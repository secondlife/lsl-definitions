  llReadKeyValue( string Key ) -> key:
    Key: ''
    tooltip: "\n                   Starts an asychronous transaction to retrieve the value associated with the key given. Will fail with XP_ERROR_KEY_NOT_FOUND if the key does not exist. The dataserver\
      \ callback will be executed with the key returned from this call and a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the\
      \ transaction succeeded (1) or not (0). In the failure case, the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the\
      \ value associated with the key.\n                "
  llUpdateKeyValue( string Key, string Value, integer Checked, string OriginalValue ) -> key:
    Key: ''
    Value: ''
    Checked: ''
    OriginalValue: ''
    tooltip: "\n                   Starts an asychronous transaction to update the value associated with the key given. The dataserver callback will be executed with the key returned from this call and\
      \ a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second\
      \ item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value associated with the key. If Checked is 1 the existing value in the\
      \ data store must match the OriginalValue passed or XP_ERROR_RETRY_UPDATE will be returned. If Checked is 0 the key will be created if necessary.\n                "
dataserver:
  dataserver( key RequestID, string Data ):
    RequestID: ''
    Data: ''
    tooltip: "This event is triggered when the requested data is returned to the script.\n\t\t\tData may be requested by the llRequestAgentData, llRequestInventoryData, and llGetNotecardLine function calls,\
      \ for example."
  llCreateKeyValue( string Key, string Value ) -> key:
    Key: ''
    Value: ''
    tooltip: "\n                   Starts an asychronous transaction to create a key-value pair. Will fail with XP_ERROR_STORAGE_EXCEPTION if the key already exists. The dataserver callback will be executed\
      \ with the key returned from this call and a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1)\
      \ or not (0). In the failure case, the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value passed to the function.\n\
      \                "
  llDataSizeKeyValue(  ) -> key:
    tooltip: "\n                   Starts an asychronous transaction the request the used and total amount of data allocated for the Experience. The dataserver callback will be executed with the key returned\
      \ from this call and a string describing the result. The result is commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case,\
      \ the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the the amount in use and the third item will be the total available.\n\
      \                "
  llDeleteKeyValue( string Key ) -> key:
    Key: ''
    tooltip: "\n                   Starts an asychronous transaction to delete a key-value pair. The dataserver callback will be executed with the key returned from this call and a string describing the\
      \ result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second item will be an integer\
      \ corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value associated with the key.\n                "
  llFindNotecardTextCount( string NotecardName, string Pattern, list Options ) -> key:
    NotecardName: ''
    Pattern: Regex pattern to find in the notecard text.
    Options: A list of options to control the search. Included for future expansion, should be []
    tooltip: "Searches the text of a cached notecard for lines containing the given pattern and returns the \n            number of matches found through a dataserver event.\n            "
  llGetNotecardLine( string NotecardName, integer LineNumber ) -> key:
    NotecardName: ''
    LineNumber: ''
    tooltip: Returns LineNumber from NotecardName via the dataserver event. The line index starts at zero in LSL, one in Lua.\nIf the requested line is passed the end of the note-card the dataserver event
      will return the constant EOF string.\nThe key returned by this function is a unique identifier which will be supplied to the dataserver event in the requested parameter.
  llGetNumberOfNotecardLines( string NotecardName ) -> key:
    NotecardName: ''
    tooltip: Returns the number of lines contained within a notecard via the dataserver event.\nThe key returned by this function is a query ID for identifying the dataserver reply.
  llKeyCountKeyValue(  ) -> key:
    tooltip: "\n                   Starts an asychronous transaction the request the number of keys in the data store. The dataserver callback will be executed with the key returned from this call and a\
      \ string describing the result. The result is commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second item will\
      \ be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will the the number of keys in the system.\n                "
  llKeysKeyValue( integer First, integer Count ) -> key:
    First: Index of the first key to return.
    Count: The number of keys to return.
    tooltip: "\n                   Starts an asychronous transaction the request a number of keys from the data store. The dataserver callback will be executed with the key returned from this call and a\
      \ string describing the result. The result is commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second item will\
      \ be an integer corresponding to one of the XP_ERROR_... constants. The error XP_ERROR_KEY_NOT_FOUND is returned if First is greater than or equal to the number of keys in the data store. In the success\
      \ case the subsequent items will be the keys requested. The number of keys returned may be less than requested if the return value is too large or if there is not enough keys remaining. The order\
      \ keys are returned is not guaranteed but is stable between subsequent calls as long as no keys are added or removed. Because the keys are returned in a comma-delimited list it is not recommended\
      \ to use commas in key names if this function is used.\n                "
  llReadKeyValue( string Key ) -> key:
    Key: ''
    tooltip: "\n                   Starts an asychronous transaction to retrieve the value associated with the key given. Will fail with XP_ERROR_KEY_NOT_FOUND if the key does not exist. The dataserver\
      \ callback will be executed with the key returned from this call and a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the\
      \ transaction succeeded (1) or not (0). In the failure case, the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the\
      \ value associated with the key.\n                "
  llRequestAgentData( key AvatarID, integer Data ) -> key:
    AvatarID: ''
    Data: ''
    tooltip: Requests data about AvatarID. When data is available the dataserver event will be raised.\nThis function requests data about an avatar. If and when the information is collected, the dataserver
      event is triggered with the key returned from this function passed in the requested parameter. See the agent data constants (DATA_*) for details about valid values of data and what each will return
      in the dataserver event.
  llRequestDisplayName( key AvatarID ) -> key:
    AvatarID: Avatar UUID
    tooltip: Requests the display name of the agent. When the display name is available the dataserver event will be raised.\nThe avatar identified does not need to be in the same region or online at the
      time of the request.\nReturns a key that is used to identify the dataserver event when it is raised.
  llRequestInventoryData( string InventoryItem ) -> key:
    InventoryItem: ''
    tooltip: Requests data for the named InventoryItem.\nWhen data is available, the dataserver event will be raised with the key returned from this function in the requested parameter.\nThe only request
      currently implemented is to request data from landmarks, where the data returned is in the form "<float, float, float>" which can be cast to a vector. This position is in region local coordinates.
  llRequestSimulatorData( string RegionName, integer Data ) -> key:
    RegionName: ''
    Data: ''
    tooltip: Requests the specified Data about RegionName. When the specified data is available, the dataserver event is raised.\nData should use one of the DATA_SIM_* constants.\nReturns a dataserver query
      ID and triggers the dataserver event when data is found.
  llRequestUserKey( string Name ) -> key:
    Name: Name of agent to look up.
    tooltip: Look up Agent ID for the named agent using a historical name.
  llRequestUsername( key AvatarID ) -> key:
    AvatarID: ''
    tooltip: Requests single-word user-name of an avatar. When data is available the dataserver event will be raised.\nRequests the user-name of the identified agent. When the user-name is available the
      dataserver event is raised.\nThe agent identified does not need to be in the same region or online at the time of the request.\nReturns a key that is used to identify the dataserver event when it
      is raised.
  llUpdateKeyValue( string Key, string Value, integer Checked, string OriginalValue ) -> key:
    Key: ''
    Value: ''
    Checked: ''
    OriginalValue: ''
    tooltip: "\n                   Starts an asychronous transaction to update the value associated with the key given. The dataserver callback will be executed with the key returned from this call and\
      \ a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second\
      \ item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value associated with the key. If Checked is 1 the existing value in the\
      \ data store must match the OriginalValue passed or XP_ERROR_RETRY_UPDATE will be returned. If Checked is 0 the key will be created if necessary.\n                "
detected:
  collision( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised while another object, or avatar, is colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information on\
      \ those objects may be gathered via the llDetected* functions."
  collision_end( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised when another object, or avatar, stops colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information on\
      \ those objects may be gathered via the llDetected* library functions."
  collision_start( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised when another object, or avatar, starts colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information\
      \ on those objects may be gathered via the llDetected* library functions."
  final_damage( integer count ):
    count: The number of damage events queued.
    tooltip: Triggered as damage is applied to an avatar or task, after all on_damage events have been processed.
  no_sensor(  ):
    tooltip: This event is raised when sensors are active, via the llSensor function call, but are not sensing anything.
  on_damage( integer count ):
    count: The number of damage events queued.
    tooltip: Triggered when an avatar or object receives damage.
  sensor( integer NumberDetected ):
    NumberDetected: ''
    tooltip: "This event is raised whenever objects matching the constraints of the llSensor command are detected.\n\t\t\tThe number of detected objects is passed to the script in the parameter. Information\
      \ on those objects may be gathered via the llDetected* functions."
  touch( integer NumberOfTouches ):
    NumberOfTouches: ''
    tooltip: "This event is raised while a user is touching the object the script is attached to.\n\t\t\tThe number of touching objects is passed to the script in the parameter.\n\t\t\tInformation on those\
      \ objects may be gathered via the llDetected* library functions."
  touch_end( integer NumberOfTouches ):
    NumberOfTouches: ''
    tooltip: "This event is raised when a user stops touching the object the script is attached to. The number of touches is passed to the script in the parameter.\n\t\t\tInformation on those objects may\
      \ be gathered via the llDetected* library functions."
  touch_start( integer NumberOfTouches ):
    NumberOfTouches: ''
    tooltip: "This event is raised when a user first touches the object the script is attached to. The number of touches is passed to the script in the parameter.\n\t\t\tInformation on those objects may\
      \ be gathered via the llDetected() library functions."
  llAdjustDamage( integer Number, float Damage ) -> void:
    Number: Damage event index to modify.
    Damage: New damage amount to apply on this event.
    tooltip: Changes the amount of damage to be delivered by this damage event.
  llDetectedDamage( integer Number ) -> list:
    Number: ''
    tooltip: Returns a list containing the current damage for the event, the damage type and the original damage delivered.
  llDetectedGrab( integer Number ) -> vector:
    Number: ''
    tooltip: Returns the grab offset of a user touching the object.\nReturns <0.0, 0.0, 0.0> if Number is not a valid object.
  llDetectedGroup( integer Number ) -> integer:
    Number: ''
    tooltip: Returns TRUE if detected object or agent Number has the same user group active as this object.\nIt will return FALSE if the object or agent is in the group, but the group is not active.
  llDetectedKey( integer Number ) -> key:
    Number: ''
    tooltip: Returns the key of detected object or avatar number.\nReturns NULL_KEY if Number is not a valid index.
  llDetectedLinkNumber( integer Number ) -> integer:
    Number: ''
    tooltip: Returns the link position of the triggered event for touches and collisions only.\n0 for a non-linked object, 1 for the root of a linked object, 2 for the first child, etc.
  llDetectedName( integer Number ) -> string:
    Number: ''
    tooltip: Returns the name of detected object or avatar number.\nReturns the name of detected object number.\nReturns empty string if Number is not a valid index.
  llDetectedOwner( integer Number ) -> key:
    Number: ''
    tooltip: Returns the key of detected object's owner.\nReturns invalid key if Number is not a valid index.
  llDetectedPos( integer Number ) -> vector:
    Number: ''
    tooltip: Returns the position of detected object or avatar number.\nReturns <0.0, 0.0, 0.0> if Number is not a valid index.
  llDetectedRezzer( integer Number ) -> key:
    Number: ''
    tooltip: Returns the key for the rezzer of the detected object.
  llDetectedRot( integer Number ) -> rotation:
    Number: ''
    tooltip: Returns the rotation of detected object or avatar number.\nReturns <0.0, 0.0, 0.0, 1.0> if Number is not a valid offset.
  llDetectedTouchBinormal( integer Index ) -> vector:
    Index: Index of detection information
    tooltip: Returns the surface bi-normal for a triggered touch event.\nReturns a vector that is the surface bi-normal (tangent to the surface) where the touch event was triggered.
  llDetectedTouchFace( integer Index ) -> integer:
    Index: Index of detection information
    tooltip: Returns the index of the face where the avatar clicked in a triggered touch event.
  llDetectedTouchNormal( integer Index ) -> vector:
    Index: Index of detection information
    tooltip: Returns the surface normal for a triggered touch event.\nReturns a vector that is the surface normal (perpendicular to the surface) where the touch event was triggered.
  llDetectedTouchPos( integer Index ) -> vector:
    Index: Index of detected information
    tooltip: Returns the position, in region coordinates, where the object was touched in a triggered touch event.\nUnless it is a HUD, in which case it returns the position relative to the attach point.
  llDetectedTouchST( integer Index ) -> vector:
    Index: Index of detection information
    tooltip: Returns a vector that is the surface coordinates where the prim was touched.\nThe X and Y vector positions contain the horizontal (S) and vertical (T) face coordinates respectively.\nEach component
      is in the interval [0.0, 1.0].\nTOUCH_INVALID_TEXCOORD is returned if the surface coordinates cannot be determined (e.g. when the viewer does not support this function).
  llDetectedTouchUV( integer Index ) -> vector:
    Index: Index of detection information
    tooltip: Returns a vector that is the texture coordinates for where the prim was touched.\nThe X and Y vector positions contain the U and V face coordinates respectively.\nTOUCH_INVALID_TEXCOORD is
      returned if the touch UV coordinates cannot be determined (e.g. when the viewer does not support this function).
  llDetectedType( integer Number ) -> integer:
    Number: ''
    tooltip: "Returns the type (AGENT, ACTIVE, PASSIVE, SCRIPTED) of detected object.\\nReturns 0 if number is not a valid index.\\nNote that number is a bit-field, so comparisons need to be a bitwise checked.\
      \ e.g.:\\ninteger iType = llDetectedType(0);\\n{\\n\t// ...do stuff with the agent\\n}"
  llDetectedVel( integer Number ) -> vector:
    Number: ''
    tooltip: Returns the velocity of the detected object Number.\nReturns<0.0, 0.0, 0.0> if Number is not a valid offset.
effects:
  llCollisionSprite( string ImpactSprite ) -> void // deprecated:
    ImpactSprite: ''
    tooltip: Suppress default collision sprites, replace default impact sprite with ImpactSprite; found in the object inventory (empty string to just suppress).
  llLinkParticleSystem( integer LinkNumber, list Rules ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
