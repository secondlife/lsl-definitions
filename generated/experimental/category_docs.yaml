  llDialog( key AvatarID, string Text, list Buttons, integer Channel ) -> void:
    AvatarID: ''
    Text: ''
    Buttons: ''
    Channel: ''
    tooltip: "Shows a dialog box on the avatar's screen with the message.\\n\n                    Up to 12 strings in the list form buttons.\\n\n                    If a button is clicked, the name is chatted\
      \ on Channel.\\nOpens a \"notify box\" in the given avatars screen displaying the message.\\n\n                Up to twelve buttons can be specified in a list of strings. When the user clicks a button,\
      \ the name of the button is said on the specified channel.\\n\n                Channels work just like llSay(), so channel 0 can be heard by everyone.\\n\n                The chat originates at the\
      \ object's position, not the avatar's position, even though it is said as the avatar (uses avatar's UUID and Name etc.).\\n\n                Examples:\\n\n                llDialog(who, \"Are you a\
      \ boy or a girl?\", [ \"Boy\", \"Girl\" ], -4913);\\n\n                llDialog(who, \"This shows only an OK button.\", [], -192);\\n\n                llDialog(who, \"This chats so you can 'hear'\
      \ it.\", [\"Hooray\"], 0);"
  llLoadURL( key AvatarID, string Text, string URL ) -> void:
