    tooltip: Sets the object status attributes specified by status to value.
  llSetText( string text, vector color, float alpha ) -> void:
    text: Floating text string to display.
    color: Color vector in RGB <R, G, B> (values from 0.0 to 1.0).
    alpha: Transparency value to set, from 0.0 (clear) to 1.0 (solid).
    tooltip: Displays floating text above the prim with the specified color vector and transparency alpha.
  llSetTouchText( string text ) -> void:
    text: Context menu text to display.
    tooltip: Displays the string text instead of 'Touch' in the right-click context menu.
quaternion:
  llAngleBetween( rotation a, rotation b ) -> float:
    a: Starting rotation.
    b: Ending rotation.
    tooltip: Returns a float representing the angle in radians between rotations a and b.
  llAxes2Rot( vector fwd, vector left, vector up ) -> rotation:
    fwd: Forward/back directional vector of the rotation.
    left: Left/right directional vector of the rotation.
    up: Up/down directional vector of the rotation.
    tooltip: Returns the rotation defined by the coordinate axes fwd, left, and up.
  llAxisAngle2Rot( vector axis, float angle ) -> rotation:
    axis: Axis vector around which the rotation is generated.
    angle: Angle of rotation, expressed in radians.
    tooltip: Returns the rotation representing a generated angle (in radians) about the specified axis.
  llEuler2Rot( vector v ) -> rotation:
    v: Vector of Euler angles to convert.
    tooltip: Returns the rotation representation of the Euler angles vector v.
  llRot2Angle( rotation rot ) -> float:
    rot: Rotation value.
    tooltip: Returns a float representing the rotation angle of rot.
  llRot2Axis( rotation rot ) -> vector:
    rot: Rotation value.
    tooltip: Returns a vector representing the rotation axis of rot.
  llRot2Euler( rotation quat ) -> vector:
    quat: Rotation value to convert.
    tooltip: Returns a vector representing the Euler rotation (roll, pitch, yaw) of quat, with each component expressed in radians.
  llRot2Fwd( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive X direction (forward) relative to the parent (root prim or region) defined by rotation q.
  llRot2Left( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Y direction (left) relative to the parent (root prim or region) defined by rotation q.
  llRot2Up( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Z direction (up) relative to the parent (root prim or region) defined by rotation q.
  llRotBetween( vector start_vec, vector end_vec ) -> rotation:
    start_vec: Starting vector.
    end_vec: Target ending vector.
    tooltip: Returns a rotation representing the shortest path rotation from vector start to vector end.
region:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  llCloud( vector offset ) -> float // deprecated:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a float representing the cloud density at the prim's position offset by the vector offset.
  llEdgeOfWorld( vector pos, vector dir ) -> integer:
    pos: Position vector in region coordinates.
    dir: Direction vector.
    tooltip: Checks if the border reached along the vector dir from the vector pos is the edge of the world (i.e., has no neighboring simulator). Returns TRUE if it hits the edge of the world, or FALSE
      if there is a neighboring simulator.
  llGetAgentList( integer scope, list options ) -> list:
    scope: Scope flag (AGENT_LIST_PARCEL, AGENT_LIST_PARCEL_OWNER, or AGENT_LIST_REGION) to filter the returned agents.
    options: A list of options to apply (currently unused).
    tooltip: Requests a list of avatar UUID keys for agents currently in the region, limited by scope. Returns a list of keys or a list containing an error message string.
  llGetEnv( string name ) -> string:
    name: Name of the regional data to request (unrecognized strings return an empty string).
    tooltip: Returns a string containing the requested regional data specified by name.
  llGetRegionAgentCount(  ) -> integer:
    tooltip: Returns an integer representing the current number of avatars in the region.
  llGetRegionCorner(  ) -> vector:
    tooltip: Returns a vector (in meters) representing the global grid coordinates of the south-west corner of the current region (Z component is always 0.0).
  llGetRegionDayLength(  ) -> integer:
    tooltip: Returns an integer representing the total number of seconds in the region-wide day cycle.
  llGetRegionDayOffset(  ) -> integer:
    tooltip: Returns an integer representing the offset duration (in seconds) added to calculate the current environmental time for the region.
  llGetRegionFPS(  ) -> float:
    tooltip: Returns a float representing the average region simulator frames per second (FPS).
  llGetRegionFlags(  ) -> integer:
    tooltip: Returns an integer bitfield representing the region flags (REGION_FLAG_*) currently enabled for the region containing the object.
  llGetRegionMoonDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the region's moon, taking altitude into account.
  llGetRegionMoonRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the moon at the region level, taking altitude track into account.
  llGetRegionName(  ) -> string:
    tooltip: Returns a string containing the name of the current region.
  llGetRegionSunDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the region's sun, taking altitude into account.
  llGetRegionSunRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the sun at the region level, taking altitude track into account.
  llGetRegionTimeDilation(  ) -> float:
    tooltip: Returns a float representing the current physics time dilation of the region, ranging from 0.0 (full dilation / slow) to 1.0 (no dilation / real-world speed).
  llGetRegionTimeOfDay(  ) -> float:
    tooltip: Returns a float with subsecond precision representing the elapsed seconds since region environmental midnight or region uptime (whichever is smaller). If the region's sun position is fixed,
      returns region uptime.
  llGetSimStats( integer stat_type ) -> float:
    stat_type: SIM_STAT_* flag of the statistic to retrieve.
    tooltip: Returns a float containing the value of the requested region statistic specified by stat_type.
  llGetSimulatorHostname(  ) -> string:
    tooltip: Returns a string containing the hostname of the server machine running the script (e.g., 'sim225.agni.lindenlab.com').
  llGround( vector offset ) -> float:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a float representing the ground height directly below the prim's position offset by the vector offset.
  llGroundContour( vector offset ) -> vector:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a vector representing the ground contour direction (the direction with no change in elevation) directly below the prim's position offset by the vector offset.
  llGroundNormal( vector offset ) -> vector:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a vector representing the ground surface normal vector directly below the current position offset by the vector offset.
  llGroundRepel( float height, integer water, float tau ) -> void:
    height: Target distance in meters above the ground or water.
    water: Boolean. If TRUE, damp relative to the higher of land and water; if FALSE, damp relative to land only.
    tau: Timescale in seconds to critically damp the movement.
    tooltip: Critically damps the object's vertical motion to height (using critical damping timescale tau) if it is within height * 0.5 of the terrain (or water level if water is TRUE). Only works on physics-enabled
      objects; do not use with vehicles.
  llGroundSlope( vector offset ) -> vector:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a vector representing the ground slope directly below the prim's position offset by the vector offset.
  llModifyLand( integer action, integer brush ) -> void:
    action: LAND_* action flag to perform (e.g., LAND_LEVEL, LAND_RAISE, LAND_LOWER, LAND_SMOOTH, LAND_NOISE, or LAND_REVERT).
    brush: Brush size (0, 1, or 2, representing 2m x 2m, 4m x 4m, or 8m x 8m).
    tooltip: Modifies the terrain using the specified land action and brush size (0, 1, or 2, corresponding to 2m x 2m, 4m x 4m, or 8m x 8m).
  llRequestSimulatorData( string region, integer data ) -> key:
    region: Case-sensitive region name.
    data: DATA_SIM_* flag of the requested simulator data.
    tooltip: Asynchronously requests data (using a DATA_SIM_* constant) about the region. Triggers a dataserver event and returns a key query handle.
  llSetGroundTexture( list changes ) -> integer:
    changes: A list of terrain detail properties and values to change.
    tooltip: Changes the painted terrain textures on the region based on changes. The script owner must have estate management rights. Returns an integer status.
  llWater( vector offset ) -> float:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a float representing the water height directly below the prim's position offset by the vector offset.
  llWind( vector offset ) -> vector:
    offset: Offset relative to the prim's position, expressed in local coordinates.
    tooltip: Returns a vector representing the wind velocity at the prim's position offset by the vector offset.
region_appearance:
  llGetRegionMoonDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the region's moon, taking altitude into account.
  llGetRegionMoonRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the moon at the region level, taking altitude track into account.
  llGetRegionSunDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the region's sun, taking altitude into account.
  llGetRegionSunRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the sun at the region level, taking altitude track into account.
  llReplaceAgentEnvironment( key agent_id, float transition, string environment ) -> integer:
    agent_id: UUID of an agent in the region participating in the experience.
    transition: Duration in seconds over which to transition to the new environment.
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    tooltip: Replaces the region and parcel environment seen by the specified agent_id as part of an experience, transitioning the settings over transition seconds. Passing NULL_KEY or an empty string for
      environment restores defaults.
  llSetAgentEnvironment( key agent_id, float transition, list params ) -> integer:
    agent_id: UUID of the agent participating in the experience.
    transition: Transition duration in seconds.
    params: A list of environmental parameters to apply.
    tooltip: Sets an individual agent's environmental settings using the attributes in params over a duration of transition seconds. Must be used as part of an experience; passing an empty list removes
      overrides.
rez:
  object_rez( key id ):
    id: UUID of the newly rezzed object.
    tooltip: Triggered when this object successfully rezzes another object from its inventory. Passes the key (UUID) id of the newly rezzed object.
  on_rez( integer start_param ):
    start_param: Integer start parameter passed from the rezzing call.
    tooltip: Triggered when the object is rezzed into the world (by a script or user). Passes start_param from the rezzing call (or 0 if rezzed from inventory). Also triggers on attachments during login
      or when attached from inventory.
  llDerezObject( key id, integer flags ) -> integer:
    id: UUID of the object in the region to derez.
    flags: Derez behavior flags matching DEREZ_* constants.
    tooltip: Derezzes (deletes or returns) a targeted object in the region previously rezzed by a script in this linkset, returning TRUE on success or FALSE on failure.
  llDie(  ) -> void:
    tooltip: Deletes the entire object containing the script (the object does not go to inventory). Use llBreakLink first to delete only a single prim.
  llGetStartParameter(  ) -> integer:
    tooltip: Returns an integer representing the start/rez parameter passed to the object on creation (returns 0 if rezzed by an agent).
  llGetStartString(  ) -> string:
    tooltip: Returns the initialization string passed to the object's root prim on rez with llRezObjectWithParams (via REZ_PARAM_STRING; returns an empty string if rezzed by an agent).
  llGodLikeRezObject( key id, vector pos ) -> void:
    id: Asset UUID of the object to rez.
    pos: Position vector in region coordinates where the object will be rezzed.
    tooltip: Rezzes an object directly from a UUID specified by id at the position pos, provided the owner has the god-bit set.
  llReturnObjectsByID( list objects ) -> integer:
    objects: A list of object UUID keys to return.
    tooltip: Returns objects specified by the list of UUIDs objects to their owners. Requires the PERMISSION_RETURN_OBJECTS permission, and the script owner must own the parcel or be an estate manager/region
      owner.
  llReturnObjectsByOwner( key owner, integer scope ) -> integer:
    owner: UUID of the avatar or group whose objects will be returned.
    scope: OBJECT_RETURN_* scope flag (such as OBJECT_RETURN_PARCEL, OBJECT_RETURN_PARCEL_OWNER, or OBJECT_RETURN_REGION).
    tooltip: Returns objects owned by owner within the specified scope (parcel, parcel owner, or region). Requires the PERMISSION_RETURN_OBJECTS permission, and the script owner must own the parcel or be
      an estate manager/region owner.
  llRezAtRoot( string item, vector pos, vector vel, rotation rot, integer start_param ) -> void:
    item: Name of the object in the prim's inventory to rez.
    pos: Position vector in region coordinates where the root of the object will be placed.
    vel: Initial velocity vector for the rezzed object.
    rot: Initial rotation of the rezzed object.
    start_param: Start parameter passed to the rezzed object's on_rez event (accessible via llGetStartParameter).
    tooltip: Instantiates the named inventory object with the root prim at pos with velocity vel and rotation rot, passing start_param as the on_rez start parameter. The vel parameter is ignored if the
      rezzed object is non-physical.
  llRezObject( string item, vector pos, vector vel, rotation rot, integer start_param ) -> void:
    item: Name of the object in the prim's inventory to rez.
    pos: Position vector in region coordinates where the center of the object will be placed.
    vel: Initial velocity vector (maximum magnitude ~200m/s).
    rot: Initial rotation of the rezzed object.
    start_param: Start parameter passed to the rezzed object's on_rez event (accessible via llGetStartParameter).
    tooltip: Instantiates the named inventory object with the bounding box centered at pos with velocity vel and rotation rot, passing param as the on_rez start parameter. The vel parameter is ignored if
      the rezzed object is non-physical.
  llRezObjectWithParams( string item, list options ) -> key:
    item: Name of the object in the prim's inventory to rez.
    options: A list of REZ_* options to configure the rezzed object's attributes.
    tooltip: Instantiates the named inventory object (defaulting to the rezzing prim's position unless REZ_POS is specified) using the initial set of parameters specified in options. Returns the key of
      the rezzed object, or a blank key on failure.
script:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  on_rez( integer start_param ):
    start_param: Integer start parameter passed from the rezzing call.
    tooltip: Triggered when the object is rezzed into the world (by a script or user). Passes start_param from the rezzing call (or 0 if rezzed from inventory). Also triggers on attachments during login
      or when attached from inventory.
  state_entry(  ):
    tooltip: Triggered immediately whenever a new state is entered (including at script start). It is always the first event handled.
  state_exit(  ):
    tooltip: Triggered when the state command is used to transition out of the current state. Handled before entering the new state's state_entry.
  timer(  ):
    tooltip: Triggered at regular periodic intervals configured by llSetTimerEvent.
  llGetAndResetTime(  ) -> float:
    tooltip: Returns the elapsed script time in seconds as a float, then resets the script timer to zero.
  llGetEnergy(  ) -> float:
    tooltip: Returns a float representing the remaining physics energy of the object as a percentage (0.0 to 1.0) of its maximum capacity.
  llGetFreeMemory(  ) -> integer:
    tooltip: Returns an integer representing the number of free bytes of memory currently available to the script.
  llGetFreeURLs(  ) -> integer:
    tooltip: Returns an integer representing the number of available HTTP URLs (remaining for the owner if the object is attached, or for the region if unattached).
  llGetMemoryLimit(  ) -> integer:
    tooltip: Returns an integer representing the maximum memory limit (in bytes) that the script is allowed to allocate.
  llGetSPMaxMemory(  ) -> integer:
    tooltip: Returns an integer representing the maximum memory (in bytes) used by the script while the memory profiler was last active (only valid after using PROFILE_SCRIPT_MEMORY).
  llGetScriptName(  ) -> string:
    tooltip: Returns a string containing the name of the script calling this function.
  llGetScriptState( string script ) -> integer:
    script: Name of the script in the prim's inventory.
    tooltip: Returns a boolean integer indicating whether the specified script in the prim's inventory is running (returns TRUE if running, FALSE otherwise).
  llGetStartParameter(  ) -> integer:
    tooltip: Returns an integer representing the start/rez parameter passed to the object on creation (returns 0 if rezzed by an agent).
  llGetStartString(  ) -> string:
    tooltip: Returns the initialization string passed to the object's root prim on rez with llRezObjectWithParams (via REZ_PARAM_STRING; returns an empty string if rezzed by an agent).
  llGetTime(  ) -> float:
    tooltip: Returns a float representing the elapsed script time in seconds with subsecond precision (since the script started, was reset, or since the last call to llResetTime or llGetAndResetTime).
  llGetUsedMemory(  ) -> integer:
    tooltip: Returns an integer representing the total number of bytes of memory currently used by the script (non-Mono scripts always return 16,384 bytes).
  llMinEventDelay( float delay ) -> void:
    delay: Minimum delay duration in seconds.
    tooltip: Sets the minimum delay time between events being handled (minimums and defaults vary by event type).
  llRemoteLoadScript( key target, string script, integer running, integer start_param ) -> void // private // deprecated:
    target: UUID of the target prim.
    script: Name of the script in the prim's inventory.
    running: Boolean. If TRUE, sets the copied script to run immediately; if FALSE, leaves it stopped.
    start_param: Integer start parameter passed to the copied script (readable via llGetStartParameter).
    tooltip: Deprecated.
  llRemoteLoadScriptPin( key target, string script, integer pin, integer running, integer start_param ) -> void:
    target: UUID of the target prim in the same region.
    script: Name of the script in the prim's inventory.
    pin: Integer PIN code (must match the PIN set on the ObjectID via llSetRemoteScriptAccessPin).
    running: Boolean. If TRUE, sets the copied script to run immediately; if FALSE, leaves it stopped.
    start_param: Integer start parameter passed to the copied script (readable via llGetStartParameter).
    tooltip: Copies the script into target, setting it running (if running is TRUE) with the start_param, provided the script owner has modify permissions on target and target's PIN matches pin (set via
      llSetRemoteScriptAccessPin).
  llResetOtherScript( string script ) -> void:
    script: Name of the target script in the prim's inventory.
    tooltip: Resets the named script name in the prim's inventory.
  llResetScript(  ) -> void:
    tooltip: Resets the current script.
  llResetTime(  ) -> void:
    tooltip: Resets the script's elapsed time timer back to zero.
  llScriptDanger( vector pos ) -> integer:
    pos: Position vector in region coordinates to check.
    tooltip: Returns TRUE if the vector position pos is over public land, sandbox land, land restricting edit/build permissions, or land that disables outside scripts.
  llScriptProfiler( integer flags ) -> void:
    flags: PROFILE_* flag (such as PROFILE_NONE or PROFILE_SCRIPT_MEMORY) to set the profiling state.
    tooltip: Enables or disables the script's profiling state using flags (supports PROFILE_SCRIPT_MEMORY on Mono, or PROFILE_NONE). Active profiling can significantly reduce script performance.
  llSetMemoryLimit( integer limit ) -> integer:
    limit: Integer memory limit in bytes to reserve (must be less than the 64KB maximum).
    tooltip: Requests that limit bytes are reserved for the script. Returns TRUE on success or FALSE on failure (has no effect in LSO).
  llSetRemoteScriptAccessPin( integer pin ) -> void:
    pin: Integer PIN code (non-zero enables, zero disables).
    tooltip: Sets the prim's remote script access PIN to pin (a non-zero value enables loading via llRemoteLoadScriptPin, while zero disables it).
  llSetScriptState( string script, integer running ) -> void:
    script: Name of the script in the prim's inventory.
    running: Boolean. If TRUE, enables the script; if FALSE, disables it.
    tooltip: Sets the running state of the named script in the prim's inventory. If running is TRUE, the script is enabled; if FALSE, it is disabled.
  llSetTimerEvent( float sec ) -> void:
    sec: Interval in seconds between timer events (0.0 to disable).
    tooltip: Sets a timer to trigger a timer event periodically every sec seconds. Passing 0.0 stops further timer events.
  llSleep( float sec ) -> void:
    sec: Duration in seconds to put the script to sleep.
    tooltip: Puts the script to sleep for sec seconds (at least until the next server-frame, ~0.02222 seconds). The script is inactive during this time. If sec is 0.0 or less, the script does not sleep.
script_communication:
  http_request( key request_id, string method, string body ):
    request_id: Unique key identifying the incoming HTTP request (used with llHTTPResponse).
    method: HTTP method string ('GET', 'POST', 'PUT', 'DELETE') or URL request status constants.
    body: String payload of the incoming request body.
    tooltip: Triggered when the script's registered URL receives an incoming HTTP request identified by request_id.
  http_response( key request_id, integer status, list metadata, string body ):
    request_id: Key matching the handle returned by the initiating llHTTPRequest call.
    status: Integer HTTP status code returned (such as 200 or 404).
    metadata: A list of HTTP_* constants and response headers metadata.
    body: String payload of the received response body.
    tooltip: Triggered when an HTTP response body is received for a pending request_id, or if the request fails or times out.
  link_message( integer sender_num, integer num, string str, key id ):
    sender_num: Link index of the prim containing the script that sent the message.
    num: An integer value passed from the sending script.
    str: A text string value passed from the sending script.
    id: A key value passed from the sending script.
    tooltip: Triggered when the script receives a link message from sender_num, containing the parameters num, str, and id sent via llMessageLinked.
  listen( integer channel, string name, key id, string message ):
    channel: Chat channel where the message appeared.
    name: Name of the sending prim or the legacy name of the sending avatar.
    id: UUID of the sending avatar or prim.
    message: Spoken text string.
    tooltip: Triggered when a chat message matching active llListen filters is received on channel. Passes the sender's name and UUID key id, along with the spoken message string.
  remote_data( integer event_type, key channel, key message_id, string sender, integer idata, string sdata ) // deprecated:
    event_type: Integer constant representing the type of XML-RPC event.
    channel: XML-RPC channel ID key.
    message_id: XML-RPC message ID key.
    sender: XML-RPC sender string.
    idata: Payload integer data.
    sdata: Payload string data.
    tooltip: Deprecated. Triggered by incoming XML-RPC calls, passing event_type, channel, message_id, sender, idata, and sdata.
  llCloseRemoteDataChannel( key channel ) -> void // deprecated:
    channel: XML-RPC channel ID to close.
    tooltip: Deprecated. Closes the specified XML-RPC channel.
  llGetNextEmail( string address, string subject ) -> void:
    address: Sender email address filter.
    subject: Email subject filter.
    tooltip: Requests the next queued email matching the specified sender address and subject filters via the email event.
  llHTTPRequest( string url, list parameters, string body ) -> key:
    url: Destination HTTP or HTTPS URL.
    parameters: A list of HTTP_* configuration flags and value pairs.
    body: String contents of the request body.
    tooltip: Sends an HTTP request to the specified url containing body and configured via parameters. Raises an http_response event and returns a key query handle identifying the request.
  llHTTPResponse( key request_id, integer status, string body ) -> void:
    request_id: Unique key identifying the incoming HTTP request.
    status: Integer HTTP status code (such as 200, 400, or 404) to respond with.
    body: String contents of the response body.
    tooltip: Responds to the incoming HTTP request identified by request_id with the HTTP status code status and the payload body.
  llListen( integer channel, string name, key id, string msg ) -> integer:
    channel: Input chat channel to listen on (any integer from -2147483648 to 2147483647).
    name: Specific prim name or avatar legacy name to filter by (or empty string for no filter).
    id: Specific avatar or prim UUID to filter by (or NULL_KEY for no filter).
    msg: Specific chat message string to filter by (or empty string for no filter).
    tooltip: Creates a listener on channel from name and id for msg. Returns an integer listener handle used to control or remove the listener. Empty strings or NULL_KEY filters do not filter on those parameters.
  llListenControl( integer handle, integer active ) -> void:
    handle: Integer listener handle returned by llListen.
    active: Boolean. If TRUE, activates the listener; if FALSE, deactivates it.
    tooltip: Enables or disables the listener specified by the integer handle. If active is TRUE, the listener is activated; if FALSE, it is deactivated.
  llListenRemove( integer handle ) -> void:
    handle: Integer listener handle returned by llListen to remove.
    tooltip: Completely removes the listener specified by the integer handle.
  llMessageLinked( integer link, integer num, string str, key id ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag controlling which prim(s) receive the message.
    num: An integer value passed as the second parameter of the link_message event.
    str: A string value passed as the third parameter of the link_message event.
    id: A key value passed as the fourth parameter of the link_message event.
    tooltip: Triggers a link_message event, sending num, str, and id to the scripts in the prim(s) specified by link to allow scripts within the same object to communicate.
  llOpenRemoteDataChannel(  ) -> void // deprecated:
    tooltip: Deprecated. Creates a channel to listen for incoming XML-RPC calls, triggering a remote_data event with the channel ID once available.
  llRegionSay( integer channel, string msg ) -> void:
    channel: Output chat channel to broadcast on (must be non-zero).
    msg: Text message string to broadcast.
    tooltip: Broadcasts the message msg on channel to the entire region (heard by any script listening on that channel; channel 0 is not permitted).
  llRegionSayTo( key target, integer channel, string msg ) -> void:
    target: UUID of the destination avatar or prim in the same region.
    channel: Output chat channel (any integer value).
    msg: Text message string to send.
    tooltip: Sends the message msg on channel privately to the targeted avatar or object (if within the region). If target is an avatar and channel is non-zero, the message can also be heard by any attachments
      worn by the avatar.
  llRemoteDataReply( key channel, key message_id, string sdata, integer idata ) -> void // deprecated:
    channel: XML-RPC channel ID.
    message_id: XML-RPC message ID.
    sdata: String payload data to reply with.
    idata: Integer payload data to reply with.
    tooltip: Deprecated. Sends an XML-RPC reply on channel to message_id with payload string sdata and integer idata.
  llRemoteDataSetRegion(  ) -> void // deprecated:
    tooltip: Deprecated. Used with XML-RPC to reregister remote data channels if the object moves to another region.
  llRequestSecureURL(  ) -> key:
    tooltip: Asynchronously requests one secure HTTPS (SSL, port 12043) URL for use by this object, triggering an http_request event. Returns a key query handle.
  llRequestURL(  ) -> key:
    tooltip: Asynchronously requests one HTTP URL for use by this script, triggering an http_request event. Returns a key query handle.
  llSay( integer channel, string msg ) -> void:
    channel: Integer chat channel to transmit the message on.
    msg: Text message string to transmit.
    tooltip: Says the text message msg on the specified channel. The message can be heard up to a 20m radius. Channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not visible to avatars
      and can be used for script-to-script communication.
  llSendRemoteData( key channel, string dest, integer idata, string sdata ) -> key // deprecated:
    channel: XML-RPC channel ID.
    dest: Destination XML-RPC URL or server.
    idata: Integer payload data.
    sdata: String payload data.
    tooltip: Deprecated. Sends an XML-RPC request to dest on channel, containing the channel ID as a string, integer idata, and string sdata. Returns a key representing the message_id.
  llShout( integer channel, string msg ) -> void:
    channel: Integer chat channel to shout the message on.
    msg: Text message string to transmit.
    tooltip: Shouts the text message msg on the specified channel. The message can be heard up to a 100m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
  llWhisper( integer channel, string msg ) -> void:
    channel: Integer chat channel to whisper the message on.
    msg: Text message string to transmit.
    tooltip: Whispers the text message msg on the specified channel. The message can be heard up to a 10m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
sensor:
  collision( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar or another object is colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_end( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object stops colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_start( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object first begins colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  no_sensor(  ):
    tooltip: Triggered when active sensors (from llSensor or llSensorRepeat) complete a scan without finding any matching targets.
  sensor( integer num_detected ):
    num_detected: Total number of detected targets found (usable with llDetected* functions).
    tooltip: Triggered when objects matching constraints of llSensor or llSensorRepeat are successfully detected. Passes num_detected, representing the number of detected targets.
  llCastRay( vector start_pos, vector end_pos, list options ) -> list:
    start_pos: Starting location vector of the ray.
    end_pos: Ending location vector of the ray.
    options: A list of option flags and their parameters to configure the raycast.
    tooltip: Casts a ray into the physics world from start to end and reports collision data for intersections with objects based on options. Returns a list of strided values [UUID_1, {link_number_1}, hit_position_1,
      {hit_normal_1}, ..., status_code]. A negative status_code indicates an error; otherwise, it represents the number of hits.
  llCollisionFilter( string name, key id, integer accept ) -> void:
    name: Specific object name or avatar legacy name to filter for.
    id: Group, avatar, or object UUID to filter by.
    accept: Boolean. If TRUE, only collisions matching the name and id filters are processed; if FALSE, matching collisions are excluded.
    tooltip: Sets the collision filter, either exclusively or inclusively. If accept is TRUE, only collisions matching name and id are processed; if FALSE, matches are excluded. Pass an empty string or
      NULL_KEY to name or id to skip filtering on that parameter.
  llPassCollisions( integer pass ) -> void:
    pass: A PASS_* flag (e.g., PASS_ALWAYS, PASS_IF_NOT_HANDLED, or PASS_NEVER).
    tooltip: Sets the pass-collisions attribute. If pass is TRUE, collision events are passed from child prims to the root; if FALSE (default), they only trigger events in the affected child prim.
  llSensor( string name, key id, integer type, float radius, float arc ) -> void:
    name: Specific object or avatar name to filter for (or empty string for no filter).
    id: UUID of the group, avatar, or object to filter by (or NULL_KEY for no filter).
    type: Integer bitfield type mask containing AGENT, AGENT_BY_LEGACY_NAME, AGENT_BY_USERNAME, ACTIVE, PASSIVE, or SCRIPTED (0 for no filter).
    radius: Maximum distance in meters to scan (range [0.0, 96.0]).
    arc: Maximum angle in radians relative to the local X-axis to scan (range [0.0, PI]).
    tooltip: Performs a single scan from the prim's forward vector for name and id of type within radius meters and arc radians. Results trigger a sensor or no_sensor event. Passing empty filters (blank
      name, 0 type, or NULL_KEY id) disables that filter.
  llSensorRemove(  ) -> void:
    tooltip: Removes the periodic sensor previously configured by llSensorRepeat.
  llSensorRepeat( string name, key id, integer type, float radius, float arc, float rate ) -> void:
    name: Specific object or avatar name to filter for (or empty string for no filter).
    id: UUID of the group, avatar, or object to filter by (or NULL_KEY for no filter).
    type: Integer bitfield type mask containing AGENT, AGENT_BY_LEGACY_NAME, AGENT_BY_USERNAME, ACTIVE, PASSIVE, or SCRIPTED (0 for no filter).
    radius: Maximum distance in meters to scan (range [0.0, 96.0]).
    arc: Maximum angle in radians relative to the local X-axis to scan (range [0.0, PI]).
    rate: Interval in seconds between repeated scans.
    tooltip: Sets up a repeating periodic scan every rate seconds for name and id of type within radius meters and arc radians of the forward vector. Results trigger sensor or no_sensor events.
  llVolumeDetect( integer detect ) -> void:
    detect: Boolean. If TRUE, enables VolumeDetect; if FALSE (default), disables it.
    tooltip: If detect is TRUE, enables VolumeDetect (object becomes phantom and physical objects/avatars can pass through it). Triggers collision_start on initial intersection and collision_end when intersection
      stops (standard collision events are suppressed while intersecting).
sit:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  llAvatarOnLinkSitTarget( integer link ) -> key:
    link: Index of the prim in the linkset (1 for root, >1 for children), or a LINK_* flag.
    tooltip: Returns the UUID of the avatar seated on the specified link's sit target, or NULL_KEY if no avatar is sitting there.
  llAvatarOnSitTarget(  ) -> key:
    tooltip: Returns the UUID of the avatar seated on the prim's sit target (defined via llSitTarget), or NULL_KEY if no avatar is sitting there or the prim lacks a sit target.
  llGetLinkSitFlags( integer link ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns an integer representing the active sit flags currently set on the linked prim specified by link.
  llLinkSitTarget( integer link, vector offset, rotation rot ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    offset: Offset position vector in local prim coordinates.
    rot: Rotation relative to the prim's rotation.
    tooltip: Sets the sit target position (offset) and orientation (rot) for the linked prim link, relative to the prim's own position and rotation. Clear by setting offset to <0.0, 0.0, 0.0>.
  llSetLinkCamera( integer link, vector eye, vector at ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    eye: Eye offset position vector in local coordinates relative to the prim.
    at: Look-at offset position vector in local coordinates relative to the prim.
    tooltip: Sets the camera eye position offset eye and looking-at position offset at for avatars who sit on the linked prim link.
  llSetLinkSitFlags( integer link, integer flags ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    flags: A bitfield of sit flags (SIT_FLAG_*) to apply.
    tooltip: Sets the sit target flags for the linked prim link inside the linkset.
  llSetSitText( string text ) -> void:
    text: Context menu text to display.
    tooltip: Displays the string text instead of 'Sit' (or 'Sit Here') in the viewer's right-click context menu.
  llSitOnLink( key agent_id, integer link ) -> integer:
    agent_id: UUID of the avatar being forced to sit.
    link: Link number for the prim containing the desired sit target.
    tooltip: Forces the avatar specified by agent_id (who must be participating in the experience) to sit on the sit target of the prim indicated by link. If occupied, searches down the linkset for an available
      sit target. Returns an integer.
  llSitTarget( vector offset, rotation rot ) -> void:
    offset: Target position vector in local prim coordinates.
    rot: Target rotation relative to the prim's rotation.
    tooltip: Sets the sit target position (offset) and rotation (rot) relative to the prim's position and orientation. Clears the sit target if offset is ZERO_VECTOR.
  llUnSit( key id ) -> void:
    id: UUID of the avatar to unsit.
    tooltip: Forces the agent specified by id to stand up if they are sitting on the object containing the script, or are currently over land owned by the object's owner.
sound:
  llAdjustSoundVolume( float volume ) -> void:
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Adjusts the volume of the currently playing attached sound (has no effect on sounds started with llTriggerSound).
  llCollisionSound( string impact_sound, float impact_volume ) -> void:
    impact_sound: UUID of a sound, the name of a sound in the prim's inventory, or an empty string to suppress sounds.
    impact_volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Suppresses default collision sounds and replaces default impact sounds with impact_sound at the volume level specified by impact_volume. Supply an empty string to only suppress collision sounds.
  llCollisionSprite( string impact_sprite ) -> void // deprecated:
    impact_sprite: UUID of a texture, the name of a texture in the prim's inventory, or an empty string to suppress sprites.
    tooltip: Suppresses default collision sprites and replaces them with impact_sprite (which must be in the prim's inventory). Supply an empty string to only suppress collision sprites.
  llLinkAdjustSoundVolume( integer link, float volume ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag of the prim to adjust.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Adjusts the volume of the currently playing sound attached to the linked prim link (has no effect on sounds started with llTriggerSound).
  llLinkPlaySound( integer link, string sound, float volume, integer flags ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    flags: Bitwise flags (combination of SOUND_*) controlling the sound playback.
    tooltip: Plays the specified sound on the linked prim link (once or looping) at volume. Only one sound can be attached to a prim at a time; new attachments or calling llStopSound stops previous playback.
      Controlled by flags.
  llLinkSetSoundQueueing( integer link, integer queue ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    queue: Boolean. If TRUE, sound queuing is enabled; if FALSE, it is disabled.
    tooltip: Enables or disables sound queuing on the linked prim link. When set to TRUE, sounds will queue and play in sequence.
  llLinkSetSoundRadius( integer link, float radius ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    radius: Maximum distance in meters at which the sounds can be heard.
    tooltip: Limits the audibility radius of attached and triggered scripted sounds to distance radius (in meters) around the linked prim link.
  llLinkStopSound( integer link ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Stops the playback of any currently playing attached sound on the linked prim link.
  llLoopSound( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays the attached sound looping indefinitely at the specified volume. Only one sound can be attached to a prim at a time; new loops adjust the volume of the currently playing sound without
      restarting it.
  llLoopSoundMaster( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays the attached sound looping indefinitely at the specified volume and declares it a Sync Master, forcing slave sounds to synchronize with it.
  llLoopSoundSlave( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays the attached sound looping indefinitely at the specified volume, synchronized to the most audible active Sync Master in range.
  llPlaySound( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays the specified sound once at volume, attached to the object. Only one sound can be attached to a prim at a time; new sounds or calling llStopSound stops previous playback. A second call
      with the same sound adjusts the volume without restarting it.
  llPlaySoundSlave( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays the attached sound once at volume, synchronized to the next loop point of the most audible active Sync Master.
  llPreloadSound( string sound ) -> void:
    sound: Name of the sound in the prim's inventory, or a UUID.
    tooltip: Causes nearby viewers in range to preload the specified sound from the object's inventory to prevent playback delays.
  llSetSoundQueueing( integer queue ) -> void:
    queue: Boolean. If TRUE, sound queuing is enabled; if FALSE, it is disabled.
    tooltip: Sets whether attached sounds wait for the current sound to end before playing (enables queuing if queue is TRUE, disables if FALSE). The queue is one level deep.
  llSetSoundRadius( float radius ) -> void:
    radius: Maximum distance in meters at which the sounds can be heard.
    tooltip: Limits the audibility radius of attached and triggered scripted sounds to distance radius.
  llSound( string sound, float volume, integer queue, integer loop ) -> void // deprecated:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    queue: Boolean. If TRUE, queues the sound; if FALSE, interrupts the currently playing sound.
    loop: Boolean. If TRUE, loops the sound.
    tooltip: Deprecated (use llPlaySound instead). Plays the specified sound at volume, with options to loop or queue the sound.
  llSoundPreload( string sound ) -> void // deprecated:
    sound: Name of a sound in the prim's inventory, or a UUID.
    tooltip: Deprecated (use llPreloadSound instead). Preloads the specified sound on viewers within range.
  llStopSound(  ) -> void:
    tooltip: Stops playback of the currently playing attached sound.
  llTriggerSound( string sound, float volume ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Plays specified sound once at volume, centered at the object's current position but not attached (does not move with the object and cannot be stopped or adjusted). Does not affect attached
      sounds.
  llTriggerSoundLimited( string sound, float volume, vector top_north_east, vector bottom_south_west ) -> void:
    sound: Name of a sound in the prim's inventory, or a UUID.
    volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    top_north_east: Top-north-east boundary position vector in region coordinates.
    bottom_south_west: Bottom-south-west boundary position vector in region coordinates.
    tooltip: Plays the specified sound once at volume, centered at the object but not attached, restricted to the axis-aligned bounding box defined by the coordinates top_north_east and bottom_south_west.
string:
  llChar( integer val ) -> string:
    val: Unicode codepoint integer (ordinal) to convert.
    tooltip: Constructs and returns a single-character string from the given Unicode codepoint ordinal.
  llDeleteSubString( string src, integer start_index, integer end_index ) -> string:
    src: Source string to modify.
    start_index: Starting codepoint index of the substring to remove (inclusive). Supports negative indexing.
    end_index: Ending codepoint index of the substring to remove (inclusive). Supports negative indexing.
    tooltip: Returns a copy of the string src with the characters from start_index to end_index (inclusive) removed. Negative indices count backward from the end of the string. If start_index is greater
      than end_index, the deletion excludes the specified range.
  llGetSubString( string src, integer start_index, integer end_index ) -> string:
    src: Source string to slice.
    start_index: Starting codepoint index (inclusive). Supports negative indexing.
    end_index: Ending codepoint index (inclusive). Supports negative indexing.
    tooltip: Returns a copy of the substring from src within the inclusive codepoint range start_index..end_index. Negative indices count backward from the end of the string. If start_index is greater than
      end_index, the substring is the excluded range.
  llInsertString( string dst, integer index, string src ) -> string:
    dst: Target destination string.
    index: Codepoint index where insertion starts.
    src: Source string to insert.
    tooltip: Returns a copy of dst with src inserted at the given codepoint index.
  llOrd( string val, integer index ) -> integer:
    val: Source string.
    index: Codepoint index of the character to convert. Supports negative indexing.
    tooltip: Returns the ordinal (Unicode copepoint integer) of the character at index in the string val. Negative indices count backward from the end of the string.
  llReplaceSubString( string src, string pattern, string replacement_pattern, integer count ) -> string:
    src: Original source string to search.
    pattern: Substring pattern to find and replace.
    replacement_pattern: New substring that replaces the pattern.
    count: Maximum number of replacements to make (0 for all, positive for left-to-right, negative for right-to-left).
    tooltip: Returns a copy of src with count occurrences of pattern replaced by replacement_pattern. Setting count to 0 replaces all occurrences; positive counts process left-to-right, while negative counts
      process right-to-left.
  llStringLength( string str ) -> integer:
    str: String to measure.
    tooltip: Returns the number of unicode codepoints in the string.
  llStringTrim( string src, integer type ) -> string:
    src: String to trim.
    type: Trim type flag (STRING_TRIM_HEAD, STRING_TRIM_TAIL, or STRING_TRIM).
    tooltip: Returns a copy of the string src with leading, trailing, or both types of whitespace (including spaces, tabs, and line feeds) eliminated, according to the specified trim type.
  llSubStringIndex( string source, string pattern ) -> integer:
    source: Source string to search within.
    pattern: Substring pattern to search for.
    tooltip: Returns the codepoint index of the first occurrence of pattern inside the string source. Returns -1 if not found. No regex.
  llToLower( string src ) -> string:
    src: Source string to convert.
    tooltip: Returns a lowercase copy of the string src. Converts all unicode characters, not just ASCII.
  llToUpper( string src ) -> string:
    src: Source string to convert.
    tooltip: Returns an uppercase copy of the string src. Converts all unicode characters, not just ASCII.
teleport:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  llMapDestination( string simname, vector pos, vector look_at ) -> void:
    simname: Name of the target simulator region.
    pos: Position vector in region coordinates to highlight.
    look_at: Position in local coordinates (currently unused/ignored).
    tooltip: 'Opens the world map for the avatar touching or wearing the object, centered on simname with pos highlighted. Only works for attached scripts or during touch events. Note: look_at currently
      has no effect.'
  llTeleportAgent( key agent, string landmark, vector position, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    landmark: Name of the landmark in the prim's inventory, or an empty string to teleport locally.
    position: Position vector in local region coordinates to teleport to if landmark is empty.
    look_at: Position vector (or direction unit vector if teleporting out of region) the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to a landmark in the object's inventory. If landmark is empty, teleports them to position within the current region. Upon arrival,
      the agent is turned to face look_at. Can only teleport the owner.
  llTeleportAgentGlobalCoords( key agent, vector global_coordinates, vector region_coordinates, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    global_coordinates: Global coordinates vector of the target region (obtained via llRequestSimulatorData).
    region_coordinates: Target coordinates vector within the destination region.
    look_at: Position vector within the region (or unit direction vector if out of region) that the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to region_coordinates within a target region specified by global_coordinates. Upon landing, the agent faces the direction look_at.
      Can only teleport the owner.
  llTeleportAgentHome( key avatar ) -> void:
    avatar: UUID of the avatar to teleport.
    tooltip: Teleports the avatar (who must be standing on land owned by the script owner) directly to their designated home location without warning (similar to a God Summons).
time:
  timer(  ):
    tooltip: Triggered at regular periodic intervals configured by llSetTimerEvent.
  llGetDate(  ) -> string:
    tooltip: Returns a string representing the current date in the UTC time zone in the format 'YYYY-MM-DD'.
  llGetDayLength(  ) -> integer:
    tooltip: Returns an integer representing the number of seconds in the environmental day cycle applied to the current parcel.
  llGetDayOffset(  ) -> integer:
    tooltip: Returns an integer representing the offset duration (in seconds) added to calculate the current environmental time on this parcel.
  llGetGMTclock(  ) -> float:
    tooltip: Returns a float representing the time in seconds since midnight GMT (truncated to whole seconds).
  llGetRegionDayLength(  ) -> integer:
    tooltip: Returns an integer representing the total number of seconds in the region-wide day cycle.
  llGetRegionDayOffset(  ) -> integer:
    tooltip: Returns an integer representing the offset duration (in seconds) added to calculate the current environmental time for the region.
  llGetRegionTimeOfDay(  ) -> float:
    tooltip: Returns a float with subsecond precision representing the elapsed seconds since region environmental midnight or region uptime (whichever is smaller). If the region's sun position is fixed,
      returns region uptime.
  llGetTimeOfDay(  ) -> float:
    tooltip: Returns a float with subsecond precision representing the elapsed seconds since parcel environmental midnight or region uptime (whichever is smaller). If the parcel's sun position is fixed,
      returns region uptime.
  llGetTimestamp(  ) -> string:
    tooltip: Returns a string containing the current date and time in the UTC time zone formatted as an ISO 8601 timestamp ('YYYY-MM-DDThh:mm:ss.ff..fZ').
  llGetUnixTime(  ) -> integer:
    tooltip: Returns an integer representing the current Unix timestamp (the number of seconds elapsed since 00:00:00 Jan 1, 1970 UTC).
  llGetWallclock(  ) -> float:
    tooltip: Returns a float representing the time in seconds since midnight Pacific Time (PST/PDT), which is equivalent to Second Life Time (SLT) truncated to whole seconds.
  llSetTimerEvent( float sec ) -> void:
    sec: Interval in seconds between timer events (0.0 to disable).
    tooltip: Sets a timer to trigger a timer event periodically every sec seconds. Passing 0.0 stops further timer events.
  llSleep( float sec ) -> void:
    sec: Duration in seconds to put the script to sleep.
    tooltip: Puts the script to sleep for sec seconds (at least until the next server-frame, ~0.02222 seconds). The script is inactive during this time. If sec is 0.0 or less, the script does not sleep.
touch:
  touch( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar touches the object. Passes num_detected, representing the number of touching agents.
  touch_end( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar stops touching the object. Passes num_detected, representing the number of touching agents.
  touch_start( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar first touches the object. Passes num_detected, representing the number of touching agents.
  llDetectedGrab( integer number ) -> vector:
    number: Index of the detection information.
    tooltip: Returns a vector representing the grab offset of the user touching the object. Only works in touch events and returns <0.0, 0.0, 0.0> if number is not a valid index.
  llDetectedTouchBinormal( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface binormal vector (tangent to the surface, pointing along the positive T (V) direction of tangent space) at the touched location specified by index. Can be used with llDetectedTouchNormal
      to determine the tangent space.
  llDetectedTouchFace( integer index ) -> integer:
    index: Index of the detection information.
    tooltip: Returns the integer index of the face clicked by the avatar in the touch event specified by index.
  llDetectedTouchNormal( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface normal vector (perpendicular to the surface) at the touched location specified by index. Can be used with llDetectedTouchBinormal to determine the tangent space.
  llDetectedTouchPos( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the vector position where the object was touched (specified by index) in region coordinates, or in screen-space coordinates if the object is attached as a HUD.
  llDetectedTouchST( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface coordinates (<s, t, 0.0>) where the prim was touched, specified by index. X and Y contain the horizontal (s) and vertical (t) face coordinates, typically in the interval
      [0.0, 1.0]. Returns TOUCH_INVALID_TEXCOORD if coordinates cannot be determined.
  llDetectedTouchUV( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the texture coordinates (<u, v, 0.0>) where the prim was touched, specified by index. X and Y contain the horizontal (u) and vertical (v) texture coordinates, typically in the interval
      [0.0, 1.0] (affected by repeats and rotation). Returns TOUCH_INVALID_TEXCOORD if coordinates cannot be determined.
  llPassTouches( integer pass ) -> void:
    pass: A PASS_* flag (e.g., PASS_ALWAYS, PASS_IF_NOT_HANDLED, or PASS_NEVER).
    tooltip: Sets the pass-touches attribute. If pass is TRUE, touch events are passed from child prims to the root; if FALSE (default), they only trigger events in the affected child prim.
  llSetClickAction( integer action ) -> void:
    action: CLICK_ACTION_* flag representing the action to apply.
    tooltip: Sets the action (a CLICK_ACTION_* flag) performed when an avatar left-clicks the prim.
  llSetTouchText( string text ) -> void:
    text: Context menu text to display.
    tooltip: Displays the string text instead of 'Touch' in the right-click context menu.
user_interface:
  touch( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar touches the object. Passes num_detected, representing the number of touching agents.
  touch_end( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar stops touching the object. Passes num_detected, representing the number of touching agents.
  touch_start( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar first touches the object. Passes num_detected, representing the number of touching agents.
  llDialog( key avatar, string message, list buttons, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    buttons: A list of up to 12 strings representing button labels.
    channel: Output chat channel (any integer value) where button clicks are chatted.
    tooltip: Shows a dialog box on the screen of the avatar specified by avatar, displaying message along with up to 12 choice buttons. Clicking a button chats its label on channel.
  llLoadURL( key avatar, string message, string url ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    url: Web URL to open.
    tooltip: Shows a dialog box displaying message to the avatar avatar offering to open the specified url. Clicking yes launches the URL in their default web browser.
  llMapBeacon( string region_name, vector pos, list options ) -> void:
    region_name: Name of the region where the beacon is displayed.
    pos: Position vector in region coordinates to highlight.
    options: A list of options to configure the map beacon.
    tooltip: Displays an in-world beacon and optionally opens the world map for the avatar touching or wearing the object, centered on region_name with pos highlighted. Only works for attached scripts or
      during touch events.
  llMapDestination( string simname, vector pos, vector look_at ) -> void:
    simname: Name of the target simulator region.
    pos: Position vector in region coordinates to highlight.
    look_at: Position in local coordinates (currently unused/ignored).
    tooltip: 'Opens the world map for the avatar touching or wearing the object, centered on simname with pos highlighted. Only works for attached scripts or during touch events. Note: look_at currently
      has no effect.'
  llSetClickAction( integer action ) -> void:
    action: CLICK_ACTION_* flag representing the action to apply.
    tooltip: Sets the action (a CLICK_ACTION_* flag) performed when an avatar left-clicks the prim.
  llSetPayPrice( integer price, list quick_pay_buttons ) -> void:
    price: Default price integer shown in the text field (can accept PAY_* constants or positive values).
    quick_pay_buttons: A list of four integer values or PAY_* constants specifying the button payment choices.
    tooltip: Suggests default amounts for the pay text input field price and the four payment dialog quick_pay_buttons when an avatar pays this object.
  llSetSitText( string text ) -> void:
    text: Context menu text to display.
    tooltip: Displays the string text instead of 'Sit' (or 'Sit Here') in the viewer's right-click context menu.
  llSetTouchText( string text ) -> void:
    text: Context menu text to display.
    tooltip: Displays the string text instead of 'Touch' in the right-click context menu.
  llTextBox( key avatar, string message, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the text box.
    channel: Output chat channel (any integer value) where the input text is chatted.
    tooltip: Opens an input text box dialog displaying message to the avatar. Submitting text chats the input string on channel as if said by the avatar.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: World-frame position vector to project into HUD space.
    tooltip: Returns the local position vector that places the center of the HUD object directly over the world coordinate world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA
      runtime permission.
uuid:
  llDetectedKey( integer number ) -> key:
    number: Index of the detection information.
    tooltip: Returns the key (UUID) of the detected object or avatar specified by number, or NULL_KEY if number is not a valid index.
  llGenerateKey(  ) -> key:
    tooltip: Generates and returns a unique versioned UUID key (utilizing SHA-1 hashing). Due to being versioned, it will not return NULL_KEY; however, the exact UUID version is an implementation detail
      that should not be relied upon.
  llGetKey(  ) -> key:
    tooltip: Returns the key (UUID) of the prim containing the script.
  llGetLinkKey( integer link ) -> key:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns the key (UUID) of the linked prim or avatar specified by link.
  llGetObjectLinkKey( key object_id, integer link ) -> key:
    object_id: UUID of the target prim or linkset.
    link: Link number (1 for root, >1 for children) or a LINK_* flag of the prim to retrieve.
    tooltip: Returns the key (UUID) of the linked child prim specified by link within the linkset identified by object_id.
  llGetOwner(  ) -> key:
    tooltip: Returns the key (UUID) of the object's current owner.
  llGetOwnerKey( key id ) -> key:
    id: UUID of the prim in the same region.
    tooltip: Returns the key (UUID) of the owner of the prim specified by id.
  llRequestUserKey( string username ) -> key:
    username: Current or historical username of the avatar to resolve.
    tooltip: Asynchronously requests the Agent ID key (UUID) for the agent specified by their current or historical username, returning NULL_KEY if not found. Returns a key query handle for the dataserver
      event.
vector:
  llRot2Axis( rotation rot ) -> vector:
    rot: Rotation value.
    tooltip: Returns a vector representing the rotation axis of rot.
  llRot2Fwd( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive X direction (forward) relative to the parent (root prim or region) defined by rotation q.
  llRot2Left( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Y direction (left) relative to the parent (root prim or region) defined by rotation q.
  llRot2Up( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Z direction (up) relative to the parent (root prim or region) defined by rotation q.
  llVecDist( vector vec_a, vector vec_b ) -> float:
    vec_a: First vector.
    vec_b: Second vector.
    tooltip: Returns a float representing the undirected, non-negative distance between vectors vec_a and vec_b.
  llVecMag( vector vec ) -> float:
    vec: Vector to evaluate.
    tooltip: Returns a float representing the magnitude (geometric length) of the vector vec.
  llVecNorm( vector vec ) -> vector:
    vec: Vector to normalize.
    tooltip: Returns a normalized unit vector sharing the same direction as vec.
vehicles:
  llRemoveVehicleFlags( integer flags ) -> void:
    flags: A bitwise mask of VEHICLE_FLAG_* constants to disable.
    tooltip: Disables the specified vehicle flags (sets them to FALSE) using the bitwise mask flags.
  llSetVehicleFlags( integer flags ) -> void:
    flags: A bitwise mask of VEHICLE_FLAG_* constants to enable.
    tooltip: Enables the vehicle flags specified in the Flags bitmask.
  llSetVehicleFloatParam( integer param, float value ) -> void:
    param: VEHICLE_* float parameter constant to set.
    value: Float value to set.
    tooltip: Sets the specified vehicle float parameter param to value.
  llSetVehicleRotationParam( integer param, rotation rot ) -> void:
    param: VEHICLE_* rotation parameter constant to set.
    rot: Rotation value to set.
    tooltip: Sets the specified vehicle rotation parameter param to rot.
  llSetVehicleType( integer type ) -> void:
    type: VEHICLE_TYPE_* constant to set.
    tooltip: Sets the vehicle physics preset type to one of the default vehicle types.
  llSetVehicleVectorParam( integer param, vector vec ) -> void:
    param: VEHICLE_* vector parameter constant to set.
    vec: Vector value to set.
    tooltip: Sets the specified vehicle vector parameter param to vec.
web:
  http_request( key request_id, string method, string body ):
    request_id: Unique key identifying the incoming HTTP request (used with llHTTPResponse).
    method: HTTP method string ('GET', 'POST', 'PUT', 'DELETE') or URL request status constants.
    body: String payload of the incoming request body.
    tooltip: Triggered when the script's registered URL receives an incoming HTTP request identified by request_id.
  http_response( key request_id, integer status, list metadata, string body ):
    request_id: Key matching the handle returned by the initiating llHTTPRequest call.
    status: Integer HTTP status code returned (such as 200 or 404).
    metadata: A list of HTTP_* constants and response headers metadata.
    body: String payload of the received response body.
    tooltip: Triggered when an HTTP response body is received for a pending request_id, or if the request fails or times out.
  llEscapeURL( string url ) -> string:
    url: Unescaped URL string to escape.
    tooltip: Returns a string representing the escaped/encoded version of url, replacing spaces with '%20' and non-alphanumeric characters with their '%xx' hexadecimal UTF-8 equivalent.
  llGetFreeURLs(  ) -> integer:
    tooltip: Returns an integer representing the number of available HTTP URLs (remaining for the owner if the object is attached, or for the region if unattached).
  llGetHTTPHeader( key request_id, string header ) -> string:
    request_id: Unique key of the HTTP request.
    header: Lowercase name of the HTTP header to retrieve.
    tooltip: Returns a string representing the value of the specified header associated with the HTTP request_id.
  llHTTPRequest( string url, list parameters, string body ) -> key:
    url: Destination HTTP or HTTPS URL.
    parameters: A list of HTTP_* configuration flags and value pairs.
    body: String contents of the request body.
    tooltip: Sends an HTTP request to the specified url containing body and configured via parameters. Raises an http_response event and returns a key query handle identifying the request.
  llHTTPResponse( key request_id, integer status, string body ) -> void:
    request_id: Unique key identifying the incoming HTTP request.
    status: Integer HTTP status code (such as 200, 400, or 404) to respond with.
    body: String contents of the response body.
    tooltip: Responds to the incoming HTTP request identified by request_id with the HTTP status code status and the payload body.
  llLoadURL( key avatar, string message, string url ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    url: Web URL to open.
    tooltip: Shows a dialog box displaying message to the avatar avatar offering to open the specified url. Clicking yes launches the URL in their default web browser.
  llRefreshPrimURL(  ) -> void // deprecated:
    tooltip: Legacy function intended to reload the web page displayed on the prim's faces (currently non-functional).
  llReleaseURL( string url ) -> void:
    url: URL string to release.
    tooltip: Releases the specified url (previously obtained via llRequestURL), rendering it no longer usable.
  llRequestSecureURL(  ) -> key:
    tooltip: Asynchronously requests one secure HTTPS (SSL, port 12043) URL for use by this object, triggering an http_request event. Returns a key query handle.
  llRequestURL(  ) -> key:
    tooltip: Asynchronously requests one HTTP URL for use by this script, triggering an http_request event. Returns a key query handle.
  llSetContentType( key request_id, integer content_type ) -> void:
    request_id: Unique key identifying the incoming HTTP request.
    content_type: CONTENT_TYPE_* constant representing the Internet media type to use.
    tooltip: Sets the 'Content-Type' header of subsequent HTTP server responses (via llHTTPResponse) for request_id using the specified content_type (a CONTENT_TYPE_* constant).
  llSetLinkMedia( integer link, integer face, list params ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on face of the linked prim link without a script delay. Returns an integer STATUS_* flag detailing success or failure.
  llSetPrimMediaParams( integer face, list params ) -> integer:
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on the designated face of the prim. Returns an integer STATUS_* flag detailing success or failure.
  llSetPrimURL( string url ) -> void // deprecated:
    url: Web URL to display.
    tooltip: Deprecated (use llSetPrimMediaParams instead). Updates the URL displayed on the prim's faces.
  llUnescapeURL( string url ) -> string:
    url: Escaped URL string to decode.
    tooltip: Returns a string representing the unescaped/decoded version of url, replacing '%20' with spaces and decoding raw UTF-8 characters.
