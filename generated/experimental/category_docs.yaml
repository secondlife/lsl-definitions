  llGetSunRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the sun on the current parcel and altitude track. Falls back to the region's sun rotation if no custom parcel environment is set.
  llReplaceAgentEnvironment( key agent_id, float transition, string environment ) -> integer:
    agent_id: UUID of an agent in the region participating in the experience.
    transition: Duration in seconds over which to transition to the new environment.
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    tooltip: Replaces the region and parcel environment seen by the specified agent_id as part of an experience, transitioning the settings over transition seconds. Passing NULL_KEY or an empty string for
      environment restores defaults.
  ? llReplaceEnvironment( vector position, string environment, integer track_no, integer day_length, integer day_offset ) -> integer
  : position: Position vector of the target parcel (the Z component is ignored; use <-1.0, -1.0, -1.0> for the entire region).
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    track_no: 'The elevation track to change (0: water, 1: ground, 2: 1000m, 3: 2000m, 4: 3000m, -1: all tracks).'
