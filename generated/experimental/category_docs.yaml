    name: ''
    value: ''
    tooltip: Triggered when a script modifies the linkset datastore.
  llCreateKeyValue( string Key, string Value ) -> key:
    Key: ''
    Value: ''
    tooltip: "\n                   Starts an asychronous transaction to create a key-value pair. Will fail with XP_ERROR_STORAGE_EXCEPTION if the key already exists. The dataserver callback will be executed\
      \ with the key returned from this call and a string describing the result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1)\
      \ or not (0). In the failure case, the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value passed to the function.\n\
      \                "
  llDataSizeKeyValue(  ) -> key:
    tooltip: "\n                   Starts an asychronous transaction the request the used and total amount of data allocated for the Experience. The dataserver callback will be executed with the key returned\
      \ from this call and a string describing the result. The result is commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case,\
      \ the second item will be an integer corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the the amount in use and the third item will be the total available.\n\
      \                "
  llDeleteKeyValue( string Key ) -> key:
    Key: ''
    tooltip: "\n                   Starts an asychronous transaction to delete a key-value pair. The dataserver callback will be executed with the key returned from this call and a string describing the\
      \ result. The result is a two element commma-delimited list. The first item is an integer specifying if the transaction succeeded (1) or not (0). In the failure case, the second item will be an integer\
      \ corresponding to one of the XP_ERROR_... constants. In the success case the second item will be the value associated with the key.\n                "
  llFindNotecardTextCount( string NotecardName, string Pattern, list Options ) -> key:
