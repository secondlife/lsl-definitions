  llLookAt( vector Target, float Strength, float Damping ) -> void:
    Target: ''
    Strength: ''
    Damping: ''
    tooltip: Cause object name to point its forward axis towards Target, at a force controlled by Strength and Damping.\nGood Strength values are around half the mass of the object and good Damping values
      are less than 1/10th of the Strength.\nAsymmetrical shapes require smaller Damping. A Strength of 0.0 cancels the look at.
  llMoveToTarget( vector Target, float Tau ) -> void:
    Target: ''
    Tau: ''
    tooltip: Critically damp to Target in Tau seconds (if the script is physical).\nCritically damp to position target in tau-seconds if the script is physical. Good tau-values are greater than 0.2. A tau
      of 0.0 stops the critical damping.
  llPointAt( vector Point ) -> void // private // deprecated:
    Point: ''
    tooltip: ''
  llPushObject( key ObjectID, vector Impulse, vector AngularImpulse, integer Local ) -> void:
    ObjectID: ''
    Impulse: ''
    AngularImpulse: ''
    Local: ''
    tooltip: Applies Impulse and AngularImpulse to ObjectID.\nApplies the supplied impulse and angular impulse to the object specified.
  llRotLookAt( rotation Rotation, float Strength, float Damping ) -> void:
    Rotation: ''
    Strength: ''
    Damping: ''
    tooltip: Cause object to rotate to Rotation, with a force function defined by Strength and Damping parameters. Good strength values are around half the mass of the object and good damping values are
      less than 1/10th of the strength.\nAsymmetrical shapes require smaller damping.\nA strength of 0.0 cancels the look at.
  llRotTarget( rotation Rotation, float LeeWay ) -> integer:
    Rotation: ''
    LeeWay: ''
    tooltip: Set rotations with error of LeeWay radians as a rotational target, and return an ID for the rotational target.\nThe returned number is a handle that can be used in at_rot_target and llRotTargetRemove.
  llRotTargetRemove( integer Handle ) -> void:
    Handle: ''
    tooltip: Removes rotational target number.\nRemove rotational target indicated by the handle.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Rotation to turn the avatar to face.
    flags: flags
    tooltip: Sets the avatar rotation to the given value.
  llSetAngularVelocity( vector AngVel, integer Local ) -> void:
    AngVel: The angular velocity to set the object to.
    Local: If TRUE, the AngVel is treated as a local directional vector instead of a regional directional vector.
    tooltip: Sets an object's angular velocity to AngVel, in local coordinates if Local == TRUE (if the script is physical).\nHas no effect on non-physical objects.
  llSetForce( vector Force, integer Local ) -> void:
    Force: Directional force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets Force on object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetForceAndTorque( vector Force, vector Torque, integer Local ) -> void:
    Force: Directional force.
    Torque: Torque force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets the Force and Torque of object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetHoverHeight( float Height, integer Water, float Tau ) -> void:
    Height: Distance above the ground.
    Water: Boolean, if TRUE then hover above water too.
    Tau: Seconds to critically damp in.
    tooltip: Critically damps a physical object to a Height (either above ground level or above the higher of land and water if water == TRUE).\nDo not use with vehicles. Use llStopHover to stop hovering.
  llSetKeyframedMotion( list Keyframes, list Options ) -> void:
    Keyframes: 'Strided keyframe list of the form: position, orientation, time. Each keyframe is interpreted relative to the previous transform of the object.'
    Options: ''
    tooltip: Requests that a non-physical object be key-framed according to key-frame list.\nSpecify a list of times, positions, and orientations to be followed by an object. The object will be smoothly
      moved between key-frames by the simulator. Collisions with other non-physical or key-framed objects will be ignored (no script events will fire and collision processing will not occur). Collisions
      with physical objects will be computed and reported, but the key-framed object will be unaffected by those collisions.\nKeyframes is a strided list containing positional, rotational, and time data
      for each step in the motion.  Options is a list containing optional arguments and parameters (specified by KFM_* constants).
  llSetLocalRot( rotation Rotation ) -> void:
    Rotation: ''
    tooltip: Sets the rotation of a child prim relative to the root prim.
  llSetPos( vector Position ) -> void:
    Position: Region coordinates to move to (within 10m).
    tooltip: If the object is not physical, this function sets the position of the prim.\nIf the script is in a child prim, Position is treated as root relative and the link-set is adjusted.\nIf the prim
      is the root prim, the entire object is moved (up to 10m) to Position in region coordinates.
  llSetRegionPos( vector Position ) -> integer:
    Position: Vector. The location to move to, in region coordinates.
    tooltip: Attempts to move the object so that the root prim is within 0.1m of Position.\nReturns an integer boolean, TRUE if the object is successfully placed within 0.1 m of Position, FALSE otherwise.\nPosition
      may be any location within the region or up to 10m across a region border.\nIf the position is below ground, it will be set to the ground level at that x,y location.
  llSetRot( rotation Rotation ) -> void:
    Rotation: ''
    tooltip: If the object is not physical, this function sets the rotation of the prim.\nIf the script is in a child prim, Rotation is treated as root relative and the link-set is adjusted.\nIf the prim
      is the root prim, the entire object is rotated to Rotation in the global reference frame.
  llSetTorque( vector Torque, integer Local ) -> void:
    Torque: Torque force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets the Torque acting on the script's object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetVelocity( vector Velocity, integer Local ) -> void:
    Velocity: The velocity to apply.
    Local: If TRUE, the Velocity is treated as a local directional vector instead of a regional directional vector.
    tooltip: If the object is physics-enabled, sets the object's linear velocity to Velocity.\nIf Local==TRUE, Velocity is treated as a local directional vector; otherwise, Velocity is treated as a global
      directional vector.
  llStopHover(  ) -> void:
    tooltip: Stop hovering to a height (due to llSetHoverHeight()).
  llStopLookAt(  ) -> void:
    tooltip: Stop causing object to point at a target (due to llLookAt() or llRotLookAt()).
  llStopMoveToTarget(  ) -> void:
    tooltip: Stops critically damped motion (due to llMoveToTarget()).
  llStopPointAt(  ) -> void // private // deprecated:
    tooltip: ''
  llTarget( vector Position, float Range ) -> integer:
    Position: ''
    Range: ''
    tooltip: This function is to have the script know when it has reached a position.\nIt registers a Position with a Range that triggers at_target and not_at_target events continuously until unregistered.
  llTargetOmega( vector Axis, float SpinRate, float Gain ) -> void:
    Axis: ''
    SpinRate: ''
    Gain: ''
    tooltip: Attempt to spin at SpinRate with strength Gain on Axis.\nA spin rate of 0.0 cancels the spin. This function always works in object-local coordinates.
  llTargetRemove( integer Target ) -> void:
    Target: ''
    tooltip: Removes positional target Handle registered with llTarget.
notecard:
  llFindNotecardTextCount( string NotecardName, string Pattern, list Options ) -> key:
    NotecardName: ''
    Pattern: Regex pattern to find in the notecard text.
    Options: A list of options to control the search. Included for future expansion, should be []
    tooltip: "Searches the text of a cached notecard for lines containing the given pattern and returns the \n            number of matches found through a dataserver event.\n            "
  llFindNotecardTextSync( string NotecardName, string Pattern, integer StartMatch, integer Count, list Options ) -> list:
    NotecardName: ''
    Pattern: Regex pattern to find in the notecard text.
    StartMatch: Index of the first match to return.
    Count: The maximum number of matches to return. If 0 this function will return the first 64 matches found.
    Options: A list of options to control the search. Included for future expansion, should be []
    tooltip: "Searches the text of a cached notecard for lines containing the given pattern. \n            Returns a list of line numbers and column where a match is found. If the notecard is not in\n \
      \           the cache it returns a list containing a single entry of NAK. If no matches are found an\n            empty list is returned."
  llGetNotecardLine( string NotecardName, integer LineNumber ) -> key:
    NotecardName: ''
    LineNumber: ''
    tooltip: Returns LineNumber from NotecardName via the dataserver event. The line index starts at zero in LSL, one in Lua.\nIf the requested line is passed the end of the note-card the dataserver event
      will return the constant EOF string.\nThe key returned by this function is a unique identifier which will be supplied to the dataserver event in the requested parameter.
  llGetNotecardLineSync( string NotecardName, integer LineNumber ) -> string:
    NotecardName: ''
    LineNumber: ''
    tooltip: Returns LineNumber from NotecardName. The line index starts at zero in LSL, one in Lua.\nIf the requested line is past the end of the note-card the return value will be set to the constant
      EOF string.\nIf the note-card is not cached on the simulator the return value is the NAK string.
  llGetNumberOfNotecardLines( string NotecardName ) -> key:
    NotecardName: ''
    tooltip: Returns the number of lines contained within a notecard via the dataserver event.\nThe key returned by this function is a query ID for identifying the dataserver reply.
object:
  llGetBoundingBox( key ID ) -> list:
    ID: ''
    tooltip: Returns the bounding box around the object (including any linked prims) relative to its root prim, as a list in the format [ (vector) min_corner, (vector) max_corner ].
  llGetCenterOfMass(  ) -> vector:
    tooltip: Returns the prim's centre of mass (unless called from the root prim, where it returns the object's centre of mass).
  llGetObjectDetails( key ID, list Parameters ) -> list:
    ID: Prim or avatar UUID that is in the same region.
    Parameters: List of OBJECT_* flags.
    tooltip: Returns a list of object details specified in the Parameters list for the object or avatar in the region with key ID.\nParameters are specified by the OBJECT_* constants.
  llGetObjectLinkKey( key id, integer link_no ) -> key:
    id: UUID of prim
    link_no: Link number to retrieve
    tooltip: Returns the key of the linked prim link_no in a linkset.\nReturns the key of link_no in the link set specified by id.
  llGetObjectMass( key ID ) -> float:
    ID: ''
    tooltip: Returns the mass of the avatar or object in the region.\nGets the mass of the object or avatar corresponding to ID.
  llGetObjectPrimCount( key ObjectID ) -> integer:
    ObjectID: ''
    tooltip: Returns the total number of prims for an object in the region.\nReturns the prim count for any object id in the same region.
  llGetOwnerKey( key ObjectID ) -> key:
    ObjectID: ''
    tooltip: Returns the owner of ObjectID.\nReturns the key for the owner of object ObjectID.
  llKey2Name( key ID ) -> string:
    ID: Avatar or rezzed prim UUID.
    tooltip: Returns the name of the prim or avatar specified by ID. The ID must be a valid rezzed prim or avatar key in the current simulator, otherwise an empty string is returned.\nFor avatars, the returned
      name is the legacy name
  llSameGroup( key ID ) -> integer:
    ID: ''
    tooltip: Returns TRUE if avatar ID is in the same region and has the same active group, otherwise FALSE.\nReturns TRUE if the object or agent identified is in the same simulator and has the same active
      group as this object. Otherwise, returns FALSE.
object_animation:
  llGetObjectAnimationNames(  ) -> list:
    tooltip: Returns a list of names of playing animations for an object.\nReturns a list of names of all playing animations for the current object.
  llStartObjectAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function plays the specified animation on the rigged mesh object associated with the current script.\nAnimation may be an animation in task inventory or a built-in animation.\n
  llStopObjectAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function stops the specified animation on the rigged mesh object associated with the current script.\nAnimation may be an animation in task inventory, a built-in animation, or the uuid
      of an animation.\n
parcel:
  llAddToLandBanList( key ID, float Hours ) -> void:
    ID: Agent UUID to add to ban-list.
    Hours: Period, in hours, to ban the avatar for.
    tooltip: Add avatar ID to the parcel ban list for the specified number of Hours.\nA value of 0 for Hours will add the agent indefinitely.\nThe smallest value that Hours will accept is 0.01; anything
      smaller will be seen as 0.\nWhen values that small are used, it seems the function bans in approximately 30 second increments (Probably 36 second increments, as 0.01 of an hour is 36 seconds).\nResidents
      teleporting to a parcel where they are banned will be redirected to a neighbouring parcel.
  llAddToLandPassList( key ID, float Hours ) -> void:
    ID: Agent UUID to add to pass-list.
    Hours: Period, in hours, to allow the avatar for.
    tooltip: Add avatar ID to the land pass list, for a duration of Hours.
  llEjectFromLand( key AvatarID ) -> void:
    AvatarID: ''
    tooltip: Ejects AvatarID from land that you own.\nEjects AvatarID from land that the object owner (group or resident) owns.
  llGetAgentList( integer Scope, list Options ) -> list:
    Scope: The scope (region, parcel, parcel same owner) to return agents for.
    Options: List of options to apply. Current unused.
    tooltip: Requests a list of agents currently in the region, limited by the scope parameter.\nReturns a list [key UUID-0, key UUID-1, ..., key UUID-n] or [string error_msg] - returns avatar keys for
      all agents in the region limited to the area(s) specified by scope
  llGetEnvironment( vector Position, list EnvParams ) -> list:
    Position: Location within the region.
    EnvParams: List of environment settings requested for the specified parcel location.
    tooltip: Returns a string with the requested data about the region.
  llGetLandOwnerAt( vector Position ) -> key:
    Position: ''
    tooltip: Returns the key of the land owner, returns NULL_KEY if public.\nReturns the key of the land owner at Position, or NULL_KEY if public.
  llGetMoonDirection(  ) -> vector:
    tooltip: Returns a normalized vector of the direction of the moon in the parcel.\nReturns the moon's direction on the simulator in the parcel.
  llGetMoonRotation(  ) -> rotation:
    tooltip: Returns the rotation applied to the moon in the parcel.
  llGetParcelDetails( vector Position, list ParcelDetails ) -> list:
    Position: Location within the region.
    ParcelDetails: List of details requested for the specified parcel location.
    tooltip: 'Returns a list of parcel details specified in the ParcelDetails list for the parcel at Position.\nParameters is one or more of: PARCEL_DETAILS_NAME, _DESC, _OWNER, _GROUP, _AREA, _ID, _SEE_AVATARS.\nReturns
      a list that is the parcel details specified in ParcelDetails (in the same order) for the parcel at Position.'
  llGetParcelFlags( vector Position ) -> integer:
    Position: ''
    tooltip: Returns a mask of the parcel flags (PARCEL_FLAG_*) for the parcel that includes the point Position.\nReturns a bit-field specifying the parcel flags (PARCEL_FLAG_*) for the parcel at Position.
  llGetParcelMaxPrims( vector Position, integer SimWide ) -> integer:
    Position: Region coordinates (z is ignored) of parcel.
    SimWide: Boolean. If FALSE then the return is the maximum prims supported by the parcel. If TRUE then it is the combined number of prims on all parcels in the region owned by the specified parcel's
      owner.
    tooltip: Returns the maximum number of prims allowed on the parcel at Position for a given scope.\nThe scope may be set to an individual parcel or the combined resources of all parcels with the same
      ownership in the region.
  llGetParcelMusicURL(  ) -> string:
    tooltip: Gets the streaming audio URL for the parcel object is on.\nThe object owner, avatar or group, must also be the land owner.
  llGetParcelPrimCount( vector Position, integer Category, integer SimWide ) -> integer:
    Position: Region coordinates of parcel to query.
    Category: A PARCEL_COUNT_* flag.
    SimWide: Boolean. If FALSE then the return is the maximum prims supported by the parcel. If TRUE then it is the combined number of prims on all parcels in the region owned by the specified parcel's
      owner.
    tooltip: 'Returns the number of prims on the parcel at Position of the given category.\nCategories: PARCEL_COUNT_TOTAL, _OWNER, _GROUP, _OTHER, _SELECTED, _TEMP.\nReturns the number of prims used on
      the parcel at Position which are in Category.\nIf SimWide is TRUE, it returns the total number of objects for all parcels with matching ownership in the category specified.\nIf SimWide is FALSE, it
      returns the number of objects on this specific parcel in the category specified'
  llGetParcelPrimOwners( vector Position ) -> list:
    Position: ''
    tooltip: Returns a list of up to 100 residents who own objects on the parcel at Position, with per-owner land impact totals.\nRequires owner-like permissions for the parcel, and for the script owner
      to be present in the region.\nThe list is formatted as [ key agentKey1, integer agentLI1, key agentKey2, integer agentLI2, ... ], sorted by agent key.\nThe integers are the combined land impacts of
      the objects owned by the corresponding agents.
  llGetSunDirection(  ) -> vector:
    tooltip: Returns a normalized vector of the direction of the sun in the parcel.\nReturns the sun's direction on the simulator in the parcel.
  llGetSunRotation(  ) -> rotation:
    tooltip: Returns the rotation applied to the sun in the parcel.
  llOverMyLand( key ID ) -> integer:
    ID: ''
    tooltip: Returns TRUE if id ID over land owned by the script owner, otherwise FALSE.\nReturns TRUE if key ID is over land owned by the object owner, FALSE otherwise.
  llParcelMediaCommandList( list CommandList ) -> void:
    CommandList: 'A list of PARCEL_MEDIA_COMMAND_* flags and their parameters '
    tooltip: Controls the playback of multimedia resources on a parcel or for an agent, via one or more PARCEL_MEDIA_COMMAND_* arguments specified in CommandList.
  llParcelMediaQuery( list QueryList ) -> list:
    QueryList: ''
    tooltip: Queries the media properties of the parcel containing the script, via one or more PARCEL_MEDIA_COMMAND_* arguments specified in CommandList.\nThis function will only work if the script is contained
      within an object owned by the land-owner (or if the land is owned by a group, only if the object has been deeded to the group).
  llRemoveFromLandBanList( key AvatarID ) -> void:
    AvatarID: ''
    tooltip: Remove avatar from the land ban list.\nRemove specified avatar from the land parcel ban list.
  llRemoveFromLandPassList( key AvatarID ) -> void:
    AvatarID: ''
    tooltip: Remove avatar from the land pass list.\nRemove specified avatar from the land parcel pass list.
  ? llReplaceEnvironment( vector position, string environment, integer track_no, integer day_length, integer day_offset ) -> integer
  : position: Location of parcel to change. Use <-1, -1, -1> for entire region.
    environment: "Name of inventory item, or UUID of environment resource to apply.\n                         Use NULL_KEY or empty string to remove environment."
    track_no: Elevation zone of where to apply environment. Use -1 for all.
    day_length: Length of day cycle for this parcel or region. -1 to leave unchanged.
    day_offset: Offset from GMT for the day cycle on this parcel or region. -1 to leave unchanged.
    tooltip: Replaces the environment for a parcel or region.
  llResetLandBanList(  ) -> void:
    tooltip: Removes all residents from the land ban list.
  llResetLandPassList(  ) -> void:
    tooltip: Removes all residents from the land access/pass list.
  llScriptDanger( vector Position ) -> integer:
    Position: ''
    tooltip: Returns TRUE if Position is over public land, sandbox land, land that doesn't allow everyone to edit and build, or land that doesn't allow outside scripts.\nReturns true if the position is
      over public land, land that doesn't allow everyone to edit and build, or land that doesn't allow outside scripts.
  llSetEnvironment( vector Position, list EnvParams ) -> integer:
    Position: Location within the region.
    EnvParams: List of environment settings to change for the specified parcel location.
    tooltip: Returns a string with the requested data about the region.
  llSetParcelForSale( integer ForSale, list Options ) -> integer:
    ForSale: If TRUE, the parcel is put up for sale.
    Options: A list of options to set for the sale.
    tooltip: Sets the parcel the object is on for sale.\nForSale is a boolean, if TRUE the parcel is put up for sale. Options is a list of options to set for the sale, such as price, authorized buyer, and
      whether to include objects on the parcel.\n Setting ForSale to FALSE will remove the parcel from sale and clear any options that were set.\nRequires the PERMISSION_PRIVILEGED_LAND_ACCESS permission.
  llSetParcelMusicURL( string URL ) -> void:
    URL: ''
    tooltip: Sets the streaming audio URL for the parcel the object is on.\nThe object must be owned by the owner of the parcel; if the parcel is group owned the object must be owned by that group.
