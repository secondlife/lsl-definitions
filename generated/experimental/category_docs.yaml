      an integer representing a boolean, TRUE if the call was successful; FALSE if throttled, invalid action, invalid or null id or object owner is not allowed to manage the estate.\nThe object owner is
      notified of any changes, unless PERMISSION_SILENT_ESTATE_MANAGEMENT has been granted to the script.
