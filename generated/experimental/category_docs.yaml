# Functions by category
asset_permissions:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  llGetInventoryPermMask( string item, integer group ) -> integer:
    item: Name of the item in the prim's inventory.
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to get.
    tooltip: Returns the specified item's permission flags for the specified group.
  llGetObjectPermMask( integer group ) -> integer:
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to get.
    tooltip: Returns the script's object's permission flags for the specified group.
  llSetInventoryPermMask( string item, integer group, integer flags ) -> void:
    item: Name of the item in the prim's inventory.
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to set.
    flags: Bitfield of permissions (PERM_* flags) to set.
    tooltip: Sets the specified item's permission flags for the specified group.
  llSetObjectPermMask( integer group, integer flags ) -> void:
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to set.
    flags: Bitfield of permissions (PERM_* flags) to set.
    tooltip: Sets the scripts's object's permission flags for the specified group.
  llTransferOwnership( key agent, integer flags, list options ) -> integer:
    agent: UUID of the agent to receive ownership of the object.
    flags: Flags controlling the transfer type (such as TRANSFER_FLAG_COPY or TRANSFER_FLAG_TAKE).
    options: Extra options applied to the transfer (currently unused).
    tooltip: Transfers ownership of the object (or a copy of it, depending on Flags) to the specified agent. Returns an integer indicating the success or failure of the transfer.
attachments:
  attach( key id ):
    id: UUID of the avatar the object is attached to, or NULL_KEY if detached.
    tooltip: Triggered whenever the object is attached to or detached from an avatar. Passes the UUID key of the avatar (id) if attached, or NULL_KEY if detached.
  llAttachToAvatar( integer attach_point ) -> void:
    attach_point: ATTACH_* constant or integer value representing the target attachment point.
    tooltip: Attaches the object to the avatar who has granted the PERMISSION_ATTACH permission. Takes the object into the user's inventory and attaches it at attach_point.
  llAttachToAvatarTemp( integer attach_point ) -> void:
    attach_point: ATTACH_* constant or integer value representing the target attachment point.
    tooltip: Attaches the object temporarily to an avatar who has granted the PERMISSION_ATTACH permission. No permanent inventory is created, and the object disappears on detach or disconnect. Can be used
      on non-owners (changing ownership to the wearer).
  llDetachFromAvatar(  ) -> void:
    tooltip: Detaches the object containing the script from the avatar. Requires the PERMISSION_ATTACH runtime permission (automatically granted to attached objects). Note that the detached object is completely
      removed from the region and not dropped on the ground.
  llGetAttached(  ) -> integer:
    tooltip: Returns the integer attachment point (an ATTACH_* constant) that the object is attached to, or 0 if it is unattached or pending detachment.
  llGetAttachedList( key avatar ) -> list:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a list of object keys (UUIDs) corresponding to public, visible (non-HUD) attachments worn by the specified avatar, in the order they were attached. Returns a list with an error message
      string on failure.
  llGetAttachedListFiltered( key avatar, list options ) -> list:
    avatar: UUID of the avatar in the same region.
    options: A list of options to filter the returned attachments.
    tooltip: Retrieves a list of attachment object keys worn by avatar in the order they were attached, filtered by options. Returns a list containing an error message string on failure.
avatar:
  control( key id, integer level, integer edge ):
    id: UUID of the avatar whose inputs are captured.
    level: A bitfield of CONTROL_* constants representing currently held controls.
    edge: A bitfield of CONTROL_* constants representing controls that just changed state.
    tooltip: Triggered to pass captured avatar control inputs into the script. The parameter level indicates held controls, and edge indicates change in controls (both are bitfields of CONTROL_* constants).
  experience_permissions( key agent_id ):
    agent_id: UUID of the avatar approving experience permissions.
    tooltip: Triggered when the agent specified by agent_id approves an experience permissions request (interactively or automatically if previously approved).
  experience_permissions_denied( key agent_id, integer reason ):
    agent_id: UUID of the avatar who denied or was blocked from granting permissions.
    reason: XP_ERROR_* error constant describing why permissions were denied.
    tooltip: Triggered when the agent specified by agent_id denies experience permissions, or when permission is blocked for other reasons (specified by the error code reason).
  game_control( key id, integer button_levels, list axes ):
    id: UUID of the avatar supplying controller input.
    button_levels: A 32-bit mask representing the buttons currently held down on the controller.
    axes: A list of six float values in the range [-1.0, 1.0] representing controller axes.
    tooltip: Triggered when a compatible viewer sends game controller input changes for the avatar specified by id. Only triggers for scripts in attachments or seats.
  llAgentInExperience( key agent ) -> integer:
    agent: UUID of the avatar in the same region to query.
    tooltip: Returns TRUE if the specified agent is in the experience and the experience can run in the current region/location; returns FALSE otherwise.
  llAttachToAvatar( integer attach_point ) -> void:
    attach_point: ATTACH_* constant or integer value representing the target attachment point.
    tooltip: Attaches the object to the avatar who has granted the PERMISSION_ATTACH permission. Takes the object into the user's inventory and attaches it at attach_point.
  llAttachToAvatarTemp( integer attach_point ) -> void:
    attach_point: ATTACH_* constant or integer value representing the target attachment point.
    tooltip: Attaches the object temporarily to an avatar who has granted the PERMISSION_ATTACH permission. No permanent inventory is created, and the object disappears on detach or disconnect. Can be used
      on non-owners (changing ownership to the wearer).
  llAvatarOnLinkSitTarget( integer link ) -> key:
    link: Index of the prim in the linkset (1 for root, >1 for children), or a LINK_* flag.
    tooltip: Returns the UUID of the avatar seated on the specified link's sit target, or NULL_KEY if no avatar is sitting there.
  llAvatarOnSitTarget(  ) -> key:
    tooltip: Returns the UUID of the avatar seated on the prim's sit target (defined via llSitTarget), or NULL_KEY if no avatar is sitting there or the prim lacks a sit target.
  llClearCameraParams(  ) -> void:
    tooltip: Resets all camera parameters to default values and turns off scripted camera control. Requires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted for attached or sat-on
      objects).
  llDetachFromAvatar(  ) -> void:
    tooltip: Detaches the object containing the script from the avatar. Requires the PERMISSION_ATTACH runtime permission (automatically granted to attached objects). Note that the detached object is completely
      removed from the region and not dropped on the ground.
  llDetectedOwner( integer number ) -> key:
    number: Index of the detection information.
    tooltip: Returns the key (UUID) of the owner of the detected object specified by number. Returns an invalid key if number is not a valid index.
  llForceMouselook( integer mouselook ) -> void:
    mouselook: Boolean. If TRUE, forces a sitting avatar into mouselook; if FALSE, allows them to keep their current camera mode.
    tooltip: Sets whether any avatar sitting on this prim is forced into mouselook mode. Setting mouselook to TRUE forces the mode; FALSE (default) allows the avatar to keep their current camera mode.
  llGetAgentInfo( key id ) -> integer:
    id: UUID of the avatar in the same region.
    tooltip: Returns an integer bitfield containing status information about the agent specified by id (such as AGENT_FLYING, AGENT_ATTACHMENTS, AGENT_SITTING, etc.).
  llGetAgentLanguage( key avatar ) -> string:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a string representing the language code of the preferred interface language set by the avatar.
  llGetAgentList( integer scope, list options ) -> list:
    scope: Scope flag (AGENT_LIST_PARCEL, AGENT_LIST_PARCEL_OWNER, or AGENT_LIST_REGION) to filter the returned agents.
    options: A list of options to apply (currently unused).
    tooltip: Requests a list of avatar UUID keys for agents currently in the region, limited by scope. Returns a list of keys or a list containing an error message string.
  llGetAgentSize( key avatar ) -> vector:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a vector representing the estimated bounding box size of the specified avatar, or ZERO_VECTOR if they are not in the same region.
  llGetAnimation( key avatar ) -> string:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a string representing the name of the currently playing locomotion animation for the specified avatar.
  llGetAnimationList( key avatar ) -> list:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a list of keys (UUIDs) representing all active animations currently playing on the specified avatar.
  llGetAnimationOverride( string anim_state ) -> string:
    anim_state: Animation state string to query.
    tooltip: Returns a string representing the name of the animation currently overriding the specified anim_state. Requires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission.
  llGetAttachedList( key avatar ) -> list:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a list of object keys (UUIDs) corresponding to public, visible (non-HUD) attachments worn by the specified avatar, in the order they were attached. Returns a list with an error message
      string on failure.
  llGetAttachedListFiltered( key avatar, list options ) -> list:
    avatar: UUID of the avatar in the same region.
    options: A list of options to filter the returned attachments.
    tooltip: Retrieves a list of attachment object keys worn by avatar in the order they were attached, filtered by options. Returns a list containing an error message string on failure.
  llGetCameraAspect(  ) -> float:
    tooltip: Returns a float representing the camera's current aspect ratio (width/height) of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraFOV(  ) -> float:
    tooltip: Returns a float representing the camera's current field of view (FOV) in radians of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraPos(  ) -> vector:
    tooltip: Returns a vector representing the camera's current position in region coordinates of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_VECTOR if permissions are not granted.
  llGetCameraRot(  ) -> rotation:
    tooltip: Returns a rotation representing the camera's current orientation of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_ROTATION if permissions are not granted.
  llGetDisplayName( key id ) -> string:
    id: UUID of the avatar in the same region or otherwise known to the region.
    tooltip: Returns the display name string of the avatar specified by id if they are in the region or cached; returns an empty string otherwise (use llRequestDisplayName if the avatar is absent).
  llGetPermissionsKey(  ) -> key:
    tooltip: Returns the key (UUID) of the avatar that last granted or declined permissions to the script, or NULL_KEY if the permissions request was ignored or cancelled.
  llGetUsername( key id ) -> string:
    id: UUID of the avatar in the same region or otherwise known to the region.
    tooltip: Returns a string representing the unique username of the avatar specified by id if they are connected to the region or cached; returns an empty string otherwise (use llRequestUsername if the
      avatar is absent).
  llGetVisualParams( key agentid, list params ) -> list:
    agentid: UUID of the avatar in the same region.
    params: A list of visual parameter IDs or names to retrieve values for.
    tooltip: Returns a list containing the values of the visual parameters requested in params for the agent specified by agentid.
  llGiveMoney( key destination, integer amount ) -> integer:
    destination: UUID of the destination avatar.
    amount: Number of L$ to transfer (must be greater than 0).
    tooltip: Transfers the specified amount of L$ from the script owner to the destination avatar. Silently fails if the PERMISSION_DEBIT permission has not been granted. Returns 0 (use llTransferLindenDollars
      to match transactions to transaction_result events).
  llIsFriend( key agent_id ) -> integer:
    agent_id: UUID of the agent to check.
    tooltip: Returns TRUE if agent_id and the owner of the script are friends, and FALSE otherwise.
  llName2Key( string name ) -> key:
    name: Name of the avatar (e.g., 'First Last' or 'first.last').
    tooltip: Requests the key (UUID) of the avatar name in the current region. Returns NULL_KEY if no matching agent is present. Formats are 'First Last' or 'first.last' (assumes 'Resident' if last name
      is omitted; case-insensitive).
  llReleaseCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated. Intended to return camera control back to the avatar (use llClearCameraParams instead).
  llReleaseControls(  ) -> void:
    tooltip: Stops taking inputs (previously acquired via llTakeControls) from the avatar, dequeuing any remaining control events and revoking the PERMISSION_TAKE_CONTROLS permission.
  llReplaceAgentEnvironment( key agent_id, float transition, string environment ) -> integer:
    agent_id: UUID of an agent in the region participating in the experience.
    transition: Duration in seconds over which to transition to the new environment.
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    tooltip: Replaces the region and parcel environment seen by the specified agent_id as part of an experience, transitioning the settings over transition seconds. Passing NULL_KEY or an empty string for
      environment restores defaults.
  llRequestAgentData( key id, integer data ) -> key:
    id: UUID of the agent.
    data: DATA_* category flag of the requested information.
    tooltip: Asynchronously requests the specified data category (DATA_*) about the agent id. Triggers a dataserver event with the results and returns a key query handle.
  llRequestDisplayName( key id ) -> key:
    id: UUID of the avatar to query.
    tooltip: Asynchronously requests the display name of the agent specified by id, triggering a dataserver event with the results. The agent does not need to be online or in the region. Returns a key query
      handle.
  llRequestExperiencePermissions( key agent, string name ) -> void:
    agent: UUID of the agent to request permissions from.
    name: Deprecated parameter (no longer used).
    tooltip: Requests permission from the specified agent to participate in the experience. These permissions are persistent and apply grid-wide across all scripts in the experience, automatically triggering
      experience_permissions or experience_permissions_denied.
  llRequestUserKey( string username ) -> key:
    username: Current or historical username of the avatar to resolve.
    tooltip: Asynchronously requests the Agent ID key (UUID) for the agent specified by their current or historical username, returning NULL_KEY if not found. Returns a key query handle for the dataserver
      event.
  llRequestUsername( key id ) -> key:
    id: UUID of the avatar to query.
    tooltip: Asynchronously requests the unique single-word username of the agent identified by id, triggering a dataserver event. The agent does not need to be online or in the region. Returns a key query
      handle.
  llSetAgentEnvironment( key agent_id, float transition, list params ) -> integer:
    agent_id: UUID of the agent participating in the experience.
    transition: Transition duration in seconds.
    params: A list of environmental parameters to apply.
    tooltip: Sets an individual agent's environmental settings using the attributes in params over a duration of transition seconds. Must be used as part of an experience; passing an empty list removes
      overrides.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Target rotation to turn the avatar to face.
    flags: Flags to configure the rotation behavior.
    tooltip: Sets the rotation of the avatar to rot, controlled by flags.
  llSetCameraParams( list rules ) -> void:
    rules: A strided list of rules and data pairs configuring the camera.
    tooltip: Sets multiple camera parameters simultaneously using the list of rules. Requires the PERMISSION_CONTROL_CAMERA runtime permission.
  llStartAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, or the built-in animation name.
    tooltip: Starts the animation anim (inventory or built-in) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on objects).
  llStopAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, the UUID of the animation, or the built-in animation name.
    tooltip: Stops the specified animation anim (inventory, built-in, or UUID) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on
      objects).
  llTakeCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated (use llSetCameraParams instead). Formerly used to take control of the agent's camera.
  llTakeControls( integer controls, integer accept, integer pass_on ) -> void:
    controls: Bitfield of CONTROL_* flags to intercept.
    accept: Boolean. Determines whether control events are generated to trigger script handlers.
    pass_on: Boolean. If TRUE, the keys also perform their default functions; if FALSE, default actions are suppressed.
    tooltip: Intercepts inputs (keyboard/mouse clicks) from the agent, specifically those specified by controls. The boolean accept determines if events are generated, and pass_on determines if inputs also
      perform their default functions. Requires the PERMISSION_TAKE_CONTROLS runtime permission.
  llTeleportAgent( key agent, string landmark, vector position, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    landmark: Name of the landmark in the prim's inventory, or an empty string to teleport locally.
    position: Position vector in local region coordinates to teleport to if landmark is empty.
    look_at: Position vector (or direction unit vector if teleporting out of region) the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to a landmark in the object's inventory. If landmark is empty, teleports them to position within the current region. Upon arrival,
      the agent is turned to face look_at. Can only teleport the owner.
  llTeleportAgentGlobalCoords( key agent, vector global_coordinates, vector region_coordinates, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    global_coordinates: Global coordinates vector of the target region (obtained via llRequestSimulatorData).
    region_coordinates: Target coordinates vector within the destination region.
    look_at: Position vector within the region (or unit direction vector if out of region) that the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to region_coordinates within a target region specified by global_coordinates. Upon landing, the agent faces the direction look_at.
      Can only teleport the owner.
  llTeleportAgentHome( key avatar ) -> void:
    avatar: UUID of the avatar to teleport.
    tooltip: Teleports the avatar (who must be standing on land owned by the script owner) directly to their designated home location without warning (similar to a God Summons).
  llUnSit( key id ) -> void:
    id: UUID of the avatar to unsit.
    tooltip: Forces the agent specified by id to stand up if they are sitting on the object containing the script, or are currently over land owned by the object's owner.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: World-frame position vector to project into HUD space.
    tooltip: Returns the local position vector that places the center of the HUD object directly over the world coordinate world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA
      runtime permission.
avatar_animation:
  llGetAnimation( key avatar ) -> string:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a string representing the name of the currently playing locomotion animation for the specified avatar.
  llGetAnimationList( key avatar ) -> list:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a list of keys (UUIDs) representing all active animations currently playing on the specified avatar.
  llGetAnimationOverride( string anim_state ) -> string:
    anim_state: Animation state string to query.
    tooltip: Returns a string representing the name of the animation currently overriding the specified anim_state. Requires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission.
  llResetAnimationOverride( string anim_state ) -> void:
    anim_state: Animation state string (or 'ALL') to reset.
    tooltip: Resets the animation override for anim_state to its default value (use 'ALL' to reset all states). Requires the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llSetAnimationOverride( string anim_state, string anim ) -> void:
    anim_state: Animation state to override.
    anim: Name of an animation in the prim's inventory, or a built-in animation name.
    tooltip: Overrides the default animation for anim_state with anim (which must be in the object's inventory or a built-in animation). Requires the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llStartAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, or the built-in animation name.
    tooltip: Starts the animation anim (inventory or built-in) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on objects).
  llStopAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, the UUID of the animation, or the built-in animation name.
    tooltip: Stops the specified animation anim (inventory, built-in, or UUID) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on
      objects).
avatar_communication:
  email( string time, string address, string subject, string message, integer num_left ):
    time: Timestamp of when the email was received.
    address: Email address of the sender.
    subject: Subject of the email.
    message: Body text of the email.
    num_left: Number of pending emails still waiting in the queue.
    tooltip: Triggered when an email sent to this script's address arrives. num_left indicates the number of pending emails remaining in the queue.
  listen( integer channel, string name, key id, string message ):
    channel: Chat channel where the message appeared.
    name: Name of the sending prim or the legacy name of the sending avatar.
    id: UUID of the sending avatar or prim.
    message: Spoken text string.
    tooltip: Triggered when a chat message matching active llListen filters is received on channel. Passes the sender's name and UUID key id, along with the spoken message string.
  llDialog( key avatar, string message, list buttons, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    buttons: A list of up to 12 strings representing button labels.
    channel: Output chat channel (any integer value) where button clicks are chatted.
    tooltip: Shows a dialog box on the screen of the avatar specified by avatar, displaying message along with up to 12 choice buttons. Clicking a button chats its label on channel.
  llEmail( string address, string subject, string message ) -> void:
    address: Destination email address.
    subject: Subject of the email.
    message: Message body of the email.
    tooltip: Sends an email to address with subject and message.
  llInstantMessage( key user, string message ) -> void:
    user: UUID of the destination user.
    message: Text message string to send.
    tooltip: Sends an instant message containing message to the user identified by their key.
  llListen( integer channel, string name, key id, string msg ) -> integer:
    channel: Input chat channel to listen on (any integer from -2147483648 to 2147483647).
    name: Specific prim name or avatar legacy name to filter by (or empty string for no filter).
    id: Specific avatar or prim UUID to filter by (or NULL_KEY for no filter).
    msg: Specific chat message string to filter by (or empty string for no filter).
    tooltip: Creates a listener on channel from name and id for msg. Returns an integer listener handle used to control or remove the listener. Empty strings or NULL_KEY filters do not filter on those parameters.
  llListenControl( integer handle, integer active ) -> void:
    handle: Integer listener handle returned by llListen.
    active: Boolean. If TRUE, activates the listener; if FALSE, deactivates it.
    tooltip: Enables or disables the listener specified by the integer handle. If active is TRUE, the listener is activated; if FALSE, it is deactivated.
  llListenRemove( integer handle ) -> void:
    handle: Integer listener handle returned by llListen to remove.
    tooltip: Completely removes the listener specified by the integer handle.
  llLoadURL( key avatar, string message, string url ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    url: Web URL to open.
    tooltip: Shows a dialog box displaying message to the avatar avatar offering to open the specified url. Clicking yes launches the URL in their default web browser.
  llMapBeacon( string region_name, vector pos, list options ) -> void:
    region_name: Name of the region where the beacon is displayed.
    pos: Position vector in region coordinates to highlight.
    options: A list of options to configure the map beacon.
    tooltip: Displays an in-world beacon and optionally opens the world map for the avatar touching or wearing the object, centered on region_name with pos highlighted. Only works for attached scripts or
      during touch events.
  llMapDestination( string simname, vector pos, vector look_at ) -> void:
    simname: Name of the target simulator region.
    pos: Position vector in region coordinates to highlight.
    look_at: Position in local coordinates (currently unused/ignored).
    tooltip: 'Opens the world map for the avatar touching or wearing the object, centered on simname with pos highlighted. Only works for attached scripts or during touch events. Note: look_at currently
      has no effect.'
  llOpenFloater( string floater_name, string url, list params ) -> integer:
    floater_name: Identifier string of the viewer floater to open.
    url: URL to load within the opened floater.
    params: Options or parameters to apply to the opened floater.
    tooltip: Opens the specified viewer floater_name loaded with url and configured via params. Returns an integer error code, or 0 if successful.
  llOwnerSay( string msg ) -> void:
    msg: Text message string to send.
    tooltip: Sends the chat message msg privately to the object owner (the owner must be currently in the same region for the message to be received).
  llRegionSayTo( key target, integer channel, string msg ) -> void:
    target: UUID of the destination avatar or prim in the same region.
    channel: Output chat channel (any integer value).
    msg: Text message string to send.
    tooltip: Sends the message msg on channel privately to the targeted avatar or object (if within the region). If target is an avatar and channel is non-zero, the message can also be heard by any attachments
      worn by the avatar.
  llSay( integer channel, string msg ) -> void:
    channel: Integer chat channel to transmit the message on.
    msg: Text message string to transmit.
    tooltip: Says the text message msg on the specified channel. The message can be heard up to a 20m radius. Channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not visible to avatars
      and can be used for script-to-script communication.
  llSetText( string text, vector color, float alpha ) -> void:
    text: Floating text string to display.
    color: Color vector in RGB <R, G, B> (values from 0.0 to 1.0).
    alpha: Transparency value to set, from 0.0 (clear) to 1.0 (solid).
    tooltip: Displays floating text above the prim with the specified color vector and transparency alpha.
  llShout( integer channel, string msg ) -> void:
    channel: Integer chat channel to shout the message on.
    msg: Text message string to transmit.
    tooltip: Shouts the text message msg on the specified channel. The message can be heard up to a 100m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
  llTargetedEmail( integer target, string subject, string message ) -> void:
    target: Target constant (e.g., TARGETED_EMAIL_OBJECT_OWNER or TARGETED_EMAIL_ROOT_CREATOR).
    subject: Subject of the email.
    message: Email message body.
    tooltip: Sends an email containing subject and message to the target (which can designate the owner or creator of the object).
  llTextBox( key avatar, string message, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the text box.
    channel: Output chat channel (any integer value) where the input text is chatted.
    tooltip: Opens an input text box dialog displaying message to the avatar. Submitting text chats the input string on channel as if said by the avatar.
  llWhisper( integer channel, string msg ) -> void:
    channel: Integer chat channel to whisper the message on.
    msg: Text message string to transmit.
    tooltip: Whispers the text message msg on the specified channel. The message can be heard up to a 10m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
avatar_inventory:
  llGiveAgentInventory( key agent, string folder, list items, list options ) -> integer:
    agent: UUID of the target agent in the same region.
    folder: Name of the destination folder to be created
    items: The names of the items in the prim's inventory to transfer.
    options: A list of options to configure the inventory transfer.
    tooltip: Gives the specified inventory items to the agent as a new folder named folder, as permitted by the permissions system. Customizes the transfer using options.
  llGiveInventory( key target, string item ) -> void:
    target: UUID of the target agent or prim.
    item: Name of the item in the prim's inventory to transfer.
    tooltip: Gives the specified inventory item to the target, as permitted by the permissions system. The target can be any agent or an object located in the same region.
  llGiveInventoryList( key target, string folder, list items ) -> void:
    target: UUID of the target agent or prim in the same region.
    folder: Name of the destination folder to be created (ignored if the target is an object).
    items: The names of the items in the prim's inventory to transfer.
    tooltip: Gives the list of inventory items to target as a new folder named folder. If target is an object, the items are passed directly into its inventory and no folder is created. The target must
      be an agent or an object in the same region.
camera:
  llClearCameraParams(  ) -> void:
    tooltip: Resets all camera parameters to default values and turns off scripted camera control. Requires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted for attached or sat-on
      objects).
  llForceMouselook( integer mouselook ) -> void:
    mouselook: Boolean. If TRUE, forces a sitting avatar into mouselook; if FALSE, allows them to keep their current camera mode.
    tooltip: Sets whether any avatar sitting on this prim is forced into mouselook mode. Setting mouselook to TRUE forces the mode; FALSE (default) allows the avatar to keep their current camera mode.
  llGetCameraAspect(  ) -> float:
    tooltip: Returns a float representing the camera's current aspect ratio (width/height) of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraFOV(  ) -> float:
    tooltip: Returns a float representing the camera's current field of view (FOV) in radians of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraPos(  ) -> vector:
    tooltip: Returns a vector representing the camera's current position in region coordinates of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_VECTOR if permissions are not granted.
  llGetCameraRot(  ) -> rotation:
    tooltip: Returns a rotation representing the camera's current orientation of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_ROTATION if permissions are not granted.
  llReleaseCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated. Intended to return camera control back to the avatar (use llClearCameraParams instead).
  llSetCameraAtOffset( vector offset ) -> void:
    offset: Offset position vector in local coordinates relative to the prim.
    tooltip: Sets the target offset vector (in local coordinates) that a seated avatar's camera will look at.
  llSetCameraEyeOffset( vector offset ) -> void:
    offset: Offset position vector in local coordinates relative to the prim.
    tooltip: Sets the eye offset vector (in local coordinates) where a seated avatar's camera is positioned.
  llSetCameraParams( list rules ) -> void:
    rules: A strided list of rules and data pairs configuring the camera.
    tooltip: Sets multiple camera parameters simultaneously using the list of rules. Requires the PERMISSION_CONTROL_CAMERA runtime permission.
  llSetLinkCamera( integer link, vector eye, vector at ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    eye: Eye offset position vector in local coordinates relative to the prim.
    at: Look-at offset position vector in local coordinates relative to the prim.
    tooltip: Sets the camera eye position offset eye and looking-at position offset at for avatars who sit on the linked prim link.
  llTakeCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated (use llSetCameraParams instead). Formerly used to take control of the agent's camera.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: World-frame position vector to project into HUD space.
    tooltip: Returns the local position vector that places the center of the HUD object directly over the world coordinate world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA
      runtime permission.
chat:
  listen( integer channel, string name, key id, string message ):
    channel: Chat channel where the message appeared.
    name: Name of the sending prim or the legacy name of the sending avatar.
    id: UUID of the sending avatar or prim.
    message: Spoken text string.
    tooltip: Triggered when a chat message matching active llListen filters is received on channel. Passes the sender's name and UUID key id, along with the spoken message string.
  llDialog( key avatar, string message, list buttons, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the dialog box.
    buttons: A list of up to 12 strings representing button labels.
    channel: Output chat channel (any integer value) where button clicks are chatted.
    tooltip: Shows a dialog box on the screen of the avatar specified by avatar, displaying message along with up to 12 choice buttons. Clicking a button chats its label on channel.
  llListen( integer channel, string name, key id, string msg ) -> integer:
    channel: Input chat channel to listen on (any integer from -2147483648 to 2147483647).
    name: Specific prim name or avatar legacy name to filter by (or empty string for no filter).
    id: Specific avatar or prim UUID to filter by (or NULL_KEY for no filter).
    msg: Specific chat message string to filter by (or empty string for no filter).
    tooltip: Creates a listener on channel from name and id for msg. Returns an integer listener handle used to control or remove the listener. Empty strings or NULL_KEY filters do not filter on those parameters.
  llListenControl( integer handle, integer active ) -> void:
    handle: Integer listener handle returned by llListen.
    active: Boolean. If TRUE, activates the listener; if FALSE, deactivates it.
    tooltip: Enables or disables the listener specified by the integer handle. If active is TRUE, the listener is activated; if FALSE, it is deactivated.
  llListenRemove( integer handle ) -> void:
    handle: Integer listener handle returned by llListen to remove.
    tooltip: Completely removes the listener specified by the integer handle.
  llRegionSay( integer channel, string msg ) -> void:
    channel: Output chat channel to broadcast on (must be non-zero).
    msg: Text message string to broadcast.
    tooltip: Broadcasts the message msg on channel to the entire region (heard by any script listening on that channel; channel 0 is not permitted).
  llRegionSayTo( key target, integer channel, string msg ) -> void:
    target: UUID of the destination avatar or prim in the same region.
    channel: Output chat channel (any integer value).
    msg: Text message string to send.
    tooltip: Sends the message msg on channel privately to the targeted avatar or object (if within the region). If target is an avatar and channel is non-zero, the message can also be heard by any attachments
      worn by the avatar.
  llSay( integer channel, string msg ) -> void:
    channel: Integer chat channel to transmit the message on.
    msg: Text message string to transmit.
    tooltip: Says the text message msg on the specified channel. The message can be heard up to a 20m radius. Channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not visible to avatars
      and can be used for script-to-script communication.
  llShout( integer channel, string msg ) -> void:
    channel: Integer chat channel to shout the message on.
    msg: Text message string to transmit.
    tooltip: Shouts the text message msg on the specified channel. The message can be heard up to a 100m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
  llTextBox( key avatar, string message, integer channel ) -> void:
    avatar: UUID of the avatar in the same region.
    message: Text message to display in the text box.
    channel: Output chat channel (any integer value) where the input text is chatted.
    tooltip: Opens an input text box dialog displaying message to the avatar. Submitting text chats the input string on channel as if said by the avatar.
  llWhisper( integer channel, string msg ) -> void:
    channel: Integer chat channel to whisper the message on.
    msg: Text message string to transmit.
    tooltip: Whispers the text message msg on the specified channel. The message can be heard up to a 10m radius. All channels other than PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647) are not sent to
      avatars and are used to communicate with scripts.
combat:
  final_damage( integer num_detected ):
    num_detected: Number of damage events applied to the avatar or task.
    tooltip: Triggered after all on_damage events across all scripts have completed and damage is actively applied to the avatar or distributed among seated avatars. Collision detected functions (llDetected*)
      and llDetectedDamage are available.
  on_damage( integer num_detected ):
    num_detected: Number of pending damage events.
    tooltip: Triggered when damage has been inflicted on an avatar or task, but before it is applied or distributed. Collision detected functions (llDetected*), llDetectedDamage, and llAdjustDamage are
      available. Passes num_detected, representing the number of pending damage events.
  on_death(  ):
    tooltip: Triggered on all worn attachments when the wearing avatar's health reaches 0.
  llAdjustDamage( integer number, float new_damage ) -> void:
    number: Index of the damage event to modify.
    new_damage: New damage value to be applied or distributed after on_damage processing.
    tooltip: Modifies the amount of damage applied by the current on_damage event after it completes processing, specified by the damage event index number.
  llDamage( key target, float damage, integer damage_type ) -> void:
    target: Key of the target avatar or task to receive damage.
    damage: Amount of damage to inflict (can exceed 100, unlike collision-based damage).
    damage_type: Type of damage to deliver to the target (can correspond to a DAMAGE_TYPE_* constant).
    tooltip: Generates a damage event delivering the specified amount of damage and damage_type to the targeted avatar or task in the same region.
  llDetectedDamage( integer number ) -> list:
    number: Index of the detection information.
    tooltip: Returns a list containing pending damage information for the event specified by number, including the current damage, the damage type, and the original damage delivered.
  llGetHealth( key id ) -> float:
    id: UUID of the agent or object to query.
    tooltip: Returns a float representing the current health of the avatar or object specified by id.
  llRezObjectWithParams( string item, list options ) -> key:
    item: Name of the object in the prim's inventory to rez.
    options: A list of REZ_* options to configure the rezzed object's attributes.
    tooltip: Instantiates the named inventory object (defaulting to the rezzing prim's position unless REZ_POS is specified) using the initial set of parameters specified in options. Returns the key of
      the rezzed object, or a blank key on failure.
  llSetDamage( float damage ) -> void:
    damage: Float damage value to set (range -100.0 for full heal to 100.0 for instant kill).
    tooltip: Sets the amount of damage delivered when this object hits an avatar. The object is immediately destroyed upon inflicting damage, and no collision event is triggered.
cryptography:
  llComputeHash( string message, string algorithm ) -> string:
    message: Message string to be hashed.
    algorithm: Cryptographic digest algorithm to use (e.g., md5, sha1, sha224, sha256, sha384, or sha512).
    tooltip: Returns a hex-encoded hash digest string of message using the specified cryptographic algorithm.
  llHMAC( string private_key, string msg, string algorithm ) -> string:
    private_key: PEM-formatted secret key to use for the HMAC hash.
    msg: Message string to be hashed.
    algorithm: Cryptographic digest algorithm to use.
    tooltip: Returns a Base64-encoded HMAC hash of msg using the secret key private_key and the specified digest algorithm (md5, sha1, sha224, sha256, sha384, or sha512).
  llHash( string val ) -> integer:
    val: String to hash.
    tooltip: Returns an integer representing the 32-bit hash value of the string val (returns 0 if the string is empty).
  llMD5String( string src, integer nonce ) -> string:
    src: Source string to hash.
    nonce: Nonce string used as a salt.
    tooltip: Returns a string of 32 hex characters representing the MD5 checksum of src salted with nonce (formatted as ':' + nonce).
  llSHA1String( string src ) -> string:
    src: Source string to hash.
    tooltip: Returns a string of 40 hex characters representing the SHA-1 security hash of src.
  llSHA256String( string src ) -> string:
    src: Source string to hash.
    tooltip: Returns a string of 64 hex characters representing the SHA-256 security hash of src.
  llSignRSA( string private_key, string msg, string algorithm ) -> string:
    private_key: PEM-formatted private key.
    msg: Message contents to sign.
    algorithm: Digest algorithm to use (sha1, sha224, sha256, sha384, or sha512).
    tooltip: Returns the Base64-encoded RSA signature of msg using the PEM-formatted private_key and the specified digest algorithm (sha1, sha224, sha256, sha384, or sha512). Can be paired with llVerifyRSA
      to pass verifiable messages.
  llVerifyRSA( string public_key, string msg, string signature, string algorithm ) -> integer:
    public_key: PEM-formatted public key to use for signature verification.
    msg: Message string that was signed.
    signature: Base64-encoded signature to verify.
    algorithm: Cryptographic digest algorithm to use.
    tooltip: Returns TRUE if the Base64-formatted signature is verified as valid for the message msg when using the digest algorithm and public_key. Returns FALSE otherwise.
data_conversion:
  llBase64ToInteger( string str ) -> integer:
    str: Base64-encoded string to decode.
    tooltip: Returns an integer representing the Base64-decoded big-endian value of str. Returns zero if str is longer than 8 characters; the return value is unpredictable if str contains fewer than 6 characters.
  llBase64ToString( string str ) -> string:
    str: Base64-encoded string to decode.
    tooltip: Decodes the Base64-encoded string str into a conventional string, interpreting the bytes as a UTF-8 character sequence. Unprintable characters are converted to question marks.
  llCSV2List( string src ) -> list:
    src: String of comma-separated values to parse.
    tooltip: Parses the comma-separated string src and returns it as a list.
  llDumpList2String( list src, string separator ) -> string:
    src: Source list to convert.
    separator: Separator string to place between list entries.
    tooltip: Returns a string that is the list src converted to a single string, with separator placed between each entry.
  llIntegerToBase64( integer number ) -> string:
    number: Integer number to encode.
    tooltip: Returns an 8-character Base64 string representing the big-endian encoded value of number.
  llJson2List( string src ) -> list:
    src: JSON string to parse.
    tooltip: Parses the JSON string src and returns a list representing its top-level elements.
  llJsonGetValue( string json, list specifiers ) -> string:
    json: JSON string to query.
    specifiers: A list of key names or array indices specifying the path to the desired value.
    tooltip: Parses the JSON string json and returns the value found by traversing the specified path of specifiers as a string.
  llJsonSetValue( string json, list specifiers, string value ) -> string:
    json: Source JSON string to modify.
    specifiers: A list of key names or array indices specifying the path to add, update, or delete.
    value: New value to set, or the JSON_DELETE constant to delete the targeted element.
    tooltip: Returns a new JSON string representing json with the target located at specifiers set to value. Supports JSON_APPEND to append elements. Writing JSON_DELETE deletes the target. Overwriting
      array bounds or setting non-array levels with array indices returns JSON_INVALID.
  llJsonValueType( string json, list specifiers ) -> string:
    json: JSON string containing the value to query.
    specifiers: A list of key names or array indices specifying the path to the value.
    tooltip: Parses the JSON string json and returns the JSON type constant (JSON_*) representing the value found at specifiers.
  llLinear2sRGB( vector color ) -> vector:
    color: RGB color vector in linear space to convert.
    tooltip: Returns a vector representing the conversion of color from the linear RGB colorspace into the sRGB colorspace.
  llList2CSV( list src ) -> string:
    src: Source list to convert.
    tooltip: Returns a string of comma-separated values taken in order from the list src.
  llList2Float( list src, integer index ) -> float:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the float value at index in the list src. Returns 0.0 if the index is out of bounds or if the value cannot be type-cast.
  llList2Integer( list src, integer index ) -> integer:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the integer value at index in the list src. Returns 0 if the index is out of bounds or if the value cannot be type-cast.
  llList2Json( string type, list values ) -> string:
    type: JSON target type (JSON_ARRAY or JSON_OBJECT).
    values: List of values to serialize.
    tooltip: Converts the list values into a JSON string of the specified type (either a JSON_ARRAY or a JSON_OBJECT). Returns JSON_INVALID if an error is encountered.
  llList2Key( list src, integer index ) -> key:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the key (UUID) value at index in the list src. Returns a null string/key if the index is out of bounds or if the value cannot be type-cast.
  llList2Rot( list src, integer index ) -> rotation:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the rotation value at index in the list src. Returns ZERO_ROTATION if the index is out of bounds or if the value cannot be type-cast.
  llList2String( list src, integer index ) -> string:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the string value at index in the list src. Returns an empty string if the index is out of bounds.
  llList2Vector( list src, integer index ) -> vector:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the vector value at index in the list src. Returns ZERO_VECTOR if the index is out of bounds or if the value cannot be type-cast.
  llParseString2List( string src, list separators, list spacers ) -> list:
    src: Source string to parse.
    separators: A list of up to 8 strings representing separators to be discarded.
    spacers: A list of up to 8 strings representing spacers to be preserved in the list.
    tooltip: Breaks the string src into a list of substrings, discarding any separators, keeping spacers, and omitting any empty null values. separators and spacers accept up to 8 string entries each.
  llParseStringKeepNulls( string src, list separators, list spacers ) -> list:
    src: Source string to parse.
    separators: A list of up to 8 strings representing separators to be discarded.
    spacers: A list of up to 8 strings representing spacers to be preserved in the list.
    tooltip: Breaks the string src into a list of substrings, discarding separators and keeping spacers, while preserving empty null values (unlike llParseString2List). separators and spacers accept up
      to 8 string entries each.
  llStringToBase64( string str ) -> string:
    str: Source string to encode.
    tooltip: Returns the Base64 representation string of str, interpreting it as a UTF-8 byte sequence.
  llXorBase64( string str1, string str2 ) -> string:
    str1: First Base64 string.
    str2: Second Base64 string (will repeat if shorter than str1).
    tooltip: Correctly performs a bitwise exclusive OR (XOR) on Base64 strings str1 and str2, returning the result as a Base64 string. The string str2 repeats if it is shorter than str1.
  llXorBase64Strings( string str1, string str2 ) -> string // deprecated:
    str1: First Base64 string.
    str2: Second Base64 string (will repeat if shorter than str1).
    tooltip: Deprecated (use llXorBase64 instead). Retained for backwards compatibility. Incorrectly performs a bitwise exclusive OR (XOR) on Base64 strings str1 and str2.
  llXorBase64StringsCorrect( string str1, string str2 ) -> string // deprecated:
    str1: First Base64 string.
    str2: Second Base64 string (will repeat if shorter than str1).
    tooltip: Deprecated (use llXorBase64 instead). Correctly performs (unless nulls are present) a bitwise exclusive OR (XOR) on Base64 strings str1 and str2.
data_storage:
  linkset_data( integer action, string name, string value ):
    action: An integer constant representing the action taken (e.g., LINKSETDATA_UPDATE, LINKSETDATA_DELETE, LINKSETDATA_RESET).
    name: Key name of the modified key-value pair.
    value: New string value of the pair (empty if the pair was deleted or is password-protected).
    tooltip: Fires in all scripts in the linkset whenever the datastore has been modified via an llLinksetData function. Passes the action taken, the affected key name, and the new value.
  llCreateKeyValue( string k, string v ) -> key:
    k: Unique key name for the key-value pair.
    v: Value for the key-value pair (maximum 2047 characters, or 4095 characters if using Mono).
    tooltip: Starts an asynchronous transaction to create a key-value pair (k and v) associated with the script's experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_STORAGE_EXCEPTION
      if the key already exists.
  llDataSizeKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction to request the used and total data storage allocated for the experience. Returns a key query handle for the dataserver event.
  llDeleteKeyValue( string k ) -> key:
    k: Key of the key-value pair to delete.
    tooltip: Starts an asynchronous transaction to delete the key-value pair associated with key k in the experience. Returns a key query handle for the dataserver event.
  llFindNotecardTextCount( string notecardname, string pattern, list options ) -> key:
    notecardname: Name of the target notecard.
    pattern: Regular expression pattern to search for.
    options: A list of options to control the search (currently unused, should be []).
    tooltip: Searches the text of a cached notecard for lines containing the given pattern and returns the number of matches found through a dataserver event.
  llFindNotecardTextSync( string name, string pattern, integer start, integer count, list options ) -> list:
    name: Name of a notecard in the prim's inventory, or a UUID.
    pattern: Regular expression pattern to search for.
    start: Number of match results to skip before returning (0 to start at the first match).
    count: Maximum number of matches to return (if 0, returns the first 64 matches).
    options: A list of options for future expansion (unused, should be []).
    tooltip: Synchronously searches a cached notecard name for lines containing pattern, returning a list of line and column numbers. Returns a list containing 'NAK' if the notecard is not cached, or an
      empty list if no matches are found.
  llGetNotecardLine( string name, integer line ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    line: Zero-based line number to request.
    tooltip: Asynchronously requests the line index line of the notecard name from the dataserver. Returns a key query handle for the dataserver event, which will return 'EOF' when reaching past the end
      of the notecard.
  llGetNotecardLineSync( string name, integer line ) -> string:
    name: Name of the notecard in the prim's inventory, or a UUID.
    line: Zero-based line number to request.
    tooltip: Synchronously reads the line index line of the notecard name from the region's cache, immediately returning its text without raising a dataserver event. Returns 'NAK' if not cached or 'EOF'
      if out of bounds.
  llGetNumberOfNotecardLines( string name ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    tooltip: Asynchronously requests the total line count of the notecard name. Returns a key query handle for the dataserver event.
  llKeyCountKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction requesting the total count of keys in the experience data store. Returns a key query handle for the dataserver event.
  llKeysKeyValue( integer first, integer count ) -> key:
    first: Zero-based start index of the keys to retrieve.
    count: Number of keys to retrieve.
    tooltip: Starts an asynchronous transaction to retrieve count keys from the experience data store starting at the zero-based index first. Returns a key query handle for the dataserver event. Fails with
      XP_ERROR_KEY_NOT_FOUND if out of bounds.
  llLinksetDataAvailable(  ) -> integer:
    tooltip: Returns an integer representing the number of bytes available/remaining in the linkset's datastore.
  llLinksetDataCountFound( string pattern ) -> integer:
    pattern: A regular expression (regex) search string used to match keys.
    tooltip: Returns the total count of keys in the linkset datastore that match the regular expression pattern.
  llLinksetDataCountKeys(  ) -> integer:
    tooltip: Returns an integer representing the total number of unique keys stored in the linkset's datastore.
  llLinksetDataDelete( string name ) -> integer:
    name: Key name of the key-value pair to delete.
    tooltip: Deletes the unprotected key-value pair specified by name from the linkset's datastore, triggering a linkset_data event.
  llLinksetDataDeleteFound( string pattern, string pass ) -> list:
    pattern: A regular expression (regex) specifying which keys to delete.
    pass: Optional passphrase required to delete matching protected keys.
    tooltip: Deletes all keys in the datastore matching the regular expression pattern. Returns a list [num_deleted, num_failed_protected]. Decrypts and deletes protected keys if matching pass is provided.
  llLinksetDataDeleteProtected( string name, string pass ) -> integer:
    name: Key name of the protected key-value pair to delete.
    pass: Passphrase required to delete the protected key.
    tooltip: Deletes the protected key-value pair specified by name from the linkset's datastore using the passphrase pass, triggering a linkset_data event.
  llLinksetDataFindKeys( string pattern, integer start, integer count ) -> list:
    pattern: A regular expression (regex) describing which keys to search for.
    start: Zero-based start index of the matching keys to return.
    count: Maximum number of keys to return (or less than 1 to retrieve all matching keys).
    tooltip: Returns an alphabetically sorted list of up to count keys from the datastore that match the regular expression pattern, starting at index start (returns all matching keys if count < 1).
  llLinksetDataListKeys( integer start, integer count ) -> list:
    start: Zero-based start index of the keys to return.
    count: Maximum number of keys to return (or less than 1 to retrieve all keys).
    tooltip: Returns an alphabetically sorted list of up to count keys from the datastore, starting at index start (returns all keys if count < 1).
  llLinksetDataRead( string name ) -> string:
    name: Key of the key-value pair to read.
    tooltip: Reads and returns the string value corresponding to key name from the linkset's datastore.
  llLinksetDataReadProtected( string name, string pass ) -> string:
    name: Key of the protected key-value pair to read.
    pass: Passphrase required to read the protected key.
    tooltip: Reads and returns the string value of the protected key name from the linkset's datastore using the passphrase pass.
  llLinksetDataReset(  ) -> void:
    tooltip: Erases all key-value pairs stored in the linkset's datastore, triggering a linkset_data event (with LINKSETDATA_RESET) in all scripts in the linkset.
  llLinksetDataWrite( string name, string value ) -> integer:
    name: Key name of the key-value pair.
    value: String value to write to the datastore.
    tooltip: Creates or updates an unprotected key-value pair (name and value) in the linkset's datastore. Returns an integer success or failure code.
  llLinksetDataWriteProtected( string name, string value, string pass ) -> integer:
    name: Key name of the protected key-value pair.
    value: String value to write to the datastore.
    pass: Passphrase used to protect or update the key.
    tooltip: Creates or updates a protected key-value pair (name and value) in the linkset's datastore using the passphrase pass. Returns an integer success or failure code.
  llReadKeyValue( string k ) -> key:
    k: Key of the key-value pair to read.
    tooltip: Starts an asynchronous transaction to read the value associated with key k in the experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_KEY_NOT_FOUND if the key
      does not exist.
  llUpdateKeyValue( string k, string v, integer checked, string original_value ) -> key:
    k: Key of the key-value pair to update.
    v: New value for the key-value pair.
    checked: Boolean. If TRUE, requires the existing value to match original_value to complete the update; if FALSE, creates the key if needed.
    original_value: String value to compare against the existing value in the datastore.
    tooltip: Starts an asynchronous transaction to update the key k to value v inside the experience datastore. If checked is TRUE, the update fails with XP_ERROR_RETRY_UPDATE unless the existing value
      matches original_value.
dataserver:
  dataserver( key queryid, string data ):
    queryid: Key identifying the asynchronous request (matches the handle returned by the requesting function).
    data: String containing the requested data.
    tooltip: Triggered when requested data is returned to the script (e.g., from llRequestAgentData, llRequestInventoryData, or llGetNotecardLine).
  llCreateKeyValue( string k, string v ) -> key:
    k: Unique key name for the key-value pair.
    v: Value for the key-value pair (maximum 2047 characters, or 4095 characters if using Mono).
    tooltip: Starts an asynchronous transaction to create a key-value pair (k and v) associated with the script's experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_STORAGE_EXCEPTION
      if the key already exists.
  llDataSizeKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction to request the used and total data storage allocated for the experience. Returns a key query handle for the dataserver event.
  llDeleteKeyValue( string k ) -> key:
    k: Key of the key-value pair to delete.
    tooltip: Starts an asynchronous transaction to delete the key-value pair associated with key k in the experience. Returns a key query handle for the dataserver event.
  llFindNotecardTextCount( string notecardname, string pattern, list options ) -> key:
    notecardname: Name of the target notecard.
    pattern: Regular expression pattern to search for.
    options: A list of options to control the search (currently unused, should be []).
    tooltip: Searches the text of a cached notecard for lines containing the given pattern and returns the number of matches found through a dataserver event.
  llGetNotecardLine( string name, integer line ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    line: Zero-based line number to request.
    tooltip: Asynchronously requests the line index line of the notecard name from the dataserver. Returns a key query handle for the dataserver event, which will return 'EOF' when reaching past the end
      of the notecard.
  llGetNumberOfNotecardLines( string name ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    tooltip: Asynchronously requests the total line count of the notecard name. Returns a key query handle for the dataserver event.
  llKeyCountKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction requesting the total count of keys in the experience data store. Returns a key query handle for the dataserver event.
  llKeysKeyValue( integer first, integer count ) -> key:
    first: Zero-based start index of the keys to retrieve.
    count: Number of keys to retrieve.
    tooltip: Starts an asynchronous transaction to retrieve count keys from the experience data store starting at the zero-based index first. Returns a key query handle for the dataserver event. Fails with
      XP_ERROR_KEY_NOT_FOUND if out of bounds.
  llReadKeyValue( string k ) -> key:
    k: Key of the key-value pair to read.
    tooltip: Starts an asynchronous transaction to read the value associated with key k in the experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_KEY_NOT_FOUND if the key
      does not exist.
  llRequestAgentData( key id, integer data ) -> key:
    id: UUID of the agent.
    data: DATA_* category flag of the requested information.
    tooltip: Asynchronously requests the specified data category (DATA_*) about the agent id. Triggers a dataserver event with the results and returns a key query handle.
  llRequestDisplayName( key id ) -> key:
    id: UUID of the avatar to query.
    tooltip: Asynchronously requests the display name of the agent specified by id, triggering a dataserver event with the results. The agent does not need to be online or in the region. Returns a key query
      handle.
  llRequestInventoryData( string item ) -> key:
    item: Name of the item in the prim's inventory.
    tooltip: Asynchronously requests data for the named inventory item, triggering a dataserver event. Currently, only landmark items are supported (which return local region coordinates). Returns a key
      query handle.
  llRequestSimulatorData( string region, integer data ) -> key:
    region: Case-sensitive region name.
    data: DATA_SIM_* flag of the requested simulator data.
    tooltip: Asynchronously requests data (using a DATA_SIM_* constant) about the region. Triggers a dataserver event and returns a key query handle.
  llRequestUserKey( string username ) -> key:
    username: Current or historical username of the avatar to resolve.
    tooltip: Asynchronously requests the Agent ID key (UUID) for the agent specified by their current or historical username, returning NULL_KEY if not found. Returns a key query handle for the dataserver
      event.
  llRequestUsername( key id ) -> key:
    id: UUID of the avatar to query.
    tooltip: Asynchronously requests the unique single-word username of the agent identified by id, triggering a dataserver event. The agent does not need to be online or in the region. Returns a key query
      handle.
  llUpdateKeyValue( string k, string v, integer checked, string original_value ) -> key:
    k: Key of the key-value pair to update.
    v: New value for the key-value pair.
    checked: Boolean. If TRUE, requires the existing value to match original_value to complete the update; if FALSE, creates the key if needed.
    original_value: String value to compare against the existing value in the datastore.
    tooltip: Starts an asynchronous transaction to update the key k to value v inside the experience datastore. If checked is TRUE, the update fails with XP_ERROR_RETRY_UPDATE unless the existing value
      matches original_value.
detected:
  collision( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar or another object is colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_end( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object stops colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_start( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object first begins colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  final_damage( integer num_detected ):
    num_detected: Number of damage events applied to the avatar or task.
    tooltip: Triggered after all on_damage events across all scripts have completed and damage is actively applied to the avatar or distributed among seated avatars. Collision detected functions (llDetected*)
      and llDetectedDamage are available.
  no_sensor(  ):
    tooltip: Triggered when active sensors (from llSensor or llSensorRepeat) complete a scan without finding any matching targets.
  on_damage( integer num_detected ):
    num_detected: Number of pending damage events.
    tooltip: Triggered when damage has been inflicted on an avatar or task, but before it is applied or distributed. Collision detected functions (llDetected*), llDetectedDamage, and llAdjustDamage are
      available. Passes num_detected, representing the number of pending damage events.
  sensor( integer num_detected ):
    num_detected: Total number of detected targets found (usable with llDetected* functions).
    tooltip: Triggered when objects matching constraints of llSensor or llSensorRepeat are successfully detected. Passes num_detected, representing the number of detected targets.
  touch( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar touches the object. Passes num_detected, representing the number of touching agents.
  touch_end( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar stops touching the object. Passes num_detected, representing the number of touching agents.
  touch_start( integer num_detected ):
    num_detected: Total number of touching agents detected (usable with llDetected* functions).
    tooltip: Triggered when an avatar first touches the object. Passes num_detected, representing the number of touching agents.
  llAdjustDamage( integer number, float new_damage ) -> void:
    number: Index of the damage event to modify.
    new_damage: New damage value to be applied or distributed after on_damage processing.
    tooltip: Modifies the amount of damage applied by the current on_damage event after it completes processing, specified by the damage event index number.
  llDetectedDamage( integer number ) -> list:
    number: Index of the detection information.
    tooltip: Returns a list containing pending damage information for the event specified by number, including the current damage, the damage type, and the original damage delivered.
  llDetectedGrab( integer number ) -> vector:
    number: Index of the detection information.
    tooltip: Returns a vector representing the grab offset of the user touching the object. Only works in touch events and returns <0.0, 0.0, 0.0> if number is not a valid index.
  llDetectedGroup( integer number ) -> integer:
    number: Index of the detection information.
    tooltip: Returns TRUE if the detected object or avatar specified by number has the same active group as the prim containing the script. Returns FALSE if the group is not active or if they are not in
      the group.
  llDetectedKey( integer number ) -> key:
    number: Index of the detection information.
    tooltip: Returns the key (UUID) of the detected object or avatar specified by number, or NULL_KEY if number is not a valid index.
  llDetectedLinkNumber( integer number ) -> integer:
    number: Index of the detection information.
    tooltip: Returns the link number (integer) of the triggered event (touches and collisions only) specified by number. Returns 0 for non-linked objects, 1 for the root prim, and 2+ for child prims. Returns
      0 if not supported by the event.
  llDetectedName( integer item ) -> string:
    item: Index of the detection information.
    tooltip: Returns a string representing the name of the detected object or avatar specified by item. Returns an empty string if item is not a valid index.
  llDetectedOwner( integer number ) -> key:
    number: Index of the detection information.
    tooltip: Returns the key (UUID) of the owner of the detected object specified by number. Returns an invalid key if number is not a valid index.
  llDetectedPos( integer number ) -> vector:
    number: Index of the detection information.
    tooltip: Returns the vector position (in region coordinates) of the detected object or avatar specified by number, or <0.0, 0.0, 0.0> if number is not a valid index.
  llDetectedRezzer( integer number ) -> key:
    number: Index of the detection information.
    tooltip: Returns the key (UUID) of the object or avatar that rezzed the detected object specified by number.
  llDetectedRot( integer number ) -> rotation:
    number: Index of the detection information.
    tooltip: Returns the rotation of the detected object or avatar specified by number, or <0.0, 0.0, 0.0, 1.0> if number is not a valid offset index.
  llDetectedTouchBinormal( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface binormal vector (tangent to the surface, pointing along the positive T (V) direction of tangent space) at the touched location specified by index. Can be used with llDetectedTouchNormal
      to determine the tangent space.
  llDetectedTouchFace( integer index ) -> integer:
    index: Index of the detection information.
    tooltip: Returns the integer index of the face clicked by the avatar in the touch event specified by index.
  llDetectedTouchNormal( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface normal vector (perpendicular to the surface) at the touched location specified by index. Can be used with llDetectedTouchBinormal to determine the tangent space.
  llDetectedTouchPos( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the vector position where the object was touched (specified by index) in region coordinates, or in screen-space coordinates if the object is attached as a HUD.
  llDetectedTouchST( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the surface coordinates (<s, t, 0.0>) where the prim was touched, specified by index. X and Y contain the horizontal (s) and vertical (t) face coordinates, typically in the interval
      [0.0, 1.0]. Returns TOUCH_INVALID_TEXCOORD if coordinates cannot be determined.
  llDetectedTouchUV( integer index ) -> vector:
    index: Index of the detection information.
    tooltip: Returns the texture coordinates (<u, v, 0.0>) where the prim was touched, specified by index. X and Y contain the horizontal (u) and vertical (v) texture coordinates, typically in the interval
      [0.0, 1.0] (affected by repeats and rotation). Returns TOUCH_INVALID_TEXCOORD if coordinates cannot be determined.
  llDetectedType( integer number ) -> integer:
    number: Index of the detection information.
    tooltip: Returns an integer bitfield representing the types (AGENT, ACTIVE, PASSIVE, or SCRIPTED) of the detected object or avatar specified by number. Returns 0 if number is not a valid index.
  llDetectedVel( integer number ) -> vector:
    number: Index of the detection information.
    tooltip: Returns the vector velocity of the detected object or avatar specified by number, or <0.0, 0.0, 0.0> if number is not a valid offset index.
effects:
  llCollisionSprite( string impact_sprite ) -> void // deprecated:
    impact_sprite: UUID of a texture, the name of a texture in the prim's inventory, or an empty string to suppress sprites.
    tooltip: Suppresses default collision sprites and replaces them with impact_sprite (which must be in the prim's inventory). Supply an empty string to only suppress collision sprites.
  llLinkParticleSystem( integer link, list rules ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    rules: A list of particle system rules and data pairs [rule1, data1, ...].
    tooltip: Creates or updates a particle system on the linked prim link based on the list of rules. An empty list removes the particle system.
  ? llMakeExplosion( integer particles, float scale, float vel, float lifetime, float arc, string texture, vector offset ) -> void // deprecated
  : particles: ''
    scale: ''
    vel: ''
    lifetime: ''
    arc: ''
    texture: Name of a texture in the prim's inventory, or a UUID.
    offset: Offset relative to the prim's position (expressed in local coordinates; completely ignored by the system).
    tooltip: Deprecated. Generates a circular explosion of particles. Use llParticleSystem instead.
  ? llMakeFire( integer particles, float scale, float vel, float lifetime, float arc, string texture, vector offset ) -> void // deprecated
  : particles: ''
    scale: ''
    vel: ''
    lifetime: ''
    arc: ''
    texture: Name of a texture in the prim's inventory, or a UUID.
    offset: Offset relative to the prim's position (expressed in local coordinates; completely ignored by the system).
    tooltip: Deprecated. Generates fire-like particles. Use llParticleSystem instead.
  ? llMakeFountain( integer particles, float scale, float vel, float lifetime, float arc, integer bounce, string texture, vector offset, float bounce_offset ) -> void // deprecated
  : particles: ''
    scale: ''
    vel: ''
    lifetime: ''
    arc: ''
    bounce: ''
    texture: Name of a texture in the prim's inventory, or a UUID.
    offset: Offset relative to the prim's position (expressed in local coordinates; completely ignored by the system).
    bounce_offset: ''
    tooltip: Deprecated. Generates a fountain of particles. Use llParticleSystem instead.
  ? llMakeSmoke( integer particles, float scale, float vel, float lifetime, float arc, string texture, vector offset ) -> void // deprecated
  : particles: ''
    scale: ''
    vel: ''
    lifetime: ''
    arc: ''
    texture: Name of a texture in the prim's inventory, or a UUID.
    offset: Offset relative to the prim's position (expressed in local coordinates; completely ignored by the system).
    tooltip: Deprecated. Generates smoke-like particles. Use llParticleSystem instead.
  llParticleSystem( list rules ) -> void:
    rules: A list of particle system rules and data pairs [rule1, data1, ...].
    tooltip: Creates or updates a particle system on the prim containing the script based on rules. An empty list removes the particle system.
  ? llSetLinkTextureAnim( integer link, integer mode, integer face, integer sizex, integer sizey, float start, float length, float rate ) -> void
  : link: Link number (1 for root, >1 for children) or a LINK_* flag to animate.
    mode: Bitfield of texture animation mode flags (ANIM_ON, LOOP, etc.).
    face: Face number or ALL_SIDES.
    sizex: Number of horizontal frames (ignored for ROTATE and SCALE).
    sizey: Number of vertical frames (ignored for ROTATE and SCALE).
    start: Start frame number (or radians for ROTATE).
    length: Number of frames to display (or radians for ROTATE).
    rate: Playback rate in frames per second (or radians/sec for ROTATE, UV coords/sec for SMOOTH). Must not be zero.
    tooltip: Animates the texture on face of the linked prim link by setting the scale and offset according to mode. Parameters sizex/sizey define frames, start defines the start frame/angle, length defines
      duration, and rate defines playback speed.
  llSetText( string text, vector color, float alpha ) -> void:
    text: Floating text string to display.
    color: Color vector in RGB <R, G, B> (values from 0.0 to 1.0).
    alpha: Transparency value to set, from 0.0 (clear) to 1.0 (solid).
    tooltip: Displays floating text above the prim with the specified color vector and transparency alpha.
  ? llSetTextureAnim( integer mode, integer face, integer sizex, integer sizey, float start, float length, float rate ) -> void
  : mode: Bitfield of texture animation mode flags (ANIM_ON, LOOP, etc.).
    face: Face number or ALL_SIDES.
    sizex: Number of horizontal frames (ignored for ROTATE and SCALE).
    sizey: Number of vertical frames (ignored for ROTATE and SCALE).
    start: Start frame number (or radians for ROTATE).
    length: Number of frames to display (or radians for ROTATE).
    rate: Playback rate in frames per second (or radians/sec for ROTATE, UV coords/sec for SMOOTH). Must not be zero.
    tooltip: Animates the texture on face of the prim by setting its scale and offset. mode defines options, sizex/sizey define frames, start defines the start frame/angle, length defines duration, and
      rate defines playback speed.
experience:
  experience_permissions( key agent_id ):
