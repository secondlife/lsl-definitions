chat:
  listen( integer Channel, string Name, key ID, string Text ):
    Channel: ''
    Name: ''
    ID: ''
    Text: ''
    tooltip: "This event is raised whenever a chat message matching the constraints set in the llListen command is received. The name and ID of the speaker, as well as the message, are passed in as parameters.\n\
      \t\t\tChannel 0 is the public chat channel that all avatars see as chat text. Channels 1 through 2,147,483,648 are private channels that are not sent to avatars but other scripts can listen on those\
      \ channels."
  llDialog( key AvatarID, string Text, list Buttons, integer Channel ) -> void:
    AvatarID: ''
    Text: ''
    Buttons: ''
    Channel: ''
    tooltip: "Shows a dialog box on the avatar's screen with the message.\\n\n                    Up to 12 strings in the list form buttons.\\n\n                    If a button is clicked, the name is chatted\
      \ on Channel.\\nOpens a \"notify box\" in the given avatars screen displaying the message.\\n\n                Up to twelve buttons can be specified in a list of strings. When the user clicks a button,\
      \ the name of the button is said on the specified channel.\\n\n                Channels work just like llSay(), so channel 0 can be heard by everyone.\\n\n                The chat originates at the\
      \ object's position, not the avatar's position, even though it is said as the avatar (uses avatar's UUID and Name etc.).\\n\n                Examples:\\n\n                llDialog(who, \"Are you a\
      \ boy or a girl?\", [ \"Boy\", \"Girl\" ], -4913);\\n\n                llDialog(who, \"This shows only an OK button.\", [], -192);\\n\n                llDialog(who, \"This chats so you can 'hear'\
      \ it.\", [\"Hooray\"], 0);"
  llListen( integer Channel, string SpeakersName, key SpeakersID, string Text ) -> integer:
    Channel: ''
    SpeakersName: ''
    SpeakersID: ''
    Text: ''
    tooltip: Creates a listen callback for Text on Channel from SpeakersName and SpeakersID (SpeakersName, SpeakersID, and/or Text can be empty) and returns an identifier that can be used to deactivate
      or remove the listen.\nNon-empty values for SpeakersName, SpeakersID, and Text will filter the results accordingly, while empty strings and NULL_KEY will not filter the results, for string and key
      parameters respectively.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel, and is also visible to nearby avatars. All other channels
      are are not sent to avatars, but may be used to communicate with scripts.
  llListenControl( integer ChannelHandle, integer Active ) -> void:
    ChannelHandle: ''
    Active: ''
    tooltip: Makes a listen event callback active or inactive. Pass in the value returned from llListen to the iChannelHandle parameter to specify which listener you are controlling.\nUse boolean values
      to specify Active
  llListenRemove( integer ChannelHandle ) -> void:
    ChannelHandle: ''
    tooltip: Removes a listen event callback. Pass in the value returned from llListen to the iChannelHandle parameter to specify which listener to remove.
  llRegionSay( integer Channel, string Text ) -> void:
    Channel: Any integer value except zero.
    Text: Message to be transmitted.
    tooltip: Broadcasts Text to entire region on Channel (except for channel 0).
  llRegionSayTo( key TargetID, integer Channel, string Text ) -> void:
    TargetID: Avatar or object to say to.
    Channel: Output channel, any integer value.
    Text: Message to be transmitted.
    tooltip: Says Text, on Channel, to avatar or object indicated by TargetID (if within region).\nIf TargetID is an avatar and Channel is nonzero, Text can be heard by any attachment on the avatar.
  llSay( integer Channel, string Text ) -> void:
    Channel: Channel to use to say text on.
    Text: Text to say.
    tooltip: Says Text on Channel.\nThis chat method has a range of 20m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel, and
      is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
  llShout( integer Channel, string Text ) -> void:
    Channel: ''
    Text: ''
    tooltip: Shouts Text on Channel.\nThis chat method has a range of 100m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel,
      and is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
  llTextBox( key AvatarID, string Text, integer Channel ) -> void:
    AvatarID: ''
    Text: ''
    Channel: ''
    tooltip: Opens a dialog for the specified avatar with message Text, which contains a text box for input. Any text that is entered is said on the specified Channel (as if by the avatar) when the "OK"
      button is clicked.
  llWhisper( integer Channel, string Text ) -> void:
    Channel: ''
    Text: ''
    tooltip: Whispers Text on Channel.\nThis chat method has a range of 10m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel,
      and is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
