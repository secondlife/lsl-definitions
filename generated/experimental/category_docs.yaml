  llLinear2sRGB( vector color ) -> vector:
    color: RGB color vector in linear space to convert.
    tooltip: Returns a vector representing the conversion of color from the linear RGB colorspace into the sRGB colorspace.
  llOffsetTexture( float u, float v, integer face ) -> void:
    u: Horizontal (U) offset, typically in the interval [-1.0, 1.0].
    v: Vertical (V) offset, typically in the interval [-1.0, 1.0].
