  http_response( key HTTPRequestID, integer Status, list Metadata, string Body ):
    HTTPRequestID: ''
    Status: ''
    Metadata: ''
    Body: ''
    tooltip: This event handler is invoked when an HTTP response is received for a pending llHTTPRequest request or if a pending request fails or times out.
  llEscapeURL( string URL ) -> string:
    URL: ''
    tooltip: "Returns an escaped/encoded version of url, replacing spaces with %20 etc.\\nReturns the string that is the URL-escaped version of URL (replacing spaces with %20, etc.).\\n\n              \
      \  This function returns the UTF-8 encoded escape codes for selected characters."
  llGetFreeURLs(  ) -> integer:
    tooltip: Returns the number of available URLs for the current script.\nReturns an integer that is the number of available URLs.
  llGetHTTPHeader( key HTTPRequestID, string Header ) -> string:
    HTTPRequestID: A valid HTTP request key
    Header: Header value name
    tooltip: Returns the value for header for request_id.\nReturns a string that is the value of the Header for HTTPRequestID.
  llHTTPRequest( string URL, list Parameters, string Body ) -> key:
    URL: A valid HTTP/HTTPS URL.
    Parameters: Configuration parameters, specified as HTTP_* flag-value pairs.
    Body: Contents of the request.
    tooltip: Sends an HTTP request to the specified URL with the Body of the request and Parameters.\nReturns a key that is a handle identifying the HTTP request made.
  llHTTPResponse( key HTTPRequestID, integer Status, string Body ) -> void:
    HTTPRequestID: A valid HTTP request key.
    Status: HTTP Status (200, 400, 404, etc.).
    Body: Contents of the response.
    tooltip: Responds to an incoming HTTP request which was triggerd by an http_request event within the script. HTTPRequestID specifies the request to respond to (this ID is supplied in the http_request
      event handler).  Status and Body specify the status code and message to respond with.
  llLoadURL( key AvatarID, string Text, string URL ) -> void:
    AvatarID: ''
    Text: ''
    URL: ''
    tooltip: "Shows dialog to avatar AvatarID offering to load web page at URL.\tIf user clicks yes, launches their web browser.\\nllLoadURL displays a dialogue box to the user, offering to load the specified\
      \ web page using the default web browser."
