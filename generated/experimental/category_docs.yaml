list:
  llDeleteSubList( list src, integer start_index, integer end_index ) -> list:
    src: Source list to copy and modify.
    start_index: Starting index of the slice to remove (inclusive).
    end_index: Ending index of the slice to remove (inclusive).
    tooltip: Returns a copy of the list src with the slice from start_index to end_index (inclusive) removed. Negative indices count backward from the end of the list. If start_index is greater than end_index,
      the deletion excludes the specified range.
  llGetListEntryType( list src, integer index ) -> integer:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns an integer representing the variable type (TYPE_*) of the list entry at index in the list src.
  llGetListLength( list src ) -> integer:
    src: List to measure.
    tooltip: Returns an integer representing the total number of elements in the list src.
  llList2CSV( list src ) -> string:
    src: Source list to convert.
    tooltip: Returns a string of comma-separated values taken in order from the list src.
  llList2Float( list src, integer index ) -> float:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the float value at index in the list src. Returns 0.0 if the index is out of bounds or if the value cannot be type-cast.
  llList2Integer( list src, integer index ) -> integer:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the integer value at index in the list src. Returns 0 if the index is out of bounds or if the value cannot be type-cast.
  llList2Json( string type, list values ) -> string:
    type: JSON target type (JSON_ARRAY or JSON_OBJECT).
    values: List of values to serialize.
    tooltip: Converts the list values into a JSON string of the specified type (either a JSON_ARRAY or a JSON_OBJECT). Returns JSON_INVALID if an error is encountered.
  llList2Key( list src, integer index ) -> key:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the key (UUID) value at index in the list src. Returns a null string/key if the index is out of bounds or if the value cannot be type-cast.
  llList2List( list src, integer start_index, integer end_index ) -> list:
    src: Source list to slice.
    start_index: Zero-based start index (inclusive).
    end_index: Zero-based end index (inclusive).
    tooltip: Returns a new list containing the subset of entries from src within the inclusive range specified by the start and end indices. Negative indices count backward from the end.
  llList2ListSlice( list src, integer start_index, integer end_index, integer stride, integer slice_index ) -> list:
    src: Source strided list.
    start_index: Zero-based start index (inclusive).
    end_index: Zero-based end index (inclusive).
    stride: Number of entries per stride (defaults to 1 if less than 1).
    slice_index: Zero-based element index within each stride to extract (negatives count backward from the end of the stride).
    tooltip: Returns a list containing the slice_index'th element of every stride within the inclusive range from start to end in the strided list src. Stride must be a positive integer.
  llList2ListStrided( list src, integer start_index, integer end_index, integer stride ) -> list:
    src: Source strided list.
    start_index: Zero-based start index (inclusive).
    end_index: Zero-based end index (inclusive).
    stride: Number of entries per stride (defaults to 1 if less than 1).
    tooltip: Returns a new list containing the first element of every stride in the strided list src within the inclusive range from start to end.
  llList2Rot( list src, integer index ) -> rotation:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the rotation value at index in the list src. Returns ZERO_ROTATION if the index is out of bounds or if the value cannot be type-cast.
  llList2String( list src, integer index ) -> string:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the string value at index in the list src. Returns an empty string if the index is out of bounds.
  llList2Vector( list src, integer index ) -> vector:
    src: Source list containing the element of interest.
    index: Zero-based index of the entry.
    tooltip: Returns the vector value at index in the list src. Returns ZERO_VECTOR if the index is out of bounds or if the value cannot be type-cast.
  llListFindList( list src, list test ) -> integer:
    src: List to search within.
    test: List elements to search for.
    tooltip: Returns the integer index of the first instance of list test within the list src (returns -1 if not found).
  llListFindListNext( list src, list test, integer instance ) -> integer:
    src: List to search within.
    test: List elements to search for.
    instance: Zero-based occurrence index of the match to find.
    tooltip: Returns the integer index of the specified instance of list test within the list src (returns -1 if not found).
  llListFindStrided( list src, list test, integer start_index, integer end_index, integer stride ) -> integer:
    src: List to search within.
    test: List elements to search for.
    start_index: Zero-based start index of the range to search.
    end_index: Zero-based end index of the range to search.
    stride: Number of entries per stride in the list.
    tooltip: Returns the integer index of the first instance of list test in the strided list src within the range from start to end (stepping through by stride). Returns -1 if not found.
  llListInsertList( list dest, list src, integer start ) -> list:
    dest: Target destination list.
    src: Source list to insert.
    start: Zero-based index where insertion begins.
    tooltip: Returns a new list containing all elements of dest with the elements of src inserted starting at index start. Does not modify dest itself.
  llListRandomize( list src, integer stride ) -> list:
    src: Source list to randomize.
    stride: Size of each randomized block (defaults to 1 if less than 1).
    tooltip: Returns a randomized copy of the list src by blocks of size stride. If the list length is not perfectly divisible by stride, no randomization occurs.
  llListReplaceList( list dest, list src, integer start_index, integer end_index ) -> list:
    dest: Target destination list.
    src: Source list to insert.
    start_index: Zero-based start index (inclusive) of the replaced range.
    end_index: Zero-based end index (inclusive) of the replaced range.
    tooltip: Returns a copy of the list dest with the inclusive range from start to end removed, and the elements of src inserted in its place at start.
  llListSort( list src, integer stride, integer ascending ) -> list:
    src: List to be sorted.
    stride: Number of entries per block/stride (defaults to 1 if less than 1).
    ascending: Boolean. If TRUE, sorts in ascending order; if FALSE, sorts in descending order.
    tooltip: Returns a copy of the list src, sorted into blocks of stride in ascending order (if ascending is TRUE) or descending order (if FALSE). Only works if the first entry of each block shares the
      same datatype.
  llListSortStrided( list src, integer stride, integer stride_index, integer ascending ) -> list:
    src: List to be sorted.
    stride: Number of entries per block/stride (defaults to 1 if less than 1).
    stride_index: Zero-based index of the element within each stride to use as the sort key (negatives count backward from the end of the stride).
    ascending: Boolean. If TRUE, sorts in ascending order; if FALSE, sorts in descending order.
    tooltip: Returns a copy of the list src sorted into blocks of stride by the element at stride_index in each block. Sorted in ascending order (if ascending is TRUE) or descending order (if FALSE).
  llListStatistics( integer operation, list src ) -> float:
    operation: LIST_STAT_* constant of the statistical operation to perform.
    src: List of floats and integers to analyze.
    tooltip: Returns a float representing the result of performing the statistical aggregate function operation (a LIST_STAT_* constant) on the numeric list src.
math:
  llAbs( integer val ) -> integer:
    val: Any integer value.
    tooltip: Returns an integer representing the absolute (positive) value of val.
  llAcos( float val ) -> float:
    val: A floating-point value falling in the range [-1.0, 1.0].
    tooltip: Returns a float representing the arc-cosine of val in radians.
  llAngleBetween( rotation a, rotation b ) -> float:
    a: Starting rotation.
    b: Ending rotation.
    tooltip: Returns a float representing the angle in radians between rotations a and b.
  llAsin( float val ) -> float:
    val: A floating-point value falling in the range [-1.0, 1.0].
    tooltip: Returns a float representing the arc-sine of val in radians.
  llAtan2( float y, float x ) -> float:
    y: A floating-point value representing the y coordinate.
    x: A floating-point value representing the x coordinate.
    tooltip: Returns a float representing the arctangent2 of y and x.
  llAxes2Rot( vector fwd, vector left, vector up ) -> rotation:
    fwd: Forward/back directional vector of the rotation.
    left: Left/right directional vector of the rotation.
    up: Up/down directional vector of the rotation.
    tooltip: Returns the rotation defined by the coordinate axes fwd, left, and up.
  llAxisAngle2Rot( vector axis, float angle ) -> rotation:
    axis: Axis vector around which the rotation is generated.
    angle: Angle of rotation, expressed in radians.
    tooltip: Returns the rotation representing a generated angle (in radians) about the specified axis.
  llCeil( float val ) -> integer:
    val: Float value to round.
    tooltip: Returns the smallest integer value greater than or equal to val (rounded toward positive infinity).
  llCos( float theta ) -> float:
    theta: Angle expressed in radians.
    tooltip: Returns a float representing the cosine of theta.
  llEuler2Rot( vector v ) -> rotation:
    v: Vector of Euler angles to convert.
    tooltip: Returns the rotation representation of the Euler angles vector v.
  llFabs( float val ) -> float:
    val: Float value to convert.
    tooltip: Returns a float representing the absolute (positive) value of val.
  llFloor( float val ) -> integer:
    val: Float value to round.
    tooltip: Returns the largest integer value less than or equal to val (rounded toward negative infinity).
  llFrand( float mag ) -> float:
    mag: Float magnitude of the random range.
    tooltip: Returns a pseudo-random float in the range [0.0, mag) or (mag, 0.0] depending on the sign of mag. The value is inclusive of 0.0 but exclusive of mag.
  llLinear2sRGB( vector color ) -> vector:
    color: RGB color vector in linear space to convert.
    tooltip: Returns a vector representing the conversion of color from the linear RGB colorspace into the sRGB colorspace.
  llListStatistics( integer operation, list src ) -> float:
    operation: LIST_STAT_* constant of the statistical operation to perform.
    src: List of floats and integers to analyze.
    tooltip: Returns a float representing the result of performing the statistical aggregate function operation (a LIST_STAT_* constant) on the numeric list src.
  llLog( float val ) -> float:
    val: Float value to evaluate.
    tooltip: Returns a float representing the natural (base e) logarithm of the positive value val (returns 0.0 if val <= 0).
  llLog10( float val ) -> float:
    val: Float value to evaluate.
    tooltip: Returns a float representing the base-10 (common) logarithm of the positive value val (returns 0.0 if val <= 0).
  llModPow( integer a, integer b, integer c ) -> integer:
    a: Base integer value.
    b: Power exponent (capped at 0xFFFF / 16 bits).
    c: Modulus integer value.
    tooltip: Returns an integer representing a raised to the power b, modulo c (i.e., (a**b)%c). The b value is capped at 0xFFFF (16 bits).
  llPow( float base, float exponent ) -> float:
    base: Base float value.
    exponent: Exponent float value.
    tooltip: Returns a float representing base raised to the power exponent. Returns 0 and triggers a Math Error for imaginary results.
  llRot2Angle( rotation rot ) -> float:
    rot: Rotation value.
    tooltip: Returns a float representing the rotation angle of rot.
  llRot2Axis( rotation rot ) -> vector:
    rot: Rotation value.
    tooltip: Returns a vector representing the rotation axis of rot.
  llRot2Euler( rotation quat ) -> vector:
    quat: Rotation value to convert.
    tooltip: Returns a vector representing the Euler rotation (roll, pitch, yaw) of quat, with each component expressed in radians.
  llRot2Fwd( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive X direction (forward) relative to the parent (root prim or region) defined by rotation q.
  llRot2Left( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Y direction (left) relative to the parent (root prim or region) defined by rotation q.
  llRot2Up( rotation q ) -> vector:
    q: Rotation value.
    tooltip: Returns a unit vector pointing in the local positive Z direction (up) relative to the parent (root prim or region) defined by rotation q.
  llRotBetween( vector start_vec, vector end_vec ) -> rotation:
    start_vec: Starting vector.
    end_vec: Target ending vector.
    tooltip: Returns a rotation representing the shortest path rotation from vector start to vector end.
  llRound( float val ) -> integer:
    val: Float value to round.
    tooltip: Returns the integer that float val is closest to.
  llSin( float theta ) -> float:
    theta: Angle expressed in radians.
    tooltip: Returns a float representing the sine of theta.
  llSqrt( float val ) -> float:
    val: Positive float value (must be >= 0.0).
    tooltip: Returns a float representing the square root of the positive value val. Triggers a math runtime error if val is less than 0.0 (imaginary results).
  llTan( float theta ) -> float:
    theta: Angle expressed in radians.
    tooltip: Returns a float representing the tangent of theta.
  llVecDist( vector vec_a, vector vec_b ) -> float:
    vec_a: First vector.
    vec_b: Second vector.
    tooltip: Returns a float representing the undirected, non-negative distance between vectors vec_a and vec_b.
  llVecMag( vector vec ) -> float:
    vec: Vector to evaluate.
    tooltip: Returns a float representing the magnitude (geometric length) of the vector vec.
  llVecNorm( vector vec ) -> vector:
    vec: Vector to normalize.
    tooltip: Returns a normalized unit vector sharing the same direction as vec.
  llsRGB2Linear( vector srgb ) -> vector:
    srgb: Color vector in the sRGB colorspace to convert.
    tooltip: Returns a vector representing the conversion of the color srgb from the sRGB colorspace into the linear RGB colorspace.
