sound:
  llAdjustSoundVolume( float Volume ) -> void:
    Volume: The volume to set.
    tooltip: Adjusts the volume (0.0 - 1.0) of the currently playing attached sound.\nThis function has no effect on sounds started with llTriggerSound.
  llCollisionSound( string ImpactSound, float ImpactVolume ) -> void:
    ImpactSound: ''
    ImpactVolume: ''
    tooltip: Suppress default collision sounds, replace default impact sounds with ImpactSound.\nThe ImpactSound must be in the object inventory.\nSupply an empty string to suppress collision sounds.
  llCollisionSprite( string ImpactSprite ) -> void // deprecated:
    ImpactSprite: ''
    tooltip: Suppress default collision sprites, replace default impact sprite with ImpactSprite; found in the object inventory (empty string to just suppress).
  llLinkAdjustSoundVolume( integer LinkNumber, float Volume ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    Volume: The volume to set.
    tooltip: Adjusts the volume (0.0 - 1.0) of the currently playing sound attached to the link.\nThis function has no effect on sounds started with llTriggerSound.
  llLinkPlaySound( integer LinkNumber, string Sound, float Volume, integer Flags ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    Sound: ''
    Volume: ''
    Flags: ''
    tooltip: Plays Sound, once or looping, at Volume (0.0 - 1.0). The sound may be attached to the link or triggered at its location.\nOnly one sound may be attached to an object at a time, and attaching
      a new sound or calling llStopSound will stop the previously attached sound.
  llLinkSetSoundQueueing( integer LinkNumber, integer QueueEnable ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    QueueEnable: 'Boolean, sound queuing for the linked prim: TRUE enables, FALSE disables (default).'
    tooltip: Limits radius for audibility of scripted sounds (both attached and triggered) to distance Radius around the link.
  llLinkSetSoundRadius( integer LinkNumber, float radius ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    radius: Maximum distance that sounds can be heard.
    tooltip: Limits radius for audibility of scripted sounds (both attached and triggered) to distance Radius around the link.
  llLinkStopSound( integer LinkNumber ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    tooltip: Stops playback of the currently attached sound on a link.
  llLoopSound( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays specified Sound, looping indefinitely, at Volume (0.0 - 1.0).\nOnly one sound may be attached to an object at a time.\nA second call to llLoopSound with the same key will not restart
      the sound, but the new volume will be used. This allows control over the volume of already playing sounds.\nSetting the volume to 0 is not the same as calling llStopSound; a sound with 0 volume will
      continue to loop.\nTo restart the sound from the beginning, call llStopSound before calling llLoopSound again.
  llLoopSoundMaster( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays attached Sound, looping at volume (0.0 - 1.0), and declares it a sync master.\nBehaviour is identical to llLoopSound, with the addition of marking the source as a "Sync Master", causing
      "Slave" sounds to sync to it. If there are multiple masters within a viewers interest area, the most audible one (a function of both distance and volume) will win out as the master.\nThe use of multiple
      masters within a small area is unlikely to produce the desired effect.
  llLoopSoundSlave( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays attached sound looping at volume (0.0 - 1.0), synced to most audible sync master.\nBehaviour is identical to llLoopSound, unless there is a "Sync Master" present.\nIf a Sync Master is
      already playing the Slave sound will begin playing from the same point the master is in its loop synchronizing the loop points of both sounds.\nIf a Sync Master is started when the Slave is already
      playing, the Slave will skip to the correct position to sync with the Master.
  llPlaySound( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays Sound once, at Volume (0.0 - 1.0) and attached to the object.\nOnly one sound may be attached to an object at a time, and attaching a new sound or calling llStopSound will stop the previously
      attached sound.\nA second call to llPlaySound with the same sound will not restart the sound, but the new volume will be used, which allows control over the volume of already playing sounds.\nTo restart
      the sound from the beginning, call llStopSound before calling llPlaySound again.
  llPlaySoundSlave( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays attached Sound once, at Volume (0.0 - 1.0), synced to next loop of most audible sync master.\nBehaviour is identical to llPlaySound, unless there is a "Sync Master" present. If a Sync
      Master is already playing, the Slave sound will not be played until the Master hits its loop point and returns to the beginning.\nllPlaySoundSlave will play the sound exactly once; if it is desired
      to have the sound play every time the Master loops, either use llLoopSoundSlave with extra silence padded on the end of the sound or ensure that llPlaySoundSlave is called at least once per loop of
      the Master.
  llPreloadSound( string Sound ) -> void:
    Sound: ''
    tooltip: Causes nearby viewers to preload the Sound from the object's inventory.\nThis is intended to prevent delays in starting new sounds when called upon.
  llSetSoundQueueing( integer QueueEnable ) -> void:
    QueueEnable: 'Boolean, sound queuing: TRUE enables, FALSE disables (default).'
    tooltip: Sets whether successive calls to llPlaySound, llLoopSound, etc., (attached sounds) interrupt the currently playing sound.\nThe default for objects is FALSE. Setting this value to TRUE will
      make the sound wait until the current playing sound reaches its end. The queue is one level deep.
  llSetSoundRadius( float Radius ) -> void:
    Radius: Maximum distance that sounds can be heard.
    tooltip: Limits radius for audibility of scripted sounds (both attached and triggered) to distance Radius.
  llSound( string Sound, float Volume, integer Queue, integer Loop ) -> void // deprecated:
    Sound: ''
    Volume: ''
    Queue: ''
    Loop: ''
    tooltip: 'Deprecated: Use llPlaySound instead.\nPlays Sound at Volume and specifies whether the sound should loop and/or be enqueued.'
  llSoundPreload( string Sound ) -> void // deprecated:
    Sound: ''
    tooltip: 'Deprecated: Use llPreloadSound instead.\nPreloads a sound on viewers within range.'
  llStopSound(  ) -> void:
    tooltip: Stops playback of the currently attached sound.
  llTriggerSound( string Sound, float Volume ) -> void:
    Sound: ''
    Volume: ''
    tooltip: Plays Sound at Volume (0.0 - 1.0), centered at but not attached to object.\nThere is no limit to the number of triggered sounds which can be generated by an object, and calling llTriggerSound
      does not affect the attached sounds created by llPlaySound and llLoopSound. This is very useful for things like collision noises, explosions, etc. There is no way to stop or alter the volume of a
      sound triggered by this function.
  llTriggerSoundLimited( string Sound, float Volume, vector TNE, vector BSW ) -> void:
    Sound: ''
    Volume: ''
    TNE: ''
    BSW: ''
    tooltip: Plays Sound at Volume (0.0 - 1.0), centered at but not attached to object, limited to axis-aligned bounding box defined by vectors top-north-east (TNE) and bottom-south-west (BSW).\nThere is
      no limit to the number of triggered sounds which can be generated by an object, and calling llTriggerSound does not affect the attached sounds created by llPlaySound and llLoopSound. This is very
      useful for things like collision noises, explosions, etc. There is no way to stop or alter the volume of a sound triggered by this function.
string:
  llChar( integer value ) -> string:
    value: Unicode value to convert into a string.
    tooltip: Returns a single character string that is the representation of the unicode value.
  llDeleteSubString( string Source, integer Start, integer End ) -> string:
    Source: ''
    Start: ''
    End: ''
    tooltip: Removes the indicated sub-string and returns the result.\nStart and End are inclusive.\nUsing negative numbers for Start and/or End causes the index to count backwards from the length of the
      string, so 0, -1 would delete the entire string.\nIf Start is larger than End, the sub-string is the exclusion of the entries; so 6, 4 would delete the entire string except for the 5th character.
  llGetSubString( string String, integer Start, integer End ) -> string:
    String: ''
    Start: ''
    End: ''
    tooltip: Returns a sub-string from String, in a range specified by the Start and End indices (inclusive).\nUsing negative numbers for Start and/or End causes the index to count backwards from the length
      of the string, so 0, -1 would capture the entire string.\nIf Start is greater than End, the sub string is the exclusion of the entries.
  llInsertString( string TargetVariable, integer Position, string SourceVariable ) -> string:
    TargetVariable: ''
    Position: ''
    SourceVariable: ''
    tooltip: Inserts SourceVariable into TargetVariable at Position, and returns the result.\nInserts SourceVariable into TargetVariable at Position and returns the result. Note this does not alter TargetVariable.
  llOrd( string value, integer index ) -> integer:
    value: The string to convert to Unicode.
    index: Index of character to convert to unicode.
    tooltip: Returns the unicode value of the indicated character in the string.
  llReplaceSubString( string InitialString, string SubString, string NewSubString, integer Count ) -> string:
    InitialString: The original string in which to hunt for substring matches.
    SubString: The original substring to find.
    NewSubString: The new substring used to replace.
    Count: The max number of replacements to make. Zero Count means "replace all". Positive Count moves left to right. Negative moves right to left.
    tooltip: Searches InitialString and replaces instances of SubString with NewSubString. Zero Count means "replace all". Positive Count moves left to right. Negative moves right to left.
  llStringLength( string Text ) -> integer:
    Text: ''
    tooltip: Returns an integer that is the number of characters in Text (not counting the null).
  llStringTrim( string Text, integer TrimType ) -> string:
    Text: String to trim
    TrimType: STRING_TRIM_HEAD, STRING_TRIM_TAIL, or STRING_TRIM.
    tooltip: 'Outputs a string, eliminating white-space from the start and/or end of the input string Text.\nValid options for TrimType:\nSTRING_TRIM_HEAD: trim all leading spaces in Text\nSTRING_TRIM_TAIL:
      trim all trailing spaces in Text\nSTRING_TRIM: trim all leading and trailing spaces in Text.'
  llSubStringIndex( string Text, string Sequence ) -> integer:
    Text: ''
    Sequence: ''
    tooltip: Returns the first index where Sequence appears in Text. Returns -1 if not found.
  llToLower( string Text ) -> string:
    Text: ''
    tooltip: Returns a string that is Text with all lower-case characters.
  llToUpper( string Text ) -> string:
    Text: ''
    tooltip: Returns a string that is Text with all upper-case characters.
