particles:
  llLinkParticleSystem( integer LinkNumber, list Rules ) -> void:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    Rules: Particle system rules list in the format [ rule1, data1, rule2, data2 . . . ruleN, dataN ]
    tooltip: Creates a particle system in prim LinkNumber based on Rules. An empty list removes a particle system from object.\nList format is [ rule-1, data-1, rule-2, data-2 ... rule-n, data-n ].\nThis
      is identical to llParticleSystem except that it applies to a specified linked prim and not just the prim the script is in.
  llParticleSystem( list Parameters ) -> void:
    Parameters: ''
    tooltip: Creates a particle system in the prim the script is attached to, based on Parameters. An empty list removes a particle system from object.\nList format is [ rule-1, data-1, rule-2, data-2 ...
      rule-n, data-n ].
pathfinding:
  moving_end(  ):
    tooltip: Triggered whenever an object with this script stops moving.
  moving_start(  ):
    tooltip: Triggered whenever an object with this script starts moving.
  path_update( integer Type, list Reserved ):
    Type: ''
    Reserved: ''
    tooltip: This event is called to inform the script of changes within the object's path-finding status.
  llCreateCharacter( list Options ) -> void:
    Options: ''
    tooltip: Convert link-set to AI/Physics character.\nCreates a path-finding entity, known as a "character", from the object containing the script. Required to activate use of path-finding functions.\nOptions
      is a list of key/value pairs.
  llDeleteCharacter(  ) -> void:
    tooltip: Convert link-set from AI/Physics character to Physics object.\nConvert the current link-set back to a standard object, removing all path-finding properties.
  llEvade( key TargetID, list Options ) -> void:
    TargetID: Agent or object to evade.
    Options: No options yet.
    tooltip: Evade a specified target.\nCharacters will (roughly) try to hide from their pursuers if there is a good hiding spot along their fleeing path. Hiding means no direct line of sight from the head
      of the character (centre of the top of its physics bounding box) to the head of its pursuer and no direct path between the two on the navigation-mesh.
  llExecCharacterCmd( integer Command, list Options ) -> void:
    Command: Command to send.
    Options: Height for CHARACTER_CMD_JUMP.
    tooltip: Execute a character command.\nSend a command to the path system.\nCurrently only supports stopping the current path-finding operation or causing the character to jump.
  llFleeFrom( vector Source, float Distance, list Options ) -> void:
    Source: Global coordinate from which to flee.
    Distance: Distance in meters to flee from the source.
    Options: No options available at this time.
    tooltip: Flee from a point.\nDirects a character (llCreateCharacter) to keep away from a defined position in the region or adjacent regions.
  llGetClosestNavPoint( vector Point, list Options ) -> list:
    Point: A point in region-local space.
    Options: No options at this time.
    tooltip: Get the closest navigable point to the point provided.\nThe function accepts a point in region-local space (like all the other path-finding methods) and returns either an empty list or a list
      containing a single vector which is the closest point on the navigation-mesh to the point provided.
  llGetStaticPath( vector Start, vector End, float Radius, list Parameters ) -> list:
    Start: Starting position.
    End: Ending position.
    Radius: Radius of the character that the path is for, between 0.125m and 5.0m.
    Parameters: Currently only accepts the parameter CHARACTER_TYPE; the options are identical to those used for llCreateCharacter. The default value is CHARACTER_TYPE_NONE.
    tooltip: ''
  llNavigateTo( vector Location, list Options ) -> void:
    Location: Region coordinates for the character to navigate to.
    Options: List of parameters to control the type of path-finding used. Currently only FORCE_DIRECT_PATH supported.
    tooltip: Navigate to destination.\nDirects an object to travel to a defined position in the region or adjacent regions.
  llPatrolPoints( list Points, list Options ) -> void:
    Points: A list of vectors for the character to travel through sequentially. The list must contain at least two entries.
    Options: No options available at this time.
    tooltip: Patrol a list of points.\nSets the points for a character (llCreateCharacter) to patrol along.
  llPursue( key TargetID, list Options ) -> void:
    TargetID: Agent or object to pursue.
    Options: Parameters for pursuit.
    tooltip: Chase after a target.\nCauses the character (llCharacter) to pursue the target defined by TargetID.
  llUpdateCharacter( list Options ) -> void:
    Options: Character configuration options. Takes the same constants as llCreateCharacter().
    tooltip: Updates settings for a pathfinding character.
  llWanderWithin( vector Origin, vector Area, list Options ) -> void:
    Origin: Central point to wander about.
    Area: Half-extents of an area the character may wander within. (i.e., it can wander from the specified origin by up to +/-Distance.x in x, +/-Distance.y in y, etc.)
    Options: No options available at this time.
    tooltip: Wander within a specified volume.\nSets a character to wander about a central spot within a specified area.
permissions:
  experience_permissions( key agent_id ):
    agent_id: ID of the agent approving permission for the Experience.
    tooltip: Triggered when an agent has approved an experience permissions request.
  experience_permissions_denied( key agent_id, integer Reason ):
    agent_id: ID of the agent denying permission for the Experience.
    Reason: One of the XP_ERROR_... constants describing the reason why the Experience permissions were denied for the agent.
    tooltip: Describes why the Experience permissions were denied for the agent.
  run_time_permissions( integer PermissionFlags ):
    PermissionFlags: ''
    tooltip: "Scripts need permission from either the owner or the avatar they wish to act on before they may perform certain functions, such as debiting money from their owners account, triggering an animation\
      \ on an avatar, or capturing control inputs. The llRequestPermissions library function is used to request these permissions and the various permissions integer constants can be supplied.\n\t\t\tThe\
      \ integer returned to this event handler contains the current set of permissions flags, so if permissions equal 0 then no permissions are set."
  llClearCameraParams(  ) -> void:
    tooltip: Resets all camera parameters to default values and turns off scripted camera control.\nRequires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted to attached or sat on
      objects).
  llForceMouselook( integer Enable ) -> void:
    Enable: Boolean, if TRUE when an avatar sits on the prim, the avatar will be forced into mouse-look mode.\nFALSE is the default setting and will undo a previously set TRUE or do nothing.
    tooltip: If Enable is TRUE any avatar that sits on this object is forced into mouse-look mode.\nAfter calling this function with Enable set to TRUE, any agent sitting down on the prim will be forced
      into mouse-look.\nJust like llSitTarget, this changes a permanent property of the prim (not the object) and needs to be reset by calling this function with Enable set to FALSE in order to disable
      it.
  llGetAnimation( key AvatarID ) -> string:
    AvatarID: ''
    tooltip: Returns the name of the currently playing locomotion animation for the avatar id.\nReturns the currently playing animation for the specified avatar ID.
  llGetAnimationList( key AvatarID ) -> list:
    AvatarID: ''
    tooltip: Returns a list of keys of playing animations for an avatar.\nReturns a list of keys of all playing animations for the specified avatar ID.
  llGetAnimationOverride( string AnimationState ) -> string:
    AnimationState: ''
    tooltip: Returns a string that is the name of the animation that is used for the specified animation state.\nRequires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission
      (automatically granted to attached objects).
  llGetCameraAspect(  ) -> float:
    tooltip: 'Returns the current camera aspect ratio (width / height) of the agent who has granted the scripted object PERMISSION_TRACK_CAMERA permissions. If no permissions have been granted: it returns
      zero.'
  llGetCameraFOV(  ) -> float:
    tooltip: 'Returns the current camera field of view of the agent who has granted the scripted object PERMISSION_TRACK_CAMERA permissions. If no permissions have been granted: it returns zero.'
  llGetCameraPos(  ) -> vector:
    tooltip: Returns the current camera position for the agent the task has permissions for.\nReturns the position of the camera, of the user that granted the script PERMISSION_TRACK_CAMERA. If no user
      has granted the permission, it returns ZERO_VECTOR.
  llGetCameraRot(  ) -> rotation:
    tooltip: Returns the current camera orientation for the agent the task has permissions for. If no user has granted the PERMISSION_TRACK_CAMERA permission, returns ZERO_ROTATION.
  llGetPermissions(  ) -> integer:
    tooltip: Returns an integer bitmask of the permissions that have been granted to the script.  Individual permissions can be determined using a bit-wise "and" operation against the PERMISSION_* constants
  llGetPermissionsKey(  ) -> key:
    tooltip: Returns the key of the avatar that last granted or declined permissions to the script.\nReturns NULL_KEY if permissions were never granted or declined.
  llGiveMoney( key AvatarID, integer Amount ) -> integer:
    AvatarID: ''
    Amount: ''
    tooltip: Transfers Amount of L$ from script owner to AvatarID.\nThis call will silently fail if PERMISSION_DEBIT has not been granted.
  llReleaseCamera( key AvatarID ) -> void // deprecated:
    AvatarID: ''
    tooltip: 'Return camera to agent.\nDeprecated: Use llClearCameraParams instead.'
  llReleaseControls(  ) -> void:
    tooltip: Stop taking inputs.\nStop taking inputs from the avatar.
  llRequestExperiencePermissions( key AgentID, string unused ) -> void:
    AgentID: ''
    unused: Not used, should be ""
    tooltip: "\n                   Ask the agent for permission to participate in an experience. This request is similar to llRequestPermissions with the following permissions: PERMISSION_TAKE_CONTROLS,\
      \ PERMISSION_TRIGGER_ANIMATION, PERMISSION_ATTACH, PERMISSION_TRACK_CAMERA, PERMISSION_CONTROL_CAMERA and PERMISSION_TELEPORT. However, unlike llRequestPermissions the decision to allow or block the\
      \ request is persistent and applies to all scripts using the experience grid wide. Subsequent calls to llRequestExperiencePermissions from scripts in the experience will receive the same response\
      \ automatically with no user interaction. One of experience_permissions or experience_permissions_denied will be generated in response to this call. Outstanding permission requests will be lost if\
      \ the script is derezzed, moved to another region or reset.\n                "
  llRequestPermissions( key AvatarID, integer PermissionMask ) -> void:
    AvatarID: ''
    PermissionMask: ''
    tooltip: Ask AvatarID to allow the script to perform certain actions, specified in the PermissionMask bitmask. PermissionMask should be one or more PERMISSION_* constants. Multiple permissions can be
      requested simultaneously by ORing the constants together. Many of the permissions requests can only go to object owner.\nThis call will not stop script execution. If the avatar grants the requested
      permissions, the run_time_permissions event will be called.
  llResetAnimationOverride( string AnimationState ) -> void:
    AnimationState: ''
    tooltip: Resets the animation of the specified animation state to the default value.\nIf animation state equals "ALL", then all animation states are reset.\nRequires the PERMISSION_OVERRIDE_ANIMATIONS
      permission (automatically granted to attached objects).
  llSetAnimationOverride( string AnimationState, string AnimationName ) -> void:
    AnimationState: ''
    AnimationName: ''
    tooltip: Sets the animation (in object inventory) that will play for the given animation state.\nTo use this function the script must obtain the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llSetCameraParams( list Parameters ) -> void:
    Parameters: ''
    tooltip: Sets multiple camera parameters at once. List format is [ rule-1, data-1, rule-2, data-2 . . . rule-n, data-n ].\nRequires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted
      to attached or sat on objects).
  llStartAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function plays the specified animation from playing on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory or a built-in
      animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
  llStopAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function stops the specified animation on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory, a built-in animation,
      or the uuid of an animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
  llTakeCamera( key AvatarID ) -> void // deprecated:
    AvatarID: ''
    tooltip: 'Deprecated: Use llSetCameraParams instead.'
  llTakeControls( integer Controls, integer Accept, integer PassOn ) -> void:
    Controls: Bit-field of CONTROL_* flags.
    Accept: Boolean, determines whether control events are generated.
    PassOn: Boolean, determines whether controls are disabled.
    tooltip: Take controls from the agent the script has permissions for.\nIf (Accept == (Controls & input)), send input to the script.  PassOn determines whether Controls also perform their normal functions.\nRequires
      the PERMISSION_TAKE_CONTROLS runtime permission (automatically granted to attached or sat on objects).
  llTeleportAgent( key AvatarID, string LandmarkName, vector Position, vector LookAtPoint ) -> void:
    AvatarID: UUID of avatar.
    LandmarkName: Name of landmark (in object contents), or empty string, to use.
    Position: If no landmark was provided, the position within the current region to teleport the avatar to.
    LookAtPoint: The position within the target region that the avatar should be turned to face upon arrival.
    tooltip: Requests a teleport of avatar to a landmark stored in the object's inventory. If no landmark is provided (an empty string), the avatar is teleported to the location position in the current
      region. In either case, the avatar is turned to face the position given by look_at in local coordinates.\nRequires the PERMISSION_TELEPORT runtime permission.\nThis function can only teleport the
      owner of the object.
  llTeleportAgentGlobalCoords( key AvatarID, vector GlobalPosition, vector RegionPosition, vector LookAtPoint ) -> void:
    AvatarID: UUID of avatar.
    GlobalPosition: Global coordinates of the destination region. Can be retrieved by using llRequestSimulatorData(region_name, DATA_SIM_POS).
    RegionPosition: The position within the target region to teleport the avatar to, if no landmark was provided.
    LookAtPoint: The position within the target region that the avatar should be turned to face upon arrival.
    tooltip: Teleports an agent to the RegionPosition local coordinates within a region which is specified by the GlobalPosition global coordinates. The agent lands facing the position defined by LookAtPoint
      local coordinates.\nRequires the PERMISSION_TELEPORT runtime permission.\nThis function can only teleport the owner of the object.
  llTransferLindenDollars( key AvatarID, integer Amount ) -> key:
    AvatarID: ''
    Amount: ''
    tooltip: Transfer Amount of linden dollars (L$) from script owner to AvatarID. Returns a key to a corresponding transaction_result event for the success of the transfer.\nAttempts to send the amount
      of money to the specified avatar, and trigger a transaction_result event identified by the returned key. Requires the PERMISSION_DEBIT runtime permission.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: The world-frame position to project into HUD space
    tooltip: Returns the local position that would put the origin of a HUD object directly over world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA runtime permission (else will
      return zero vector).
physics:
  collision( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised while another object, or avatar, is colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information on\
      \ those objects may be gathered via the llDetected* functions."
  collision_end( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised when another object, or avatar, stops colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information on\
      \ those objects may be gathered via the llDetected* library functions."
  collision_start( integer NumberOfCollisions ):
    NumberOfCollisions: ''
    tooltip: "This event is raised when another object, or avatar, starts colliding with the object the script is attached to.\n\t\t\tThe number of detected objects is passed to the script. Information\
      \ on those objects may be gathered via the llDetected* library functions."
  land_collision( vector Position ):
    Position: ''
    tooltip: This event is raised when the object the script is attached to is colliding with the ground.
  land_collision_end( vector Position ):
    Position: ''
    tooltip: This event is raised when the object the script is attached to stops colliding with the ground.
  land_collision_start( vector Position ):
    Position: ''
    tooltip: This event is raised when the object the script is attached to begins to collide with the ground.
  llApplyImpulse( vector Force, integer Local ) -> void:
    Force: Amount of impulse force to apply.
    Local: Boolean, if TRUE, force is treated as a local directional vector instead of region directional vector.
    tooltip: Applies impulse to the object.\nIf Local == TRUE, apply the Force in local coordinates; otherwise, apply the Force in global coordinates.\nThis function only works on physical objects.
  llApplyRotationalImpulse( vector Force, integer Local ) -> void:
    Force: Amount of impulse force to apply.
    Local: Boolean, if TRUE, uses local axis, if FALSE, uses region axis.
    tooltip: Applies rotational impulse to the object.\nIf Local == TRUE, apply the Force in local coordinates; otherwise, apply the Force in global coordinates.\nThis function only works on physical objects.
  llCastRay( vector Start, vector End, list Options ) -> list:
    Start: ''
    End: ''
    Options: ''
    tooltip: 'Casts a ray into the physics world from ''start'' to ''end'' and returns data according to details in Options.\nReports collision data for intersections with objects.\nReturn value: [UUID_1,
      {link_number_1}, hit_position_1, {hit_normal_1}, UUID_2, {link_number_2}, hit_position_2, {hit_normal_2}, ... , status_code] where {} indicates optional data.'
  llCollisionFilter( string ObjectName, key ObjectID, integer Accept ) -> void:
    ObjectName: ''
    ObjectID: ''
    Accept: If TRUE, only accept collisions with ObjectName name AND ObjectID (either is optional), otherwise with objects not ObjectName AND ObjectID.
    tooltip: Specify an empty string or NULL_KEY for Accept, to not filter on the corresponding parameter.
  llCollisionSound( string ImpactSound, float ImpactVolume ) -> void:
    ImpactSound: ''
    ImpactVolume: ''
    tooltip: Suppress default collision sounds, replace default impact sounds with ImpactSound.\nThe ImpactSound must be in the object inventory.\nSupply an empty string to suppress collision sounds.
  llGetAccel(  ) -> vector:
    tooltip: Returns the acceleration of the object relative to the region's axes.\nGets the acceleration of the object.
  llGetCenterOfMass(  ) -> vector:
    tooltip: Returns the prim's centre of mass (unless called from the root prim, where it returns the object's centre of mass).
  llGetForce(  ) -> vector:
    tooltip: Returns the force (if the script is physical).\nReturns the current force if the script is physical.
  llGetGeometricCenter(  ) -> vector:
    tooltip: Returns the vector that is the geometric center of the object relative to the root prim.
  llGetMass(  ) -> float:
    tooltip: Returns the mass of object that the script is attached to.\nReturns the scripted object's mass. When called from a script in a link-set, the parent will return the sum of the link-set weights,
      while a child will return just its own mass. When called from a script inside an attachment, this function will return the mass of the avatar it's attached to, not its own.
  llGetMassMKS(  ) -> float:
    tooltip: Acts as llGetMass(), except that the units of the value returned are Kg.
  llGetObjectMass( key ID ) -> float:
    ID: ''
    tooltip: Returns the mass of the avatar or object in the region.\nGets the mass of the object or avatar corresponding to ID.
  llGetOmega(  ) -> vector:
    tooltip: Returns the rotation velocity in radians per second.\nReturns a vector that is the rotation velocity of the object in radians per second.
  llGetPhysicsMaterial(  ) -> list:
    tooltip: Returns a list of the form [float gravity_multiplier, float restitution, float friction, float density].
  llGetStatus( integer StatusFlag ) -> integer:
    StatusFlag: A STATUS_* flag
    tooltip: Returns boolean value of the specified status (e.g. STATUS_PHANTOM) of the object the script is attached to.
  llGetTorque(  ) -> vector:
    tooltip: Returns the torque (if the script is physical).\nReturns a vector that is the torque (if the script is physical).
  llGetVel(  ) -> vector:
    tooltip: Returns the velocity of the object.\nReturns a vector that is the velocity of the object.
  llLookAt( vector Target, float Strength, float Damping ) -> void:
    Target: ''
    Strength: ''
    Damping: ''
    tooltip: Cause object name to point its forward axis towards Target, at a force controlled by Strength and Damping.\nGood Strength values are around half the mass of the object and good Damping values
      are less than 1/10th of the Strength.\nAsymmetrical shapes require smaller Damping. A Strength of 0.0 cancels the look at.
  llMoveToTarget( vector Target, float Tau ) -> void:
    Target: ''
    Tau: ''
    tooltip: Critically damp to Target in Tau seconds (if the script is physical).\nCritically damp to position target in tau-seconds if the script is physical. Good tau-values are greater than 0.2. A tau
      of 0.0 stops the critical damping.
  llPassCollisions( integer Pass ) -> void:
    Pass: Boolean, if TRUE, collisions are passed from children on to parents.
    tooltip: Configures how collision events are passed to scripts in the linkset.\nIf Pass == TRUE, collisions involving collision-handling scripted child prims are also passed on to the root prim. If
      Pass == FALSE (default behavior), such collisions will only trigger events in the affected child prim.
  llPointAt( vector Point ) -> void // private // deprecated:
    Point: ''
    tooltip: ''
  llPushObject( key ObjectID, vector Impulse, vector AngularImpulse, integer Local ) -> void:
    ObjectID: ''
    Impulse: ''
    AngularImpulse: ''
    Local: ''
    tooltip: Applies Impulse and AngularImpulse to ObjectID.\nApplies the supplied impulse and angular impulse to the object specified.
  llRemoveVehicleFlags( integer Vehiclelags ) -> void:
    Vehiclelags: ''
    tooltip: Removes the enabled bits in 'flags'.\nSets the vehicle flags to FALSE. Valid parameters can be found in the vehicle flags constants section.
  llRotLookAt( rotation Rotation, float Strength, float Damping ) -> void:
    Rotation: ''
    Strength: ''
    Damping: ''
    tooltip: Cause object to rotate to Rotation, with a force function defined by Strength and Damping parameters. Good strength values are around half the mass of the object and good damping values are
      less than 1/10th of the strength.\nAsymmetrical shapes require smaller damping.\nA strength of 0.0 cancels the look at.
  llRotTarget( rotation Rotation, float LeeWay ) -> integer:
    Rotation: ''
    LeeWay: ''
    tooltip: Set rotations with error of LeeWay radians as a rotational target, and return an ID for the rotational target.\nThe returned number is a handle that can be used in at_rot_target and llRotTargetRemove.
  llRotTargetRemove( integer Handle ) -> void:
    Handle: ''
    tooltip: Removes rotational target number.\nRemove rotational target indicated by the handle.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Rotation to turn the avatar to face.
    flags: flags
    tooltip: Sets the avatar rotation to the given value.
  llSetAngularVelocity( vector AngVel, integer Local ) -> void:
    AngVel: The angular velocity to set the object to.
    Local: If TRUE, the AngVel is treated as a local directional vector instead of a regional directional vector.
    tooltip: Sets an object's angular velocity to AngVel, in local coordinates if Local == TRUE (if the script is physical).\nHas no effect on non-physical objects.
  llSetBuoyancy( float Buoyancy ) -> void:
    Buoyancy: ''
    tooltip: Set the tasks buoyancy (0 is none, < 1.0 sinks, 1.0 floats, > 1.0 rises).\nSet the object buoyancy. A value of 0 is none, less than 1.0 sinks, 1.0 floats, and greater than 1.0 rises.
  llSetForce( vector Force, integer Local ) -> void:
    Force: Directional force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets Force on object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetForceAndTorque( vector Force, vector Torque, integer Local ) -> void:
    Force: Directional force.
    Torque: Torque force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets the Force and Torque of object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetHoverHeight( float Height, integer Water, float Tau ) -> void:
    Height: Distance above the ground.
    Water: Boolean, if TRUE then hover above water too.
    Tau: Seconds to critically damp in.
    tooltip: Critically damps a physical object to a Height (either above ground level or above the higher of land and water if water == TRUE).\nDo not use with vehicles. Use llStopHover to stop hovering.
  llSetKeyframedMotion( list Keyframes, list Options ) -> void:
    Keyframes: 'Strided keyframe list of the form: position, orientation, time. Each keyframe is interpreted relative to the previous transform of the object.'
    Options: ''
    tooltip: Requests that a non-physical object be key-framed according to key-frame list.\nSpecify a list of times, positions, and orientations to be followed by an object. The object will be smoothly
      moved between key-frames by the simulator. Collisions with other non-physical or key-framed objects will be ignored (no script events will fire and collision processing will not occur). Collisions
      with physical objects will be computed and reported, but the key-framed object will be unaffected by those collisions.\nKeyframes is a strided list containing positional, rotational, and time data
      for each step in the motion.  Options is a list containing optional arguments and parameters (specified by KFM_* constants).
  ? llSetPhysicsMaterial( integer MaterialBits, float GravityMultiplier, float Restitution, float Friction, float Density ) -> void
  : MaterialBits: A bitmask specifying which of the parameters in the other arguments should be applied to the object.
    GravityMultiplier: ''
    Restitution: ''
    Friction: ''
    Density: ''
    tooltip: Sets the selected parameters of the object's physics behavior.\nMaterialBits is a bitmask specifying which of the parameters in the other arguments should be applied to the object. GravityMultiplier,
      Restitution, Friction, and Density are the possible parameters to manipulate.
  llSetStatus( integer Status, integer Value ) -> void:
    Status: ''
    Value: ''
    tooltip: Sets object status specified in Status bitmask (e.g. STATUS_PHYSICS|STATUS_PHANTOM) to boolean Value.\nFor a full list of STATUS_* constants, see wiki documentation.
  llSetTorque( vector Torque, integer Local ) -> void:
    Torque: Torque force.
    Local: Boolean, if TRUE uses local axis, if FALSE uses region axis.
    tooltip: Sets the Torque acting on the script's object, in object-local coordinates if Local == TRUE (otherwise, the region reference frame is used).\nOnly works on physical objects.
  llSetVelocity( vector Velocity, integer Local ) -> void:
    Velocity: The velocity to apply.
    Local: If TRUE, the Velocity is treated as a local directional vector instead of a regional directional vector.
    tooltip: If the object is physics-enabled, sets the object's linear velocity to Velocity.\nIf Local==TRUE, Velocity is treated as a local directional vector; otherwise, Velocity is treated as a global
      directional vector.
  llStopHover(  ) -> void:
    tooltip: Stop hovering to a height (due to llSetHoverHeight()).
  llStopLookAt(  ) -> void:
    tooltip: Stop causing object to point at a target (due to llLookAt() or llRotLookAt()).
  llStopMoveToTarget(  ) -> void:
    tooltip: Stops critically damped motion (due to llMoveToTarget()).
  llStopPointAt(  ) -> void // private // deprecated:
    tooltip: ''
  llTargetOmega( vector Axis, float SpinRate, float Gain ) -> void:
    Axis: ''
    SpinRate: ''
    Gain: ''
    tooltip: Attempt to spin at SpinRate with strength Gain on Axis.\nA spin rate of 0.0 cancels the spin. This function always works in object-local coordinates.
  llVolumeDetect( integer DetectEnabled ) -> void:
    DetectEnabled: TRUE enables, FALSE disables.
    tooltip: If DetectEnabled = TRUE, object becomes phantom but triggers collision_start and collision_end events when other objects start and stop interpenetrating.\nIf another object (including avatars)
      interpenetrates it, it will get a collision_start event.\nWhen an object stops interpenetrating, a collision_end event is generated. While the other is inter-penetrating, collision events are NOT
      generated.
prim:
  llAvatarOnSitTarget(  ) -> key:
    tooltip: If an avatar is seated on the sit target, returns the avatar's key, otherwise NULL_KEY.\nThis only will detect avatars sitting on sit targets defined with llSitTarget.
  llClearPrimMedia( integer Face ) -> integer:
    Face: Number of side to clear.
    tooltip: Clears (deletes) the media and all parameters from the given Face.\nReturns an integer that is a STATUS_* flag which details the success/failure of the operation.
  llGetAlpha( integer Face ) -> float:
    Face: ''
    tooltip: Returns the alpha value of Face.\nReturns the 'alpha' of the given face. If face is ALL_SIDES the value returned is the mean average of all faces.
  llGetColor( integer Face ) -> vector:
    Face: ''
    tooltip: Returns the color on Face.\nReturns the color of Face as a vector of red, green, and blue values between 0 and 1. If face is ALL_SIDES the color returned is the mean average of each channel.
  llGetCreator(  ) -> key:
    tooltip: Returns a key for the creator of the prim.\nReturns the key of the object's original creator. Similar to llGetOwner.
  llGetKey(  ) -> key:
    tooltip: Returns the key of the prim the script is attached to.\nGet the key for the object which has this script.
  llGetLinkNumber(  ) -> integer:
    tooltip: Returns the link number of the prim containing the script (0 means not linked, 1 the prim is the root, 2 the prim is the first child, etc.).\nReturns the link number of the prim containing
      the script. 0 means no link, 1 the root, 2 for first child, etc.
  llGetLocalPos(  ) -> vector:
    tooltip: Returns the position relative to the root.\nReturns the local position of a child object relative to the root.
  llGetLocalRot(  ) -> rotation:
    tooltip: Returns the rotation local to the root.\nReturns the local rotation of a child object relative to the root.
  llGetNumberOfSides(  ) -> integer:
    tooltip: Returns the number of faces (or sides) of the prim.\nReturns the number of sides of the prim which has the script.
  llGetObjectDesc(  ) -> string:
    tooltip: Returns the description of the prim the script is attached to.\nReturns the description of the scripted object/prim. You can set the description using llSetObjectDesc.
  llGetObjectName(  ) -> string:
    tooltip: Returns the name of the prim which the script is attached to.\nReturns the name of the prim (not object) which contains the script.
  llGetPhysicsMaterial(  ) -> list:
    tooltip: Returns a list of the form [float gravity_multiplier, float restitution, float friction, float density].
  llGetPos(  ) -> vector:
    tooltip: Returns the position of the task in region coordinates.\nReturns the vector position of the task in region coordinates.
  llGetPrimMediaParams( integer Face, list Parameters ) -> list:
    Face: face number
    Parameters: A list of PRIM_MEDIA_* property constants to return values of.
    tooltip: Returns the media parameters for a particular face on an object, given the desired list of parameter names, in the order requested. Returns an empty list if no media exists on the face.
  llGetPrimitiveParams( list Parameters ) -> list:
    Parameters: PRIM_* flags and face parameters
    tooltip: Returns the primitive parameters specified in the parameters list.\nReturns primitive parameters specified in the Parameters list.
  llGetRenderMaterial( integer Face ) -> string:
    Face: ''
    tooltip: Returns a string that is the render material on face (the inventory name if it is a material in the prim's inventory, otherwise the key).\nReturns the render material of a face, if it is found
      in object inventory, its key otherwise.
  llGetRot(  ) -> rotation:
    tooltip: Returns the rotation relative to the region's axes.\nReturns the rotation.
  llGetScale(  ) -> vector:
    tooltip: Returns the scale of the prim.\nReturns a vector that is the scale (dimensions) of the prim.
  llGetTexture( integer Face ) -> string:
    Face: ''
    tooltip: Returns a string that is the texture on face (the inventory name if it is a texture in the prim's inventory, otherwise the key).\nReturns the texture of a face, if it is found in object inventory,
      its key otherwise.
  llGetTextureOffset( integer Face ) -> vector:
    Face: ''
    tooltip: Returns the texture offset of face in the x and y components of a vector.
  llGetTextureRot( integer Face ) -> float:
    Face: ''
    tooltip: Returns the texture rotation of side.
  llGetTextureScale( integer Face ) -> vector:
    Face: ''
    tooltip: Returns the texture scale of side in the x and y components of a vector.\nReturns the texture scale of a side in the x and y components of a vector.
  llOffsetTexture( float OffsetS, float OffsetT, integer Face ) -> void:
    OffsetS: ''
    OffsetT: ''
    Face: ''
    tooltip: Sets the texture S and T offsets for the chosen Face.\nIf Face is ALL_SIDES this function sets the texture offsets for all faces.
  llRemoteLoadScriptPin( key ObjectID, string ScriptName, integer PIN, integer Running, integer StartParameter ) -> void:
    ObjectID: Target prim to attempt copying into.
    ScriptName: Name of the script in current inventory to copy.
    PIN: Integer set on target prim as a Personal Information Number code.
    Running: If the script should be set running in the target prim.
