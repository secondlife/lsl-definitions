# Functions by category
asset_permissions:
  changed( integer Changed ):
    Changed: ''
    tooltip: Triggered when various events change the object. The change argument will be a bit-field of CHANGED_* constants.
  llGetInventoryPermMask( string InventoryItem, integer BitMask ) -> integer:
    InventoryItem: Inventory item name.
    BitMask: MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE or MASK_NEXT
    tooltip: Returns the requested permission mask for the inventory item.\nReturns the requested permission mask for the inventory item defined by InventoryItem. If item is not in the object's inventory,
      llGetInventoryPermMask returns FALSE and causes the object to say "No item named '<item>'", where "<item>" is item.
  llGetObjectPermMask( integer Category ) -> integer:
    Category: Category is one of MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT
    tooltip: Returns the permission mask of the requested category for the object.
  llSetInventoryPermMask( string InventoryItem, integer PermissionFlag, integer PermissionMask ) -> void:
    InventoryItem: An item in the prim's inventory
    PermissionFlag: MASK_* flag
    PermissionMask: Permission bit-field (PERM_* flags)
    tooltip: Sets the given permission mask to the new value on the inventory item.
  llSetObjectPermMask( integer PermissionFlag, integer PermissionMask ) -> void:
    PermissionFlag: MASK_* flag
    PermissionMask: Permission bit-field (PERM_* flags)
    tooltip: Sets the specified PermissionFlag permission to the value specified by PermissionMask on the object the script is attached to.
  llTransferOwnership( key AgentID, integer Flags, list Params ) -> integer:
    AgentID: An agent in the region.
    Flags: Flags to control type of inventory transfer.
    Params: Extra parameters to llTransferOwnership. None are defined at this time.
    tooltip: Transfers ownership of an object, or a copy of the object to a new agent.
attachments:
  attach( key AvatarID ):
    AvatarID: ''
    tooltip: This event is triggered whenever an object is attached or detached from an avatar. If it is attached, the key of the avatar it is attached to is passed in, otherwise NULL_KEY is.
  llAttachToAvatar( integer AttachmentPoint ) -> void:
    AttachmentPoint: ''
    tooltip: Attach to avatar at point AttachmentPoint.\nRequires the PERMISSION_ATTACH runtime permission.
  llAttachToAvatarTemp( integer AttachPoint ) -> void:
    AttachPoint: Valid attachment point or ATTACH_* constant.
    tooltip: Follows the same convention as llAttachToAvatar, with the exception that the object will not create new inventory for the user, and will disappear on detach or disconnect.\nRequires the PERMISSION_ATTACH
      runtime permission.
  llDetachFromAvatar(  ) -> void:
    tooltip: Remove the object containing the script from the avatar.\nRequires the PERMISSION_ATTACH runtime permission (automatically granted to attached objects).
  llGetAttached(  ) -> integer:
    tooltip: Returns the object's attachment point, or 0 if not attached.
  llGetAttachedList( key ID ) -> list:
    ID: Avatar to get attachments
    tooltip: Returns a list of keys of all visible (not HUD) attachments on the avatar identified by the ID argument, or a list containing 1 string on error.
  llGetAttachedListFiltered( key AgentID, list Options ) -> list:
    AgentID: An agent in the region.
    Options: A list of option for inventory transfer.
    tooltip: Retrieves a list of attachments on an avatar, or a list containing 1 string on error.
avatar:
  control( key AvatarID, integer Levels, integer Edges ):
    AvatarID: ''
    Levels: ''
    Edges: ''
    tooltip: "Once a script has the ability to grab control inputs from the avatar, this event will be used to pass the commands into the script.\n\t\t\tThe levels and edges are bit-fields of control constants."
  experience_permissions( key agent_id ):
    agent_id: ID of the agent approving permission for the Experience.
    tooltip: Triggered when an agent has approved an experience permissions request.
  experience_permissions_denied( key agent_id, integer Reason ):
    agent_id: ID of the agent denying permission for the Experience.
    Reason: One of the XP_ERROR_... constants describing the reason why the Experience permissions were denied for the agent.
    tooltip: Describes why the Experience permissions were denied for the agent.
  game_control( key id, integer buttons, list axes ):
    id: UUID of avatar supplying input
    buttons: 32-bit mask of buttons pressed
    axes: Six float values in range [-1, 1]
    tooltip: This event is raised when game controller input changes.
  llAgentInExperience( key AgentID ) -> integer:
    AgentID: ''
    tooltip: "\n                   Returns TRUE if the agent is in the Experience and the Experience can run in the current location.\n                "
  llAttachToAvatar( integer AttachmentPoint ) -> void:
    AttachmentPoint: ''
    tooltip: Attach to avatar at point AttachmentPoint.\nRequires the PERMISSION_ATTACH runtime permission.
  llAttachToAvatarTemp( integer AttachPoint ) -> void:
    AttachPoint: Valid attachment point or ATTACH_* constant.
    tooltip: Follows the same convention as llAttachToAvatar, with the exception that the object will not create new inventory for the user, and will disappear on detach or disconnect.\nRequires the PERMISSION_ATTACH
      runtime permission.
  llAvatarOnLinkSitTarget( integer LinkNumber ) -> key:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag.'
    tooltip: If an avatar is sitting on the link's sit target, return the avatar's key, NULL_KEY otherwise.\nReturns a key that is the UUID of the user seated on the specified link's prim.
  llAvatarOnSitTarget(  ) -> key:
    tooltip: If an avatar is seated on the sit target, returns the avatar's key, otherwise NULL_KEY.\nThis only will detect avatars sitting on sit targets defined with llSitTarget.
  llClearCameraParams(  ) -> void:
    tooltip: Resets all camera parameters to default values and turns off scripted camera control.\nRequires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted to attached or sat on
      objects).
  llDetachFromAvatar(  ) -> void:
    tooltip: Remove the object containing the script from the avatar.\nRequires the PERMISSION_ATTACH runtime permission (automatically granted to attached objects).
  llDetectedOwner( integer Number ) -> key:
    Number: ''
    tooltip: Returns the key of detected object's owner.\nReturns invalid key if Number is not a valid index.
  llForceMouselook( integer Enable ) -> void:
    Enable: Boolean, if TRUE when an avatar sits on the prim, the avatar will be forced into mouse-look mode.\nFALSE is the default setting and will undo a previously set TRUE or do nothing.
    tooltip: If Enable is TRUE any avatar that sits on this object is forced into mouse-look mode.\nAfter calling this function with Enable set to TRUE, any agent sitting down on the prim will be forced
      into mouse-look.\nJust like llSitTarget, this changes a permanent property of the prim (not the object) and needs to be reset by calling this function with Enable set to FALSE in order to disable
      it.
  llGetAgentInfo( key AvatarID ) -> integer:
    AvatarID: ''
    tooltip: "Returns an integer bit-field containing the agent information about id.\\n\n                    Returns AGENT_FLYING, AGENT_ATTACHMENTS, AGENT_SCRIPTED, AGENT_SITTING, AGENT_ON_OBJECT, AGENT_MOUSELOOK,\
      \ AGENT_AWAY, AGENT_BUSY, AGENT_TYPING, AGENT_CROUCHING, AGENT_ALWAYS_RUN, AGENT_WALKING, AGENT_IN_AIR and/or AGENT_FLOATING_VIA_SCRIPTED_ATTACHMENT.\\nReturns information about the given agent ID\
      \ as a bit-field of agent info constants."
  llGetAgentLanguage( key AvatarID ) -> string:
    AvatarID: ''
    tooltip: Returns the language code of the preferred interface language of the avatar.\nReturns a string that is the language code of the preferred interface language of the resident.
  llGetAgentList( integer Scope, list Options ) -> list:
    Scope: The scope (region, parcel, parcel same owner) to return agents for.
    Options: List of options to apply. Current unused.
    tooltip: Requests a list of agents currently in the region, limited by the scope parameter.\nReturns a list [key UUID-0, key UUID-1, ..., key UUID-n] or [string error_msg] - returns avatar keys for
      all agents in the region limited to the area(s) specified by scope
  llGetAgentSize( key AvatarID ) -> vector:
    AvatarID: ''
    tooltip: If the avatar is in the same region, returns the size of the bounding box of the requested avatar by id, otherwise returns ZERO_VECTOR.\nIf the agent is in the same region as the object, returns
      the size of the avatar.
  llGetAnimation( key AvatarID ) -> string:
    AvatarID: ''
    tooltip: Returns the name of the currently playing locomotion animation for the avatar id.\nReturns the currently playing animation for the specified avatar ID.
  llGetAnimationList( key AvatarID ) -> list:
    AvatarID: ''
    tooltip: Returns a list of keys of playing animations for an avatar.\nReturns a list of keys of all playing animations for the specified avatar ID.
  llGetAnimationOverride( string AnimationState ) -> string:
    AnimationState: ''
    tooltip: Returns a string that is the name of the animation that is used for the specified animation state.\nRequires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission
      (automatically granted to attached objects).
  llGetAttachedList( key ID ) -> list:
    ID: Avatar to get attachments
    tooltip: Returns a list of keys of all visible (not HUD) attachments on the avatar identified by the ID argument, or a list containing 1 string on error.
  llGetAttachedListFiltered( key AgentID, list Options ) -> list:
    AgentID: An agent in the region.
    Options: A list of option for inventory transfer.
    tooltip: Retrieves a list of attachments on an avatar, or a list containing 1 string on error.
  llGetCameraAspect(  ) -> float:
    tooltip: 'Returns the current camera aspect ratio (width / height) of the agent who has granted the scripted object PERMISSION_TRACK_CAMERA permissions. If no permissions have been granted: it returns
      zero.'
  llGetCameraFOV(  ) -> float:
    tooltip: 'Returns the current camera field of view of the agent who has granted the scripted object PERMISSION_TRACK_CAMERA permissions. If no permissions have been granted: it returns zero.'
  llGetCameraPos(  ) -> vector:
    tooltip: Returns the current camera position for the agent the task has permissions for.\nReturns the position of the camera, of the user that granted the script PERMISSION_TRACK_CAMERA. If no user
      has granted the permission, it returns ZERO_VECTOR.
  llGetCameraRot(  ) -> rotation:
    tooltip: Returns the current camera orientation for the agent the task has permissions for. If no user has granted the PERMISSION_TRACK_CAMERA permission, returns ZERO_ROTATION.
  llGetDisplayName( key AvatarID ) -> string:
    AvatarID: Avatar UUID that is in the same region, or is otherwise known to the region.
    tooltip: Returns the display name of an avatar, if the avatar is connected to the current region, or if the name has been cached.  Otherwise, returns an empty string. Use llRequestDisplayName if the
      avatar may be absent from the region.
  llGetPermissionsKey(  ) -> key:
    tooltip: Returns the key of the avatar that last granted or declined permissions to the script.\nReturns NULL_KEY if permissions were never granted or declined.
  llGetUsername( key AvatarID ) -> string:
    AvatarID: ''
    tooltip: Returns the username of an avatar, if the avatar is connected to the current region, or if the name has been cached.  Otherwise, returns an empty string. Use llRequestUsername if the avatar
      may be absent from the region.
  llGetVisualParams( key ID, list Parameters ) -> list:
    ID: Avatar UUID in the same region.
    Parameters: List of visual parameter IDs.
    tooltip: Returns a list of the current value for each requested visual parameter.
  llGiveMoney( key AvatarID, integer Amount ) -> integer:
    AvatarID: ''
    Amount: ''
    tooltip: Transfers Amount of L$ from script owner to AvatarID.\nThis call will silently fail if PERMISSION_DEBIT has not been granted.
  llIsFriend( key agent_id ) -> integer:
    agent_id: Agent ID of another agent in the region.
    tooltip: Returns TRUE if avatar ID is a friend of the script owner.
  llName2Key( string Name ) -> key:
    Name: Name of agent in region to look up.
    tooltip: Look up Agent ID for the named agent in the region.
  llReleaseCamera( key AvatarID ) -> void // deprecated:
    AvatarID: ''
    tooltip: 'Return camera to agent.\nDeprecated: Use llClearCameraParams instead.'
  llReleaseControls(  ) -> void:
    tooltip: Stop taking inputs.\nStop taking inputs from the avatar.
  llReplaceAgentEnvironment( key agent_id, float transition, string environment ) -> integer:
    agent_id: ''
    transition: ''
    environment: ''
    tooltip: Replaces the entire environment for an agent. Must be used as part of an experience.
  llRequestAgentData( key AvatarID, integer Data ) -> key:
    AvatarID: ''
    Data: ''
    tooltip: Requests data about AvatarID. When data is available the dataserver event will be raised.\nThis function requests data about an avatar. If and when the information is collected, the dataserver
      event is triggered with the key returned from this function passed in the requested parameter. See the agent data constants (DATA_*) for details about valid values of data and what each will return
      in the dataserver event.
  llRequestDisplayName( key AvatarID ) -> key:
    AvatarID: Avatar UUID
    tooltip: Requests the display name of the agent. When the display name is available the dataserver event will be raised.\nThe avatar identified does not need to be in the same region or online at the
      time of the request.\nReturns a key that is used to identify the dataserver event when it is raised.
  llRequestExperiencePermissions( key AgentID, string unused ) -> void:
    AgentID: ''
    unused: Not used, should be ""
    tooltip: "\n                   Ask the agent for permission to participate in an experience. This request is similar to llRequestPermissions with the following permissions: PERMISSION_TAKE_CONTROLS,\
      \ PERMISSION_TRIGGER_ANIMATION, PERMISSION_ATTACH, PERMISSION_TRACK_CAMERA, PERMISSION_CONTROL_CAMERA and PERMISSION_TELEPORT. However, unlike llRequestPermissions the decision to allow or block the\
      \ request is persistent and applies to all scripts using the experience grid wide. Subsequent calls to llRequestExperiencePermissions from scripts in the experience will receive the same response\
      \ automatically with no user interaction. One of experience_permissions or experience_permissions_denied will be generated in response to this call. Outstanding permission requests will be lost if\
      \ the script is derezzed, moved to another region or reset.\n                "
  llRequestUserKey( string Name ) -> key:
    Name: Name of agent to look up.
    tooltip: Look up Agent ID for the named agent using a historical name.
  llRequestUsername( key AvatarID ) -> key:
    AvatarID: ''
    tooltip: Requests single-word user-name of an avatar. When data is available the dataserver event will be raised.\nRequests the user-name of the identified agent. When the user-name is available the
      dataserver event is raised.\nThe agent identified does not need to be in the same region or online at the time of the request.\nReturns a key that is used to identify the dataserver event when it
      is raised.
  llSetAgentEnvironment( key agent_id, float transition, list Settings ) -> integer:
    agent_id: Agent to receive new environment settings.
    transition: Number of seconds over which to apply new settings.
    Settings: List of environment settings to replace for agent.
    tooltip: Sets an agent's environmental values to the specified values. Must be used as part of an experience.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Rotation to turn the avatar to face.
    flags: flags
    tooltip: Sets the avatar rotation to the given value.
  llSetCameraParams( list Parameters ) -> void:
    Parameters: ''
    tooltip: Sets multiple camera parameters at once. List format is [ rule-1, data-1, rule-2, data-2 . . . rule-n, data-n ].\nRequires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted
      to attached or sat on objects).
  llStartAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function plays the specified animation from playing on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory or a built-in
      animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
  llStopAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function stops the specified animation on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory, a built-in animation,
      or the uuid of an animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
  llTakeCamera( key AvatarID ) -> void // deprecated:
    AvatarID: ''
    tooltip: 'Deprecated: Use llSetCameraParams instead.'
  llTakeControls( integer Controls, integer Accept, integer PassOn ) -> void:
    Controls: Bit-field of CONTROL_* flags.
    Accept: Boolean, determines whether control events are generated.
    PassOn: Boolean, determines whether controls are disabled.
    tooltip: Take controls from the agent the script has permissions for.\nIf (Accept == (Controls & input)), send input to the script.  PassOn determines whether Controls also perform their normal functions.\nRequires
      the PERMISSION_TAKE_CONTROLS runtime permission (automatically granted to attached or sat on objects).
  llTeleportAgent( key AvatarID, string LandmarkName, vector Position, vector LookAtPoint ) -> void:
    AvatarID: UUID of avatar.
    LandmarkName: Name of landmark (in object contents), or empty string, to use.
    Position: If no landmark was provided, the position within the current region to teleport the avatar to.
    LookAtPoint: The position within the target region that the avatar should be turned to face upon arrival.
    tooltip: Requests a teleport of avatar to a landmark stored in the object's inventory. If no landmark is provided (an empty string), the avatar is teleported to the location position in the current
      region. In either case, the avatar is turned to face the position given by look_at in local coordinates.\nRequires the PERMISSION_TELEPORT runtime permission.\nThis function can only teleport the
      owner of the object.
  llTeleportAgentGlobalCoords( key AvatarID, vector GlobalPosition, vector RegionPosition, vector LookAtPoint ) -> void:
    AvatarID: UUID of avatar.
    GlobalPosition: Global coordinates of the destination region. Can be retrieved by using llRequestSimulatorData(region_name, DATA_SIM_POS).
    RegionPosition: The position within the target region to teleport the avatar to, if no landmark was provided.
    LookAtPoint: The position within the target region that the avatar should be turned to face upon arrival.
    tooltip: Teleports an agent to the RegionPosition local coordinates within a region which is specified by the GlobalPosition global coordinates. The agent lands facing the position defined by LookAtPoint
      local coordinates.\nRequires the PERMISSION_TELEPORT runtime permission.\nThis function can only teleport the owner of the object.
  llTeleportAgentHome( key AvatarID ) -> void:
    AvatarID: ''
    tooltip: Teleport agent over the owner's land to agent's home location.
  llUnSit( key AvatarID ) -> void:
    AvatarID: ''
    tooltip: If agent identified by AvatarID is sitting on the object the script is attached to or is over land owned by the object's owner, the agent is forced to stand up.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: The world-frame position to project into HUD space
    tooltip: Returns the local position that would put the origin of a HUD object directly over world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA runtime permission (else will
      return zero vector).
avatar_animation:
  llGetAnimation( key AvatarID ) -> string:
    AvatarID: ''
    tooltip: Returns the name of the currently playing locomotion animation for the avatar id.\nReturns the currently playing animation for the specified avatar ID.
  llGetAnimationList( key AvatarID ) -> list:
    AvatarID: ''
    tooltip: Returns a list of keys of playing animations for an avatar.\nReturns a list of keys of all playing animations for the specified avatar ID.
  llGetAnimationOverride( string AnimationState ) -> string:
    AnimationState: ''
    tooltip: Returns a string that is the name of the animation that is used for the specified animation state.\nRequires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission
      (automatically granted to attached objects).
  llResetAnimationOverride( string AnimationState ) -> void:
    AnimationState: ''
    tooltip: Resets the animation of the specified animation state to the default value.\nIf animation state equals "ALL", then all animation states are reset.\nRequires the PERMISSION_OVERRIDE_ANIMATIONS
      permission (automatically granted to attached objects).
  llSetAnimationOverride( string AnimationState, string AnimationName ) -> void:
    AnimationState: ''
    AnimationName: ''
    tooltip: Sets the animation (in object inventory) that will play for the given animation state.\nTo use this function the script must obtain the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llStartAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function plays the specified animation from playing on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory or a built-in
      animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
  llStopAnimation( string Animation ) -> void:
    Animation: ''
    tooltip: This function stops the specified animation on the avatar who received the script's most recent permissions request.\nAnimation may be an animation in task inventory, a built-in animation,
      or the uuid of an animation.\nRequires the PERMISSION_TRIGGER_ANIMATION runtime permission (automatically granted to attached or sat on objects).
avatar_communication:
  email( string Time, string Address, string Subject, string Body, integer NumberRemaining ):
    Time: ''
    Address: ''
    Subject: ''
    Body: ''
    NumberRemaining: ''
    tooltip: "This event is triggered when an email sent to this script arrives.\n\t\t\tThe number remaining tells how many more emails are known to be still pending."
  listen( integer Channel, string Name, key ID, string Text ):
    Channel: ''
    Name: ''
    ID: ''
    Text: ''
    tooltip: "This event is raised whenever a chat message matching the constraints set in the llListen command is received. The name and ID of the speaker, as well as the message, are passed in as parameters.\n\
      \t\t\tChannel 0 is the public chat channel that all avatars see as chat text. Channels 1 through 2,147,483,648 are private channels that are not sent to avatars but other scripts can listen on those\
      \ channels."
  llDialog( key AvatarID, string Text, list Buttons, integer Channel ) -> void:
    AvatarID: ''
    Text: ''
    Buttons: ''
    Channel: ''
    tooltip: "Shows a dialog box on the avatar's screen with the message.\\n\n                    Up to 12 strings in the list form buttons.\\n\n                    If a button is clicked, the name is chatted\
      \ on Channel.\\nOpens a \"notify box\" in the given avatars screen displaying the message.\\n\n                Up to twelve buttons can be specified in a list of strings. When the user clicks a button,\
      \ the name of the button is said on the specified channel.\\n\n                Channels work just like llSay(), so channel 0 can be heard by everyone.\\n\n                The chat originates at the\
      \ object's position, not the avatar's position, even though it is said as the avatar (uses avatar's UUID and Name etc.).\\n\n                Examples:\\n\n                llDialog(who, \"Are you a\
      \ boy or a girl?\", [ \"Boy\", \"Girl\" ], -4913);\\n\n                llDialog(who, \"This shows only an OK button.\", [], -192);\\n\n                llDialog(who, \"This chats so you can 'hear'\
      \ it.\", [\"Hooray\"], 0);"
  llEmail( string Address, string Subject, string Text ) -> void:
    Address: ''
    Subject: ''
    Text: ''
    tooltip: Sends email to Address with Subject and Message.\nSends an email to Address with Subject and Message.
  llInstantMessage( key AvatarID, string Text ) -> void:
    AvatarID: ''
    Text: ''
    tooltip: IMs Text to the user identified.\nSend Text to the user as an instant message.
  llListen( integer Channel, string SpeakersName, key SpeakersID, string Text ) -> integer:
    Channel: ''
    SpeakersName: ''
    SpeakersID: ''
    Text: ''
    tooltip: Creates a listen callback for Text on Channel from SpeakersName and SpeakersID (SpeakersName, SpeakersID, and/or Text can be empty) and returns an identifier that can be used to deactivate
      or remove the listen.\nNon-empty values for SpeakersName, SpeakersID, and Text will filter the results accordingly, while empty strings and NULL_KEY will not filter the results, for string and key
      parameters respectively.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel, and is also visible to nearby avatars. All other channels
      are are not sent to avatars, but may be used to communicate with scripts.
  llListenControl( integer ChannelHandle, integer Active ) -> void:
    ChannelHandle: ''
    Active: ''
    tooltip: Makes a listen event callback active or inactive. Pass in the value returned from llListen to the iChannelHandle parameter to specify which listener you are controlling.\nUse boolean values
      to specify Active
  llListenRemove( integer ChannelHandle ) -> void:
    ChannelHandle: ''
    tooltip: Removes a listen event callback. Pass in the value returned from llListen to the iChannelHandle parameter to specify which listener to remove.
  llLoadURL( key AvatarID, string Text, string URL ) -> void:
    AvatarID: ''
    Text: ''
    URL: ''
    tooltip: "Shows dialog to avatar AvatarID offering to load web page at URL.\tIf user clicks yes, launches their web browser.\\nllLoadURL displays a dialogue box to the user, offering to load the specified\
      \ web page using the default web browser."
  llMapBeacon( string RegionName, vector Position, list Options ) -> void:
    RegionName: Region in which to show the beacon.
    Position: Position within region to show the beacon.
    Options: Options
    tooltip: Displays an in world beacon and optionally opens world map for avatar who touched the object or is wearing the script, centered on RegionName with Position highlighted. Only works for scripts
      attached to avatar, or during touch events.
  llMapDestination( string RegionName, vector Position, vector Direction ) -> void:
    RegionName: ''
    Position: ''
    Direction: ''
    tooltip: Opens world map for avatar who touched it or is wearing the script, centred on RegionName with Position highlighted. Only works for scripts attached to avatar, or during touch events.\nDirection
      currently has no effect.
  llOpenFloater( string floater_name, string url, list params ) -> integer:
    floater_name: Identifier for floater to open
    url: URL to pass to floater
    params: Parameters to apply to open floater
    tooltip: Returns the value for header for request_id.\nReturns a string that is the value of the Header for HTTPRequestID.
  llOwnerSay( string Text ) -> void:
    Text: ''
    tooltip: says Text to owner only (if owner is in region).\nSays Text to the owner of the object running the script, if the owner has been within the object's simulator since logging into Second Life,
      regardless of where they may be in-world.
  llRegionSayTo( key TargetID, integer Channel, string Text ) -> void:
    TargetID: Avatar or object to say to.
    Channel: Output channel, any integer value.
    Text: Message to be transmitted.
    tooltip: Says Text, on Channel, to avatar or object indicated by TargetID (if within region).\nIf TargetID is an avatar and Channel is nonzero, Text can be heard by any attachment on the avatar.
  llSay( integer Channel, string Text ) -> void:
    Channel: Channel to use to say text on.
    Text: Text to say.
    tooltip: Says Text on Channel.\nThis chat method has a range of 20m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel, and
      is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
  llSetText( string Text, vector Color, float Opacity ) -> void:
    Text: ''
    Color: ''
    Opacity: ''
    tooltip: Causes Text to float above the prim, using the specified Color and Opacity.
  llShout( integer Channel, string Text ) -> void:
    Channel: ''
    Text: ''
    tooltip: Shouts Text on Channel.\nThis chat method has a range of 100m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel,
      and is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
  llTargetedEmail( integer Target, string Subject, string Text ) -> void:
    Target: ''
    Subject: ''
    Text: ''
    tooltip: Sends an email with Subject and Message to the owner or creator of an object.
  llTextBox( key AvatarID, string Text, integer Channel ) -> void:
    AvatarID: ''
    Text: ''
    Channel: ''
    tooltip: Opens a dialog for the specified avatar with message Text, which contains a text box for input. Any text that is entered is said on the specified Channel (as if by the avatar) when the "OK"
      button is clicked.
  llWhisper( integer Channel, string Text ) -> void:
    Channel: ''
    Text: ''
    tooltip: Whispers Text on Channel.\nThis chat method has a range of 10m radius.\nPUBLIC_CHANNEL is the public chat channel that all avatars see as chat text. DEBUG_CHANNEL is the script debug channel,
      and is also visible to nearby avatars. All other channels are are not sent to avatars, but may be used to communicate with scripts.
avatar_inventory:
