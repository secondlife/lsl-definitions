    Stride: Stride length.
    Ascending: Boolean. TRUE = result in ascending order, FALSE = result in descending order.
    tooltip: Returns the specified list, sorted into blocks of stride in ascending order (if Ascending is TRUE, otherwise descending). Note that sort only works if the first entry of each block is the same
      datatype.
