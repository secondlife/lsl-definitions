      instead.'
  ? llMakeFire( integer Particles, float Scale, float Velocity, float Lifetime, float Arc, string Texture, vector Offset ) -> void // deprecated
  : Particles: ''
    Scale: ''
    Velocity: ''
    Lifetime: ''
    Arc: ''
    Texture: ''
    Offset: ''
    tooltip: 'Make fire like particles. Deprecated: Use llParticleSystem instead.\nMake fire particles using texture from the objects inventory. Deprecated: Use llParticleSystem instead.'
  ? llMakeFountain( integer Particles, float Scale, float Velocity, float Lifetime, float Arc, integer Bounce, string Texture, vector Offset, float Bounce_Offset ) -> void // deprecated
  : Particles: ''
    Scale: ''
    Velocity: ''
    Lifetime: ''
    Arc: ''
    Bounce: ''
    Texture: ''
    Offset: ''
    Bounce_Offset: ''
    tooltip: 'Make a fountain of particles. Deprecated: Use llParticleSystem instead.\nMake a fountain of particles using texture from the objects inventory. Deprecated: Use llParticleSystem instead.'
  ? llMakeSmoke( integer Particles, float Scale, float Velocity, float Lifetime, float Arc, string Texture, vector Offset ) -> void // deprecated
  : Particles: ''
    Scale: ''
    Velocity: ''
    Lifetime: ''
    Arc: ''
    Texture: ''
    Offset: ''
    tooltip: 'Make smoke like particles. Deprecated: Use llParticleSystem instead.\nMake smoky particles using texture from the objects inventory. Deprecated: Use llParticleSystem instead.'
  llParticleSystem( list Parameters ) -> void:
    Parameters: ''
    tooltip: Creates a particle system in the prim the script is attached to, based on Parameters. An empty list removes a particle system from object.\nList format is [ rule-1, data-1, rule-2, data-2 ...
      rule-n, data-n ].
  ? llSetLinkTextureAnim( integer LinkNumber, integer Mode, integer Face, integer SizeX, integer SizeY, float Start, float Length, float Rate ) -> void
  : LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag to effect'
    Mode: Bitmask of animation options.
    Face: Specifies which object face to animate or ALL_SIDES.
    SizeX: Horizontal frames (ignored for ROTATE and SCALE).
    SizeY: Vertical frames (ignored for ROTATE and SCALE).
    Start: Start position/frame number (or radians for ROTATE).
    Length: Specifies the animation duration, in frames (or radians for ROTATE).
    Rate: Specifies the animation playback rate, in frames per second (must be greater than zero).
    tooltip: Animates a texture on the prim specified by LinkNumber, by setting the texture scale and offset.\nMode is a bitmask of animation options.\nFace specifies which object face to animate.\nSizeX
      and SizeY specify the number of horizontal and vertical frames.Start specifes the animation start point.\nLength specifies the animation duration.\nRate specifies the animation playback rate.
  llSetText( string Text, vector Color, float Opacity ) -> void:
    Text: ''
    Color: ''
    Opacity: ''
    tooltip: Causes Text to float above the prim, using the specified Color and Opacity.
  ? llSetTextureAnim( integer Mode, integer Face, integer SizeX, integer SizeY, float Start, float Length, float Rate ) -> void
  : Mode: Mask of Mode flags.
    Face: Face number or ALL_SIDES.
    SizeX: Horizontal frames (ignored for ROTATE and SCALE).
    SizeY: Vertical frames (ignored for ROTATE and SCALE).
    Start: Start position/frame number (or radians for ROTATE).
    Length: number of frames to display (or radians for ROTATE).
    Rate: Frames per second (must not greater than zero).
    tooltip: Animates a texture by setting the texture scale and offset.\nMode is a bitmask of animation options.\nFace specifies which object face to animate.\nSizeX and SizeY specify the number of horizontal
      and vertical frames.Start specifes the animation start point.\nLength specifies the animation duration.\nRate specifies the animation playback rate.
