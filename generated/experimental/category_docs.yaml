input:
  control( key id, integer level, integer edge ):
    id: UUID of the avatar whose inputs are captured.
    level: A bitfield of CONTROL_* constants representing currently held controls.
    edge: A bitfield of CONTROL_* constants representing controls that just changed state.
    tooltip: Triggered to pass captured avatar control inputs into the script. The parameter level indicates held controls, and edge indicates change in controls (both are bitfields of CONTROL_* constants).
  game_control( key id, integer button_levels, list axes ):
    id: UUID of the avatar supplying controller input.
    button_levels: A 32-bit mask representing the buttons currently held down on the controller.
    axes: A list of six float values in the range [-1.0, 1.0] representing controller axes.
    tooltip: Triggered when a compatible viewer sends game controller input changes for the avatar specified by id. Only triggers for scripts in attachments or seats.
  llReleaseControls(  ) -> void:
    tooltip: Stops taking inputs (previously acquired via llTakeControls) from the avatar, dequeuing any remaining control events and revoking the PERMISSION_TAKE_CONTROLS permission.
  llSetClickAction( integer action ) -> void:
    action: CLICK_ACTION_* flag representing the action to apply.
    tooltip: Sets the action (a CLICK_ACTION_* flag) performed when an avatar left-clicks the prim.
  llTakeControls( integer controls, integer accept, integer pass_on ) -> void:
    controls: Bitfield of CONTROL_* flags to intercept.
    accept: Boolean. Determines whether control events are generated to trigger script handlers.
    pass_on: Boolean. If TRUE, the keys also perform their default functions; if FALSE, default actions are suppressed.
    tooltip: Intercepts inputs (keyboard/mouse clicks) from the agent, specifically those specified by controls. The boolean accept determines if events are generated, and pass_on determines if inputs also
      perform their default functions. Requires the PERMISSION_TAKE_CONTROLS runtime permission.
json:
  llJson2List( string src ) -> list:
    src: JSON string to parse.
    tooltip: Parses the JSON string src and returns a list representing its top-level elements.
  llJsonGetValue( string json, list specifiers ) -> string:
    json: JSON string to query.
    specifiers: A list of key names or array indices specifying the path to the desired value.
    tooltip: Parses the JSON string json and returns the value found by traversing the specified path of specifiers as a string.
  llJsonSetValue( string json, list specifiers, string value ) -> string:
    json: Source JSON string to modify.
    specifiers: A list of key names or array indices specifying the path to add, update, or delete.
    value: New value to set, or the JSON_DELETE constant to delete the targeted element.
    tooltip: Returns a new JSON string representing json with the target located at specifiers set to value. Supports JSON_APPEND to append elements. Writing JSON_DELETE deletes the target. Overwriting
      array bounds or setting non-array levels with array indices returns JSON_INVALID.
  llJsonValueType( string json, list specifiers ) -> string:
    json: JSON string containing the value to query.
    specifiers: A list of key names or array indices specifying the path to the value.
    tooltip: Parses the JSON string json and returns the JSON type constant (JSON_*) representing the value found at specifiers.
  llList2Json( string type, list values ) -> string:
    type: JSON target type (JSON_ARRAY or JSON_OBJECT).
    values: List of values to serialize.
    tooltip: Converts the list values into a JSON string of the specified type (either a JSON_ARRAY or a JSON_OBJECT). Returns JSON_INVALID if an error is encountered.
land_moderation:
  llAddToLandBanList( key avatar, float hours ) -> void:
    avatar: UUID of the avatar to add to the ban list.
    hours: Duration, in hours, to ban the avatar for (0 for indefinite).
    tooltip: Adds the avatar to the parcel ban list for the specified number of hours. A value of 0 hours adds the avatar indefinitely. Banned users teleporting to the parcel are redirected to a neighboring
      parcel; the minimum accepted duration is 0.01 hours (approximately 36 seconds).
  llAddToLandPassList( key avatar, float hours ) -> void:
    avatar: UUID of the avatar to add to the pass list.
    hours: Duration, in hours, to allow the avatar for (range [0.0, 144.0], 0 for indefinite).
    tooltip: Adds the avatar to the land pass list for the specified number of hours (or indefinitely if hours is 0).
  llEjectFromLand( key avatar ) -> void:
    avatar: UUID of the avatar in the same region.
    tooltip: Ejects the specified avatar from land/parcels owned by the object's owner (group or resident).
  llManageEstateAccess( integer action, key avatar ) -> integer:
    action: An ESTATE_ACCESS_* action flag specifying the operation to perform.
    avatar: UUID of the avatar or group to add or remove.
    tooltip: Adds or removes agents from the estate's access or ban lists, or groups from the estate's group access list, specified by the action. Returns TRUE if successful, or FALSE if throttled, if the
      action/ID is invalid, or if the script owner lacks estate management rights.
  llRemoveFromLandBanList( key avatar ) -> void:
    avatar: UUID of the avatar to remove.
    tooltip: Removes the specified avatar from the land parcel's ban list.
  llRemoveFromLandPassList( key avatar ) -> void:
    avatar: UUID of the avatar to remove.
    tooltip: Removes the specified avatar from the land parcel's pass/access list.
  llResetLandBanList(  ) -> void:
    tooltip: Removes all blocked residents from the land parcel's ban list.
  llResetLandPassList(  ) -> void:
    tooltip: Removes all residents from the land parcel's access/pass list.
  llReturnObjectsByID( list objects ) -> integer:
    objects: A list of object UUID keys to return.
    tooltip: Returns objects specified by the list of UUIDs objects to their owners. Requires the PERMISSION_RETURN_OBJECTS permission, and the script owner must own the parcel or be an estate manager/region
      owner.
  llReturnObjectsByOwner( key owner, integer scope ) -> integer:
    owner: UUID of the avatar or group whose objects will be returned.
    scope: OBJECT_RETURN_* scope flag (such as OBJECT_RETURN_PARCEL, OBJECT_RETURN_PARCEL_OWNER, or OBJECT_RETURN_REGION).
    tooltip: Returns objects owned by owner within the specified scope (parcel, parcel owner, or region). Requires the PERMISSION_RETURN_OBJECTS permission, and the script owner must own the parcel or be
      an estate manager/region owner.
  llTeleportAgentHome( key avatar ) -> void:
    avatar: UUID of the avatar to teleport.
    tooltip: Teleports the avatar (who must be standing on land owned by the script owner) directly to their designated home location without warning (similar to a God Summons).
linkset:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  linkset_data( integer action, string name, string value ):
    action: An integer constant representing the action taken (e.g., LINKSETDATA_UPDATE, LINKSETDATA_DELETE, LINKSETDATA_RESET).
    name: Key name of the modified key-value pair.
    value: New string value of the pair (empty if the pair was deleted or is password-protected).
    tooltip: Fires in all scripts in the linkset whenever the datastore has been modified via an llLinksetData function. Passes the action taken, the affected key name, and the new value.
  llAvatarOnLinkSitTarget( integer link ) -> key:
    link: Index of the prim in the linkset (1 for root, >1 for children), or a LINK_* flag.
    tooltip: Returns the UUID of the avatar seated on the specified link's sit target, or NULL_KEY if no avatar is sitting there.
  llBreakAllLinks(  ) -> void:
    tooltip: Delinks all prims in the linkset. Requires the PERMISSION_CHANGE_LINKS runtime permission, which must be requested and granted by the owner.
  llBreakLink( integer link ) -> void:
    link: 'The link number (0: unlinked, 1: root prim, >1: child prims and seated avatars) to delink.'
    tooltip: Delinks the prim specified by the link number link. Requires the PERMISSION_CHANGE_LINKS runtime permission.
  llClearLinkMedia( integer link, integer face ) -> integer:
    link: 'The link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag representing the target prim.'
    face: Face number to clear.
    tooltip: Deletes the media and clears all parameters from the given face on the linked prim. Returns an integer STATUS_* flag detailing the success or failure of the operation.
  llCreateLink( key target, integer parent ) -> void:
    target: UUID of the target prim/object in the same region.
    parent: Boolean. If TRUE, the script's object becomes the root prim; if FALSE, target becomes the root.
    tooltip: Attempts to link the object containing the script with target. Requires the PERMISSION_CHANGE_LINKS runtime permission.
  llGetLinkKey( integer link ) -> key:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns the key (UUID) of the linked prim or avatar specified by link.
  llGetLinkMedia( integer link, integer face, list params ) -> list:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number (side) of the prim.
    params: A list of PRIM_MEDIA_* property constants to retrieve values for.
    tooltip: Returns a list containing the media parameters of the specified face on the linked prim link, retrieved in the order requested by params.
  llGetLinkName( integer link ) -> string:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns a string containing the name of the linked prim specified by link.
  llGetLinkNumberOfSides( integer link ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns an integer representing the number of sides (faces) of the linked prim specified by link.
  llGetLinkPrimitiveParams( integer link, list params ) -> list:
    link: Link number (1 for root, >1 for children) or a LINK_* flag to retrieve parameters from.
    params: A list of PRIM_* flags specifying the attributes to retrieve.
    tooltip: Returns a list of primitive parameters requested in params for the linked prim specified by link (equivalent to llGetPrimitiveParams).
  llGetLinkSitFlags( integer link ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    tooltip: Returns an integer representing the active sit flags currently set on the linked prim specified by link.
  llGetMass(  ) -> float:
    tooltip: Returns a float representing the mass of the object (in lindograms). Returns the total linkset mass if called from the root, or the individual prim's mass if called from a child prim. Returns
      the wearer's mass if inside an attachment.
  llGetMassMKS(  ) -> float:
    tooltip: Returns a float representing the mass of the object in kilograms. Functionally identical to llGetMass except for using MKS (metric) units.
  llGetMaxScaleFactor(  ) -> float:
    tooltip: Returns a float representing the maximum scale factor that can be applied to the object via llScaleByFactor without violating size or linkability limits.
  llGetMinScaleFactor(  ) -> float:
    tooltip: Returns a float representing the minimum scale factor that can be applied to the object via llScaleByFactor without violating size limits.
  llGetNumberOfPrims(  ) -> integer:
    tooltip: Returns an integer representing the total number of prims and seated avatars in the linkset containing the script.
  llGetObjectPermMask( integer group ) -> integer:
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to get.
    tooltip: Returns the script's object's permission flags for the specified group.
  llGetOwner(  ) -> key:
    tooltip: Returns the key (UUID) of the object's current owner.
  llGetRootPosition(  ) -> vector:
    tooltip: Returns a vector representing the position (in region coordinates) of the root prim of the linkset containing the script.
  llGetRootRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation (relative to the region) of the root prim of the linkset containing the script.
  llGetStatus( integer status ) -> integer:
    status: Single STATUS_* flag to check.
    tooltip: Returns a boolean integer indicating whether the specified status flag status is enabled for the object.
  llIsLinkGLTFMaterial( integer link, integer face ) -> integer:
    link: Link number (or LINK_* flag) of the prim to inspect.
    face: Face number (or ALL_SIDES) of the prim to inspect.
    tooltip: Checks the specified face on the linked prim link. Returns TRUE if the face material is a PBR render material, or FALSE if it uses Blinn-Phong diffuse textures.
  llLinkSitTarget( integer link, vector offset, rotation rot ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    offset: Offset position vector in local prim coordinates.
    rot: Rotation relative to the prim's rotation.
    tooltip: Sets the sit target position (offset) and orientation (rot) for the linked prim link, relative to the prim's own position and rotation. Clear by setting offset to <0.0, 0.0, 0.0>.
  llLinksetDataAvailable(  ) -> integer:
    tooltip: Returns an integer representing the number of bytes available/remaining in the linkset's datastore.
  llLinksetDataCountFound( string pattern ) -> integer:
    pattern: A regular expression (regex) search string used to match keys.
    tooltip: Returns the total count of keys in the linkset datastore that match the regular expression pattern.
  llLinksetDataCountKeys(  ) -> integer:
    tooltip: Returns an integer representing the total number of unique keys stored in the linkset's datastore.
  llLinksetDataDelete( string name ) -> integer:
    name: Key name of the key-value pair to delete.
    tooltip: Deletes the unprotected key-value pair specified by name from the linkset's datastore, triggering a linkset_data event.
  llLinksetDataDeleteFound( string pattern, string pass ) -> list:
    pattern: A regular expression (regex) specifying which keys to delete.
    pass: Optional passphrase required to delete matching protected keys.
    tooltip: Deletes all keys in the datastore matching the regular expression pattern. Returns a list [num_deleted, num_failed_protected]. Decrypts and deletes protected keys if matching pass is provided.
  llLinksetDataDeleteProtected( string name, string pass ) -> integer:
    name: Key name of the protected key-value pair to delete.
    pass: Passphrase required to delete the protected key.
    tooltip: Deletes the protected key-value pair specified by name from the linkset's datastore using the passphrase pass, triggering a linkset_data event.
  llLinksetDataFindKeys( string pattern, integer start, integer count ) -> list:
    pattern: A regular expression (regex) describing which keys to search for.
    start: Zero-based start index of the matching keys to return.
    count: Maximum number of keys to return (or less than 1 to retrieve all matching keys).
    tooltip: Returns an alphabetically sorted list of up to count keys from the datastore that match the regular expression pattern, starting at index start (returns all matching keys if count < 1).
  llLinksetDataListKeys( integer start, integer count ) -> list:
    start: Zero-based start index of the keys to return.
    count: Maximum number of keys to return (or less than 1 to retrieve all keys).
    tooltip: Returns an alphabetically sorted list of up to count keys from the datastore, starting at index start (returns all keys if count < 1).
  llLinksetDataRead( string name ) -> string:
    name: Key of the key-value pair to read.
    tooltip: Reads and returns the string value corresponding to key name from the linkset's datastore.
  llLinksetDataReadProtected( string name, string pass ) -> string:
    name: Key of the protected key-value pair to read.
    pass: Passphrase required to read the protected key.
    tooltip: Reads and returns the string value of the protected key name from the linkset's datastore using the passphrase pass.
  llLinksetDataReset(  ) -> void:
    tooltip: Erases all key-value pairs stored in the linkset's datastore, triggering a linkset_data event (with LINKSETDATA_RESET) in all scripts in the linkset.
  llLinksetDataWrite( string name, string value ) -> integer:
    name: Key name of the key-value pair.
    value: String value to write to the datastore.
    tooltip: Creates or updates an unprotected key-value pair (name and value) in the linkset's datastore. Returns an integer success or failure code.
  llLinksetDataWriteProtected( string name, string value, string pass ) -> integer:
    name: Key name of the protected key-value pair.
    value: String value to write to the datastore.
    pass: Passphrase used to protect or update the key.
    tooltip: Creates or updates a protected key-value pair (name and value) in the linkset's datastore using the passphrase pass. Returns an integer success or failure code.
  llScaleByFactor( float scaling_factor ) -> integer:
    scaling_factor: Multiplier scale factor to apply to the prim sizes and their local positions.
    tooltip: Attempts to uniformly resize the entire object by scaling_factor, maintaining size-position ratios of the prims. Fails if the linkset is physical, a pathfinding character, in keyframed motion,
      would exceed prim scale/linkability limits, or would overflow parcel capacity.
  llSetLinkAlpha( integer link, float alpha, integer face ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    alpha: Transparency value to set, from 0.0 (clear) to 1.0 (solid).
    face: Face number or ALL_SIDES.
    tooltip: Sets the Blinn-Phong alpha (transparency) of face on the linked prim link.
  llSetLinkColor( integer link, vector color, integer face ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    color: Color vector in RGB <R, G, B> (values from 0.0 to 1.0).
    face: Face number or ALL_SIDES.
    tooltip: Sets the Blinn-Phong diffuse RGB color of face on the linked prim link.
  llSetLinkGLTFOverrides( integer link, integer face, list params ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number or ALL_SIDES.
    params: A list of overrides and their corresponding values to set.
    tooltip: Sets or removes individual GLTF override parameters specified by params on face of the linked prim link.
  llSetLinkMedia( integer link, integer face, list params ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on face of the linked prim link without a script delay. Returns an integer STATUS_* flag detailing success or failure.
  llSetLinkPrimitiveParams( integer link, list rules ) -> void // deprecated:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    rules: A list of PRIM_* rules and data to apply.
    tooltip: Deprecated (use llSetLinkPrimitiveParamsFast instead). Sets primitive parameters for the linked prim link according to rules.
  llSetLinkPrimitiveParamsFast( integer link, list rules ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    rules: A list of PRIM_* rules and data to apply.
    tooltip: Sets primitive parameters for the linked prim link according to rules with no built-in script sleep delay.
  llSetLinkRenderMaterial( integer link, string material, integer face ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    material: Name of a material in the prim's inventory, or a UUID.
    face: Face number or ALL_SIDES.
    tooltip: 'Applies material (UUID or inventory name) to face of the linked prim link. Note: This clears most PRIM_GLTF_* properties on the face except for repeats, offsets, and rotation.'
  llSetLinkSitFlags( integer link, integer flags ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    flags: A bitfield of sit flags (SIT_FLAG_*) to apply.
    tooltip: Sets the sit target flags for the linked prim link inside the linkset.
  llSetLinkTexture( integer link, string texture, integer face ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    texture: Name of a texture in the prim's inventory, or a UUID.
    face: Face number or ALL_SIDES.
    tooltip: Applies texture (UUID or inventory name) to face of the linked prim link.
  ? llSetLinkTextureAnim( integer link, integer mode, integer face, integer sizex, integer sizey, float start, float length, float rate ) -> void
  : link: Link number (1 for root, >1 for children) or a LINK_* flag to animate.
    mode: Bitfield of texture animation mode flags (ANIM_ON, LOOP, etc.).
    face: Face number or ALL_SIDES.
    sizex: Number of horizontal frames (ignored for ROTATE and SCALE).
    sizey: Number of vertical frames (ignored for ROTATE and SCALE).
    start: Start frame number (or radians for ROTATE).
    length: Number of frames to display (or radians for ROTATE).
    rate: Playback rate in frames per second (or radians/sec for ROTATE, UV coords/sec for SMOOTH). Must not be zero.
    tooltip: Animates the texture on face of the linked prim link by setting the scale and offset according to mode. Parameters sizex/sizey define frames, start defines the start frame/angle, length defines
      duration, and rate defines playback speed.
  llSetObjectPermMask( integer group, integer flags ) -> void:
    group: MASK_* group (e.g., MASK_BASE, MASK_OWNER, MASK_GROUP, MASK_EVERYONE, or MASK_NEXT) to set.
    flags: Bitfield of permissions (PERM_* flags) to set.
    tooltip: Sets the scripts's object's permission flags for the specified group.
  llSetStatus( integer status, integer value ) -> void:
    status: Bitmask representing the STATUS_* flag(s) to change.
    value: Boolean. If TRUE, enables the status; if FALSE, disables it.
    tooltip: Sets the object status attributes specified by status to value.
