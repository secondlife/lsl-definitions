media:
  changed( integer Changed ):
    Changed: ''
    tooltip: Triggered when various events change the object. The change argument will be a bit-field of CHANGED_* constants.
  llClearLinkMedia( integer Link, integer Face ) -> integer:
    Link: ''
    Face: ''
    tooltip: Clears (deletes) the media and all parameters from the given Face on the linked prim.\nReturns an integer that is a STATUS_* flag, which details the success/failure of the operation.
  llClearPrimMedia( integer Face ) -> integer:
    Face: Number of side to clear.
    tooltip: Clears (deletes) the media and all parameters from the given Face.\nReturns an integer that is a STATUS_* flag which details the success/failure of the operation.
  llGetLinkMedia( integer LinkNumber, integer Face, list Parameters ) -> list:
    LinkNumber: 'Link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag'
    Face: The prim's side number
    Parameters: A list of PRIM_MEDIA_* property constants to return values of.
    tooltip: "Get the media parameters for a particular face on linked prim, given the desired list of parameter names. Returns a list of values in the order requested.\tReturns an empty list if no media\
      \ exists on the face."
  llGetPrimMediaParams( integer Face, list Parameters ) -> list:
    Face: face number
    Parameters: A list of PRIM_MEDIA_* property constants to return values of.
    tooltip: Returns the media parameters for a particular face on an object, given the desired list of parameter names, in the order requested. Returns an empty list if no media exists on the face.
  llHTTPResponse( key HTTPRequestID, integer Status, string Body ) -> void:
    HTTPRequestID: A valid HTTP request key.
    Status: HTTP Status (200, 400, 404, etc.).
    Body: Contents of the response.
    tooltip: Responds to an incoming HTTP request which was triggerd by an http_request event within the script. HTTPRequestID specifies the request to respond to (this ID is supplied in the http_request
      event handler).  Status and Body specify the status code and message to respond with.
  llParcelMediaCommandList( list CommandList ) -> void:
    CommandList: 'A list of PARCEL_MEDIA_COMMAND_* flags and their parameters '
    tooltip: Controls the playback of multimedia resources on a parcel or for an agent, via one or more PARCEL_MEDIA_COMMAND_* arguments specified in CommandList.
  llParcelMediaQuery( list QueryList ) -> list:
    QueryList: ''
    tooltip: Queries the media properties of the parcel containing the script, via one or more PARCEL_MEDIA_COMMAND_* arguments specified in CommandList.\nThis function will only work if the script is contained
      within an object owned by the land-owner (or if the land is owned by a group, only if the object has been deeded to the group).
  llRefreshPrimURL(  ) -> void // deprecated:
    tooltip: Reloads the web page shown on the sides of the object.
  llReleaseURL( string URL ) -> void:
    URL: URL to release.
    tooltip: Releases the specified URL, which was previously obtained using llRequestURL.  Once released, the URL will no longer be usable.
  llRequestSecureURL(  ) -> key:
    tooltip: Requests one HTTPS:// (SSL) URL for use by this object. The http_request event is triggered with results.\nReturns a key that is the handle used for identifying the request in the http_request
      event.
  llRequestURL(  ) -> key:
    tooltip: Requests one HTTP:// URL for use by this script. The http_request event is triggered with the result of the request.\nReturns a key that is the handle used for identifying the result in the
      http_request event.
  llSetContentType( key HTTPRequestID, integer ContentType ) -> void:
    HTTPRequestID: A valid http_request() key
    ContentType: Media type to use with any following llHTTPResponse(HTTPRequestID, ...)
    tooltip: Set the media type of an LSL HTTP server response to ContentType.\nHTTPRequestID must be a valid http_request ID. ContentType must be one of the CONTENT_TYPE_* constants.
  llSetLinkMedia( integer Link, integer Face, list Parameters ) -> integer:
    Link: 'Link number (0: unlinked, 1: root prim, >1: child prims).'
    Face: Face number.
    Parameters: A set of name/value pairs (in no particular order)
    tooltip: Set the media parameters for a particular face on linked prim, specified by Link. Returns an integer that is a STATUS_* flag which details the success/failure of the operation(s).\nMediaParameters
      is a set of name/value pairs in no particular order. Parameters not specified are unchanged, or if new media is added then set to the default specified.
  llSetParcelMusicURL( string URL ) -> void:
