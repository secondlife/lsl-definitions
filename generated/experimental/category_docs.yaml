      return zero vector).
uuid:
  llDetectedKey( integer Number ) -> key:
    Number: ''
    tooltip: Returns the key of detected object or avatar number.\nReturns NULL_KEY if Number is not a valid index.
  llGenerateKey(  ) -> key:
    tooltip: Generates a key (SHA-1 hash) using UUID generation to create a unique key.\nAs the UUID produced is versioned, it should never return a value of NULL_KEY.\nThe specific UUID version is an implementation
      detail that has changed in the past and may change again in the future. Do not depend upon the UUID that is returned to be version 5 SHA-1 hash.
  llGetKey(  ) -> key:
    tooltip: Returns the key of the prim the script is attached to.\nGet the key for the object which has this script.
  llGetLinkKey( integer LinkNumber ) -> key:
    LinkNumber: ''
    tooltip: Returns the key of the linked prim LinkNumber.\nReturns the key of LinkNumber in the link set.
  llGetObjectLinkKey( key id, integer link_no ) -> key:
    id: UUID of prim
    link_no: Link number to retrieve
    tooltip: Returns the key of the linked prim link_no in a linkset.\nReturns the key of link_no in the link set specified by id.
  llGetOwner(  ) -> key:
    tooltip: Returns the object owner's UUID.\nReturns the key for the owner of the object.
  llGetOwnerKey( key ObjectID ) -> key:
    ObjectID: ''
    tooltip: Returns the owner of ObjectID.\nReturns the key for the owner of object ObjectID.
  llRequestUserKey( string Name ) -> key:
    Name: Name of agent to look up.
    tooltip: Look up Agent ID for the named agent using a historical name.
