    agent_id: UUID of the avatar who denied or was blocked from granting permissions.
    reason: XP_ERROR_* error constant describing why permissions were denied.
    tooltip: Triggered when the agent specified by agent_id denies experience permissions, or when permission is blocked for other reasons (specified by the error code reason).
  llAgentInExperience( key agent ) -> integer:
    agent: UUID of the avatar in the same region to query.
    tooltip: Returns TRUE if the specified agent is in the experience and the experience can run in the current region/location; returns FALSE otherwise.
  llClearExperience( key agentid, key experienceid ) -> void // private // deprecated:
    agentid: ''
    experienceid: ''
    tooltip: ''
  llClearExperiencePermissions( key agentid ) -> void // private // deprecated:
    agentid: ''
    tooltip: ''
  llCreateKeyValue( string k, string v ) -> key:
    k: Unique key name for the key-value pair.
    v: Value for the key-value pair (maximum 2047 characters, or 4095 characters if using Mono).
    tooltip: Starts an asynchronous transaction to create a key-value pair (k and v) associated with the script's experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_STORAGE_EXCEPTION
      if the key already exists.
  llDataSizeKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction to request the used and total data storage allocated for the experience. Returns a key query handle for the dataserver event.
  llDeleteKeyValue( string k ) -> key:
    k: Key of the key-value pair to delete.
    tooltip: Starts an asynchronous transaction to delete the key-value pair associated with key k in the experience. Returns a key query handle for the dataserver event.
  llGetExperienceDetails( key experience_id ) -> list:
    experience_id: UUID of the experience to query (can be NULL_KEY to retrieve details for the script's own experience).
    tooltip: Returns a list of details for the specified experience_id, formatted as [string experience_name, key owner_id, key experience_id, integer state, string state_message, key group_id].
  llGetExperienceErrorMessage( integer error ) -> string:
    error: XP_ERROR_* error code constant to translate.
    tooltip: Returns a text description of the specified experience error code, or a description of XP_ERROR_UNKNOWN_ERROR if the error is invalid.
  llGetExperienceList( key agentid ) -> list // private // deprecated:
    agentid: ''
    tooltip: ''
  llKeyCountKeyValue(  ) -> key:
    tooltip: Starts an asynchronous transaction requesting the total count of keys in the experience data store. Returns a key query handle for the dataserver event.
  llKeysKeyValue( integer first, integer count ) -> key:
    first: Zero-based start index of the keys to retrieve.
    count: Number of keys to retrieve.
    tooltip: Starts an asynchronous transaction to retrieve count keys from the experience data store starting at the zero-based index first. Returns a key query handle for the dataserver event. Fails with
      XP_ERROR_KEY_NOT_FOUND if out of bounds.
  llReadKeyValue( string k ) -> key:
    k: Key of the key-value pair to read.
    tooltip: Starts an asynchronous transaction to read the value associated with key k in the experience. Returns a key query handle for the dataserver event. Fails with XP_ERROR_KEY_NOT_FOUND if the key
      does not exist.
  llReplaceAgentEnvironment( key agent_id, float transition, string environment ) -> integer:
    agent_id: UUID of an agent in the region participating in the experience.
    transition: Duration in seconds over which to transition to the new environment.
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    tooltip: Replaces the region and parcel environment seen by the specified agent_id as part of an experience, transitioning the settings over transition seconds. Passing NULL_KEY or an empty string for
      environment restores defaults.
  llRequestExperiencePermissions( key agent, string name ) -> void:
    agent: UUID of the agent to request permissions from.
    name: Deprecated parameter (no longer used).
    tooltip: Requests permission from the specified agent to participate in the experience. These permissions are persistent and apply grid-wide across all scripts in the experience, automatically triggering
      experience_permissions or experience_permissions_denied.
  llSetAgentEnvironment( key agent_id, float transition, list params ) -> integer:
    agent_id: UUID of the agent participating in the experience.
    transition: Transition duration in seconds.
    params: A list of environmental parameters to apply.
    tooltip: Sets an individual agent's environmental settings using the attributes in params over a duration of transition seconds. Must be used as part of an experience; passing an empty list removes
      overrides.
  llSetExperienceKey( key experienceid ) -> integer // private // deprecated:
    experienceid: ''
    tooltip: ''
  llSitOnLink( key agent_id, integer link ) -> integer:
    agent_id: UUID of the avatar being forced to sit.
    link: Link number for the prim containing the desired sit target.
    tooltip: Forces the avatar specified by agent_id (who must be participating in the experience) to sit on the sit target of the prim indicated by link. If occupied, searches down the linkset for an available
      sit target. Returns an integer.
  llUpdateKeyValue( string k, string v, integer checked, string original_value ) -> key:
    k: Key of the key-value pair to update.
    v: New value for the key-value pair.
    checked: Boolean. If TRUE, requires the existing value to match original_value to complete the update; if FALSE, creates the key if needed.
    original_value: String value to compare against the existing value in the datastore.
    tooltip: Starts an asynchronous transaction to update the key k to value v inside the experience datastore. If checked is TRUE, the update fails with XP_ERROR_RETRY_UPDATE unless the existing value
      matches original_value.
