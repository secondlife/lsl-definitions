media:
  changed( integer changes ):
    changes: A bitfield of CHANGED_* flags representing what changed.
    tooltip: Triggered when various properties of the object change. The parameter changes is a bitfield of CHANGED_* flags.
  llClearLinkMedia( integer link, integer face ) -> integer:
    link: 'The link number (0: unlinked, 1: root prim, >1: child prims) or a LINK_* flag representing the target prim.'
    face: Face number to clear.
    tooltip: Deletes the media and clears all parameters from the given face on the linked prim. Returns an integer STATUS_* flag detailing the success or failure of the operation.
  llClearPrimMedia( integer face ) -> integer:
    face: Face number (side) to clear.
    tooltip: Deletes the media and clears all parameters from the specified face. Returns an integer STATUS_* flag detailing the success or failure of the operation.
  llGetLinkMedia( integer link, integer face, list params ) -> list:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number (side) of the prim.
    params: A list of PRIM_MEDIA_* property constants to retrieve values for.
    tooltip: Returns a list containing the media parameters of the specified face on the linked prim link, retrieved in the order requested by params.
  llGetPrimMediaParams( integer face, list params ) -> list:
    face: Face number (side) of the prim.
    params: A list of PRIM_MEDIA_* property constants to retrieve values for.
    tooltip: Returns a list containing the media parameters of the specified face, retrieved in the order requested by params. Returns an empty list if no media exists on the face.
  llHTTPResponse( key request_id, integer status, string body ) -> void:
    request_id: Unique key identifying the incoming HTTP request.
    status: Integer HTTP status code (such as 200, 400, or 404) to respond with.
    body: String contents of the response body.
    tooltip: Responds to the incoming HTTP request identified by request_id with the HTTP status code status and the payload body.
  llParcelMediaCommandList( list commandList ) -> void:
    commandList: A list containing integer PARCEL_MEDIA_COMMAND_* flags and their corresponding parameters.
    tooltip: Controls the playback of movies and other multimedia resources on a parcel or for an agent, using the PARCEL_MEDIA_COMMAND_* settings specified in commandList.
  llParcelMediaQuery( list query ) -> list:
    query: A list of PARCEL_MEDIA_COMMAND_* attributes to query.
    tooltip: Queries the media properties of the parcel containing the script, returning a list of values in the order requested by query. Only works if the object is owned by the landowner or deeded to
      the land's group.
  llRefreshPrimURL(  ) -> void // deprecated:
    tooltip: Legacy function intended to reload the web page displayed on the prim's faces (currently non-functional).
  llReleaseURL( string url ) -> void:
    url: URL string to release.
    tooltip: Releases the specified url (previously obtained via llRequestURL), rendering it no longer usable.
  llRequestSecureURL(  ) -> key:
    tooltip: Asynchronously requests one secure HTTPS (SSL, port 12043) URL for use by this object, triggering an http_request event. Returns a key query handle.
  llRequestURL(  ) -> key:
    tooltip: Asynchronously requests one HTTP URL for use by this script, triggering an http_request event. Returns a key query handle.
  llSetContentType( key request_id, integer content_type ) -> void:
    request_id: Unique key identifying the incoming HTTP request.
    content_type: CONTENT_TYPE_* constant representing the Internet media type to use.
    tooltip: Sets the 'Content-Type' header of subsequent HTTP server responses (via llHTTPResponse) for request_id using the specified content_type (a CONTENT_TYPE_* constant).
  llSetLinkMedia( integer link, integer face, list params ) -> integer:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on face of the linked prim link without a script delay. Returns an integer STATUS_* flag detailing success or failure.
  llSetParcelMusicURL( string url ) -> void:
    url: Streaming audio URL string.
    tooltip: Sets the streaming audio (music) URL for the parcel containing the object. The object owner must match the landowner or land group.
  llSetPrimMediaParams( integer face, list params ) -> integer:
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on the designated face of the prim. Returns an integer STATUS_* flag detailing success or failure.
  llSetPrimURL( string url ) -> void // deprecated:
    url: Web URL to display.
    tooltip: Deprecated (use llSetPrimMediaParams instead). Updates the URL displayed on the prim's faces.
money:
  money( key id, integer amount ):
    id: UUID of the paying resident.
    amount: Quantity of L$ paid to the prim.
    tooltip: Triggered when a resident specified by id pays an amount of Linden dollars (L$) to the prim.
  transaction_result( key id, integer success, string data ):
    id: Key matching the handle returned by the initiating llTransfer* function.
    success: Boolean. TRUE if the L$ transfer succeeded, FALSE otherwise.
    data: Contains a CSV string of transaction info on success, or an error string on failure.
    tooltip: Triggered when an asynchronous L$ transfer (such as llTransferLindenDollars) is completed. Passes transaction info id, success status, and CSV or error data.
  llGiveMoney( key destination, integer amount ) -> integer:
    destination: UUID of the destination avatar.
    amount: Number of L$ to transfer (must be greater than 0).
    tooltip: Transfers the specified amount of L$ from the script owner to the destination avatar. Silently fails if the PERMISSION_DEBIT permission has not been granted. Returns 0 (use llTransferLindenDollars
      to match transactions to transaction_result events).
  llSetClickAction( integer action ) -> void:
    action: CLICK_ACTION_* flag representing the action to apply.
    tooltip: Sets the action (a CLICK_ACTION_* flag) performed when an avatar left-clicks the prim.
  llSetPayPrice( integer price, list quick_pay_buttons ) -> void:
    price: Default price integer shown in the text field (can accept PAY_* constants or positive values).
    quick_pay_buttons: A list of four integer values or PAY_* constants specifying the button payment choices.
    tooltip: Suggests default amounts for the pay text input field price and the four payment dialog quick_pay_buttons when an avatar pays this object.
  llTransferLindenDollars( key destination, integer amount ) -> key:
    destination: UUID of the destination avatar.
    amount: Quantity of L$ to transfer (must be greater than 0).
    tooltip: Transfers amount of L$ from the script owner to the destination avatar, requiring the PERMISSION_DEBIT permission. Returns a key query handle matching the resulting transaction_result event.
movement:
  at_rot_target( integer handle, rotation targetrot, rotation ourrot ):
    handle: Integer handle returned by the llRotTarget call.
    targetrot: Target rotation specified in the llRotTarget call.
    ourrot: Current rotation of the object (similar to llGetRot).
    tooltip: Triggered when the script's rotation (ourrot) comes within a defined angle (error) of the target rotation (targetrot) set by a call to llRotTarget (which returns the associated handle).
  at_target( integer tnum, vector targetpos, vector ourpos ):
    tnum: Integer target handle returned by the llTarget call.
    targetpos: Target position vector specified in the llTarget call.
    ourpos: Current position vector of the object (similar to llGetPos).
    tooltip: Triggered when the scripted object's position (ourpos) comes within the defined range of the target position (targetpos) set by llTarget (which returns the associated handle tnum).
  moving_end(  ):
    tooltip: Triggered whenever the physical or moving object containing the script stops moving.
  moving_start(  ):
    tooltip: Triggered whenever the physical or moving object containing the script starts moving.
  not_at_rot_target(  ):
    tooltip: Triggered continuously while the object's rotation is outside the leeway angle of targets set via llRotTarget.
  not_at_target(  ):
    tooltip: Triggered continuously while the object's position has not yet reached the range of targets set via llTarget.
  llApplyImpulse( vector momentum, integer is_local ) -> void:
    momentum: Linear impulse vector to apply.
    is_local: Boolean. If TRUE, momentum is treated as a local directional vector; if FALSE, it is treated as a global region vector.
    tooltip: Applies a linear impulse (momentum) to a physical object. If local is TRUE, the impulse is applied in local coordinates; otherwise, it is applied in global region coordinates.
  llApplyRotationalImpulse( vector force, integer is_local ) -> void:
    force: Rotational impulse vector to apply.
    is_local: Boolean. If TRUE, the force is treated as a local directional vector; if FALSE, it is treated as a global region vector.
    tooltip: Applies a rotational impulse (force) to a physical object. If local is TRUE, the rotational impulse is applied in local coordinates; otherwise, it is applied in global region coordinates.
  llGetOmega(  ) -> vector:
    tooltip: Returns a vector representing the physical rotation (angular velocity) of the object in radians per second.
  llGetTorque(  ) -> vector:
    tooltip: Returns a vector representing the physical torque force currently acting on the object (if the object is physical).
  llGetVel(  ) -> vector:
    tooltip: Returns a vector representing the velocity of the object (in meters per second) relative to the global region coordinates. For physical objects, returns the velocity of its center of mass.
  llLookAt( vector target, float strength, float damping ) -> void:
    target: Target position vector in region coordinates to look at.
    strength: Force of rotation (0.0 cancels the tracking; values around half the object's mass are typical).
    damping: Timescale in seconds to critically damp the orientation.
    tooltip: Causes the object to orient its positive Z-axis (up axis) toward the target vector, keeping its positive X-axis (forward axis) below the horizon. Tracks target until llStopLookAt is called
      or strength is set to 0.0.
  llMoveToTarget( vector target, float tau ) -> void:
    target: Target position vector in region coordinates.
    tau: Timescale in seconds to critically damp the movement.
    tooltip: Critically damps the physical object's motion to position target in tau seconds. Setting tau to 0.0 stops the critical damping; recommended tau values are greater than 0.2.
  llPointAt( vector pos ) -> void // private // deprecated:
    pos: Position vector to point at.
    tooltip: Directs the avatar owning the object to point at the vector pos.
  llPushObject( key target, vector impulse, vector ang_impulse, integer is_local ) -> void:
    target: UUID of the target avatar or object in the same region.
    impulse: Linear impulse vector representing the direction and force of the push.
    ang_impulse: Angular impulse vector representing the rotational force.
    is_local: Boolean. If TRUE, forces are applied relative to the target's local axes; if FALSE, relative to region axes.
    tooltip: Applies physical impulse (force) and ang_impulse (rotational force) to the specified target avatar or object.
  llRotLookAt( rotation target_direction, float strength, float damping ) -> void:
    target_direction: Target rotation to align the object with.
    strength: Force of rotation (0.0 cancels the tracking; values around half the object's mass are typical).
    damping: Timescale in seconds to critically damp the rotation.
    tooltip: Causes the object to smoothly rotate to target_direction with a force defined by strength and damping. A strength of 0.0 cancels the rotation target. Rotation is maintained until stopped with
      llStopLookAt.
  llRotTarget( rotation rot, float error ) -> integer:
    rot: Target rotation to track.
    error: Tolerance angle in radians defining when the target rotation is considered reached.
    tooltip: Registers the rotation rot with a leeway tolerance error (in radians) as a target, triggering at_rot_target and not_at_rot_target events. Returns an integer handle to unregister the target
      via llRotTargetRemove.
  llRotTargetRemove( integer handle ) -> void:
    handle: Integer target handle returned by llRotTarget to remove.
    tooltip: Removes the rotational target specified by the integer handle registered with llRotTarget.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Target rotation to turn the avatar to face.
    flags: Flags to configure the rotation behavior.
    tooltip: Sets the rotation of the avatar to rot, controlled by flags.
  llSetAngularVelocity( vector initial_omega, integer is_local ) -> void:
    initial_omega: Angular velocity vector to apply (in radians per second).
    is_local: Boolean. If TRUE, initial_omega is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Sets the angular velocity of a physical object to initial_omega (mass-independent). If local is TRUE, applied in local coordinates; if FALSE, applied in global coordinates. Has no effect on
      non-physical objects.
  llSetForce( vector force, integer is_local ) -> void:
    force: Directional force vector to apply.
    is_local: Boolean. If TRUE, force is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Applies a constant linear force to a physical object. If local is TRUE, force is applied relative to local coordinates; if FALSE, applied relative to region coordinates.
  llSetForceAndTorque( vector force, vector torque, integer is_local ) -> void:
    force: Directional linear force vector.
    torque: Torque rotational force vector.
    is_local: Boolean. If TRUE, force and torque are treated as local vectors; if FALSE, as global region vectors.
    tooltip: Sets both the constant linear force and constant torque acting on a physical object. If local is TRUE, forces are applied in local coordinates; if FALSE, in global coordinates.
  llSetHoverHeight( float height, integer water, float tau ) -> void:
    height: Distance to hover above the ground or water.
    water: Boolean. If TRUE, hovers above water too; if FALSE, water is ignored.
    tau: Timescale in seconds to critically damp the movement.
    tooltip: Critically damps the physical object's vertical movement to hover at height (above ground, or above water if water is TRUE) in tau seconds. Do not use with vehicles; call llStopHover to cancel.
  llSetKeyframedMotion( list keyframes, list options ) -> void:
    keyframes: A strided list of the form [vector position, rotation orientation, float time] representing sequential relative keyframes (minimum time is 1/9s).
    options: A list of options (KFM_* constants) to modify playback behavior.
    tooltip: Smoothly moves a non-physical object between the positions, orientations, and times specified in the keyframes list, configured via options. Collisions with keyframed objects are ignored. An
      empty keyframes list terminates the motion.
  llSetLocalRot( rotation rot ) -> void:
    rot: Local rotation to set.
    tooltip: Sets the rotation of a child prim relative to its root prim using rot.
  llSetPos( vector pos ) -> void:
    pos: Position vector to move to (in region coordinates, or local coordinates if in a child prim).
    tooltip: Moves the non-physical object or prim toward the vector pos (up to 10m). If called in a child prim, pos is treated as root-relative; if called from the root prim, the entire object is moved.
  llSetRegionPos( vector position ) -> integer:
    position: Target position vector in region coordinates (can cross up to 10m over a region border).
    tooltip: Tries to move the entire object so that its root prim is within 0.1m of the vector position (underground positions are set to ground level). Returns TRUE on success or FALSE on failure.
  llSetRot( rotation rot ) -> void:
    rot: Target rotation.
    tooltip: Sets the rotation of the prim to rot. If in a child prim, rot is treated as root-relative; if in the root prim of a non-physical object, rotates the entire object.
  llSetTorque( vector torque, integer is_local ) -> void:
    torque: Torque rotational force vector.
    is_local: Boolean. If TRUE, torque is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Applies a constant torque rotational force to a physical object. If local is TRUE, torque is applied in local coordinates; if FALSE, applied in global coordinates.
  llSetVelocity( vector velocity, integer is_local ) -> void:
    velocity: Linear velocity vector to apply (in meters per second).
    is_local: Boolean. If TRUE, velocity is treated as a local directional vector; if FALSE, as a global region vector.
    tooltip: Sets the linear velocity of a physical object to velocity. If local is TRUE, velocity is treated as a local directional vector; if FALSE, as a global region directional vector. Has no effect
      on non-physical objects.
  llStopHover(  ) -> void:
    tooltip: Stops the hover behavior (such as that initiated by llSetHoverHeight).
  llStopLookAt(  ) -> void:
    tooltip: Stops causing the object to look at or point toward a target (canceling llLookAt or llRotLookAt).
  llStopMoveToTarget(  ) -> void:
    tooltip: Stops the critically damped movement of the object toward a target (canceling llMoveToTarget). Use llStopLookAt to stop rotational tracking.
  llStopPointAt(  ) -> void // private // deprecated:
    tooltip: Stops the avatar who owns the object from pointing.
  llTarget( vector position, float range ) -> integer:
    position: Target position vector in region coordinates.
    range: Radius tolerance in meters surrounding the target position.
    tooltip: Registers a positional target at position with a leeway radius range. This triggers at_target and not_at_target events. Returns an integer handle to unregister the target via llTargetRemove.
  llTargetOmega( vector axis, float spinrate, float gain ) -> void:
    axis: Local axis vector around which the object rotates.
    spinrate: Rotation rate multiplier in radians per second.
    gain: A float modulating the rotational strength (disables the rotation if set to 0.0).
    tooltip: Applies a smooth client-side rotation around the local axis at a rate equal to spinrate multiplied by the magnitude of axis (in radians per second) with a force defined by gain. Set spinrate
      to 0.0 to cancel.
  llTargetRemove( integer handle ) -> void:
    handle: Integer target handle returned by llTarget to remove.
    tooltip: Removes the positional target specified by the integer handle registered with llTarget.
notecard:
  llFindNotecardTextCount( string notecardname, string pattern, list options ) -> key:
    notecardname: Name of the target notecard.
    pattern: Regular expression pattern to search for.
    options: A list of options to control the search (currently unused, should be []).
    tooltip: Searches the text of a cached notecard for lines containing the given pattern and returns the number of matches found through a dataserver event.
  llFindNotecardTextSync( string name, string pattern, integer start, integer count, list options ) -> list:
    name: Name of a notecard in the prim's inventory, or a UUID.
    pattern: Regular expression pattern to search for.
    start: Number of match results to skip before returning (0 to start at the first match).
    count: Maximum number of matches to return (if 0, returns the first 64 matches).
    options: A list of options for future expansion (unused, should be []).
    tooltip: Synchronously searches a cached notecard name for lines containing pattern, returning a list of line and column numbers. Returns a list containing 'NAK' if the notecard is not cached, or an
      empty list if no matches are found.
  llGetNotecardLine( string name, integer line ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    line: Zero-based line number to request.
    tooltip: Asynchronously requests the line index line of the notecard name from the dataserver. Returns a key query handle for the dataserver event, which will return 'EOF' when reaching past the end
      of the notecard.
  llGetNotecardLineSync( string name, integer line ) -> string:
    name: Name of the notecard in the prim's inventory, or a UUID.
    line: Zero-based line number to request.
    tooltip: Synchronously reads the line index line of the notecard name from the region's cache, immediately returning its text without raising a dataserver event. Returns 'NAK' if not cached or 'EOF'
      if out of bounds.
  llGetNumberOfNotecardLines( string name ) -> key:
    name: Name of the notecard in the prim's inventory, or a UUID.
    tooltip: Asynchronously requests the total line count of the notecard name. Returns a key query handle for the dataserver event.
object:
  llGetBoundingBox( key object ) -> list:
    object: UUID of the avatar or prim in the same region.
    tooltip: Returns the bounding box of object (including any linked prims) relative to its root prim in local coordinates, formatted as [ (vector) min_corner, (vector) max_corner ].
  llGetCenterOfMass(  ) -> vector:
    tooltip: Returns the vector position (in region coordinates) of the center of mass. Returns the individual child prim's center of mass if called from a child, or the entire linkset's center of mass
      if called from the root.
  llGetObjectDetails( key id, list params ) -> list:
    id: UUID of the avatar or prim (in the same or adjacent regions) to query.
    params: A list of OBJECT_* flags specifying the attributes to retrieve.
    tooltip: Returns a list containing the requested parameters of the specified avatar or object id, retrieved in the order requested by params.
  llGetObjectLinkKey( key object_id, integer link ) -> key:
    object_id: UUID of the target prim or linkset.
    link: Link number (1 for root, >1 for children) or a LINK_* flag of the prim to retrieve.
    tooltip: Returns the key (UUID) of the linked child prim specified by link within the linkset identified by object_id.
  llGetObjectMass( key id ) -> float:
    id: UUID of the avatar or object to query.
    tooltip: Returns a float representing the mass of the avatar or object specified by id.
  llGetObjectPrimCount( key prim ) -> integer:
    prim: UUID of the prim in the same region.
    tooltip: Returns an integer representing the total number of prims in the object containing the specified prim.
  llGetOwnerKey( key id ) -> key:
    id: UUID of the prim in the same region.
    tooltip: Returns the key (UUID) of the owner of the prim specified by id.
  llKey2Name( key id ) -> string:
    id: UUID of the target avatar or prim in the same region.
    tooltip: Returns a string containing the name of the prim or avatar specified by id. The target must be a valid, rezzed entity in the current region, otherwise an empty string is returned. Avatars return
      their legacy name.
  llSameGroup( key uuid ) -> integer:
    uuid: UUID of the group, avatar, or prim to check.
    tooltip: Returns TRUE if the agent or object specified by uuid is in the same region (simulator) and shares the same active group as the prim containing the script; returns FALSE otherwise.
object_animation:
  llGetObjectAnimationNames(  ) -> list:
    tooltip: Returns a list of strings representing the names or UUIDs of all active animations currently playing on the object.
  llStartObjectAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, or the built-in animation name.
    tooltip: Starts the specified animation anim (inventory or built-in) on the rigged mesh object associated with the current script.
  llStopObjectAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, the UUID of the animation, or the built-in animation name.
    tooltip: Stops the specified animation anim (inventory, built-in, or UUID) on the rigged mesh object associated with the current script.
parcel:
  llAddToLandBanList( key avatar, float hours ) -> void:
    avatar: UUID of the avatar to add to the ban list.
    hours: Duration, in hours, to ban the avatar for (0 for indefinite).
    tooltip: Adds the avatar to the parcel ban list for the specified number of hours. A value of 0 hours adds the avatar indefinitely. Banned users teleporting to the parcel are redirected to a neighboring
      parcel; the minimum accepted duration is 0.01 hours (approximately 36 seconds).
  llAddToLandPassList( key avatar, float hours ) -> void:
    avatar: UUID of the avatar to add to the pass list.
    hours: Duration, in hours, to allow the avatar for (range [0.0, 144.0], 0 for indefinite).
    tooltip: Adds the avatar to the land pass list for the specified number of hours (or indefinitely if hours is 0).
  llEjectFromLand( key avatar ) -> void:
    avatar: UUID of the avatar in the same region.
    tooltip: Ejects the specified avatar from land/parcels owned by the object's owner (group or resident).
  llGetAgentList( integer scope, list options ) -> list:
    scope: Scope flag (AGENT_LIST_PARCEL, AGENT_LIST_PARCEL_OWNER, or AGENT_LIST_REGION) to filter the returned agents.
    options: A list of options to apply (currently unused).
    tooltip: Requests a list of avatar UUID keys for agents currently in the region, limited by scope. Returns a list of keys or a list containing an error message string.
  llGetEnvironment( vector pos, list params ) -> list:
    pos: Position vector in region coordinates (X/Y determine the parcel, or region if X/Y are -1; Z determines the sky track altitude).
    params: A list of environmental attributes to retrieve.
    tooltip: Returns a list containing the current environment parameters for the parcel or region at pos, retrieved in the order specified by params.
  llGetLandOwnerAt( vector pos ) -> key:
    pos: Position vector in region coordinates.
    tooltip: Returns the key (UUID) of the land owner at the vector pos, or NULL_KEY if the land is public.
  llGetMoonDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the parcel's moon, taking altitude into account. Falls back to the region's moon direction if no custom parcel environment
      is set.
  llGetMoonRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the moon on the current parcel and altitude track. Falls back to the region's moon rotation if no custom parcel environment is set.
  llGetParcelDetails( vector pos, list params ) -> list:
    pos: Position vector in region coordinates (only the X and Y components are used).
    params: A list of PARCEL_DETAILS_* flags specifying the attributes to retrieve.
    tooltip: Returns a list containing the requested parcel details specified by params (retrieved in the same order) for the parcel at the vector pos.
  llGetParcelFlags( vector pos ) -> integer:
    pos: Position vector in region coordinates (the Z component is ignored).
    tooltip: Returns an integer bitfield of parcel flags (PARCEL_FLAG_*) for the parcel at the position pos.
  llGetParcelMaxPrims( vector pos, integer sim_wide ) -> integer:
    pos: Position vector in region coordinates (the Z component is ignored).
    sim_wide: Boolean. If TRUE, returns the combined land impact limit for all parcels owned by the parcel owner in the region; if FALSE, returns only the limit for the specified parcel.
    tooltip: Returns an integer representing the maximum combined land impact (prim limit) allowed for objects on the parcel at pos, determined either for the single parcel or sim-wide based on sim_wide.
  llGetParcelMusicURL(  ) -> string:
    tooltip: Returns a string containing the parcel's streaming music (audio) URL. The object owner must also be the land owner (or share the same group deeding).
  llGetParcelPrimCount( vector pos, integer category, integer sim_wide ) -> integer:
    pos: Position vector in region coordinates (the Z component is ignored).
    category: PARCEL_COUNT_* category flag.
    sim_wide: Boolean. If TRUE, searches all parcels in the region owned by the targeted parcel's owner; if FALSE, searches only the specified parcel.
    tooltip: Returns an integer representing the total land impact of objects on the parcel at pos in the specified category. If sim_wide is TRUE, returns combined usage for all regional parcels owned by
      the parcel owner; if FALSE, returns usage for only the specified parcel.
  llGetParcelPrimOwners( vector pos ) -> list:
    pos: Position vector in region coordinates.
    tooltip: Returns a list of up to 100 strides (formatted as [key owner, integer land_impact]) representing owners of objects on the parcel at pos, sorted by owner key. Requires owner-like permissions
      for the parcel and the script owner's presence in the region.
  llGetSunDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the parcel's sun, taking altitude into account. Falls back to the region's sun direction if no custom parcel environment is
      set.
  llGetSunRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the sun on the current parcel and altitude track. Falls back to the region's sun rotation if no custom parcel environment is set.
  llOverMyLand( key id ) -> integer:
    id: UUID of the group, avatar, or object to check.
    tooltip: Returns TRUE if the avatar or object specified by key id is over land owned by the script owner, or FALSE otherwise.
  llParcelMediaCommandList( list commandList ) -> void:
    commandList: A list containing integer PARCEL_MEDIA_COMMAND_* flags and their corresponding parameters.
    tooltip: Controls the playback of movies and other multimedia resources on a parcel or for an agent, using the PARCEL_MEDIA_COMMAND_* settings specified in commandList.
  llParcelMediaQuery( list query ) -> list:
    query: A list of PARCEL_MEDIA_COMMAND_* attributes to query.
    tooltip: Queries the media properties of the parcel containing the script, returning a list of values in the order requested by query. Only works if the object is owned by the landowner or deeded to
      the land's group.
  llRemoveFromLandBanList( key avatar ) -> void:
    avatar: UUID of the avatar to remove.
    tooltip: Removes the specified avatar from the land parcel's ban list.
  llRemoveFromLandPassList( key avatar ) -> void:
    avatar: UUID of the avatar to remove.
    tooltip: Removes the specified avatar from the land parcel's pass/access list.
  ? llReplaceEnvironment( vector position, string environment, integer track_no, integer day_length, integer day_offset ) -> integer
  : position: Position vector of the target parcel (the Z component is ignored; use <-1.0, -1.0, -1.0> for the entire region).
    environment: Name of an environmental setting in inventory, or its asset UUID (or empty string/NULL_KEY to clear).
    track_no: 'The elevation track to change (0: water, 1: ground, 2: 1000m, 3: 2000m, 4: 3000m, -1: all tracks).'
    day_length: Day cycle length in seconds (-1 to leave unchanged).
    day_offset: Day cycle offset in seconds from UTC (-1 to leave unchanged).
    tooltip: Replaces the environment on the parcel containing position (or the entire region if position is <-1.0, -1.0, -1.0>) for the specified track_no. Modifies day_length and day_offset if specified.
      Requires edit permissions on the parcel or estate management rights.
  llResetLandBanList(  ) -> void:
    tooltip: Removes all blocked residents from the land parcel's ban list.
  llResetLandPassList(  ) -> void:
    tooltip: Removes all residents from the land parcel's access/pass list.
  llScriptDanger( vector pos ) -> integer:
    pos: Position vector in region coordinates to check.
    tooltip: Returns TRUE if the vector position pos is over public land, sandbox land, land restricting edit/build permissions, or land that disables outside scripts.
  llSetEnvironment( vector position, list params ) -> integer:
    position: Position vector in region coordinates to specify the target parcel, or <-1.0, -1.0, z> for the entire region (where z specifies the sky track, or -1 for all tracks).
    params: A list of environmental attributes and values to apply (or empty to clear).
    tooltip: Overrides the environmental settings at position for a parcel (or region if position is <-1.0, -1.0, z>) using the parameters in params. Passing an empty params list removes previous overrides.
  llSetParcelForSale( integer ForSale, list Options ) -> integer:
    ForSale: Boolean. If TRUE, puts the parcel up for sale; if FALSE, removes it from sale.
    Options: A list of options to configure the sale (e.g., price, authorized buyer, and object inclusion).
    tooltip: Sets the parcel the object is on for sale. If ForSale is TRUE, puts the land up for sale using Options (price, buyer, objects included). Setting ForSale to FALSE removes the parcel from sale.
      Requires parcel ownership and the PERMISSION_PRIVILEGED_LAND_ACCESS permission. Returns an error code or 0 if successful.
  llSetParcelMusicURL( string url ) -> void:
    url: Streaming audio URL string.
    tooltip: Sets the streaming audio (music) URL for the parcel containing the object. The object owner must match the landowner or land group.
parcel_appearance:
  llGetEnvironment( vector pos, list params ) -> list:
    pos: Position vector in region coordinates (X/Y determine the parcel, or region if X/Y are -1; Z determines the sky track altitude).
    params: A list of environmental attributes to retrieve.
    tooltip: Returns a list containing the current environment parameters for the parcel or region at pos, retrieved in the order specified by params.
  llGetMoonDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the parcel's moon, taking altitude into account. Falls back to the region's moon direction if no custom parcel environment
      is set.
  llGetMoonRotation(  ) -> rotation:
    tooltip: Returns a rotation representing the orientation applied to the moon on the current parcel and altitude track. Falls back to the region's moon rotation if no custom parcel environment is set.
  llGetSunDirection(  ) -> vector:
    tooltip: Returns a normalized vector representing the current direction of the parcel's sun, taking altitude into account. Falls back to the region's sun direction if no custom parcel environment is
