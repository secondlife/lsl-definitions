  llGetTextureRot( integer face ) -> float:
    face: Face number or ALL_SIDES.
    tooltip: Returns a float representing the texture rotation angle (in radians) on face.
  llGetTextureScale( integer face ) -> vector:
    face: Face number or ALL_SIDES.
