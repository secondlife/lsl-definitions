      Requires edit permissions on the parcel or estate management rights.
  llSetAgentEnvironment( key agent_id, float transition, list params ) -> integer:
    agent_id: UUID of the agent participating in the experience.
    transition: Transition duration in seconds.
    params: A list of environmental parameters to apply.
    tooltip: Sets an individual agent's environmental settings using the attributes in params over a duration of transition seconds. Must be used as part of an experience; passing an empty list removes
      overrides.
  llSetEnvironment( vector position, list params ) -> integer:
    position: Position vector in region coordinates to specify the target parcel, or <-1.0, -1.0, z> for the entire region (where z specifies the sky track, or -1 for all tracks).
    params: A list of environmental attributes and values to apply (or empty to clear).
    tooltip: Overrides the environmental settings at position for a parcel (or region if position is <-1.0, -1.0, z>) using the parameters in params. Passing an empty params list removes previous overrides.
parcel_media:
  llParcelMediaCommandList( list commandList ) -> void:
    commandList: A list containing integer PARCEL_MEDIA_COMMAND_* flags and their corresponding parameters.
    tooltip: Controls the playback of movies and other multimedia resources on a parcel or for an agent, using the PARCEL_MEDIA_COMMAND_* settings specified in commandList.
  llParcelMediaQuery( list query ) -> list:
    query: A list of PARCEL_MEDIA_COMMAND_* attributes to query.
    tooltip: Queries the media properties of the parcel containing the script, returning a list of values in the order requested by query. Only works if the object is owned by the landowner or deeded to
      the land's group.
  llSetParcelMusicURL( string url ) -> void:
    url: Streaming audio URL string.
    tooltip: Sets the streaming audio (music) URL for the parcel containing the object. The object owner must match the landowner or land group.
particles:
  llLinkParticleSystem( integer link, list rules ) -> void:
    link: Link number (1 for root, >1 for children) or a LINK_* flag.
    rules: A list of particle system rules and data pairs [rule1, data1, ...].
    tooltip: Creates or updates a particle system on the linked prim link based on the list of rules. An empty list removes the particle system.
  llParticleSystem( list rules ) -> void:
    rules: A list of particle system rules and data pairs [rule1, data1, ...].
    tooltip: Creates or updates a particle system on the prim containing the script based on rules. An empty list removes the particle system.
pathfinding:
  moving_end(  ):
    tooltip: Triggered whenever the physical or moving object containing the script stops moving.
  moving_start(  ):
    tooltip: Triggered whenever the physical or moving object containing the script starts moving.
  path_update( integer type, list reserved ):
    type: Path update status or failure code constant (PU_* flag).
    reserved: Reserved parameter (currently unused).
    tooltip: Triggered to inform the script of changes or failures in the pathfinding character's status.
  llCreateCharacter( list options ) -> void:
    options: A list of key-value pairs specifying the character's configuration options.
    tooltip: Converts the linkset containing the script into a pathfinding character entity (required to use pathfinding functions) using the specified options.
  llDeleteCharacter(  ) -> void:
    tooltip: Converts the linkset back to a standard physical object, removing all pathfinding properties.
  llEvade( key target, list options ) -> void:
    target: UUID of the group, avatar, or object to evade.
    options: No options currently available (should be empty list).
    tooltip: Directs a pathfinding character to evade target, attempting to hide from its pursuer if a hiding spot is available (i.e., no line of sight from the character's head to the pursuer's head, and
      no direct path on the navmesh).
  llExecCharacterCmd( integer command, list options ) -> void:
    command: Pathfinding command to execute.
    options: A list of options for the command (e.g., jump height for CHARACTER_CMD_JUMP).
    tooltip: Sends a command (specified by command) to the pathing system with options. Currently only supports stopping pathfinding or making the character jump.
  llFleeFrom( vector position, float distance, list options ) -> void:
    position: Position vector in region coordinates from which to flee.
    distance: Distance in meters to keep from the position.
    options: No options currently available (should be empty list).
    tooltip: Directs a pathfinding character to keep the specified distance from the target position vector (within the region or adjacent regions).
  llGetClosestNavPoint( vector point, list options ) -> list:
    point: Position vector in region-local coordinates.
    options: A list of GCNP_* flags and parameters to configure the search limits.
    tooltip: Returns a list containing the closest vector position on the navigation mesh (navmesh) to the specified point (expressed in region-local space), or an empty list if none is found. Configured
      using options.
  llGetStaticPath( vector start_pos, vector end_pos, float radius, list params ) -> list:
    start_pos: Starting position vector.
    end_pos: Target end position vector.
    radius: Radius of the character path, between 0.125m and 5.0m.
    params: A list specifying the CHARACTER_TYPE parameter (defaults to CHARACTER_TYPE_NONE).
    tooltip: Returns a list of position vectors representing pathfinding waypoints between start and end on the static navmesh for a character of the specified radius. Ignores movable obstacles and can
      be used in any region regardless of dynamic pathfinding status.
  llNavigateTo( vector pos, list options ) -> void:
    pos: Destination position vector in region coordinates.
    options: A list of parameters to configure pathfinding behavior (currently only FORCE_DIRECT_PATH is supported).
    tooltip: Directs a pathfinding character to navigate to the position pos (located in the current or adjacent regions) using the parameters specified in options.
  llPatrolPoints( list patrolPoints, list options ) -> void:
    patrolPoints: A list of at least two position vectors representing the patrol path.
    options: A list of PATROL_* flags and parameters to configure the patrol behavior.
    tooltip: Directs a pathfinding character to patrol sequentially through the coordinates specified in patrolPoints, configured by options.
  llPursue( key target, list options ) -> void:
    target: UUID of the group, avatar, or object to pursue.
    options: A list of options to configure pursuit behavior.
    tooltip: Directs a pathfinding character to pursue and chase target, configured by the parameters specified in options.
  llUpdateCharacter( list options ) -> void:
    options: A list of key-value pairs specifying the character's new configuration options (takes same constants as llCreateCharacter).
    tooltip: Updates settings for a pathfinding character using the parameters specified in options.
  llWanderWithin( vector origin, vector dist, list options ) -> void:
    origin: Center coordinate position vector to wander about.
    dist: A vector specifying the maximum distance limits (half-extents) along each world-aligned axis from the origin.
    options: A list of WANDER_* flags and parameters to configure the wander behavior.
    tooltip: Directs a pathfinding character to wander around a central coordinate origin, restricted within the bounding distance limits of dist and configured by options.
permissions:
  experience_permissions( key agent_id ):
    agent_id: UUID of the avatar approving experience permissions.
    tooltip: Triggered when the agent specified by agent_id approves an experience permissions request (interactively or automatically if previously approved).
  experience_permissions_denied( key agent_id, integer reason ):
    agent_id: UUID of the avatar who denied or was blocked from granting permissions.
    reason: XP_ERROR_* error constant describing why permissions were denied.
    tooltip: Triggered when the agent specified by agent_id denies experience permissions, or when permission is blocked for other reasons (specified by the error code reason).
  run_time_permissions( integer perm ):
    perm: Bitfield of currently granted permissions (PERMISSION_* flags).
    tooltip: Triggered when an agent grants or denies runtime permissions requested by llRequestPermissions. Passes the active integer permissions bitfield perm (returns 0 if no permissions are currently
      granted).
  llClearCameraParams(  ) -> void:
    tooltip: Resets all camera parameters to default values and turns off scripted camera control. Requires the PERMISSION_CONTROL_CAMERA runtime permission (automatically granted for attached or sat-on
      objects).
  llForceMouselook( integer mouselook ) -> void:
    mouselook: Boolean. If TRUE, forces a sitting avatar into mouselook; if FALSE, allows them to keep their current camera mode.
    tooltip: Sets whether any avatar sitting on this prim is forced into mouselook mode. Setting mouselook to TRUE forces the mode; FALSE (default) allows the avatar to keep their current camera mode.
  llGetAnimation( key avatar ) -> string:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a string representing the name of the currently playing locomotion animation for the specified avatar.
  llGetAnimationList( key avatar ) -> list:
    avatar: UUID of the avatar in the same region.
    tooltip: Returns a list of keys (UUIDs) representing all active animations currently playing on the specified avatar.
  llGetAnimationOverride( string anim_state ) -> string:
    anim_state: Animation state string to query.
    tooltip: Returns a string representing the name of the animation currently overriding the specified anim_state. Requires the PERMISSION_OVERRIDE_ANIMATIONS or PERMISSION_TRIGGER_ANIMATION runtime permission.
  llGetCameraAspect(  ) -> float:
    tooltip: Returns a float representing the camera's current aspect ratio (width/height) of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraFOV(  ) -> float:
    tooltip: Returns a float representing the camera's current field of view (FOV) in radians of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions are not granted.
  llGetCameraPos(  ) -> vector:
    tooltip: Returns a vector representing the camera's current position in region coordinates of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_VECTOR if permissions are not granted.
  llGetCameraRot(  ) -> rotation:
    tooltip: Returns a rotation representing the camera's current orientation of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_ROTATION if permissions are not granted.
  llGetPermissions(  ) -> integer:
    tooltip: Returns an integer bitfield representing the permissions (PERMISSION_*) currently granted to the script.
  llGetPermissionsKey(  ) -> key:
    tooltip: Returns the key (UUID) of the avatar that last granted or declined permissions to the script, or NULL_KEY if the permissions request was ignored or cancelled.
  llGiveMoney( key destination, integer amount ) -> integer:
    destination: UUID of the destination avatar.
    amount: Number of L$ to transfer (must be greater than 0).
    tooltip: Transfers the specified amount of L$ from the script owner to the destination avatar. Silently fails if the PERMISSION_DEBIT permission has not been granted. Returns 0 (use llTransferLindenDollars
      to match transactions to transaction_result events).
  llReleaseCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated. Intended to return camera control back to the avatar (use llClearCameraParams instead).
  llReleaseControls(  ) -> void:
    tooltip: Stops taking inputs (previously acquired via llTakeControls) from the avatar, dequeuing any remaining control events and revoking the PERMISSION_TAKE_CONTROLS permission.
  llRequestExperiencePermissions( key agent, string name ) -> void:
    agent: UUID of the agent to request permissions from.
    name: Deprecated parameter (no longer used).
    tooltip: Requests permission from the specified agent to participate in the experience. These permissions are persistent and apply grid-wide across all scripts in the experience, automatically triggering
      experience_permissions or experience_permissions_denied.
  llRequestPermissions( key agent, integer permissions ) -> void:
    agent: UUID of the agent in the same region.
    permissions: Bitfield containing the PERMISSION_* constants to request.
    tooltip: Requests permissions (a bitfield specified by permissions) from the agent in the same region, calling run_time_permissions if granted. This call does not pause script execution.
  llResetAnimationOverride( string anim_state ) -> void:
    anim_state: Animation state string (or 'ALL') to reset.
    tooltip: Resets the animation override for anim_state to its default value (use 'ALL' to reset all states). Requires the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llSetAnimationOverride( string anim_state, string anim ) -> void:
    anim_state: Animation state to override.
    anim: Name of an animation in the prim's inventory, or a built-in animation name.
    tooltip: Overrides the default animation for anim_state with anim (which must be in the object's inventory or a built-in animation). Requires the PERMISSION_OVERRIDE_ANIMATIONS permission.
  llSetCameraParams( list rules ) -> void:
    rules: A strided list of rules and data pairs configuring the camera.
    tooltip: Sets multiple camera parameters simultaneously using the list of rules. Requires the PERMISSION_CONTROL_CAMERA runtime permission.
  llStartAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, or the built-in animation name.
    tooltip: Starts the animation anim (inventory or built-in) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on objects).
  llStopAnimation( string anim ) -> void:
    anim: Name of the animation in the prim's inventory, the UUID of the animation, or the built-in animation name.
    tooltip: Stops the specified animation anim (inventory, built-in, or UUID) on the avatar who granted the script the PERMISSION_TRIGGER_ANIMATION permission (automatically granted for attached or sat-on
      objects).
  llTakeCamera( key avatar ) -> void // deprecated:
    avatar: UUID of the avatar in the same region.
    tooltip: Deprecated (use llSetCameraParams instead). Formerly used to take control of the agent's camera.
  llTakeControls( integer controls, integer accept, integer pass_on ) -> void:
    controls: Bitfield of CONTROL_* flags to intercept.
    accept: Boolean. Determines whether control events are generated to trigger script handlers.
    pass_on: Boolean. If TRUE, the keys also perform their default functions; if FALSE, default actions are suppressed.
    tooltip: Intercepts inputs (keyboard/mouse clicks) from the agent, specifically those specified by controls. The boolean accept determines if events are generated, and pass_on determines if inputs also
      perform their default functions. Requires the PERMISSION_TAKE_CONTROLS runtime permission.
  llTeleportAgent( key agent, string landmark, vector position, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    landmark: Name of the landmark in the prim's inventory, or an empty string to teleport locally.
    position: Position vector in local region coordinates to teleport to if landmark is empty.
    look_at: Position vector (or direction unit vector if teleporting out of region) the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to a landmark in the object's inventory. If landmark is empty, teleports them to position within the current region. Upon arrival,
      the agent is turned to face look_at. Can only teleport the owner.
  llTeleportAgentGlobalCoords( key agent, vector global_coordinates, vector region_coordinates, vector look_at ) -> void:
    agent: UUID of the owning avatar to teleport.
    global_coordinates: Global coordinates vector of the target region (obtained via llRequestSimulatorData).
    region_coordinates: Target coordinates vector within the destination region.
    look_at: Position vector within the region (or unit direction vector if out of region) that the agent faces upon landing.
    tooltip: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to region_coordinates within a target region specified by global_coordinates. Upon landing, the agent faces the direction look_at.
      Can only teleport the owner.
  llTransferLindenDollars( key destination, integer amount ) -> key:
    destination: UUID of the destination avatar.
    amount: Quantity of L$ to transfer (must be greater than 0).
    tooltip: Transfers amount of L$ from the script owner to the destination avatar, requiring the PERMISSION_DEBIT permission. Returns a key query handle matching the resulting transaction_result event.
  llWorldPosToHUD( vector world_pos ) -> vector:
    world_pos: World-frame position vector to project into HUD space.
    tooltip: Returns the local position vector that places the center of the HUD object directly over the world coordinate world_pos as viewed by the current camera. Requires the PERMISSION_TRACK_CAMERA
      runtime permission.
physics:
  collision( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered continuously while an avatar or another object is colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_end( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object stops colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  collision_start( integer num_detected ):
    num_detected: Total number of detected colliders (usable with llDetected* functions).
    tooltip: Triggered when an avatar or another object first begins colliding with the object containing the script. Passes num_detected, representing the number of detected collisions.
  land_collision( vector pos ):
    pos: Vector position of collision with the ground.
    tooltip: Triggered in the root prim when a physical object or attached avatar is colliding with the ground at position pos.
  land_collision_end( vector pos ):
    pos: Vector position of the last ground collision.
    tooltip: Triggered in the root prim when a physical object or attached avatar stops colliding with the ground at position pos.
  land_collision_start( vector pos ):
    pos: Vector position of collision with the ground.
    tooltip: Triggered in the root prim when a physical object or attached avatar first begins colliding with the ground at position pos.
  llApplyImpulse( vector momentum, integer is_local ) -> void:
    momentum: Linear impulse vector to apply.
    is_local: Boolean. If TRUE, momentum is treated as a local directional vector; if FALSE, it is treated as a global region vector.
    tooltip: Applies a linear impulse (momentum) to a physical object. If local is TRUE, the impulse is applied in local coordinates; otherwise, it is applied in global region coordinates.
  llApplyRotationalImpulse( vector force, integer is_local ) -> void:
    force: Rotational impulse vector to apply.
    is_local: Boolean. If TRUE, the force is treated as a local directional vector; if FALSE, it is treated as a global region vector.
    tooltip: Applies a rotational impulse (force) to a physical object. If local is TRUE, the rotational impulse is applied in local coordinates; otherwise, it is applied in global region coordinates.
  llCastRay( vector start_pos, vector end_pos, list options ) -> list:
    start_pos: Starting location vector of the ray.
    end_pos: Ending location vector of the ray.
    options: A list of option flags and their parameters to configure the raycast.
    tooltip: Casts a ray into the physics world from start to end and reports collision data for intersections with objects based on options. Returns a list of strided values [UUID_1, {link_number_1}, hit_position_1,
      {hit_normal_1}, ..., status_code]. A negative status_code indicates an error; otherwise, it represents the number of hits.
  llCollisionFilter( string name, key id, integer accept ) -> void:
    name: Specific object name or avatar legacy name to filter for.
    id: Group, avatar, or object UUID to filter by.
    accept: Boolean. If TRUE, only collisions matching the name and id filters are processed; if FALSE, matching collisions are excluded.
    tooltip: Sets the collision filter, either exclusively or inclusively. If accept is TRUE, only collisions matching name and id are processed; if FALSE, matches are excluded. Pass an empty string or
      NULL_KEY to name or id to skip filtering on that parameter.
  llCollisionSound( string impact_sound, float impact_volume ) -> void:
    impact_sound: UUID of a sound, the name of a sound in the prim's inventory, or an empty string to suppress sounds.
    impact_volume: Volume level to set, between 0.0 (silent) and 1.0 (loud).
    tooltip: Suppresses default collision sounds and replaces default impact sounds with impact_sound at the volume level specified by impact_volume. Supply an empty string to only suppress collision sounds.
  llGetAccel(  ) -> vector:
    tooltip: Returns a vector representing the acceleration of the object in the region's frame of reference.
  llGetCenterOfMass(  ) -> vector:
    tooltip: Returns the vector position (in region coordinates) of the center of mass. Returns the individual child prim's center of mass if called from a child, or the entire linkset's center of mass
      if called from the root.
  llGetForce(  ) -> vector:
    tooltip: Returns a vector representing the constant force currently applied to the object (if the object is physical).
  llGetGeometricCenter(  ) -> vector:
    tooltip: Returns a vector representing the geometric center of the object relative to its root prim.
  llGetMass(  ) -> float:
    tooltip: Returns a float representing the mass of the object (in lindograms). Returns the total linkset mass if called from the root, or the individual prim's mass if called from a child prim. Returns
      the wearer's mass if inside an attachment.
  llGetMassMKS(  ) -> float:
    tooltip: Returns a float representing the mass of the object in kilograms. Functionally identical to llGetMass except for using MKS (metric) units.
  llGetObjectMass( key id ) -> float:
    id: UUID of the avatar or object to query.
    tooltip: Returns a float representing the mass of the avatar or object specified by id.
  llGetOmega(  ) -> vector:
    tooltip: Returns a vector representing the physical rotation (angular velocity) of the object in radians per second.
  llGetPhysicsMaterial(  ) -> list:
    tooltip: Returns a list of the format [float gravity_multiplier, float restitution, float friction, float density] detailing the physical characteristics of the object.
  llGetStatus( integer status ) -> integer:
    status: Single STATUS_* flag to check.
    tooltip: Returns a boolean integer indicating whether the specified status flag status is enabled for the object.
  llGetTorque(  ) -> vector:
    tooltip: Returns a vector representing the physical torque force currently acting on the object (if the object is physical).
  llGetVel(  ) -> vector:
    tooltip: Returns a vector representing the velocity of the object (in meters per second) relative to the global region coordinates. For physical objects, returns the velocity of its center of mass.
  llLookAt( vector target, float strength, float damping ) -> void:
    target: Target position vector in region coordinates to look at.
    strength: Force of rotation (0.0 cancels the tracking; values around half the object's mass are typical).
    damping: Timescale in seconds to critically damp the orientation.
    tooltip: Causes the object to orient its positive Z-axis (up axis) toward the target vector, keeping its positive X-axis (forward axis) below the horizon. Tracks target until llStopLookAt is called
      or strength is set to 0.0.
  llMoveToTarget( vector target, float tau ) -> void:
    target: Target position vector in region coordinates.
    tau: Timescale in seconds to critically damp the movement.
    tooltip: Critically damps the physical object's motion to position target in tau seconds. Setting tau to 0.0 stops the critical damping; recommended tau values are greater than 0.2.
  llPassCollisions( integer pass ) -> void:
    pass: A PASS_* flag (e.g., PASS_ALWAYS, PASS_IF_NOT_HANDLED, or PASS_NEVER).
    tooltip: Sets the pass-collisions attribute. If pass is TRUE, collision events are passed from child prims to the root; if FALSE (default), they only trigger events in the affected child prim.
  llPointAt( vector pos ) -> void // private // deprecated:
    pos: Position vector to point at.
    tooltip: Directs the avatar owning the object to point at the vector pos.
  llPushObject( key target, vector impulse, vector ang_impulse, integer is_local ) -> void:
    target: UUID of the target avatar or object in the same region.
    impulse: Linear impulse vector representing the direction and force of the push.
    ang_impulse: Angular impulse vector representing the rotational force.
    is_local: Boolean. If TRUE, forces are applied relative to the target's local axes; if FALSE, relative to region axes.
    tooltip: Applies physical impulse (force) and ang_impulse (rotational force) to the specified target avatar or object.
  llRemoveVehicleFlags( integer flags ) -> void:
    flags: A bitwise mask of VEHICLE_FLAG_* constants to disable.
    tooltip: Disables the specified vehicle flags (sets them to FALSE) using the bitwise mask flags.
  llRotLookAt( rotation target_direction, float strength, float damping ) -> void:
    target_direction: Target rotation to align the object with.
    strength: Force of rotation (0.0 cancels the tracking; values around half the object's mass are typical).
    damping: Timescale in seconds to critically damp the rotation.
    tooltip: Causes the object to smoothly rotate to target_direction with a force defined by strength and damping. A strength of 0.0 cancels the rotation target. Rotation is maintained until stopped with
      llStopLookAt.
  llRotTarget( rotation rot, float error ) -> integer:
    rot: Target rotation to track.
    error: Tolerance angle in radians defining when the target rotation is considered reached.
    tooltip: Registers the rotation rot with a leeway tolerance error (in radians) as a target, triggering at_rot_target and not_at_rot_target events. Returns an integer handle to unregister the target
      via llRotTargetRemove.
  llRotTargetRemove( integer handle ) -> void:
    handle: Integer target handle returned by llRotTarget to remove.
    tooltip: Removes the rotational target specified by the integer handle registered with llRotTarget.
  llSetAgentRot( rotation rot, integer flags ) -> void:
    rot: Target rotation to turn the avatar to face.
    flags: Flags to configure the rotation behavior.
    tooltip: Sets the rotation of the avatar to rot, controlled by flags.
  llSetAngularVelocity( vector initial_omega, integer is_local ) -> void:
    initial_omega: Angular velocity vector to apply (in radians per second).
    is_local: Boolean. If TRUE, initial_omega is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Sets the angular velocity of a physical object to initial_omega (mass-independent). If local is TRUE, applied in local coordinates; if FALSE, applied in global coordinates. Has no effect on
      non-physical objects.
  llSetBuoyancy( float buoyancy ) -> void:
    buoyancy: Float buoyancy value to set.
    tooltip: Sets the buoyancy of a physical object (requires physics to be enabled). A value of 0.0 offers no buoyancy, < 1.0 sinks, 1.0 counteracts gravity, and > 1.0 rises.
  llSetForce( vector force, integer is_local ) -> void:
    force: Directional force vector to apply.
    is_local: Boolean. If TRUE, force is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Applies a constant linear force to a physical object. If local is TRUE, force is applied relative to local coordinates; if FALSE, applied relative to region coordinates.
  llSetForceAndTorque( vector force, vector torque, integer is_local ) -> void:
    force: Directional linear force vector.
    torque: Torque rotational force vector.
    is_local: Boolean. If TRUE, force and torque are treated as local vectors; if FALSE, as global region vectors.
    tooltip: Sets both the constant linear force and constant torque acting on a physical object. If local is TRUE, forces are applied in local coordinates; if FALSE, in global coordinates.
  llSetHoverHeight( float height, integer water, float tau ) -> void:
    height: Distance to hover above the ground or water.
    water: Boolean. If TRUE, hovers above water too; if FALSE, water is ignored.
    tau: Timescale in seconds to critically damp the movement.
    tooltip: Critically damps the physical object's vertical movement to hover at height (above ground, or above water if water is TRUE) in tau seconds. Do not use with vehicles; call llStopHover to cancel.
  llSetKeyframedMotion( list keyframes, list options ) -> void:
    keyframes: A strided list of the form [vector position, rotation orientation, float time] representing sequential relative keyframes (minimum time is 1/9s).
    options: A list of options (KFM_* constants) to modify playback behavior.
    tooltip: Smoothly moves a non-physical object between the positions, orientations, and times specified in the keyframes list, configured via options. Collisions with keyframed objects are ignored. An
      empty keyframes list terminates the motion.
  llSetPhysicsMaterial( integer mask, float gravity_multiplier, float restitution, float friction, float density ) -> void:
    mask: Bitwise mask combination specifying which of the floats (DENSITY, FRICTION, RESTITUTION, or GRAVITY_MULTIPLIER) to apply.
    gravity_multiplier: Gravity multiplier float value (range [-1.0, +28.0], default is 1.0).
    restitution: Elasticity restitution float value (range [0.0, 1.0]).
    friction: Friction coefficient float value (range [0.0, 255.0]).
    density: "Density float value in kg/m\xB3 (range [1.0, 22587.0])."
    tooltip: Configures the physical characteristics of an object. The mask bitfield specifies which of the other parameters (gravity_multiplier, restitution, friction, or density) should be applied to
      the object.
  llSetStatus( integer status, integer value ) -> void:
    status: Bitmask representing the STATUS_* flag(s) to change.
    value: Boolean. If TRUE, enables the status; if FALSE, disables it.
    tooltip: Sets the object status attributes specified by status to value.
  llSetTorque( vector torque, integer is_local ) -> void:
    torque: Torque rotational force vector.
    is_local: Boolean. If TRUE, torque is treated as a local vector; if FALSE, as a global region vector.
    tooltip: Applies a constant torque rotational force to a physical object. If local is TRUE, torque is applied in local coordinates; if FALSE, applied in global coordinates.
  llSetVelocity( vector velocity, integer is_local ) -> void:
    velocity: Linear velocity vector to apply (in meters per second).
    is_local: Boolean. If TRUE, velocity is treated as a local directional vector; if FALSE, as a global region vector.
    tooltip: Sets the linear velocity of a physical object to velocity. If local is TRUE, velocity is treated as a local directional vector; if FALSE, as a global region directional vector. Has no effect
      on non-physical objects.
  llStopHover(  ) -> void:
    tooltip: Stops the hover behavior (such as that initiated by llSetHoverHeight).
  llStopLookAt(  ) -> void:
    tooltip: Stops causing the object to look at or point toward a target (canceling llLookAt or llRotLookAt).
  llStopMoveToTarget(  ) -> void:
    tooltip: Stops the critically damped movement of the object toward a target (canceling llMoveToTarget). Use llStopLookAt to stop rotational tracking.
  llStopPointAt(  ) -> void // private // deprecated:
    tooltip: Stops the avatar who owns the object from pointing.
  llTargetOmega( vector axis, float spinrate, float gain ) -> void:
    axis: Local axis vector around which the object rotates.
    spinrate: Rotation rate multiplier in radians per second.
    gain: A float modulating the rotational strength (disables the rotation if set to 0.0).
    tooltip: Applies a smooth client-side rotation around the local axis at a rate equal to spinrate multiplied by the magnitude of axis (in radians per second) with a force defined by gain. Set spinrate
      to 0.0 to cancel.
  llVolumeDetect( integer detect ) -> void:
    detect: Boolean. If TRUE, enables VolumeDetect; if FALSE (default), disables it.
    tooltip: If detect is TRUE, enables VolumeDetect (object becomes phantom and physical objects/avatars can pass through it). Triggers collision_start on initial intersection and collision_end when intersection
      stops (standard collision events are suppressed while intersecting).
prim:
  llAvatarOnSitTarget(  ) -> key:
    tooltip: Returns the UUID of the avatar seated on the prim's sit target (defined via llSitTarget), or NULL_KEY if no avatar is sitting there or the prim lacks a sit target.
  llClearPrimMedia( integer face ) -> integer:
    face: Face number (side) to clear.
    tooltip: Deletes the media and clears all parameters from the specified face. Returns an integer STATUS_* flag detailing the success or failure of the operation.
  llGetAlpha( integer face ) -> float:
    face: Face number or ALL_SIDES.
    tooltip: Returns a float representing the Blinn-Phong alpha (transparency) of face. If face is ALL_SIDES, returns the mean average of all faces.
  llGetColor( integer face ) -> vector:
    face: Face number or ALL_SIDES.
    tooltip: Returns the Blinn-Phong RGB color vector of face (values between 0.0 and 1.0). If face is ALL_SIDES, returns the mean average of all faces.
  llGetCreator(  ) -> key:
    tooltip: Returns the key (UUID) of the prim's original creator.
  llGetKey(  ) -> key:
    tooltip: Returns the key (UUID) of the prim containing the script.
  llGetLinkNumber(  ) -> integer:
    tooltip: Returns the integer link number of the prim containing the script (0 for unlinked, 1 for the root, and 2+ for children).
  llGetLocalPos(  ) -> vector:
    tooltip: Returns a position vector relative to the root prim. If called from the root prim, it returns the global region position (or the position relative to the attachment point if attached).
  llGetLocalRot(  ) -> rotation:
    tooltip: Returns a rotation representing the local orientation of a child prim relative to the root prim, or the object's overall rotation if called from the root.
  llGetNumberOfSides(  ) -> integer:
    tooltip: Returns an integer representing the total number of sides (faces) of the prim containing the script.
  llGetObjectDesc(  ) -> string:
    tooltip: Returns a string containing the description of the specific prim containing the script.
  llGetObjectName(  ) -> string:
    tooltip: Returns a string containing the name of the specific prim containing the script.
  llGetPhysicsMaterial(  ) -> list:
    tooltip: Returns a list of the format [float gravity_multiplier, float restitution, float friction, float density] detailing the physical characteristics of the object.
  llGetPos(  ) -> vector:
    tooltip: Returns a vector representing the current position of the object in region coordinates.
  llGetPrimMediaParams( integer face, list params ) -> list:
    face: Face number (side) of the prim.
    params: A list of PRIM_MEDIA_* property constants to retrieve values for.
    tooltip: Returns a list containing the media parameters of the specified face, retrieved in the order requested by params. Returns an empty list if no media exists on the face.
  llGetPrimitiveParams( list params ) -> list:
    params: A list of PRIM_* flags specifying the attributes to retrieve.
    tooltip: Returns a list of primitive attribute values matching the requested params list.
  llGetRenderMaterial( integer face ) -> string:
    face: Face number or ALL_SIDES.
    tooltip: Returns a string representing the render material on face (returns the inventory name if it is in the prim's inventory, or its key UUID otherwise).
  llGetRot(  ) -> rotation:
    tooltip: Returns a rotation representing the prim's orientation relative to the region's axes.
  llGetScale(  ) -> vector:
    tooltip: Returns a vector representing the physical scale (dimensions in meters) of the prim containing the script.
  llGetTexture( integer face ) -> string:
    face: Face number or ALL_SIDES.
    tooltip: Returns a string representing the Blinn-Phong diffuse texture on face (returns the inventory name if it is a texture in the prim's inventory, or its key UUID otherwise).
  llGetTextureOffset( integer face ) -> vector:
    face: Face number or ALL_SIDES.
    tooltip: Returns a vector containing the texture offsets of face in the X (horizontal U) and Y (vertical V) components (Z is unused).
  llGetTextureRot( integer face ) -> float:
    face: Face number or ALL_SIDES.
    tooltip: Returns a float representing the texture rotation angle (in radians) on face.
  llGetTextureScale( integer face ) -> vector:
    face: Face number or ALL_SIDES.
    tooltip: Returns a vector containing the texture scales of face in the X and Y components (Z is unused).
  llOffsetTexture( float u, float v, integer face ) -> void:
    u: Horizontal (U) offset, typically in the interval [-1.0, 1.0].
    v: Vertical (V) offset, typically in the interval [-1.0, 1.0].
    face: Face number or ALL_SIDES.
    tooltip: Sets the texture horizontal (u) and vertical (v) offsets for the chosen face. If face is ALL_SIDES, offsets all faces.
  llRemoteLoadScriptPin( key target, string script, integer pin, integer running, integer start_param ) -> void:
    target: UUID of the target prim in the same region.
    script: Name of the script in the prim's inventory.
    pin: Integer PIN code (must match the PIN set on the ObjectID via llSetRemoteScriptAccessPin).
    running: Boolean. If TRUE, sets the copied script to run immediately; if FALSE, leaves it stopped.
    start_param: Integer start parameter passed to the copied script (readable via llGetStartParameter).
    tooltip: Copies the script into target, setting it running (if running is TRUE) with the start_param, provided the script owner has modify permissions on target and target's PIN matches pin (set via
      llSetRemoteScriptAccessPin).
  llRotateTexture( float angle, integer face ) -> void:
    angle: Rotation angle expressed in radians.
    face: Face number or ALL_SIDES.
    tooltip: Sets the texture rotation of face to the specified angle (in radians). If face is ALL_SIDES, rotates the texture on all faces.
  llScaleTexture( float u, float v, integer face ) -> void:
    u: Horizontal (U) texture repeats scale value, in the interval [-100.0, 100.0].
    v: Vertical (V) texture repeats scale value, in the interval [-100.0, 100.0].
    face: Face number or ALL_SIDES.
    tooltip: Sets the diffuse texture horizontal u and vertical v scales (repeats) on the specified face of the prim. Setting face to ALL_SIDES updates all sides. Negative scale values flip the texture.
  llSetAlpha( float alpha, integer face ) -> void:
    alpha: Transparency value to set, from 0.0 (clear) to 1.0 (solid; clamped to a minimum of 0.1).
    face: Face number or ALL_SIDES.
    tooltip: Sets the diffuse texture alpha (opacity) of face. If face is ALL_SIDES, applies to all faces. Values are clamped between 0.1 and 1.0 (where 1.0 is fully opaque).
  llSetColor( vector color, integer face ) -> void:
    color: Color vector in RGB <R, G, B> (values from 0.0 to 1.0).
    face: Face number or ALL_SIDES.
    tooltip: Sets the Blinn-Phong diffuse RGB color of face. If face is ALL_SIDES, applies the color to all faces.
  llSetLocalRot( rotation rot ) -> void:
    rot: Local rotation to set.
    tooltip: Sets the rotation of a child prim relative to its root prim using rot.
  llSetObjectDesc( string description ) -> void:
    description: New description string (up to 127 characters).
    tooltip: Sets the description of the prim containing the script to description (limited to 127 characters).
  llSetObjectName( string name ) -> void:
    name: New name string.
    tooltip: Sets the name of the prim containing the script to name.
  llSetPhysicsMaterial( integer mask, float gravity_multiplier, float restitution, float friction, float density ) -> void:
    mask: Bitwise mask combination specifying which of the floats (DENSITY, FRICTION, RESTITUTION, or GRAVITY_MULTIPLIER) to apply.
    gravity_multiplier: Gravity multiplier float value (range [-1.0, +28.0], default is 1.0).
    restitution: Elasticity restitution float value (range [0.0, 1.0]).
    friction: Friction coefficient float value (range [0.0, 255.0]).
    density: "Density float value in kg/m\xB3 (range [1.0, 22587.0])."
    tooltip: Configures the physical characteristics of an object. The mask bitfield specifies which of the other parameters (gravity_multiplier, restitution, friction, or density) should be applied to
      the object.
  llSetPos( vector pos ) -> void:
    pos: Position vector to move to (in region coordinates, or local coordinates if in a child prim).
    tooltip: Moves the non-physical object or prim toward the vector pos (up to 10m). If called in a child prim, pos is treated as root-relative; if called from the root prim, the entire object is moved.
  llSetPrimMediaParams( integer face, list params ) -> integer:
    face: Face number (side) of the prim.
    params: A set of property-value pairs (in no particular order) specifying media parameters.
    tooltip: Sets the media parameters specified by params on the designated face of the prim. Returns an integer STATUS_* flag detailing success or failure.
  llSetPrimURL( string url ) -> void // deprecated:
    url: Web URL to display.
    tooltip: Deprecated (use llSetPrimMediaParams instead). Updates the URL displayed on the prim's faces.
  llSetPrimitiveParams( list rules ) -> void // deprecated:
    rules: A list of PRIM_* rules and data to apply.
    tooltip: Deprecated (use llSetLinkPrimitiveParamsFast instead). Sets the prim's attributes according to rules.
  llSetRegionPos( vector position ) -> integer:
    position: Target position vector in region coordinates (can cross up to 10m over a region border).
    tooltip: Tries to move the entire object so that its root prim is within 0.1m of the vector position (underground positions are set to ground level). Returns TRUE on success or FALSE on failure.
  llSetRenderMaterial( string material, integer face ) -> void:
    material: Name of a material in the prim's inventory, or a UUID.
    face: Face number or ALL_SIDES.
    tooltip: 'Applies material (UUID or inventory name) to face of the prim. Note: This clears most PRIM_GLTF_* properties on the face except for repeats, offsets, and rotation.'
  llSetRot( rotation rot ) -> void:
    rot: Target rotation.
    tooltip: Sets the rotation of the prim to rot. If in a child prim, rot is treated as root-relative; if in the root prim of a non-physical object, rotates the entire object.
  llSetScale( vector size ) -> void:
    size: Target size vector.
    tooltip: Sets the physical scale (dimensions) of the prim containing the script to size.
  llSetSitText( string text ) -> void:
