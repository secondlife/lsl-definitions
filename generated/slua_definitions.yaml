    deprecated: true
    must-use: true
  - parameters:
    - name: name
      type: string
      comment: Specific object name or avatar legacy name to filter for.
    - name: id
      type: uuid
      comment: Group, avatar, or object UUID to filter by.
    - name: accept
      type: boolean | number
      comment: Boolean. If TRUE, only collisions matching the name and id filters
