    description: Action used with llModifyLand to raise the land.
  LAND_REVERT:
    property: read-only
    type: number
    description: Action used with llModifyLand to restore the land to its baked value.
  LAND_SMALL_BRUSH:
    property: read-only
    type: number
    description: 'Legacy small brush size (2m x 2m). Note: This constant value is
      incorrect; use LAND_BRUSH_SMALL instead.'
  LAND_SMOOTH:
    property: read-only
    type: number
    description: Action used with llModifyLand to smooth the land.
  LINKSETDATA_DELETE:
    property: read-only
    type: number
    description: Event or flag indicating a key-value pair has been removed from the
      linkset datastore, either via llLinksetDataDelete or by writing an empty value.
  LINKSETDATA_EMEMORY:
    property: read-only
    type: number
    description: Error code indicating a key-value pair was too large to write to
      the linkset datastore.
  LINKSETDATA_ENOKEY:
    property: read-only
    type: number
    description: Error code indicating the key name supplied to a linkset datastore
      operation was empty.
  LINKSETDATA_EPROTECTED:
    property: read-only
    type: number
    description: Error code indicating the key-value pair is protected from being
      deleted or overwritten in the linkset datastore.
  LINKSETDATA_MULTIDELETE:
    property: read-only
    type: number
    description: Flag or value indicating a comma-separated list of keys has been
      deleted from the linkset datastore via llLinksetDataDeleteFound.
  LINKSETDATA_NOTFOUND:
    property: read-only
    type: number
    description: Error code indicating the specified key could not be found in the
      linkset datastore.
  LINKSETDATA_NOUPDATE:
    property: read-only
    type: number
    description: Status code indicating that the linkset datastore was not updated
      because the written value matched the existing stored value.
  LINKSETDATA_OK:
    property: read-only
    type: number
    description: Status code indicating the linkset datastore operation completed
      successfully.
  LINKSETDATA_RESET:
    property: read-only
    type: number
    description: Event or flag indicating the linkset datastore has been cleared/reset
      via llLinksetDataReset.
  LINKSETDATA_UPDATE:
    property: read-only
    type: number
    description: Event or flag indicating a key in the linkset datastore has been
      created or updated with a new value via llLinksetDataWrite.
  LINK_ALL_CHILDREN:
    property: read-only
    type: number
    description: Refers to all child prims in the linkset (every prim except the root).
  LINK_ALL_OTHERS:
    property: read-only
    type: number
    description: Refers to every other prim in the linkset, excluding the prim containing
      the script.
  LINK_ROOT:
    property: read-only
    type: number
    description: Refers to the root prim of the linkset.
  LINK_SET:
    property: read-only
    type: number
    description: Refers to every prim in the linkset.
  LINK_THIS:
    property: read-only
    type: number
    description: Refers specifically to the single prim containing the running script.
  LIST_STAT_GEOMETRIC_MEAN:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the geometric mean
      of a list of numbers.
  LIST_STAT_MAX:
    property: read-only
    type: number
    description: Option used with llListStatistics to find the largest number in the
      list.
  LIST_STAT_MEAN:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the mean (average)
      of the numbers in the list.
  LIST_STAT_MEDIAN:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the median of the
      numbers in the list.
  LIST_STAT_MIN:
    property: read-only
    type: number
    description: Option used with llListStatistics to find the smallest number in
      the list.
  LIST_STAT_NUM_COUNT:
    property: read-only
    type: number
    description: Option used with llListStatistics to determine the count of float
      and integer elements in the list.
  LIST_STAT_RANGE:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the range (maximum
      value minus minimum value) of the list.
  LIST_STAT_STD_DEV:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the sample standard
      deviation of a list of numbers.
  LIST_STAT_SUM:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the sum of the numbers
      in the list.
  LIST_STAT_SUM_SQUARES:
    property: read-only
    type: number
    description: Option used with llListStatistics to calculate the sum of the squares
      of the numbers in the list.
  LOOP:
    property: read-only
    type: number
    description: Used with texture animation functions to cause the animation to loop
      continuously.
  MASK_BASE:
    property: read-only
    type: number
    description: Permissions mask option representing base permissions.
  MASK_COMBINED:
    property: read-only
    type: number
    description: Permissions mask option to include the object's inventory contents
      when calculating permissions. Can be combined with other mask flags (e.g., MASK_OWNER
      | MASK_COMBINED).
  MASK_EVERYONE:
    property: read-only
    type: number
    description: Permissions mask option representing permissions held by everyone.
  MASK_GROUP:
    property: read-only
    type: number
    description: Permissions mask option representing active group permissions.
  MASK_NEXT:
    property: read-only
    type: number
    description: Permissions mask option representing permissions the next owner will
      inherit.
  MASK_OWNER:
    property: read-only
    type: number
    description: Permissions mask option representing current owner permissions.
  NAK:
    property: read-only
    type: string
    description: Value returned by llGetNotecardLineSync (ASCII NAK surrounded by
      newlines, i.e., codes 10, 21, 10) when requested notecard data is not in the
      region's cache.
  NULL_KEY:
    struct: uuid
    description: A special string constant used as a null or empty key value.
  OBJECT_ACCOUNT_LEVEL:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve an avatar's account
      level. Returns 0 for Basic, 1 for Premium, 5 for Plus, 10 for Premium Plus,
      or -1 if the target is not an avatar.
  OBJECT_ANIMATED_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails. For an object, returns a boolean
      indicating if the root is set as 'Animated Mesh'. For an agent, returns the
      total number of 'Animated Mesh' attachments worn.
  OBJECT_ANIMATED_SLOTS_AVAILABLE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the avatar's available 'Animated
      Mesh' attachment slot count (returns 0 if the ID is not an avatar).
  OBJECT_ATTACHED_POINT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails. Returns the integer attachment
      point matching an ATTACH_* constant, or 0 if the target is not an attachment
      (e.g., an avatar or unattached object).
  OBJECT_ATTACHED_SLOTS_AVAILABLE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get an avatar's available attachment
      slot count. Returns 0 if the ID is not an avatar or if no slots are available.
  OBJECT_BODY_SHAPE_TYPE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve a float representing
      the gender/sex setting of an avatar's shape (0.0 is standard female, 1.0 is
      standard male, and values greater than or equal to 0.5 are considered male).
      Returns -1.0 if not an avatar or if no data is available.
  OBJECT_CHARACTER_TIME:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the average CPU time (in
      seconds) spent on navigation if the target is a pathfinding character. Returns
      0 for non-characters.
  OBJECT_CLICK_ACTION:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the click action of a prim.
      Returns an integer corresponding to a CLICK_ACTION_* constant (default is 0).
  OBJECT_CREATION_TIME:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the object's creation time
      (established via build-menu rezzing or mesh uploads, not via inventory/script
      rezzes, copying, or modifying). Returns an empty string for avatars.
  OBJECT_CREATOR:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the key of the prim's creator.
      Returns NULL_KEY if the ID is an avatar.
  OBJECT_DAMAGE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the amount of damage
      a prim inflicts upon collision.
  OBJECT_DAMAGE_TYPE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the type of damage
      a prim inflicts on collision. Returns an integer matching a DAMAGE_TYPE_* constant,
      a custom type, or a value repurposed by a combat system.
  OBJECT_DESC:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the prim's description.
      Returns an empty string if the ID is an avatar.
  OBJECT_GROUP:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim's group key. Returns
      NULL_KEY if the target is an avatar (which means a workaround is required to
      get an avatar's active group).
  OBJECT_GROUP_TAG:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get an avatar's active group
      tag/title. Returns an empty string if the target is not an avatar.
  OBJECT_HEALTH:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the current health
      value of an avatar or prim.
  OBJECT_HOVER_HEIGHT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the dynamic hover height
      of an avatar (default is 0.0). Returns 0.0 if not an avatar or if no data is
      available; does not reflect the shape's 'Hover' slider.
  OBJECT_LAST_OWNER_ID:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the key of the previous
      owner. For group-owned objects, returns the avatar who deeded it. Returns NULL_KEY
      for avatars, untransferred objects, or objects taken to inventory and re-rezzed.
  OBJECT_LINK_NUMBER:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the index of the prim within
      its linkset, or 0 if unlinked.
  OBJECT_LOCKED:
    property: read-only
    type: number
    description: Returns boolean, indicating if object is locked.
  OBJECT_MASS:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the total mass (in
      kilograms) of the object's linkset.
  OBJECT_MATERIAL:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the physics material
      of the object, returning an integer matching a PRIM_MATERIAL_* constant.
  OBJECT_NAME:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim's name, or the
      legacy name if the target is an avatar.
  OBJECT_OMEGA:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the rotational (angular)
      velocity of an object in radians per second.
  OBJECT_OWNER:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the owner's key. If the
      target is an avatar, their own key is returned. If group-owned, it returns NULL_KEY.
  OBJECT_PATHFINDING_TYPE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the pathfinding setting
      of an object in the region, returning an integer matching an OPT_* constant.
  OBJECT_PERMS:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the permissions of
      the object as five integers.
  OBJECT_PERMS_COMBINED:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the permissions of
      the object combined with all of its inventory items as five integers.
  OBJECT_PHANTOM:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get a boolean indicating if
      phantom is enabled on the object. Returns 0 if the target is an avatar or attachment.
  OBJECT_PHYSICS:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get a boolean indicating if
      physics is enabled on the object. Returns 0 if the target is an avatar or attachment.
  OBJECT_PHYSICS_COST:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the physics cost of the
      object.
  OBJECT_POS:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim's position in region
      coordinates. For an avatar outside the region, the returned position is relative
      to the script's region.
  OBJECT_PRIM_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim count of the object.
      Note that the script and target object must be owned by the same owner.
  OBJECT_PRIM_EQUIVALENCE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim equivalence of
      the object.
  OBJECT_RENDER_WEIGHT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the render weight (Avatar
      Rendering Cost) of an avatar based on viewer reports. Returns 0 for objects,
      -1 if unknown, and is capped at 500,000.
  OBJECT_RETURN_PARCEL:
    property: read-only
    type: number
    description: Scope flag used with llReturnObjectsByOwner to return all objects
      on the same parcel as the script owned by the specified owner. Requires the
      script owner to be an estate manager or the parcel owner.
  OBJECT_RETURN_PARCEL_OWNER:
    property: read-only
    type: number
    description: Scope flag used with llReturnObjectsByOwner to return all objects
      owned by the specified owner that are located on parcels owned by the script's
      owner.
  OBJECT_RETURN_REGION:
    property: read-only
    type: number
    description: Scope flag used with llReturnObjectsByOwner to return all objects
      in the region owned by the specified owner. Only works if the script is owned
      by the estate owner or an estate manager.
  OBJECT_REZZER_KEY:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the key of the object
      or avatar that rezzed the target object.
  OBJECT_REZ_TIME:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to retrieve the timestamp of when
      the object was rezzed.
  OBJECT_ROOT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the ID of the root prim.
      For an avatar, returns the root prim of the linkset they are sitting on (or
      the avatar's own ID if not sitting).
  OBJECT_ROT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the prim's rotation.
  OBJECT_RUNNING_SCRIPT_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the total number of running
      scripts attached to the target object or agent.
  OBJECT_SCALE:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the size (scale) of the
      object.
  OBJECT_SCRIPT_MEMORY:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the allocated script memory
      (or its upper limit) in bytes for the object or agent. This value is recomputed
      every 10-20 seconds.
  OBJECT_SCRIPT_TIME:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the average script CPU time
      (in seconds) used per frame. Reports a 30-minute average, or the average since
      entering the region if present for less than 30 minutes.
  OBJECT_SELECT_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the total number of agents/avatars
      actively selecting any link in the object. Returns 0 if the target is an avatar.
  OBJECT_SERVER_COST:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the server cost of the object.
  OBJECT_SIT_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the total number of agents
      sitting on any links in the object. Returns 0 if the target is an avatar.
  OBJECT_STREAMING_COST:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the streaming (download)
      cost of the object.
  OBJECT_TEMP_ATTACHED:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get a boolean indicating whether
      the object is temporarily attached.
  OBJECT_TEMP_ON_REZ:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get a boolean indicating if
      temporary-on-rez is enabled for the object.
  OBJECT_TEXT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the floating (hover) text
      displayed above the object.
  OBJECT_TEXT_ALPHA:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the alpha value of the floating
      (hover) text displayed above the object.
  OBJECT_TEXT_COLOR:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the color vector of the
      floating (hover) text displayed above the object.
  OBJECT_TOTAL_INVENTORY_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the total number of inventory
      items inside the object. Requires the script and target object to share the
      same owner.
  OBJECT_TOTAL_SCRIPT_COUNT:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the total number of scripts
      (both running and stopped) attached to the target object or agent.
  OBJECT_UNKNOWN_DETAIL:
    property: read-only
    type: number
    description: Flag returned by llGetObjectDetails when an invalid flag is requested.
  OBJECT_VELOCITY:
    property: read-only
    type: number
    description: Flag used with llGetObjectDetails to get the velocity vector of the
      target object.
  OBJECT_VOLUME_DETECT:
    property: read-only
    type: number
    description: Returns boolean, indicating if object is VolumeDetect.
  OPT_AVATAR:
    property: read-only
    type: number
    description: Returned for avatars.
  OPT_CHARACTER:
    property: read-only
    type: number
    description: Returned for pathfinding characters.
  OPT_EXCLUSION_VOLUME:
    property: read-only
    type: number
    description: Returned for exclusion volumes.
  OPT_LEGACY_LINKSET:
    property: read-only
    type: number
    description: Returned for movable obstacles, movable phantoms, physical, and volumedetect
      objects.
  OPT_MATERIAL_VOLUME:
    property: read-only
    type: number
    description: Returned for material volumes.
  OPT_OTHER:
    property: read-only
    type: number
    description: Returned for attachments, Linden trees, and grass.
  OPT_STATIC_OBSTACLE:
    property: read-only
    type: number
    description: Returned for static obstacles.
  OPT_WALKABLE:
    property: read-only
    type: number
    description: Returned for walkable objects.
  OVERRIDE_GLTF_BASE_ALPHA:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to set the
      alpha for the face(s). Only impacts rendering when the alpha mode is set to
      PRIM_GLTF_ALPHA_MODE_BLEND.
  OVERRIDE_GLTF_BASE_ALPHA_MASK:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to set the
      alpha cutoff level on the face(s) when the alpha mode is set to mask.
  OVERRIDE_GLTF_BASE_ALPHA_MODE:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to set the
      alpha mode on the face(s) to one of the valid blend modes.
  OVERRIDE_GLTF_BASE_COLOR_FACTOR:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to set the
      tinting color (specified in linear RGB) used for the base color. Use llsRGB2Linear
      to convert colors from Blinn-Phong to PBR.
  OVERRIDE_GLTF_BASE_DOUBLE_SIDED:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides. If set to
      TRUE, the texture on the face(s) will be rendered as double-sided.
  OVERRIDE_GLTF_EMISSIVE_FACTOR:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to set the
      tint (specified in linear RGB) used for the emissive texture on the face(s).
  OVERRIDE_GLTF_METALLIC_FACTOR:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to adjust
      the metallic factor on the specified face(s) to a value between 0 and 1.
  OVERRIDE_GLTF_ROUGHNESS_FACTOR:
    property: read-only
    type: number
    description: GLTF override setting used with llSetLinkGLTFOverrides to adjust
      the roughness factor on the specified face(s) to a value between 0 and 1.
  PARCEL_COUNT_GROUP:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the total land impact of objects
      not owned by the parcel owner but set to or owned by the parcel's group.
  PARCEL_COUNT_OTHER:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the land impact of all objects
      that are neither owned by the parcel owner nor set to or owned by the parcel's
      group.
  PARCEL_COUNT_OWNER:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the total land impact of objects
      owned by the parcel owner.
  PARCEL_COUNT_SELECTED:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the total land impact of all
      objects currently selected or sat on.
  PARCEL_COUNT_TEMP:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the total land impact of temporary
      (temp-on-rez) objects.
  PARCEL_COUNT_TOTAL:
    property: read-only
    type: number
    description: Used with llGetParcelPrimCount to get the total land impact of all
      objects on the parcel(s), excluding temporary (temp-on-rez) objects.
  PARCEL_DETAILS_AREA:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the parcel's area in
      square meters (sqm).
  PARCEL_DETAILS_DESC:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the description of
      the parcel (up to 127 characters).
  PARCEL_DETAILS_FLAGS:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the parcel flags set
      on this parcel (see llGetParcelFlags for listings and meanings).
  PARCEL_DETAILS_GROUP:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the parcel group's
      36-character key.
  PARCEL_DETAILS_ID:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the parcel's 36-character
      UUID/key.
  PARCEL_DETAILS_LANDING_LOOKAT:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the lookat vector set
      for the landing point (teleport routing) on this parcel, if any.
  PARCEL_DETAILS_LANDING_POINT:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the landing point vector
      set for this parcel, if any.
  PARCEL_DETAILS_NAME:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the name of the parcel
      (up to 63 characters).
  PARCEL_DETAILS_OWNER:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the parcel owner's
      36-character key.
  PARCEL_DETAILS_PRIM_CAPACITY:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the total prim capacity
      on this and all same-owner parcels, sim-wide (see llGetParcelMaxPrims for same-parcel-only
      and/or sim-wide reporting).
  PARCEL_DETAILS_PRIM_USED:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the total prim usage
      on this and all same-owner parcels, sim-wide (see llGetParcelPrimCount to get
      prim counts by owner, group, or temporary status).
  PARCEL_DETAILS_SCRIPT_DANGER:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to check if the script is in danger
      (due to restrictions that impact script execution) on the indicated parcel;
      see llScriptDanger.
  PARCEL_DETAILS_SEE_AVATARS:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the 'See and chat with
      residents on this parcel' avatar visibility setting.
  PARCEL_DETAILS_TP_ROUTING:
    property: read-only
    type: number
    description: Flag used with llGetParcelDetails to retrieve the teleport routing
      setting for this parcel (0 = TP_ROUTING_BLOCKED, 1 = TP_ROUTING_LANDINGP, 2
      = TP_ROUTING_FREE; rules are only enforced if a landing point is set).
  PARCEL_FLAG_ALLOW_ALL_OBJECT_ENTRY:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel allows all
      objects to enter.
  PARCEL_FLAG_ALLOW_CREATE_GROUP_OBJECTS:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if group members or scripts
      in group-deeded objects are allowed to create/rez objects on the parcel.
  PARCEL_FLAG_ALLOW_CREATE_OBJECTS:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel allows anyone
      to create objects.
  PARCEL_FLAG_ALLOW_DAMAGE:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if damage is enabled on
      the parcel.
  PARCEL_FLAG_ALLOW_FLY:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if flying is allowed on
      the parcel.
  PARCEL_FLAG_ALLOW_GROUP_OBJECT_ENTRY:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel restricts
      object entry to only group-owned and owner-owned objects.
  PARCEL_FLAG_ALLOW_GROUP_SCRIPTS:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel allows scripts
      owned by the parcel's group to run.
  PARCEL_FLAG_ALLOW_LANDMARK:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel allows landmarks
      to be created.
  PARCEL_FLAG_ALLOW_SCRIPTS:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if scripts (including outside
      scripts) are allowed to run on the parcel.
  PARCEL_FLAG_ALLOW_TERRAFORM:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel allows anyone
      to terraform the land.
  PARCEL_FLAG_LOCAL_SOUND_ONLY:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel restricts
      spatialized sounds to the parcel (preventing outside sound from being heard
      inside).
  PARCEL_FLAG_RESTRICT_PUSHOBJECT:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel restricts
      the use of llPushObject by non-owners (or non-group officers if group-owned).
  PARCEL_FLAG_USE_ACCESS_GROUP:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel limits access
      to group members.
  PARCEL_FLAG_USE_ACCESS_LIST:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel limits access
      to a specific list of residents (avatars).
  PARCEL_FLAG_USE_BAN_LIST:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel uses a ban
      list (including restricting access based on payment information).
  PARCEL_FLAG_USE_LAND_PASS_LIST:
    property: read-only
    type: number
    description: Flag used with llGetParcelFlags to check if the parcel restricts
      access via purchasable land passes (sold for L$).
  PARCEL_MEDIA_COMMAND_AGENT:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to apply the specified
      media command to the designated agent only.
  PARCEL_MEDIA_COMMAND_AUTO_ALIGN:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to toggle or set the parcel
      media option 'Auto scale content'.
  PARCEL_MEDIA_COMMAND_DESC:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel media description.
  PARCEL_MEDIA_COMMAND_LOOP:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to start the media stream
      playing from the current frame and have it loop back to the beginning when it
      reaches the end.
  PARCEL_MEDIA_COMMAND_LOOP_SET:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel's media looping variable or loop duration (which may
      have functionality limitations; see VWR-19712).
  PARCEL_MEDIA_COMMAND_PAUSE:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to pause the media stream
      on the current frame.
  PARCEL_MEDIA_COMMAND_PLAY:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to play the media stream
      from its current frame, stopping when the end is reached.
  PARCEL_MEDIA_COMMAND_SIZE:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel media pixel resolution.
  PARCEL_MEDIA_COMMAND_STOP:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to stop the media stream
      and rewind it to the first frame.
  PARCEL_MEDIA_COMMAND_TEXTURE:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel's media texture.
  PARCEL_MEDIA_COMMAND_TIME:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to jump to a specific
      timestamp in the media stream, specified in floating-point seconds.
  PARCEL_MEDIA_COMMAND_TYPE:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel media MIME type (e.g., 'text/html').
  PARCEL_MEDIA_COMMAND_UNLOAD:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList to completely unload the
      media and restore the face's original texture.
  PARCEL_MEDIA_COMMAND_URL:
    property: read-only
    type: number
    description: Command used with llParcelMediaCommandList or llParcelMediaQuery
      to get or set the parcel's media URL.
  PARCEL_SALE_AGENT:
    property: read-only
    type: number
    description: Option used with llSetParcelForSale to specify the agent ID authorized
      to buy the parcel. If none is set, any agent can purchase it.
  PARCEL_SALE_ERROR_BAD_PARAMS:
    property: read-only
    type: number
    description: Error code indicating the parameters provided to set the parcel sale
      information are invalid.
  PARCEL_SALE_ERROR_INVALID_PRICE:
    property: read-only
    type: number
    description: Error code indicating the specified parcel price is invalid (e.g.,
      less than or equal to 0).
  PARCEL_SALE_ERROR_IN_ESCROW:
    property: read-only
    type: number
    description: Error code indicating the parcel is in escrow and cannot be put up
      for sale.
  PARCEL_SALE_ERROR_NO_PARCEL:
    property: read-only
    type: number
    description: Error code indicating the parcel could not be found.
  PARCEL_SALE_ERROR_NO_PERMISSIONS:
    property: read-only
    type: number
    description: Error code indicating the script lacks the required permissions to
      set the parcel sale information.
  PARCEL_SALE_OBJECTS:
    property: read-only
    type: number
    description: Option used with llSetParcelForSale. If set to TRUE, objects on the
      parcel are included in the sale.
  PARCEL_SALE_OK:
    property: read-only
    type: number
    description: Status code indicating the parcel sale information was successfully
      set.
  PARCEL_SALE_PRICE:
    property: read-only
    type: number
    description: Option used with llSetParcelForSale to set the parcel price. If no
      authorized agent is set, the price must be greater than 0.
  PASSIVE:
    property: read-only
    type: number
    description: Identifies static or non-moving in-world objects (which do not consume
      active server resources). In llDetectedType(), indicates non-physical objects.
      In llSensor()/llSensorRepeat() filters, searches for non-physical, non-scripted,
      inactive, or non-moving physical objects.
  PASS_ALWAYS:
    property: read-only
    type: number
    description: Used with event-passing functions (e.g., llPassTouches, llPassCollisions)
      to ensure events are always passed from the child prim to the root prim, regardless
      of whether they are handled by child script handlers.
  PASS_IF_NOT_HANDLED:
    property: read-only
    type: number
    description: Used with event-passing functions (default behavior) to pass events
      from the child prim to the root prim only if there is no script handling the
      event in the child.
  PASS_NEVER:
    property: read-only
    type: number
    description: Used with event-passing functions to ensure events are never passed
      from the child prim to the root prim, regardless of whether they are handled
      by child script handlers.
  PATROL_PAUSE_AT_WAYPOINTS:
    property: read-only
    type: number
    description: Option parameter for llPatrolPoints (defaults to FALSE). If TRUE,
      the character slows down and momentarily pauses at each waypoint. If FALSE,
      the character moves to the next waypoint at full speed with no pause.
  PAYMENT_INFO_ON_FILE:
    property: read-only
    type: number
    description: Agent data flag returned by llRequestAgentData indicating if the
      user has payment information on file.
  PAYMENT_INFO_USED:
    property: read-only
    type: number
    description: Agent data flag returned by llRequestAgentData indicating if the
      user has ever used their payment information.
  PAY_DEFAULT:
    property: read-only
    type: number
    description: Used with llSetPayPrice to use the default value for the specified
      quick pay button.
  PAY_HIDE:
    property: read-only
    type: number
    description: Used with llSetPayPrice to hide the specified quick pay button completely.
  PERMISSION_ATTACH:
    property: read-only
    type: number
    description: Runtime permission that allows the script to successfully attach
      to or detach from the agent using llAttachToAvatar.
  PERMISSION_CHANGE_JOINTS:
    property: read-only
    type: number
    description: (Not yet implemented)
  PERMISSION_CHANGE_LINKS:
    property: read-only
    type: number
    description: Runtime permission that allows the script to successfully create,
      break, or modify links to other objects using llCreateLink, llBreakLink, or
      llBreakAllLinks.
  PERMISSION_CHANGE_PERMISSIONS:
    property: read-only
    type: number
    description: (Not yet implemented)
  PERMISSION_CONTROL_CAMERA:
    property: read-only
    type: number
    description: Runtime permission that allows the script to control the agent's
      camera. The agent must be sitting on or attached to the object, and permission
      is automatically revoked on standing up or detaching.
  PERMISSION_DEBIT:
    property: read-only
    type: number
    description: Runtime permission that allows the script to successfully call llGiveMoney
      or llTransferLindenDollars to debit the owner's account.
  PERMISSION_OVERRIDE_ANIMATIONS:
    property: read-only
    type: number
    description: Runtime permission that allows the script to configure and override
      default animations on the agent.
  PERMISSION_PRIVILEGED_LAND_ACCESS:
    property: read-only
    type: number
    description: Runtime permission that grants the script privileged access to land
      parcel functions, which is required to use llSetParcelForSale.
  PERMISSION_RELEASE_OWNERSHIP:
    property: read-only
    type: number
    description: (Not yet implemented)
  PERMISSION_REMAP_CONTROLS:
    property: read-only
    type: number
    description: (Not yet implemented)
  PERMISSION_RETURN_OBJECTS:
    property: read-only
    type: number
    description: Runtime permission required to use the llReturnObjectsByID and llReturnObjectsByOwner
      functions to return objects from parcels.
  PERMISSION_SILENT_ESTATE_MANAGEMENT:
    property: read-only
    type: number
    description: Runtime permission that allows the script to manage estate access
      rules via llManageEstateAccess without notifying the object owner of the changes.
  PERMISSION_TAKE_CONTROLS:
    property: read-only
    type: number
    description: Runtime permission that allows the script to successfully call the
      llTakeControls function to intercept the agent's controls.
  PERMISSION_TELEPORT:
    property: read-only
    type: number
    description: Runtime permission required to teleport the agent using the llTeleportAgent
      function.
  PERMISSION_TRACK_CAMERA:
    property: read-only
    type: number
    description: Runtime permission that allows the script to track the agent's camera
      position and rotation.
  PERMISSION_TRIGGER_ANIMATION:
    property: read-only
    type: number
    description: Runtime permission that allows the script to start or stop animations
      on the agent (such as using llStartAnimation).
  PERM_ALL:
    property: read-only
    type: number
    description: Permissions mask representing a combination of move, modify, copy,
      and transfer permissions.
  PERM_COPY:
    property: read-only
    type: number
    description: Permissions mask representing copy permission.
  PERM_MODIFY:
    property: read-only
    type: number
    description: Permissions mask representing modify permission.
  PERM_MOVE:
    property: read-only
    type: number
    description: Permissions mask representing move permission.
  PERM_TRANSFER:
    property: read-only
    type: number
    description: Permissions mask representing transfer permission.
  PI:
    property: read-only
    type: number
    description: The mathematical constant Pi (3.14159265), representing the number
      of radians in a half circle (semi-circle). When used in sensor functions, it
      specifies a full sphere scan.
  PING_PONG:
    property: read-only
    type: number
    description: Used with texture animation functions to cause the animation to play
      forward first, and then in reverse.
  PI_BY_TWO:
    property: read-only
    type: number
    description: The constant Pi/2 (1.57079633), representing the number of radians
      in a quarter circle. When used in sensor functions, it specifies a hemisphere
      scan.
  PRIM_ALLOW_UNSIT:
    property: read-only
    type: number
    description: Prim parameter for allowing or restricting manual standing for avatars
      seated on this prim within a valid experience. Ignored if the avatar was not
      seated via llSitOnLink. When restriction is active, participating seated avatars
      cannot manually stand or select another prim to sit on.
  PRIM_ALPHA_MODE:
    property: read-only
    type: number
    description: Prim parameter used to set diffuse texture alpha rendering mode attributes.
      Requires face, alpha_mode (PRIM_ALPHA_MODE_BLEND, _NONE, _MASK, or _EMISSIVE),
      and alpha_cutoff (used only for _MASK) parameters.
  PRIM_ALPHA_MODE_BLEND:
    property: read-only
    type: number
    description: Prim parameter setting for PRIM_ALPHA_MODE. Directs the face to use
      alpha blending for diffuse texture rendering (if an alpha channel exists). Also
      used as the default value to clear material settings from a prim face.
  PRIM_ALPHA_MODE_EMISSIVE:
    property: read-only
    type: number
    description: Prim parameter setting for PRIM_ALPHA_MODE. Renders the diffuse texture's
      alpha channel as an emissivity mask. Pixels render with an emissivity corresponding
      to their opacity under all lighting conditions (fully opaque pixels effectively
      render as 'full bright').
  PRIM_ALPHA_MODE_MASK:
    property: read-only
    type: number
    description: Prim parameter setting for PRIM_ALPHA_MODE. Renders the diffuse texture's
      alpha channel on a binary per-pixel basis; pixels more opaque than the alpha
      cutoff render as fully opaque, while pixels below the cutoff render as fully
      transparent.
  PRIM_ALPHA_MODE_NONE:
    property: read-only
    type: number
    description: Prim parameter setting for PRIM_ALPHA_MODE. Directs the face to ignore
      the alpha channel of the diffuse texture and render as completely opaque (default
      setting when a material face lacks an alpha channel).
  PRIM_BUMP_BARK:
    property: read-only
    type: number
    description: 'Face bump mapping setting: bark.'
  PRIM_BUMP_BLOBS:
    property: read-only
    type: number
    description: 'Face bump mapping setting: petridish (blobby amoeba-like shapes).'
  PRIM_BUMP_BRICKS:
    property: read-only
    type: number
    description: 'Face bump mapping setting: bricks.'
  PRIM_BUMP_BRIGHT:
    property: read-only
    type: number
    description: 'Face bump mapping setting: brightness (generated from highlights).'
  PRIM_BUMP_CHECKER:
    property: read-only
    type: number
    description: 'Face bump mapping setting: checker.'
  PRIM_BUMP_CONCRETE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: concrete.'
  PRIM_BUMP_DARK:
    property: read-only
    type: number
    description: 'Face bump mapping setting: darkness (generated from lowlights).'
  PRIM_BUMP_DISKS:
    property: read-only
    type: number
    description: 'Face bump mapping setting: discs (packed circles).'
  PRIM_BUMP_GRAVEL:
    property: read-only
    type: number
    description: 'Face bump mapping setting: gravel.'
  PRIM_BUMP_LARGETILE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: stonetile (large tile).'
  PRIM_BUMP_NONE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: none (no bump map).'
  PRIM_BUMP_SHINY:
    property: read-only
    type: number
    description: Prim parameter used to get or set both the shininess and bump mapping
      settings of a face.
  PRIM_BUMP_SIDING:
    property: read-only
    type: number
    description: 'Face bump mapping setting: siding.'
  PRIM_BUMP_STONE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: cutstone (blocks).'
  PRIM_BUMP_STUCCO:
    property: read-only
    type: number
    description: 'Face bump mapping setting: stucco.'
  PRIM_BUMP_SUCTION:
    property: read-only
    type: number
    description: 'Face bump mapping setting: suction (rings).'
  PRIM_BUMP_TILE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: crustytile.'
  PRIM_BUMP_WEAVE:
    property: read-only
    type: number
    description: 'Face bump mapping setting: weave.'
  PRIM_BUMP_WOOD:
    property: read-only
    type: number
    description: 'Face bump mapping setting: woodgrain.'
  PRIM_CAST_SHADOWS:
    property: read-only
    type: number
    description: Deprecated prim parameter representing shadow casting settings for
      the primitive.
  PRIM_CLICK_ACTION:
    property: read-only
    type: number
    description: Prim parameter followed by a CLICK_ACTION_* constant to specify the
      default action taken when a user clicks or touches the prim.
  PRIM_COLLISION_SOUND:
    property: read-only
    type: number
    description: Prim parameter to set the collision sound UUID and volume level for
      the prim.
  PRIM_COLOR:
    property: read-only
    type: number
    description: "Prim parameter to get or set the Blinn-Phong color and opacity of\
      \ a face.\n\ninteger face \u2013 face number or ALL_SIDES\nvector color \u2013\
      \ color in RGB <R, G, B> (<0.0, 0.0, 0.0> = black, <1.0, 1.0, 1.0> = white)\n\
      float alpha \u2013 from 0.0 (clear) to 1.0 (solid) (0.0 <= alpha <= 1.0)\n"
  PRIM_DAMAGE:
    property: read-only
    type: number
    description: Prim parameter used to get or set the damage amount and damage type
      delivered by the prim on collision.
  PRIM_DESC:
    property: read-only
    type: number
    description: Prim parameter [PRIM_DESC, string description] to get or set the
      prim's description (equivalent to llGetObjectDesc/llSetObjectDesc).
  PRIM_FLEXIBLE:
    property: read-only
    type: number
    description: "Prim parameter to get or set the prim's flexible configuration.\n\
      \ninteger boolean \u2013 TRUE enables, FALSE disables\ninteger softness \u2013\
      \ ranges from 0 to 3\nfloat gravity \u2013 ranges from -10.0 to 10.0\nfloat\
      \ friction \u2013 ranges from 0.0 to 10.0\nfloat wind \u2013 ranges from 0.0\
      \ to 10.0\nfloat tension \u2013 ranges from 0.0 to 10.0\nvector force\n"
  PRIM_FULLBRIGHT:
    property: read-only
    type: number
    description: Prim parameter [PRIM_FULLBRIGHT, integer face, integer boolean] to
      get or set whether full-bright rendering is enabled on the specified face.
  PRIM_GLOW:
    property: read-only
    type: number
    description: Prim parameter [PRIM_GLOW, integer face, float intensity] to get
      or set the glow intensity on a face (the compiler integer value is 25 if the
      named constant is rejected).
  PRIM_GLTF_ALPHA_MODE_BLEND:
    property: read-only
    type: number
    description: 'GLTF alpha mode setting for PRIM_GLTF_BASE_COLOR. Renders the material
      with transparency (alpha blending) in linear color space. Transparency from
      the texture is multiplied by the material''s opacity multiplier. Note: This
      mode can suffer from depth sorting and performance issues.'
  PRIM_GLTF_ALPHA_MODE_MASK:
    property: read-only
    type: number
    description: GLTF alpha mode setting for PRIM_GLTF_BASE_COLOR. Renders the material
      as fully opaque where the alpha value is greater than the alpha cutoff, and
      fully transparent otherwise.
  PRIM_GLTF_ALPHA_MODE_OPAQUE:
    property: read-only
    type: number
    description: GLTF alpha mode setting for PRIM_GLTF_BASE_COLOR. Ignores the alpha
      channel entirely and renders the face material as completely opaque.
  PRIM_GLTF_BASE_COLOR:
    property: read-only
    type: number
    description: Prim parameter to get or set the GLTF base color override of an object's
      face. Requires face, texture, repeats, offsets, rotation, linear_color (in linear
      space; use llsRGB2Linear), alpha_mode (PRIM_GLTF_ALPHA_MODE_*), alpha_cutoff,
      and double_sided arguments.
  PRIM_GLTF_EMISSIVE:
    property: read-only
    type: number
    description: Prim parameter to get or set the GLTF emission override of a face.
      Requires face, texture, repeats, offsets, rotation, and emissive_tint (specified
      in linear space; use llsRGB2Linear).
  PRIM_GLTF_METALLIC_ROUGHNESS:
    property: read-only
    type: number
    description: Prim parameter to get or set the GLTF occlusion/metallic/roughness
      override of a face. Requires face, texture, repeats, offsets, rotation, metallic_factor,
      and roughness_factor arguments.
  PRIM_GLTF_NORMAL:
    property: read-only
    type: number
    description: Prim parameter to get or set the GLTF normal map override of a face.
      Requires face, texture, repeats, offsets, and rotation arguments.
  PRIM_HEALTH:
    property: read-only
    type: number
    description: Prim parameter used to get or set the health of the prim. Objects
      default to 0 health.
  PRIM_HOLE_CIRCLE:
    property: read-only
    type: number
    description: Parameter used with certain PRIM_TYPE_* flags to make a circular
      hole via the hole_shape parameter.
  PRIM_HOLE_DEFAULT:
    property: read-only
    type: number
    description: Parameter used with certain PRIM_TYPE_* flags to make a hole of the
      same shape as the outer shape via the hole_shape parameter.
  PRIM_HOLE_SQUARE:
    property: read-only
    type: number
    description: Parameter used with certain PRIM_TYPE_* flags to make a squarish
      hole via the hole_shape parameter.
  PRIM_HOLE_TRIANGLE:
    property: read-only
    type: number
    description: Parameter used with certain PRIM_TYPE_* flags to make a triangular
      hole via the hole_shape parameter.
  PRIM_LINK_TARGET:
    property: read-only
    type: number
    description: Prim parameter [PRIM_LINK_TARGET, integer link_target] used to get
      or set properties for multiple linked prims within a single primitive parameters
      call.
  PRIM_MATERIAL:
    property: read-only
    type: number
    description: Prim parameter [PRIM_MATERIAL, integer PRIM_MATERIAL_*] to get or
      set the prim's material. The material determines the default collision sound,
      sprite, friction coefficient, and restitution coefficient (elasticity) without
      affecting mass.
  PRIM_MATERIAL_FLESH:
    property: read-only
    type: number
    description: 'Prim material constant: flesh.'
  PRIM_MATERIAL_GLASS:
    property: read-only
    type: number
    description: 'Prim material constant: glass (features very low friction).'
  PRIM_MATERIAL_LIGHT:
    property: read-only
    type: number
    description: Deprecated prim material constant. Light is now a face property instead
      of a prim property; equivalent functionality is achieved using [PRIM_FULLBRIGHT,
      ALL_SIDES, TRUE].
  PRIM_MATERIAL_METAL:
    property: read-only
    type: number
    description: 'Prim material constant: metal.'
  PRIM_MATERIAL_PLASTIC:
    property: read-only
    type: number
    description: 'Prim material constant: plastic.'
  PRIM_MATERIAL_RUBBER:
    property: read-only
    type: number
    description: 'Prim material constant: rubber.'
  PRIM_MATERIAL_STONE:
    property: read-only
    type: number
    description: 'Prim material constant: stone.'
  PRIM_MATERIAL_WOOD:
    property: read-only
    type: number
    description: 'Prim material constant: wood.'
  PRIM_MEDIA_ALT_IMAGE_ENABLE:
    property: read-only
    type: number
    description: 'Boolean. Gets or sets the default image state (the image a user
      sees before media is active) on a face. The default is specified by the server
      for that media type. Note: This flag is not currently implemented.'
  PRIM_MEDIA_AUTO_LOOP:
    property: read-only
    type: number
    description: Boolean. Gets or sets whether auto-looping is enabled for the face
      media.
  PRIM_MEDIA_AUTO_PLAY:
    property: read-only
    type: number
    description: Boolean. Gets or sets whether media auto-plays when a resident is
      able to view it.
  PRIM_MEDIA_AUTO_SCALE:
    property: read-only
    type: number
    description: Boolean. Gets or sets whether auto-scaling is enabled, which forces
      the media to fill the entire texture size.
  PRIM_MEDIA_AUTO_ZOOM:
    property: read-only
    type: number
    description: Boolean. Gets or sets whether clicking the media triggers auto-zoom
      and auto-focus.
  PRIM_MEDIA_CONTROLS:
    property: read-only
    type: number
    description: Integer. Gets or sets the style of media controls (can be set to
      PRIM_MEDIA_CONTROLS_STANDARD or PRIM_MEDIA_CONTROLS_MINI).
  PRIM_MEDIA_CONTROLS_MINI:
    property: read-only
    type: number
    description: Mini web navigation controls constant; does not include an address
      bar.
  PRIM_MEDIA_CONTROLS_STANDARD:
    property: read-only
    type: number
    description: Standard web navigation controls constant.
  PRIM_MEDIA_CURRENT_URL:
    property: read-only
    type: number
    description: String. Gets or sets the current URL displayed on the chosen face
      (maximum 1024 characters). Changing this URL triggers media navigation.
  PRIM_MEDIA_FIRST_CLICK_INTERACT:
    property: read-only
    type: number
    description: 'Boolean. Gets or sets what happens when someone click on a playing,
      but unfocused media face: TRUE: Does the same thing a focused media face does,
      and forwards the click to the web browser. FALSE: Focuses the media prim so
      that future clicks are forwarded to the web browser. Note: This flag only works
      on HUDs. All other media faces always behave as if this flag is FALSE.'
  PRIM_MEDIA_HEIGHT_PIXELS:
    property: read-only
    type: number
    description: Integer. Gets or sets the height of the media in pixels.
  PRIM_MEDIA_HOME_URL:
    property: read-only
    type: number
    description: String. Gets or sets the home URL for the chosen face (maximum 1024
      characters).
  PRIM_MEDIA_MAX_HEIGHT_PIXELS:
    property: read-only
    type: number
  PRIM_MEDIA_MAX_URL_LENGTH:
    property: read-only
    type: number
  PRIM_MEDIA_MAX_WHITELIST_COUNT:
    property: read-only
    type: number
  PRIM_MEDIA_MAX_WHITELIST_SIZE:
    property: read-only
    type: number
  PRIM_MEDIA_MAX_WIDTH_PIXELS:
    property: read-only
    type: number
  PRIM_MEDIA_PARAM_MAX:
    property: read-only
    type: number
  PRIM_MEDIA_PERMS_CONTROL:
    property: read-only
    type: number
    description: Integer. Gets or sets the permissions mask controlling who can see
      the media control bar (PRIM_MEDIA_PERM_ANYONE, _GROUP, _NONE, or _OWNER).
  PRIM_MEDIA_PERMS_INTERACT:
    property: read-only
    type: number
    description: Integer. Gets or sets the permissions mask controlling who can interact
      with the media (PRIM_MEDIA_PERM_ANYONE, _GROUP, _NONE, or _OWNER).
  PRIM_MEDIA_PERM_ANYONE:
    property: read-only
    type: number
  PRIM_MEDIA_PERM_GROUP:
    property: read-only
    type: number
  PRIM_MEDIA_PERM_NONE:
    property: read-only
    type: number
  PRIM_MEDIA_PERM_OWNER:
    property: read-only
    type: number
  PRIM_MEDIA_WHITELIST:
    property: read-only
    type: number
    description: String. Gets or sets the whitelist as a string of escaped, comma-separated
      URLs (supports up to 64 URLs or 1024 characters, whichever comes first).
  PRIM_MEDIA_WHITELIST_ENABLE:
    property: read-only
    type: number
    description: Boolean. Gets or sets whether media navigation is restricted to the
      URLs listed in PRIM_MEDIA_WHITELIST.
  PRIM_MEDIA_WIDTH_PIXELS:
    property: read-only
    type: number
    description: Integer. Gets or sets the width of the media in pixels.
  PRIM_NAME:
    property: read-only
    type: number
    description: Prim parameter [PRIM_NAME, string name] to get or set the prim's
      name (equivalent to llGetObjectName/llSetObjectName).
  PRIM_NORMAL:
    property: read-only
    type: number
    description: Prim parameter to get or set the Blinn-Phong normal map texture settings
      of a face. Requires face, texture, repeats, offsets, and rotation_in_radians
      arguments.
  PRIM_OMEGA:
    property: read-only
    type: number
    description: "Prim parameter to get, set, or disable a client-side physical-like\
      \ rotation (analogous to llTargetOmega).\n\nvector axis \u2013 arbitrary axis\
      \ to rotate the object around\nfloat spinrate \u2013 rate of rotation in radians\
      \ per second\nfloat gain \u2013 also modulates the final spinrate and disables\
      \ the rotation behavior if zero\n"
  PRIM_PHANTOM:
    property: read-only
    type: number
    description: Prim parameter [PRIM_PHANTOM, integer boolean] to get or set whether
      phantom status is enabled.
  PRIM_PHYSICS:
    property: read-only
    type: number
    description: Prim parameter [PRIM_PHYSICS, integer boolean] to get or set whether
      the object responds to Second Life physics.
  PRIM_PHYSICS_SHAPE_CONVEX:
    property: read-only
    type: number
    description: Physics shape type setting. Uses the convex hull of the prim shape
      to generate its physics representation (the default for mesh objects).
  PRIM_PHYSICS_SHAPE_NONE:
    property: read-only
    type: number
    description: 'Physics shape type setting. Directs the physics engine to ignore
      this prim entirely, preventing it from contributing to the linkset''s physics
      shape. Note: Cannot be applied to the root prim.'
  PRIM_PHYSICS_SHAPE_PRIM:
    property: read-only
    type: number
    description: Physics shape type setting. Uses the actual visible shape of the
      prim to determine its physics representation (the default for all non-mesh objects).
  PRIM_PHYSICS_SHAPE_TYPE:
    property: read-only
    type: number
    description: Prim parameter used to get or set the type of shape the physics engine
      uses for the prim (PRIM_PHYSICS_SHAPE_NONE, _PRIM, or _CONVEX). Mainly used
      for physics optimization.
  PRIM_POINT_LIGHT:
    property: read-only
    type: number
    description: "Prim parameter to configure local lighting.\nAccepts color in linear\
      \ space (use llsRGB2Linear to convert from sRGB).\n\ninteger boolean \u2013\
      \ TRUE enables, FALSE disables\nvector linear_color \u2013 linear color in RGB\
      \ <R, G, B&> (<0.0, 0.0, 0.0> = black, <1.0, 1.0, 1.0> = white)\nfloat intensity\
      \ \u2013 ranges from 0.0 to 1.0\nfloat radius \u2013 ranges from 0.1 to 20.0\n\
      float falloff \u2013 ranges from 0.01 to 2.0\n"
  PRIM_POSITION:
    property: read-only
    type: number
    description: Prim parameter [PRIM_POSITION, vector position] to get or set the
      position of the prim in region coordinates (or local coordinates depending on
      the script context).
  PRIM_POS_LOCAL:
    property: read-only
    type: number
    description: Prim parameter [PRIM_POS_LOCAL, vector position] to get or set the
      local position of a prim (equivalent to llGetLocalPos/llSetPos).
  PRIM_PROJECTOR:
    property: read-only
    type: number
    description: Prim parameter [PRIM_PROJECTOR, string texture, float fov, float
      focus, float ambiance] to configure light projection settings. If the prim is
      not configured as a projector, the texture key will return NULL_KEY.
  PRIM_REFLECTION_PROBE:
    property: read-only
    type: number
    description: Prim parameter to configure the object as a custom-placed reflection
      probe for Image-Based Lighting (IBL). Only affects objects inside its volume
      of influence.
  PRIM_REFLECTION_PROBE_BOX:
    property: read-only
    type: number
    description: Flag option used with PRIM_REFLECTION_PROBE. When set, the reflection
      probe volume is a box; when unset, it defaults to a sphere.
  PRIM_REFLECTION_PROBE_DYNAMIC:
    property: read-only
    type: number
    description: Flag option used with PRIM_REFLECTION_PROBE. When set, the probe
      dynamically includes avatars in its image-based lighting reflections (which
      carries a rendering performance cost).
  PRIM_REFLECTION_PROBE_MIRROR:
    property: read-only
    type: number
    description: 'Flag option used with PRIM_REFLECTION_PROBE. When set, intersecting
      low-roughness PBR materials act as mirrors. Note: Mirrors do not reflect avatars
      unless PRIM_REFLECTION_PROBE_DYNAMIC is also enabled, and they carry a performance
      cost.'
  PRIM_RENDER_MATERIAL:
    property: read-only
    type: number
    description: 'Prim parameter [PRIM_RENDER_MATERIAL, integer face, string material]
      to get or set face material settings. Note: Setting this clears most PRIM_GLTF_*
      properties on the face, except for repeats, offsets, and rotation_in_radians.'
  PRIM_ROTATION:
    property: read-only
    type: number
    description: Prim parameter [PRIM_ROTATION, rotation global_rot] to get or set
      the global rotation of the prim (equivalent to llGetRot/llSetRot; note that
      setting this on child prims may be broken).
  PRIM_ROT_LOCAL:
    property: read-only
    type: number
    description: Prim parameter [PRIM_ROT_LOCAL, rotation local_rot] to get or set
      the local rotation of a prim (equivalent to llGetLocalRot/llSetLocalRot).
  PRIM_SCRIPTED_SIT_ONLY:
    property: read-only
    type: number
    description: Prim parameter restricting manual sitting on this prim. When active,
      sitting can only be initiated via llSitOnLink; manual sitting attempts fail.
      This restriction applies even outside experience-enabled regions.
  PRIM_SCULPT_FLAG_ANIMESH:
    property: read-only
    type: number
    description: Read-only flag for PRIM_TYPE_SCULPT to query whether the object is
      an Animated Mesh (Animesh).
  PRIM_SCULPT_FLAG_INVERT:
    property: read-only
    type: number
    description: Flag for PRIM_TYPE_SCULPT to render the sculpted prim inside-out
      by inverting the normals of each polygon.
  PRIM_SCULPT_FLAG_MIRROR:
    property: read-only
    type: number
    description: Flag for PRIM_TYPE_SCULPT to render a mirror-image of the sculpted
      prim, mirrored across the X-axis.
  PRIM_SCULPT_TYPE_CYLINDER:
    property: read-only
    type: number
    description: Sculpt type option for PRIM_TYPE_SCULPT that stitches the left side
      to the right to produce a cylinder-shaped sculpted prim.
  PRIM_SCULPT_TYPE_MASK:
    property: read-only
    type: number
    description: Bitmask used when parsing sculpted prim properties (PRIM_TYPE_SCULPT)
      from llGetPrimitiveParams to separate the base sculpt type from modifying flags
      (invert or mirror).
  PRIM_SCULPT_TYPE_MESH:
    property: read-only
    type: number
    description: Sculpt type option for PRIM_TYPE_SCULPT indicating the object is
      a uploaded Mesh model.
  PRIM_SCULPT_TYPE_PLANE:
    property: read-only
    type: number
    description: Sculpt type option for PRIM_TYPE_SCULPT that performs no stitching
      or converging, producing a flat plane-shaped sculpted prim.
  PRIM_SCULPT_TYPE_SPHERE:
    property: read-only
    type: number
    description: Sculpt type option for PRIM_TYPE_SCULPT that stitches the left side
      to the right and separately converges the top and bottom to produce a sphere-shaped
      sculpted prim.
  PRIM_SCULPT_TYPE_TORUS:
    property: read-only
    type: number
    description: Sculpt type option for PRIM_TYPE_SCULPT that stitches top-to-bottom
      and left-to-right to produce a torus-shaped sculpted prim.
  PRIM_SHINY_HIGH:
    property: read-only
    type: number
    description: Sets the highest intensity legacy face shininess setting.
  PRIM_SHINY_LOW:
    property: read-only
    type: number
    description: Sets the lowest intensity legacy face shininess setting.
  PRIM_SHINY_MEDIUM:
    property: read-only
    type: number
    description: Sets a medium intensity legacy face shininess setting.
  PRIM_SHINY_NONE:
    property: read-only
    type: number
    description: Disables the legacy face shininess setting.
  PRIM_SIT_FLAGS:
    property: read-only
    type: number
    description: Prim parameter used to get or set sit-related flags currently active
      on the prim.
  PRIM_SIT_TARGET:
    property: read-only
    type: number
    description: Prim parameter [PRIM_SIT_TARGET, integer boolean, vector offset,
      rotation rot] to get or set the prim's sit target. Setting the boolean to FALSE
      deactivates the target. Unlike llLinkSitTarget, offset <0.0, 0.0, 0.0> can be
      explicitly set.
  PRIM_SIZE:
    property: read-only
    type: number
    description: Prim parameter [PRIM_SIZE, vector size] to get or set the prim's
      physical dimensions (equivalent to llGetScale/llSetScale).
  PRIM_SLICE:
    property: read-only
    type: number
    description: Prim parameter [PRIM_SLICE, vector slice] to get or set the prim's
      slice values (a shape attribute equivalent to advanced cut).
  PRIM_SPECULAR:
    property: read-only
    type: number
    description: Prim parameter to get or set the Blinn-Phong specular map texture
      settings of a face. Requires face, texture, repeats, offsets, rotation_in_radians,
      color, glossy, and environment arguments.
  PRIM_TEMP_ON_REZ:
    property: read-only
    type: number
    description: Prim parameter used to get or set the object's temporary status.
      Temporary objects live until the next garbage collection cycle (about 1 minute),
      do not count against normal prim limits, but are subject to regional limits.
  PRIM_TEXGEN:
    property: read-only
    type: number
    description: Prim parameter [PRIM_TEXGEN, integer face, integer mode] to get or
      set the texture mapping mode of the face.
  PRIM_TEXGEN_DEFAULT:
    property: read-only
    type: number
    description: Texture mapping mode setting for PRIM_TEXGEN. Specifies that texture
      repeat units are measured in texture repeats per face.
  PRIM_TEXGEN_PLANAR:
    property: read-only
    type: number
    description: Texture mapping mode setting for PRIM_TEXGEN. Specifies that texture
      repeat units are measured in repeats per half-meter (unlike the in-world editor,
      which measures in repeats per meter).
  PRIM_TEXT:
    property: read-only
    type: number
    description: Prim parameter [PRIM_TEXT, string text, vector color, float alpha]
      to get or set the object's floating/hover text (equivalent to llSetText).
  PRIM_TEXTURE:
    property: read-only
    type: number
    description: Prim parameter [PRIM_TEXTURE, integer face, string texture, vector
      repeats, vector offsets, float rotation_in_radians] to get or set the Blinn-Phong
      diffuse texture settings of a face.
  PRIM_TYPE:
    property: read-only
    type: number
    description: Prim parameter used to get or set the geometric shape type (PRIM_TYPE_*)
      and its associated parameters.
  PRIM_TYPE_BOX:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a box and
      configure its shape properties.
  PRIM_TYPE_CYLINDER:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a cylinder
      and configure its shape properties.
  PRIM_TYPE_PRISM:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a prism
      and configure its shape properties.
  PRIM_TYPE_RING:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a ring and
      configure its shape properties.
  PRIM_TYPE_SCULPT:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a sculpted
      prim (sculpty) or mesh of a specific type.
  PRIM_TYPE_SPHERE:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a sphere
      and configure its shape properties.
  PRIM_TYPE_TORUS:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a torus
      and configure its shape properties.
  PRIM_TYPE_TUBE:
    property: read-only
    type: number
    description: Shape parameter for PRIM_TYPE used to define the prim as a tube and
      configure its shape properties.
  PROFILE_NONE:
    property: read-only
    type: number
    description: Disables script profiling.
  PROFILE_SCRIPT_MEMORY:
    property: read-only
    type: number
    description: Enables script memory profiling, tracking the maximum amount of memory
      consumed while it is active.
  PSYS_PART_BF_DEST_COLOR:
    property: read-only
    type: number
    description: Scales the RGBA values by the RGBA values of the destination.
  PSYS_PART_BF_ONE:
    property: read-only
    type: number
    description: PSYS_PART_BF_ONE
  PSYS_PART_BF_ONE_MINUS_DEST_COLOR:
    property: read-only
    type: number
    description: Scales the RGBA values by the inverted RGBA values of the destination.
  PSYS_PART_BF_ONE_MINUS_SOURCE_ALPHA:
    property: read-only
    type: number
    description: Scales the RGBA values by the inverted alpha values of the particle
      source.
  PSYS_PART_BF_ONE_MINUS_SOURCE_COLOR:
    property: read-only
    type: number
    description: Scales the RGBA values by the inverted RGBA values of the particle
      source.
  PSYS_PART_BF_SOURCE_ALPHA:
    property: read-only
    type: number
    description: Scales the RGBA values by the alpha values of the particle source.
  PSYS_PART_BF_SOURCE_COLOR:
    property: read-only
    type: number
    description: Scales the RGBA values by the RGBA values of the particle source.
  PSYS_PART_BF_ZERO:
    property: read-only
    type: number
    description: Zeros out the source or destination RGBA values.
  PSYS_PART_BLEND_FUNC_DEST:
    property: read-only
    type: number
    description: Integer parameter defining the destination blending function.
  PSYS_PART_BLEND_FUNC_SOURCE:
    property: read-only
    type: number
    description: Integer parameter defining the source blending function.
  PSYS_PART_BOUNCE_MASK:
    property: read-only
    type: number
    description: Particle flag causing particles to bounce off a plane at the emitter
      object's Z height.
  PSYS_PART_EMISSIVE_MASK:
    property: read-only
    type: number
    description: Particle flag that makes particles full-bright and unaffected by
      global lighting (sunlight). Otherwise, particles are lit by current global lighting
      or local point lights.
  PSYS_PART_END_ALPHA:
    property: read-only
    type: number
    description: Float parameter that determines the ending alpha (transparency) of
      the particles.
  PSYS_PART_END_COLOR:
    property: read-only
    type: number
    description: Vector parameter <r, g, b> that determines the ending color of the
      particles.
  PSYS_PART_END_GLOW:
    property: read-only
    type: number
    description: Float parameter that determines the ending glow value of the particles.
  PSYS_PART_END_SCALE:
    property: read-only
    type: number
    description: Vector parameter <sx, sy, z> defining the ending size of the particle
      billboard in meters (z-axis value is ignored).
  PSYS_PART_FLAGS:
    property: read-only
    type: number
    description: Integer bitfield parameter specifying the simulation flags for emitted
      particles. Multiple flags can be combined using bitwise OR (|).
  PSYS_PART_FOLLOW_SRC_MASK:
    property: read-only
    type: number
    description: Particle flag causing particle positions to remain relative to the
      position and movement of the emitter. Enabling this flag disables the PSYS_SRC_BURST_RADIUS
      rule.
  PSYS_PART_FOLLOW_VELOCITY_MASK:
    property: read-only
    type: number
    description: Particle flag causing particles to rotate and orient their vertical
      'top' toward their direction of movement or emission. Otherwise, they remain
      vertically oriented with the top of the texture facing up.
  PSYS_PART_INTERP_COLOR_MASK:
    property: read-only
    type: number
    description: Particle flag causing the particle's color and alpha to smoothly
      interpolate from their START values to their END values over its lifetime.
  PSYS_PART_INTERP_SCALE_MASK:
    property: read-only
    type: number
    description: Particle flag causing the particle's size/scale to transition from
      its START setting to its END setting over its lifetime.
  PSYS_PART_MAX_AGE:
    property: read-only
    type: number
    description: Float parameter specifying the lifetime (age in seconds) of an individual
      particle before it dies.
  PSYS_PART_RIBBON_MASK:
    property: read-only
    type: number
    description: Particle flag that joins emitted particles into a continuous ribbon
      strip. Textures stretch to join adjacent edges. Width is controlled by the 'x'
      start/end scale; 'y' controls maximum visibility distance. Ribbon segments are
      not camera-facing, mimic the emitter's Z-axis, and require horizontal movement
      to render.
  PSYS_PART_START_ALPHA:
    property: read-only
    type: number
    description: Float parameter that determines the starting alpha (transparency)
      of the particles.
  PSYS_PART_START_COLOR:
    property: read-only
    type: number
    description: Vector parameter <r, g, b> that determines the starting color of
      the particles.
  PSYS_PART_START_GLOW:
    property: read-only
    type: number
    description: Float parameter that determines the starting glow value of the particles.
  PSYS_PART_START_SCALE:
    property: read-only
    type: number
    description: Vector parameter <sx, sy, z> defining the starting size of the particle
      billboard in meters (z-axis value is ignored).
  PSYS_PART_TARGET_LINEAR_MASK:
    property: read-only
    type: number
    description: Particle flag causing emitted particles to move in a straight, evenly-spaced
      line toward the PSYS_SRC_TARGET_KEY target. Ignores non-DROP patterns, radius,
      burst speeds, angles, omega, acceleration, and wind. Combining with bounce while
      target is below emitter deflects particles upward.
  PSYS_PART_TARGET_POS_MASK:
    property: read-only
    type: number
    description: Particle flag causing emitted particles to change course and travel
      toward the target specified by PSYS_SRC_TARGET_KEY during their lifetime. If
      no valid or reachable target is set, particles target the emitting prim itself.
  PSYS_PART_WIND_MASK:
    property: read-only
    type: number
    description: Particle flag that applies wind as a secondary force on the particles,
      damping their velocity toward the wind velocity.
  PSYS_SRC_ACCEL:
    property: read-only
    type: number
    description: Vector parameter <x, y, z> specifying the constant acceleration to
      apply to particles.
  PSYS_SRC_ANGLE_BEGIN:
    property: read-only
    type: number
    description: Float parameter specifying the angle in radians where particles will
      not be created (for ANGLE patterns).
  PSYS_SRC_ANGLE_END:
    property: read-only
    type: number
    description: Float parameter specifying the ending angle in radians to be filled
      with particles (for ANGLE patterns). If smaller than angle_begin, their roles
      are swapped.
  PSYS_SRC_BURST_PART_COUNT:
    property: read-only
    type: number
    description: Integer parameter specifying the number of particles to release in
      each burst.
  PSYS_SRC_BURST_RADIUS:
    property: read-only
    type: number
    description: Float parameter specifying the radial distance from the emitter's
      center at which particles are created.
  PSYS_SRC_BURST_RATE:
    property: read-only
    type: number
    description: Float parameter specifying the interval in seconds between particle
      bursts.
  PSYS_SRC_BURST_SPEED_MAX:
    property: read-only
    type: number
    description: Float parameter specifying the maximum initial speed of emitted particles.
  PSYS_SRC_BURST_SPEED_MIN:
    property: read-only
    type: number
    description: Float parameter specifying the minimum initial speed of emitted particles.
  PSYS_SRC_INNERANGLE:
    property: read-only
    type: number
    description: Float parameter specifying the inner angle of the arc for ANGLE or
      ANGLE_CONE patterns. The specified inner area will not contain particles.
  PSYS_SRC_MAX_AGE:
    property: read-only
    type: number
    description: Float parameter specifying the active duration of the particle system
      in seconds (0.0 means forever).
  PSYS_SRC_OMEGA:
    property: read-only
    type: number
    description: Vector parameter setting the angular velocity used to rotate the
      emission axis for ANGLE and ANGLE_CONE patterns.
  PSYS_SRC_OUTERANGLE:
    property: read-only
    type: number
    description: Float parameter specifying the outer angle of the arc for ANGLE or
      ANGLE_CONE patterns. The area between the outer and inner angles is filled with
      particles.
  PSYS_SRC_PATTERN:
    property: read-only
    type: number
    description: Integer parameter specifying the generation pattern (PSYS_SRC_PATTERN_*)
      used to emit particles.
  PSYS_SRC_PATTERN_ANGLE:
    property: read-only
    type: number
    description: Emission pattern that sprays particles outward in a flat circular,
      semi-circular, arc, or ray-shaped 2D area (around the prim's local X-axis) as
      defined by the start/end and inner/outer angle parameters.
  PSYS_SRC_PATTERN_ANGLE_CONE:
    property: read-only
    type: number
    description: Emission pattern that sprays particles outward in a 3D spherical,
      conical, or ring-shaped area defined by the start/end and inner/outer angle
      parameters. Can emulate the EXPLODE pattern if angles are set to 0.0 and PI.
  PSYS_SRC_PATTERN_ANGLE_CONE_EMPTY:
    property: read-only
    type: number
    description: Incomplete emission pattern that behaves identically to the DROP
      pattern. Intended to invert the ANGLE parameters to define an empty area where
      particles are not sprayed.
  PSYS_SRC_PATTERN_DROP:
    property: read-only
    type: number
    description: Emission pattern that drops particles at the source position with
      no initial velocity. Overrides burst radius, minimum speed, and maximum speed
      settings to 0.0.
  PSYS_SRC_PATTERN_EXPLODE:
    property: read-only
    type: number
    description: Emission pattern that shoots particles outward in all directions
      using the burst parameters.
  PSYS_SRC_TARGET_KEY:
    property: read-only
    type: number
    description: Key (UUID) of the target object that particles travel toward when
      PSYS_PART_TARGET_POS_MASK or PSYS_PART_TARGET_LINEAR_MASK is enabled.
  PSYS_SRC_TEXTURE:
    property: read-only
    type: number
    description: String parameter specifying the inventory name or UUID asset key
      of the texture used for the particles.
  PUBLIC_CHANNEL:
    property: read-only
    type: number
    description: Integer constant representing the open local chat channel. Passing
      this to chat functions (llSay, llWhisper, llShout) prints text to the publicly
      heard chat seen by nearby users and objects.
  PURSUIT_FUZZ_FACTOR:
    property: read-only
    type: number
    description: Option for llPursue that selects a random destination near the PURSUIT_OFFSET
      (range is 0 to 1, where 1 is most random). Requires a non-zero PURSUIT_OFFSET.
  PURSUIT_GOAL_TOLERANCE:
    property: read-only
    type: number
    description: Option for llPursue defining how close (between 0.25m and 10m) the
      character must be to consider the goal reached.
  PURSUIT_INTERCEPT:
    property: read-only
    type: number
    description: Option for llPursue specifying whether the pathfinding character
      attempts to predict and intercept the target's future location.
  PURSUIT_OFFSET:
    property: read-only
    type: number
    description: Option for llPursue specifying a constant position offset relative
      to the target for the character to navigate toward.
  PU_EVADE_HIDDEN:
    property: read-only
    type: number
    description: Path update status code triggered when an llEvade character determines
      it has successfully hidden from its pursuer.
  PU_EVADE_SPOTTED:
    property: read-only
    type: number
    description: Path update status code triggered when an llEvade character switches
      from hiding to running.
  PU_FAILURE_DYNAMIC_PATHFINDING_DISABLED:
    property: read-only
    type: number
    description: Path update failure code triggered when a character enters a region
      where dynamic pathfinding has been disabled in the Region Debug Console.
  PU_FAILURE_INVALID_GOAL:
    property: read-only
    type: number
    description: Path update failure code triggered when the specified goal is not
      on the region's navigation mesh (navmesh) and is unreachable.
  PU_FAILURE_INVALID_START:
    property: read-only
    type: number
    description: Path update failure code triggered when the character is at an unnavigable
      starting position (e.g., off the navmesh or too high above it).
  PU_FAILURE_NO_NAVMESH:
    property: read-only
    type: number
    description: Path update fatal error triggered when there is no navmesh generated
      for the region (typically indicates a server failure).
  PU_FAILURE_NO_VALID_DESTINATION:
    property: read-only
    type: number
    description: Path update failure code triggered when no reachable destinations
      remain (e.g., all patrol waypoints are blocked).
  PU_FAILURE_OTHER:
    property: read-only
    type: number
    description: Path update failure code representing an unspecified or general failure.
  PU_FAILURE_PARCEL_UNREACHABLE:
    property: read-only
    type: number
    description: Path update failure code triggered when a character is blocked from
      entering a parcel (e.g., the parcel is full or object entry was disabled after
      the navmesh was baked).
  PU_FAILURE_TARGET_GONE:
    property: read-only
    type: number
    description: Path update failure code triggered when an llPursue or llEvade target
      can no longer be tracked (e.g., they left the region or went more than ~30m
      outside region boundaries).
  PU_FAILURE_UNREACHABLE:
    property: read-only
    type: number
    description: Path update failure code triggered when a previously valid goal becomes
      unreachable (e.g., an obstacle blocks the path).
  PU_GOAL_REACHED:
    property: read-only
    type: number
    description: Path update status code triggered when the character reaches its
      goal and either stops or chooses a new goal (if wandering).
  PU_SLOWDOWN_DISTANCE_REACHED:
    property: read-only
    type: number
    description: Path update status code triggered when the character enters the slowdown
      distance near its current goal.
  RAD_TO_DEG:
    property: read-only
    type: number
    description: The constant 57.2957795 (precise value is 180/PI). Multiply a value
      in radians by this number to convert it to degrees.
  RCERR_CAST_TIME_EXCEEDED:
    property: read-only
    type: number
    description: Raycast error indicating the parcel or agent exceeded the maximum
      allocated raycast time. Waiting a few frames and retrying will usually succeed
      as resources replenish.
  RCERR_SIM_PERF_LOW:
    property: read-only
    type: number
    description: Raycast error indicating the request failed due to low simulator
      performance. Wait before retrying, and if possible, reduce scene complexity.
  RCERR_UNKNOWN:
    property: read-only
    type: number
    description: Raycast error indicating an unspecified failure.
  RC_DATA_FLAGS:
    property: read-only
    type: number
    description: Flag used with llCastRay to configure returned data.
  RC_DETECT_PHANTOM:
    property: read-only
    type: number
    description: Flag used with llCastRay. If set to TRUE (or non-zero), detects both
      phantom and volume-detect objects (they cannot be filtered individually). This
      overrides the RC_REJECT_NONPHYSICAL and RC_REJECT_PHYSICAL settings in RC_REJECT_TYPES.
  RC_GET_LINK_NUM:
    property: read-only
    type: number
    description: Flag used with llCastRay causing the results stride to include the
      specific link number that was hit.
  RC_GET_NORMAL:
    property: read-only
    type: number
    description: Flag used with llCastRay causing the results stride to include the
      surface normal vector of the impact point.
  RC_GET_ROOT_KEY:
    property: read-only
    type: number
    description: Flag used with llCastRay that returns the key of the hit object's
      root prim instead of the hit child prim.
  RC_MAX_HITS:
    property: read-only
    type: number
    description: Flag used with llCastRay to set the maximum number of hits to return
      (up to 256). To avoid performance issues, keep this value small.
  RC_REJECT_AGENTS:
    property: read-only
    type: number
    description: Flag used with llCastRay to prevent the detection of avatars.
  RC_REJECT_LAND:
    property: read-only
    type: number
    description: Flag used with llCastRay to ignore the actual terrain ground (land).
  RC_REJECT_NONPHYSICAL:
    property: read-only
    type: number
    description: Flag used with llCastRay to ignore non-physical objects.
  RC_REJECT_PHYSICAL:
    property: read-only
    type: number
    description: Flag used with llCastRay to ignore physical objects.
  RC_REJECT_TYPES:
    property: read-only
    type: number
    description: Flag used with llCastRay to define a mask for ignoring specific types
      of objects and avatars.
  REGION_FLAG_ALLOW_DAMAGE:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if the region is entirely
      damage-enabled.
  REGION_FLAG_ALLOW_DIRECT_TELEPORT:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if direct teleportation
      is allowed in the region.
  REGION_FLAG_BLOCK_FLY:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if flying is blocked/disabled
      in the region.
  REGION_FLAG_BLOCK_FLYOVER:
    property: read-only
    type: number
  REGION_FLAG_BLOCK_TERRAFORM:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if terraforming is disabled
      in the region.
  REGION_FLAG_DISABLE_COLLISIONS:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if collisions have been
      disabled in the region.
  REGION_FLAG_DISABLE_PHYSICS:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if physics has been disabled
      in the region.
  REGION_FLAG_FIXED_SUN:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if the sun's position is
      fixed in the region.
  REGION_FLAG_RESTRICT_PUSHOBJECT:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if llPushObject is restricted
      in the region.
  REGION_FLAG_SANDBOX:
    property: read-only
    type: number
    description: Flag used with llGetRegionFlags to check if the region is designated
      as a sandbox.
  REMOTE_DATA_CHANNEL:
    property: read-only
    type: number
  REMOTE_DATA_REPLY:
    property: read-only
    type: number
  REMOTE_DATA_REQUEST:
    property: read-only
    type: number
  REQUIRE_LINE_OF_SIGHT:
    property: read-only
    type: number
    description: Option flag for llPursue defining whether the character requires
      a physical line-of-sight to chase the target. When active, it will not target
      positions blocked by solid obstacles.
  RESTITUTION:
    property: read-only
    type: number
    description: Used with llSetPhysicsMaterial to enable the restitution (bounciness)
      value (must be between 0.0 and 1.0) which overrides the previous value.
  REVERSE:
    property: read-only
    type: number
    description: Used with texture animation functions to cause the animation to play
      in reverse (from end to start).
  REZ_ACCEL:
    property: read-only
    type: number
    description: Rez parameter specifying a constant acceleration force to apply to
      the rezzed object (as a [vector force, integer relative] pair). If relative
      is TRUE, the vector is in local coordinates.
  REZ_DAMAGE:
    property: read-only
    type: number
    description: Rez parameter specifying the float damage amount the rezzed object
      inflicts on an agent upon collision.
  REZ_DAMAGE_TYPE:
    property: read-only
    type: number
    description: Rez parameter specifying the integer damage type applied on collision
      (supports DAMAGE_TYPE_* constants, custom types, or a repurposed damage field).
  REZ_FLAGS:
    property: read-only
    type: number
    description: Rez parameter specifying the integer bitfield of flags to apply to
      the newly created object.
  REZ_FLAG_BLOCK_GRAB_OBJECT:
    property: read-only
    type: number
    description: Rez flag that disables grabbing on the newly rezzed object.
  REZ_FLAG_DIE_ON_COLLIDE:
    property: read-only
    type: number
    description: Rez flag causing the object to die/delete after its first collision.
  REZ_FLAG_DIE_ON_NOENTRY:
    property: read-only
    type: number
    description: Rez flag causing the object to die/delete if it attempts to enter
      an unauthorized parcel.
  REZ_FLAG_NO_COLLIDE_FAMILY:
    property: read-only
    type: number
    description: Rez flag preventing collision events from triggering when colliding
      with other objects created by the same rezzer.
  REZ_FLAG_NO_COLLIDE_OWNER:
    property: read-only
    type: number
    description: Rez flag preventing collision events from triggering when colliding
      with its owner.
  REZ_FLAG_PHANTOM:
    property: read-only
    type: number
    description: Rez flag causing the object to be created as phantom.
  REZ_FLAG_PHYSICAL:
    property: read-only
    type: number
    description: Rez flag causing the object to be created with physics enabled.
  REZ_FLAG_TEMP:
    property: read-only
    type: number
    description: Rez flag causing the object to be created as temporary.
  REZ_LOCK_AXES:
    property: read-only
    type: number
    description: Rez parameter [vector locks] used to prevent the physical object
      from rotating or spinning around specified axes. Setting a coordinate to a non-zero
      value locks that axis.
  REZ_OMEGA:
    property: read-only
    type: number
    description: Rez parameter specifying the initial angular velocity (omega) applied
      to the object. Accepts [vector axis, integer relative, float spin, float gain].
      If relative is TRUE, the axis vector is in local coordinates.
  REZ_PARAM:
    property: read-only
    type: number
    description: Rez parameter specifying the integer start parameter passed into
      the newly rezzed object's on_rez event.
  REZ_PARAM_STRING:
    property: read-only
    type: number
    description: Rez parameter specifying an initialization string (up to 1024 bytes)
      passed to the root prim of the newly rezzed object, readable via llGetStartString.
  REZ_POS:
    property: read-only
    type: number
    description: Rez parameter [vector position, integer relative, integer at_root]
      to specify where to rez the object. Can be in region coordinates or relative
      to the rezzing object, and centered on either the object's center or the root
      prim.
  REZ_ROT:
    property: read-only
    type: number
    description: Rez parameter specifying the initial rotation to apply to the newly
      rezzed object. Can be relative to the rezzing object or absolute.
  REZ_SOUND:
    property: read-only
    type: number
    description: Rez parameter [string name_or_uuid, float volume, integer loop] to
      attach and play a sound from inventory or a UUID asset key. If loop is TRUE,
      it loops continuously.
  REZ_SOUND_COLLIDE:
    property: read-only
    type: number
    description: Rez parameter [string name_or_uuid, float volume] specifying a sound
      (from inventory or a UUID asset key) to play upon collision with another object,
      the ground, or an avatar.
  REZ_VEL:
    property: read-only
    type: number
    description: Rez parameter specifying the initial velocity to apply to the object.
      Accepts [vector velocity, integer local, integer inherit]. If inherit is TRUE,
      it adds the rezzing object's velocity.
  ROTATE:
    property: read-only
    type: number
    description: Used with texture animation functions to animate the texture's rotation.
      Cannot be combined with SCALE.
  SCALE:
    property: read-only
    type: number
    description: Used with texture animation functions to animate the texture's scale.
      Cannot be combined with ROTATE.
  SCRIPTED:
    property: read-only
    type: number
    description: Identifies scripted in-world objects. In llDetectedType(), indicates
      the target has at least one active script. In llSensor()/llSensorRepeat() filters,
      searches for objects containing active scripts that are currently running.
  SIM_STAT_ACTIVE_SCRIPT_COUNT:
    property: read-only
    type: number
    description: Returns the total number of active scripts in the region.
  SIM_STAT_AGENT_COUNT:
    property: read-only
    type: number
    description: Returns the total number of agents in the region.
  SIM_STAT_AGENT_MS:
    property: read-only
    type: number
    description: Returns the time spent in the 'agent' segment of the simulation frame.
  SIM_STAT_AGENT_UPDATES:
    property: read-only
    type: number
    description: Returns the number of agent updates per second.
  SIM_STAT_AI_MS:
    property: read-only
    type: number
    description: Returns the time spent on the AI step.
  SIM_STAT_ASSET_DOWNLOADS:
    property: read-only
    type: number
    description: Returns the pending asset download count.
  SIM_STAT_ASSET_UPLOADS:
    property: read-only
    type: number
    description: Returns the pending asset upload count.
  SIM_STAT_CHILD_AGENT_COUNT:
    property: read-only
    type: number
    description: Returns the number of child (neighboring) agents in the region.
  SIM_STAT_FRAME_MS:
    property: read-only
    type: number
    description: Returns the total frame time.
  SIM_STAT_IMAGE_MS:
    property: read-only
    type: number
    description: Returns the time spent in the 'image' segment of the simulation frame.
  SIM_STAT_IO_PUMP_MS:
    property: read-only
    type: number
    description: Returns the pump IO time.
  SIM_STAT_NET_MS:
    property: read-only
    type: number
    description: Returns the time spent in the 'network' segment of the simulation
      frame.
  SIM_STAT_OTHER_MS:
    property: read-only
    type: number
    description: Returns the time spent in the main simulation 'other' segment of
      the frame, which encapsulates task, script, and miscellaneous updates.
  SIM_STAT_PACKETS_IN:
    property: read-only
    type: number
    description: Returns the average number of incoming packets per second.
  SIM_STAT_PACKETS_OUT:
    property: read-only
    type: number
    description: Returns the average number of outgoing packets per second.
  SIM_STAT_PCT_CHARS_STEPPED:
    property: read-only
    type: number
    description: Returns the percentage of pathfinding characters updated (or skipped)
      each frame, averaged over the last minute. Corresponds to the 'Characters Updated'
      stat in the viewer's Statistics Bar.
  SIM_STAT_PHYSICS_FPS:
    property: read-only
    type: number
    description: Returns the physics simulation frames per second (FPS).
  SIM_STAT_PHYSICS_MS:
    property: read-only
    type: number
    description: Returns the time spent in the 'physics' segment of the simulation
      frame.
  SIM_STAT_PHYSICS_OTHER_MS:
    property: read-only
    type: number
    description: Returns the average update time for the physics 'other' segment.
  SIM_STAT_PHYSICS_SHAPE_MS:
    property: read-only
    type: number
    description: Returns the average update time for the physics 'shape' segment.
  SIM_STAT_PHYSICS_STEP_MS:
    property: read-only
    type: number
    description: Returns the average physics step time.
  SIM_STAT_SCRIPT_EPS:
    property: read-only
    type: number
    description: Returns the number of script events per second.
  SIM_STAT_SCRIPT_MS:
    property: read-only
    type: number
    description: Returns the time spent in the 'script' segment of the simulation
      frame.
  SIM_STAT_SCRIPT_RUN_PCT:
    property: read-only
    type: number
    description: Returns the percentage of scripts run during the frame.
  SIM_STAT_SLEEP_MS:
    property: read-only
    type: number
    description: Returns the time spent sleeping.
  SIM_STAT_SPARE_MS:
    property: read-only
    type: number
    description: Returns the spare time left after the frame.
  SIM_STAT_UNACKED_BYTES:
    property: read-only
    type: number
    description: Returns the total number of unacknowledged bytes.
  SIT_FLAG_ALLOW_UNSIT:
    property: read-only
    type: number
    description: Sit flag indicating that a seated avatar is allowed to manually stand
      up (unsit) from a sit target. Applies only to agents who were seated via an
      LSL script like llSitOnLink.
  SIT_FLAG_NO_COLLIDE:
    property: read-only
    type: number
    description: Sit flag that disables the avatar's collision volume/hitbox while
      seated on this sit target.
  SIT_FLAG_NO_DAMAGE:
    property: read-only
    type: number
    description: Sit flag that prevents damage from being distributed or forwarded
      to agents sitting on this sit target.
  SIT_FLAG_SCRIPTED_ONLY:
    property: read-only
    type: number
    description: Sit flag that restricts sits to script-controlled actions only, preventing
      avatars from manually sitting on this prim.
  SIT_FLAG_SIT_TARGET:
    property: read-only
    type: number
    description: Read-only sit flag indicating whether the prim has an active sit
      target. Set or cleared using llSitTarget, llLinkSitTarget, or PRIM_SIT_TARGET,
      and read via llGetLinkSitFlags or PRIM_SIT_FLAGS.
  SIT_INVALID_AGENT:
    property: read-only
    type: number
    description: Sit error code indicating that the specified agent/avatar ID could
      not be found or is invalid.
  SIT_INVALID_LINK:
    property: read-only
    type: number
    description: Sit error code indicating that the link ID does not specify a valid
      prim, is not found, or resolves to multiple prims.
  SIT_INVALID_OBJECT:
    property: read-only
    type: number
    description: Sit error code returned when attempting to force an avatar to sit
      on an invalid target (such as an attachment) that cannot be sat upon.
  SIT_NOT_EXPERIENCE:
    property: read-only
    type: number
    description: Sit error code returned if the script is not running within a valid
      experience, lacks a valid experience key, or the experience is not permitted
      at the current location.
  SIT_NO_ACCESS:
    property: read-only
    type: number
    description: Sit error code indicating that the avatar lacks access to the parcel
      where the target prim/linkset is located.
  SIT_NO_EXPERIENCE_PERMISSION:
    property: read-only
    type: number
    description: Sit error code indicating that the agent has not granted experience
      permissions to force sits.
  SIT_NO_SIT_TARGET:
    property: read-only
    type: number
    description: Sit error code indicating that no open or available sit target could
      be found in the linkset.
  SIT_OK:
    property: read-only
    type: number
    description: Sit error code indicating that the avatar was seated successfully.
  SKY_AMBIENT:
    property: read-only
    type: number
    description: Environmental setting for the ambient color used in the scene.
  SKY_BLUE:
    property: read-only
    type: number
    description: Environmental setting containing the colors used to calculate blue
      density and blue horizon in the sky.
  SKY_CLOUDS:
    property: read-only
    type: number
    description: Environmental cloud parameters including color, coverage percentage,
      scale, variance, scroll speed (X/Y), density, detail exponents, and default
      texture status.
  SKY_CLOUD_TEXTURE:
    property: read-only
    type: number
    description: Environmental setting containing the inventory name or UUID of the
      texture used for the clouds.
  SKY_DOME:
    property: read-only
    type: number
    description: 'Environmental setting containing sky dome parameters: offset, radius,
      and maximum altitude.'
  SKY_GAMMA:
    property: read-only
    type: number
    description: Environmental setting for the gamma value applied to the scene (repurposed
      in viewer 7.0+ as the HDR Scale value in the EEP editor).
  SKY_GLOW:
    property: read-only
    type: number
    description: 'Environmental setting for sun and moon glow parameters: size and
      focus.'
  SKY_HAZE:
    property: read-only
    type: number
    description: Environmental setting containing the values used to calculate the
      light scattering impact of blue density and blue horizon on the scene.
  SKY_LIGHT:
    property: read-only
    type: number
    description: 'Environmental setting containing lighting parameters: dominant light
      direction (unit vector), current light color (fade_color in sRGB), and total
      ambient color (sRGB).'
  SKY_MOON:
    property: read-only
    type: number
    description: 'Environmental moon parameters: rotation, scale, brightness, is_default_texture,
      direction vector, ambient color, and diffuse color.'
  SKY_MOON_TEXTURE:
    property: read-only
    type: number
    description: Environmental setting containing the inventory name or UUID of the
      texture used for the moon.
  SKY_PLANET:
    property: read-only
    type: number
    description: 'Environmental planet rendering parameters: planet_radius, sky_bottom_radius,
      and sky_top_radius.'
  SKY_REFLECTION_PROBE_AMBIANCE:
    property: read-only
    type: number
    description: 'Environmental setting for the minimum ambiance value of all reflection
      probes. Note: Supported in the GLTF Materials project, requiring compatible
      viewers and testing areas.'
  SKY_REFRACTION:
    property: read-only
    type: number
    description: 'Environmental sky refraction parameters for rainbows and optical
      effects: moisture_level, droplet_radius, and ice_level.'
  SKY_STAR_BRIGHTNESS:
    property: read-only
    type: number
    description: Environmental setting for the brightness value applied to stars.
  SKY_SUN:
    property: read-only
    type: number
    description: 'Environmental sun parameters: rotation, scale, color, is_default_texture,
      direction vector, ambient color, and diffuse color.'
  SKY_SUN_TEXTURE:
    property: read-only
    type: number
    description: Environmental setting containing the inventory name or UUID of the
      texture used for the sun.
  SKY_TEXTURE_DEFAULTS:
    property: read-only
    type: number
    description: Environmental check returning 1 if the sky textures are set to their
      default values, or 0 if they use custom textures.
  SKY_TRACKS:
    property: read-only
    type: number
    description: Environmental setting containing the track altitudes used for sky
      transitions in the region.
  SMOOTH:
    property: read-only
    type: number
    description: Used with texture animation functions to cause the animation to slide
      smoothly in the X direction (or transition smoothly in SCALE/ROTATE modes) instead
      of making instant frame changes.
  SOUND_LOOP:
    property: read-only
    type: number
    description: Sound playback option that loops the sound continuously on the prim
      until stopped.
  SOUND_PLAY:
    property: read-only
    type: number
    description: Sound playback option (default) that plays the sound once, attached
      to the prim.
  SOUND_SYNC:
    property: read-only
    type: number
    description: Sound playback option that synchronizes playback to the nearest active
      sound master (see llLoopSoundMaster).
  SOUND_TRIGGER:
    property: read-only
    type: number
    description: Sound playback option that triggers a non-attached sound once at
      the prim's current location (does not move with the prim). This flag overrides
      all other sound playback options.
  SQRT2:
    property: read-only
    type: number
    description: The mathematical constant representing the square root of 2 (1.41421356).
  STATUS_BLOCK_GRAB:
    property: read-only
    type: number
    description: Status flag (default FALSE) that blocks click-and-drag grab movements
      on unlinked prims or the root prim of a linkset. Useful for preventing physical
      objects from being trivially disturbed.
  STATUS_BLOCK_GRAB_OBJECT:
    property: read-only
    type: number
    description: Status flag that blocks click-and-drag grab movements on all prims
      across the entire linkset.
  STATUS_BOUNDS_ERROR:
    property: read-only
    type: number
    description: Status code indicating that one or more arguments passed to the function
      had a bounds error.
  STATUS_CAST_SHADOWS:
    property: read-only
    type: number
    description: Unused legacy status flag intended to configure an object's ability
      to cast shadows.
  STATUS_DIE_AT_EDGE:
    property: read-only
    type: number
    description: Status flag (default TRUE) that causes the object to be deleted (and
      not returned) if it goes off-world (useful for bullets or rockets). Overridden
      by STATUS_RETURN_AT_EDGE.
  STATUS_DIE_AT_NO_ENTRY:
    property: read-only
    type: number
    description: Status flag (default FALSE) that causes the object to be deleted
      if it attempts to enter an unauthorized or full parcel. No-copy objects ignore
      this setting and remain in-world.
  STATUS_INTERNAL_ERROR:
    property: read-only
    type: number
    description: Status code indicating an internal error occurred.
  STATUS_MALFORMED_PARAMS:
    property: read-only
    type: number
    description: Status code indicating the function was called with malformed parameters.
  STATUS_NOT_FOUND:
    property: read-only
    type: number
    description: Status code indicating that the specified object or item was not
      found.
  STATUS_NOT_SUPPORTED:
    property: read-only
    type: number
    description: Status code indicating the requested feature is not supported.
  STATUS_OK:
    property: read-only
    type: number
    description: Status code indicating the function call completed successfully.
  STATUS_PHANTOM:
    property: read-only
    type: number
    description: Status flag (default FALSE) that makes the entire object phantom/non-colliding
      when set to TRUE, allowing avatars and objects to pass through it. It is a good
      idea to use this for most objects that move or rotate, but are non-physical.
      It is also useful for simulating volumetric lighting.
  STATUS_PHYSICS:
    property: read-only
    type: number
    description: Status flag (default FALSE) that controls whether the object responds
      to physical interactions, gravity, and forces.
  STATUS_RETURN_AT_EDGE:
    property: read-only
    type: number
    description: Status flag causing the object to be returned to its owner when it
      goes off-world, overriding STATUS_DIE_AT_EDGE.
  STATUS_ROTATE_X:
    property: read-only
    type: number
    description: Status flag (default TRUE) that allows physical rotation on the object's
      local X-axis. Setting to FALSE prevents physical rotation around the local X-axis.
      For example, a sit-and-spin device spins around the Z axis (up) but not around
      the X or Y axes.
  STATUS_ROTATE_Y:
    property: read-only
    type: number
    description: Status flag (default TRUE) that allows physical rotation on the object's
      local Y-axis. Setting to FALSE prevents physical rotation around the local X-axis.
      For example, a sit-and-spin device spins around the Z axis (up) but not around
      the X or Y axes.
  STATUS_ROTATE_Z:
    property: read-only
    type: number
    description: Status flag (default TRUE) that allows physical rotation on the object's
      local Z-axis. Setting to FALSE prevents physical rotation around the local Z-axis.
  STATUS_SANDBOX:
    property: read-only
    type: number
    description: Status flag (default FALSE) that restricts the object's physical
      movement to within its creation region and a short distance (10 to 20 meters)
      from its creation point to prevent it from escaping.
  STATUS_TYPE_MISMATCH:
    property: read-only
    type: number
    description: Status code indicating that one or more arguments passed to the function
      had a type mismatch.
  STATUS_WHITELIST_FAILED:
    property: read-only
    type: number
    description: Status code indicating a media domain whitelist check has failed.
  STRING_TRIM:
    property: read-only
    type: number
    description: Trims whitespace off both the beginning and the end of the string.
  STRING_TRIM_HEAD:
    property: read-only
    type: number
    description: Trims whitespace/spaces off the beginning of the string.
  STRING_TRIM_TAIL:
    property: read-only
    type: number
    description: Trims whitespace/spaces off the end of the string.
  TARGETED_EMAIL_OBJECT_OWNER:
    property: read-only
    type: number
    description: Flag used with llTargetedEmail to send the email message to the owner
      of the calling object.
  TARGETED_EMAIL_ROOT_CREATOR:
    property: read-only
    type: number
    description: Flag used with llTargetedEmail to send the email message to the creator
      of the root object.
  TERRAIN_DETAIL_1:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the texture
      or material (via UUID, inventory name, or default NULL_KEY/empty string) for
      terrain detail layer 1.
  TERRAIN_DETAIL_2:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the texture
      or material (via UUID, inventory name, or default NULL_KEY/empty string) for
      terrain detail layer 2.
  TERRAIN_DETAIL_3:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the texture
      or material (via UUID, inventory name, or default NULL_KEY/empty string) for
      terrain detail layer 3.
  TERRAIN_DETAIL_4:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the texture
      or material (via UUID, inventory name, or default NULL_KEY/empty string) for
      terrain detail layer 4.
  TERRAIN_HEIGHT_RANGE_NE:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the north-east
      height range for texture blending. Specifies low as the maximum height for texture
      1, high as the minimum height for texture 4, and lets textures 2 and 3 mix in
      between.
  TERRAIN_HEIGHT_RANGE_NW:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the north-west
      height range for texture blending. Specifies low as the maximum height for texture
      1, high as the minimum height for texture 4, and lets textures 2 and 3 mix in
      between.
  TERRAIN_HEIGHT_RANGE_SE:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the south-east
      height range for texture blending. Specifies low as the maximum height for texture
      1, high as the minimum height for texture 4, and lets textures 2 and 3 mix in
      between.
  TERRAIN_HEIGHT_RANGE_SW:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the south-west
      height range for texture blending. Specifies low as the maximum height for texture
      1, high as the minimum height for texture 4, and lets textures 2 and 3 mix in
      between.
  TERRAIN_PBR_OFFSET_1:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV offset
      vector (ignoring the Z component) for drawing terrain layer 1. Only works for
      PBR textures.
  TERRAIN_PBR_OFFSET_2:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV offset
      vector (ignoring the Z component) for drawing terrain layer 2. Only works for
      PBR textures.
  TERRAIN_PBR_OFFSET_3:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV offset
      vector (ignoring the Z component) for drawing terrain layer 3. Only works for
      PBR textures.
  TERRAIN_PBR_OFFSET_4:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV offset
      vector (ignoring the Z component) for drawing terrain layer 4. Only works for
      PBR textures.
  TERRAIN_PBR_ROTATION_1:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the rotation
      of the PBR texture for layer 1, in radians. Only works for PBR textures.
  TERRAIN_PBR_ROTATION_2:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the rotation
      of the PBR texture for layer 2, in radians. Only works for PBR textures.
  TERRAIN_PBR_ROTATION_3:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the rotation
      of the PBR texture for layer 3, in radians. Only works for PBR textures.
  TERRAIN_PBR_ROTATION_4:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the rotation
      of the PBR texture for layer 4, in radians. Only works for PBR textures.
  TERRAIN_PBR_SCALE_1:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV scale
      vector (repeats per meter, ignoring the Z component) for terrain layer 1. Only
      works for PBR textures.
  TERRAIN_PBR_SCALE_2:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV scale
      vector (repeats per meter, ignoring the Z component) for terrain layer 2. Only
      works for PBR textures.
  TERRAIN_PBR_SCALE_3:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV scale
      vector (repeats per meter, ignoring the Z component) for terrain layer 3. Only
      works for PBR textures.
  TERRAIN_PBR_SCALE_4:
    property: read-only
    type: number
    description: Terrain parameter used with llSetGroundTexture to set the UV scale
      vector (repeats per meter, ignoring the Z component) for terrain layer 4. Only
      works for PBR textures.
  TEXTURE_BLANK:
    struct: uuid
    description: The asset UUID representing the default 'Blank' texture.
  TEXTURE_DEFAULT:
    struct: uuid
  TEXTURE_MEDIA:
    struct: uuid
    description: The asset UUID representing the default 'Default Media' texture.
  TEXTURE_PLYWOOD:
    struct: uuid
    description: The asset UUID representing the default 'Plywood' texture.
  TEXTURE_TRANSPARENT:
    struct: uuid
    description: The asset UUID representing the '*Default Transparent Texture' in
      the library (included with viewers).
  TOUCH_INVALID_FACE:
    property: read-only
    type: number
    description: Value returned by llDetectedTouchFace when the touch position is
      not valid.
  TOUCH_INVALID_TEXCOORD:
    struct: vector
    description: Value returned by llDetectedTouchUV and llDetectedTouchST when the
      touch position is not valid.
  TOUCH_INVALID_VECTOR:
    struct: vector
    description: Value returned by llDetectedTouchPos, llDetectedTouchNormal, and
      llDetectedTouchBinormal when the touch position is not valid.
  TP_ROUTING_BLOCKED:
    property: read-only
    type: number
    description: Teleport routing setting indicating that direct teleporting is blocked
      on the parcel.
  TP_ROUTING_FREE:
    property: read-only
    type: number
    description: Teleport routing setting indicating that teleports are unrestricted
      on the parcel.
  TP_ROUTING_LANDINGP:
    property: read-only
    type: number
    description: Teleport routing setting indicating that teleports are routed to
      the parcel's landing point (if one has been set).
  TRANSFER_BAD_OPTS:
    property: read-only
    type: number
    description: Inventory transfer error code indicating that an invalid option was
      passed in the options list.
  TRANSFER_BAD_ROOT:
    property: read-only
    type: number
    description: Inventory transfer error code indicating that the root path specified
      in TRANSFER_DEST was invalid or resolved to nothing.
  TRANSFER_DEST:
    property: read-only
    type: number
    description: Inventory option specifying the destination root folder to transfer
      inventory into.
  TRANSFER_FLAGS:
    property: read-only
    type: number
    description: Inventory parameter specifying flags to control the behavior of inventory
      transfers.
  TRANSFER_FLAG_COPY:
    property: read-only
    type: number
    description: Inventory transfer flag that copies the transferred object and places
      it in the recipient's inventory (implies TRANSFER_FLAG_TAKE).
  TRANSFER_FLAG_RESERVED:
    property: read-only
    type: number
    description: Inventory transfer flag reserved for future expansion; do not use.
  TRANSFER_FLAG_TAKE:
    property: read-only
    type: number
    description: Inventory transfer flag that automatically removes the object from
      the world and places it in the recipient's inventory once accepted.
  TRANSFER_NO_ATTACHMENT:
    property: read-only
    type: number
    description: Inventory transfer error code indicating ownership of an attached
      object cannot be transferred.
  TRANSFER_NO_ITEMS:
    property: read-only
    type: number
    description: Inventory transfer error code indicating that the list was empty
      or contained only non-transferable items.
  TRANSFER_NO_PERMS:
    property: read-only
    type: number
    description: Inventory transfer error code indicating the object lacks transfer
      permissions.
  TRANSFER_NO_TARGET:
    property: read-only
    type: number
    description: Inventory transfer error code indicating the receiving agent could
      not be found in the current region.
  TRANSFER_OK:
    property: read-only
    type: number
    description: Status code indicating that the inventory transfer was successful
      or the transfer offer was successfully made.
  TRANSFER_THROTTLE:
    property: read-only
    type: number
    description: Inventory transfer error code indicating that the transfer rate has
      exceeded the inventory transfer throttle.
  TRAVERSAL_TYPE:
    property: read-only
    type: number
    description: Pathfinding parameter specifying the character's movement traversal
      type. Expects TRAVERSAL_TYPE_SLOW (default), _FAST, or _NONE.
  TRAVERSAL_TYPE_FAST:
    property: read-only
    type: number
  TRAVERSAL_TYPE_NONE:
    property: read-only
    type: number
  TRAVERSAL_TYPE_SLOW:
    property: read-only
    type: number
  TWO_PI:
    property: read-only
    type: number
    description: The mathematical constant representing the number of radians in a
      full circle (6.28318530, twice the value of PI).
  TYPE_FLOAT:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is a float.
  TYPE_INTEGER:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is an integer.
  TYPE_INVALID:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is invalid.
  TYPE_KEY:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is a key.
  TYPE_ROTATION:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is a rotation.
  TYPE_STRING:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is a string.
  TYPE_VECTOR:
    property: read-only
    type: number
    description: Variable type constant indicating the list entry or value is a vector.
  URL_REQUEST_DENIED:
    property: read-only
    type: string
  URL_REQUEST_GRANTED:
    property: read-only
    type: string
  VEHICLE_ANGULAR_DEFLECTION_EFFICIENCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range 0.0 to 1.0) acting as a scalar to
      modulate the strength of angular deflection, reorienting the vehicle's preferred
      axis toward its true velocity.
  VEHICLE_ANGULAR_DEFLECTION_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale for
      the vehicle to achieve full angular deflection, reorienting its preferred axis
      of motion to match its true velocity.
  VEHICLE_ANGULAR_FRICTION_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle vector parameter specifying the timescales (range [0.07,
      infinity) seconds per axis) for the exponential decay of angular velocity about
      the vehicle's preferred axes (at, left, up).
  VEHICLE_ANGULAR_MOTOR_DECAY_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale (in
      seconds) for the angular motor's magnitude and effectiveness to decay toward
      zero.
  VEHICLE_ANGULAR_MOTOR_DIRECTION:
    property: read-only
    type: number
    description: Vehicle vector parameter specifying the direction and magnitude of
      the angular velocity (in radians per second) that the vehicle's angular motor
      attempts to achieve.
  VEHICLE_ANGULAR_MOTOR_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale for
      the vehicle's angular motor to achieve full power and velocity.
  VEHICLE_BANKING_EFFICIENCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range -1.0 to 1.0) controlling banking efficiency,
      where negative values lean out of turns and positive values lean into turns.
      This parameter makes banking affect steering; use angular motors to bank. 0.0
      means no banking.
  VEHICLE_BANKING_MIX:
    property: read-only
    type: number
    description: Vehicle float parameter (range 0.0 (static) to 1.0) (dynamic) controlling
      the mix between static banking (scales only with roll angle) and dynamic banking
      (additionally scales with linear speed).
  VEHICLE_BANKING_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale for
      the banking behavior to take full effect. This is another way to scale the strength
      of the banking effect, however it affects the term that is proportional to the
      difference between what the banking behavior is trying to do, and what the vehicle
      is actually doing.
  VEHICLE_BUOYANCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range -1.0 to 1.0) defining buoyancy, where
      -1.0 represents double gravity and 1.0 represents full anti-gravity.
  VEHICLE_FLAG_BLOCK_INTERFERENCE:
    property: read-only
    type: number
    description: Vehicle flag that prevents attachments worn by passengers from pushing
      the vehicle via llPushObject or other scripting functions.
  VEHICLE_FLAG_CAMERA_DECOUPLED:
    property: read-only
    type: number
    description: Vehicle flag used with mouselook steering/banking. When set, the
      passenger's mouselook camera rotates independently of the vehicle's orientation.
  VEHICLE_FLAG_HOVER_GLOBAL_HEIGHT:
    property: read-only
    type: number
    description: Vehicle flag that forces the hover behavior to maintain a global
      height rather than hovering relative to the ground or water.
  VEHICLE_FLAG_HOVER_TERRAIN_ONLY:
    property: read-only
    type: number
    description: Vehicle flag that forces the hover behavior to ignore water height
      and hover exclusively relative to the terrain/land.
  VEHICLE_FLAG_HOVER_UP_ONLY:
    property: read-only
    type: number
    description: Vehicle flag preventing hover from pushing downward, allowing hovering
      vehicles to jump or fly above their designated hover height.
  VEHICLE_FLAG_HOVER_WATER_ONLY:
    property: read-only
    type: number
    description: Vehicle flag that forces the hover behavior to ignore terrain height
      and hover exclusively relative to water.
  VEHICLE_FLAG_LIMIT_MOTOR_UP:
    property: read-only
    type: number
    description: Vehicle flag that prevents ground vehicles from motoring upward into
      the sky. When combined with banking, banking strength decays when the vehicle
      is airborne (no longer colliding) to prevent steering mid-jump.
  VEHICLE_FLAG_LIMIT_ROLL_ONLY:
    property: read-only
    type: number
    description: Vehicle flag for vehicles with a vertical attractor that need to
      climb or dive, allowing airplanes to use the banking feature.
  VEHICLE_FLAG_MOUSELOOK_BANK:
    property: read-only
    type: number
    description: Vehicle flag that enables mouselook control, remapping left-right
      camera motions (yaw) to rotations about the vehicle's local X-axis.
  VEHICLE_FLAG_MOUSELOOK_STEER:
    property: read-only
    type: number
    description: Vehicle flag that enables steering via mouse, directing the angular
      motor to align the vehicle's local X-axis with the direction of the client-side
      camera.
  VEHICLE_FLAG_NO_DEFLECTION_UP:
    property: read-only
    type: number
    description: Vehicle flag that prevents linear deflection parallel to the world
      Z-axis, preventing ground vehicles (such as bumper cars) from climbing into
      the sky.
  VEHICLE_FLAG_NO_FLY_UP:
    property: read-only
    type: number
    description: Obsolete legacy name for VEHICLE_FLAG_NO_DEFLECTION_UP.
  VEHICLE_HOVER_EFFICIENCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range 0.0 to 1.0) controlling hover damping,
      where 0.0 is bouncy and 1.0 is critically damped.
  VEHICLE_HOVER_HEIGHT:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the height at which the vehicle
      attempts to hover. Set to 0.0 to disable hover.
  VEHICLE_HOVER_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the timescale (period of time
      in seconds) for the vehicle to achieve its hover height.
  VEHICLE_LINEAR_DEFLECTION_EFFICIENCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range 0.0 to 1.0) modulating the efficiency
      and strength of linear deflection. That is, its a simple scalar for modulating
      the strength of linear deflection.
  VEHICLE_LINEAR_DEFLECTION_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale for
      the vehicle to redirect its linear velocity along its preferred X-axis. It is
      another way to specify how much time it takes for the vehicle's linear velocity
      to be redirected to its preferred axis of motion.
  VEHICLE_LINEAR_FRICTION_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle vector parameter specifying the timescales (range [0.07,
      infinity) seconds per axis) for the exponential decay of linear velocity along
      the vehicle's preferred axes (at, left, up).
  VEHICLE_LINEAR_MOTOR_DECAY_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale (in
      seconds) for the linear motor's magnitude and effectiveness to decay toward
      zero.
  VEHICLE_LINEAR_MOTOR_DIRECTION:
    property: read-only
    type: number
    description: Vehicle vector parameter specifying the direction and magnitude of
      the linear velocity (range [0, 30] m/s) that the vehicle's linear motor attempts
      to achieve.
  VEHICLE_LINEAR_MOTOR_OFFSET:
    property: read-only
    type: number
    description: Vehicle vector parameter specifying the offset from the vehicle's
      center of mass where the linear motor force is applied.
  VEHICLE_LINEAR_MOTOR_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale for
      the vehicle to reach its full linear motor velocity.
  VEHICLE_REFERENCE_FRAME:
    property: read-only
    type: number
    description: Vehicle rotation parameter setting the orientation of the vehicle's
      preferred axes of motion (at, left, up) relative to its local geometric frame
      (x, y, z).
  VEHICLE_TYPE_AIRPLANE:
    property: read-only
    type: number
    description: Vehicle type constant for aircraft that use linear deflection for
      lift, banking to turn, and no hover.
  VEHICLE_TYPE_BALLOON:
    property: read-only
    type: number
    description: Vehicle type constant for balloons that use hover and friction but
      no deflection.
  VEHICLE_TYPE_BOAT:
    property: read-only
    type: number
    description: Vehicle type constant for boats that hover over water with high friction
      and minor angular deflection.
  VEHICLE_TYPE_CAR:
    property: read-only
    type: number
    description: Vehicle type constant for land vehicles that bounce along the ground
      and rely on external controls or timer events to drive their motors.
  VEHICLE_TYPE_NONE:
    property: read-only
    type: number
    description: Constant used to disable and turn off vehicle physics support on
      the object.
  VEHICLE_TYPE_SLED:
    property: read-only
    type: number
    description: Vehicle type constant for sliding vehicles that bump along the ground
      and prefer to move along their local X-axis.
  VEHICLE_VERTICAL_ATTRACTION_EFFICIENCY:
    property: read-only
    type: number
    description: Vehicle float parameter (range 0.0 to 1.0) controlling vertical attraction
      stability (0.0 is wobbly/bouncy, 1.0 is critically damped/firm) to keep the
      vehicle upright.
  VEHICLE_VERTICAL_ATTRACTION_TIMESCALE:
    property: read-only
    type: number
    description: Vehicle float parameter specifying the exponential timescale (in
      seconds) for the vehicle to rotate and align its local Z-axis (up) with the
      world Z-axis (vertical).
  VERTICAL:
    property: read-only
    type: number
    description: Constant indicating that the collision capsule orientation for a
      pathfinding character is vertical.
  WANDER_PAUSE_AT_WAYPOINTS:
    property: read-only
    type: number
    description: Option parameter for llWanderWithin specifying whether the character
      should pause briefly after reaching each wander waypoint.
  WATER_BLUR_MULTIPLIER:
    property: read-only
    type: number
    description: Environmental setting specifying the multiplier applied to blur the
      scene when underwater.
  WATER_FOG:
    property: read-only
    type: number
    description: 'Environmental underwater fog parameters: color, density exponent,
      and modulation.'
  WATER_FRESNEL:
    property: read-only
    type: number
    description: 'Environmental water surface Fresnel scattering parameters: offset
      and scale.'
  WATER_NORMAL_SCALE:
    property: read-only
    type: number
    description: Environmental setting specifying the scaling vector applied to the
      water normal map.
  WATER_NORMAL_TEXTURE:
    property: read-only
    type: number
    description: Environmental setting containing the inventory name or UUID of the
      normal map texture used for water waves.
  WATER_REFRACTION:
    property: read-only
    type: number
    description: 'Environmental water surface refraction scale factors: scale_above
      and scale_below.'
  WATER_TEXTURE_DEFAULTS:
    property: read-only
    type: number
    description: Environmental check returning 1 if default water wave maps are used,
      or 0 if a custom texture is set.
  WATER_WAVE_DIRECTION:
    property: read-only
    type: number
    description: Environmental wave direction vectors (X is east/west, Y is north/south)
      specifying speeds and directions for both large and small waves.
  XP_ERROR_EXPERIENCES_DISABLED:
    property: read-only
    type: number
    description: The region currently has experiences disabled.
  XP_ERROR_EXPERIENCE_DISABLED:
    property: read-only
    type: number
    description: The experience owner has temporarily disabled the experience.
  XP_ERROR_EXPERIENCE_SUSPENDED:
    property: read-only
    type: number
    description: The experience has been suspended by Linden Lab customer support.
  XP_ERROR_INVALID_EXPERIENCE:
    property: read-only
    type: number
    description: The script is associated with an experience that no longer exists.
  XP_ERROR_INVALID_PARAMETERS:
    property: read-only
    type: number
    description: One of the string arguments was too big to fit in the key-value store.
  XP_ERROR_KEY_NOT_FOUND:
    property: read-only
    type: number
    description: The requested key does not exist.
  XP_ERROR_MATURITY_EXCEEDED:
    property: read-only
    type: number
    description: The content rating of the experience exceeds that of the region.
  XP_ERROR_NONE:
    property: read-only
    type: number
    description: No error was detected.
  XP_ERROR_NOT_FOUND:
    property: read-only
    type: number
    description: The sim was unable to verify the validity of the experience. Retrying
      after a short wait is advised.
  XP_ERROR_NOT_PERMITTED:
    property: read-only
    type: number
    description: This experience is not allowed to run by the requested agent, or
      experience permissions were denied by the user.
  XP_ERROR_NOT_PERMITTED_LAND:
    property: read-only
    type: number
    description: The experience is blocked or not enabled for this land, or is not
      allowed to run in the current region.
  XP_ERROR_NO_EXPERIENCE:
    property: read-only
    type: number
    description: This script is not associated with an experience.
  XP_ERROR_QUOTA_EXCEEDED:
    property: read-only
    type: number
    description: An attempt to write data to the key-value store failed due to the
      data quota being met.
  XP_ERROR_REQUEST_PERM_TIMEOUT:
    property: read-only
    type: number
    description: The request for experience permissions was ignored and the request
      timed out without modification.
  XP_ERROR_RETRY_UPDATE:
    property: read-only
    type: number
    description: A checked update failed due to an out of date request.
  XP_ERROR_STORAGE_EXCEPTION:
    property: read-only
    type: number
    description: Unable to communicate with the key-value store, or attempted to create
      a key that already exists.
  XP_ERROR_STORE_DISABLED:
    property: read-only
    type: number
    description: The key-value store is currently disabled on this region.
  XP_ERROR_THROTTLED:
    property: read-only
    type: number
    description: The call failed due to too many recent calls.
  XP_ERROR_UNKNOWN_ERROR:
    property: read-only
    type: number
    description: An unknown error occurred that is not covered by any of the other
      predetermined error states.
  ZERO_ROTATION:
    struct: quaternion
    description: A rotation constant representing an identity rotation (causes no
      change). This is the default value for rotation variables.
  ZERO_VECTOR:
    struct: vector
    description: A vector constant representing <0.0, 0.0, 0.0>. This is the default
      value for vector variables.
  _G:
    property: read-only
