  DAMAGEABLE:
    property: read-only
    type: number
    description: Identifies objects in the world that can process damage. In llDetectedType,
      it indicates a damageable agent, or an object containing a script with on_damage
      or final_damage events. Can also filter llSensor/llSensorRepeat calls.
  DAMAGE_TYPE_ACID:
    property: read-only
    type: number
    description: Damage caused by a caustic substance, such as acid.
  DAMAGE_TYPE_BLUDGEONING:
    property: read-only
    type: number
    description: Damage caused by a blunt object, such as a club.
  DAMAGE_TYPE_COLD:
    property: read-only
    type: number
    description: Damage inflicted by exposure to extreme cold.
  DAMAGE_TYPE_ELECTRIC:
    property: read-only
    type: number
    description: Damage caused by electricity.
  DAMAGE_TYPE_EMOTIONAL:
    property: read-only
    type: number
  DAMAGE_TYPE_FIRE:
    property: read-only
    type: number
    description: Damage inflicted by exposure to heat or flames.
  DAMAGE_TYPE_FORCE:
    property: read-only
    type: number
    description: Damage inflicted by a great force or impact (Vertical Sim / SLMC).
  DAMAGE_TYPE_GENERIC:
    property: read-only
    type: number
    description: Generic or legacy damage.
  DAMAGE_TYPE_IMPACT:
    property: read-only
    type: number
    description: System damage generated by impact with land, terrain, or a prim.
  DAMAGE_TYPE_NECROTIC:
    property: read-only
    type: number
    description: Damage caused by a direct assault on the life-force.
  DAMAGE_TYPE_PIERCING:
    property: read-only
    type: number
    description: Damage caused by a piercing object such as a bullet, spear, or arrow
      (Vertical Sim / SLMC).
  DAMAGE_TYPE_POISON:
    property: read-only
    type: number
    description: Damage caused by poison.
  DAMAGE_TYPE_PSYCHIC:
    property: read-only
    type: number
    description: Damage caused by a direct assault on the mind.
  DAMAGE_TYPE_RADIANT:
    property: read-only
    type: number
    description: Damage caused by radiation or extreme light.
  DAMAGE_TYPE_SLASHING:
    property: read-only
    type: number
    description: Damage caused by a slashing object such as a sword or axe.
  DAMAGE_TYPE_SONIC:
    property: read-only
    type: number
    description: Damage caused by loud noises, like a Crash Worship concert.
  DATA_BORN:
    property: read-only
    type: number
    description: Used with llRequestAgentData to return the agent's account creation
      ('born on') date as a string in ISO 8601 format (YYYY-MM-DD), based on Pacific
      Time (not UTC).
  DATA_NAME:
    property: read-only
    type: number
    description: Used with llRequestAgentData to return the requested agent's legacy
      name.
  DATA_ONLINE:
    property: read-only
    type: number
    description: 'Used with llRequestAgentData to return whether the requested agent
      is online (returns an integer boolean string: TRUE if online, FALSE if offline).'
  DATA_PAYINFO:
    property: read-only
    type: number
    description: Used with llRequestAgentData to return a string containing the integer
      mask flag for payment status (contains PAYMENT_INFO_ON_FILE, PAYMENT_INFO_USED,
      or both).
  DATA_RATING:
    property: read-only
    type: number
    description: Deprecated. Used with llRequestAgentData to return the string '0,
      0, 0, 0, 0, 0'. It formerly returned a comma-separated list of positive and
      negative ratings (behavior, appearance, and building) before ratings were removed
      from SL.
  DATA_RESERVED_0:
    property: read-only
    type: number
    description: Reserved for Linden use.
  DATA_SIM_POS:
    property: read-only
    type: number
    description: Used with llRequestSimulatorData to return the region's global position
      as a vector.
  DATA_SIM_RATING:
    property: read-only
    type: number
    description: Used with llRequestSimulatorData to return the simulator rating string
      ('PG', 'MATURE', 'ADULT', or 'UNKNOWN').
  DATA_SIM_STATUS:
    property: read-only
    type: number
    description: Used with llRequestSimulatorData to return the simulator status as
      a string.
  DEBUG_CHANNEL:
    property: read-only
    type: number
    description: A chat channel reserved for script debugging and error messages.
      Passing this to llSay, llWhisper, or llShout prints text to the Script Warning/Error
      Window and broadcasts it to nearby avatars' script consoles.
  DEG_TO_RAD:
    property: read-only
    type: number
    description: Constant 0.017453293 (precise value is PI/180). Multiply a value
      in degrees by this number to convert it to radians.
  DENSITY:
    property: read-only
    type: number
    description: "Used with llSetPhysicsMaterial to indicate that the density parameter\
      \ is enabled (which overrides the previous value). Must be between 1.0 and 22587.0\
      \ kg/m\xB3."
  DEREZ_DIE:
    property: read-only
    type: number
    description: Used with llDerezObject to immediately delete (kill) the object.
  DEREZ_MAKE_TEMP:
    property: read-only
    type: number
    description: Used with llDerezObject to mark the object as temporary, allowing
      the simulator to clean it up at a later time.
  DEREZ_TO_INVENTORY:
    property: read-only
    type: number
    description: Used with llDerezObject to return the targeted object to the rezzer's
      (derezzer's) inventory, saving its current state.
  ENVIRONMENT_DAYINFO:
    property: read-only
    type: number
    description: 'Day cycle and time information: day_length (seconds in the environment''s
      day cycle), day_offset (seconds offset from GMT), and secs_since_midnight (seconds
      elapsed since the last day cycle midnight).'
  ENV_INVALID_AGENT:
    property: read-only
    type: number
    description: Unable to find the specified agent, or could not find an agent with
      the specified ID.
  ENV_INVALID_RULE:
    property: read-only
    type: number
    description: There was an issue with one of the rules, or an attempt was made
      to change an unknown property.
  ENV_NOT_EXPERIENCE:
    property: read-only
    type: number
    description: Attempted to change environments outside an experience, or the script
      is not running as part of an experience with a valid experience key.
  ENV_NO_ENVIRONMENT:
    property: read-only
    type: number
    description: Environmental settings inventory object could not be found, or there
      is no environment on this parcel to modify.
  ENV_NO_EXPERIENCE_LAND:
    property: read-only
    type: number
    description: Experience has not been enabled or cannot run on the land.
  ENV_NO_EXPERIENCE_PERMISSION:
    property: read-only
    type: number
    description: Agent has not granted permission to change environments.
  ENV_NO_PERMISSIONS:
    property: read-only
    type: number
    description: Script lacks permissions to modify the environment at this location,
      or an attempt was made to remove altitude track 0 or 1.
  ENV_OK:
    property: read-only
    type: number
    description: Agent, parcel, or region will attempt to change the applied environment.
  ENV_THROTTLE:
    property: read-only
    type: number
    description: Scripts have exceeded the throttle limit. Wait and retry the request.
  ENV_VALIDATION_FAIL:
    property: read-only
    type: number
    description: Could not validate the environmental settings or values passed.
  EOF:
    property: read-only
    type: string
    description: A value equal to three newline characters ("\n\n\n") returned by
      the dataserver event, indicating that the requested line is past the end of
      the notecard.
  ERR_GENERIC:
    property: read-only
    type: number
    description: An inexplicable and generic error where nothing is known about the
      cause.
  ERR_MALFORMED_PARAMS:
    property: read-only
    type: number
    description: Return value for llReturnObject* functions indicating that the parameters
      passed are malformed.
  ERR_PARCEL_PERMISSIONS:
    property: read-only
    type: number
    description: Return value for llReturnObject* functions indicating a lack of permissions
      to perform the task on the specified parcel.
  ERR_RUNTIME_PERMISSIONS:
    property: read-only
    type: number
    description: Return value for llReturnObject* functions indicating the script
      lacks the runtime permissions required to perform the requested task.
  ERR_THROTTLED:
    property: read-only
    type: number
    description: Return value for llReturnObject* functions indicating that the task
      has been throttled and should be retried later.
  ESTATE_ACCESS_ALLOWED_AGENT_ADD:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to add an agent
      to the estate's Allowed Residents list.
  ESTATE_ACCESS_ALLOWED_AGENT_REMOVE:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to remove an
      agent from the estate's Allowed Residents list.
  ESTATE_ACCESS_ALLOWED_GROUP_ADD:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to add a group
      to the estate's Allowed Groups list.
  ESTATE_ACCESS_ALLOWED_GROUP_REMOVE:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to remove a group
      from the estate's Allowed Groups list.
  ESTATE_ACCESS_BANNED_AGENT_ADD:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to add an agent
      to the estate's Banned Residents list.
  ESTATE_ACCESS_BANNED_AGENT_REMOVE:
    property: read-only
    type: number
    description: Used as an input parameter for llManageEstateAccess to remove an
      agent from the estate's Banned Residents list.
