    description: Used with llGetClosestNavPoint to limit how far out to search for
      a navigation point.
  GCNP_STATIC:
    property: read-only
    type: number
    description: Used with llGetClosestNavPoint to specify that the test should use
      the static navmesh, ignoring all dynamic obstacles.
  GRAVITY_MULTIPLIER:
    property: read-only
    type: number
    description: Used with llSetPhysicsMaterial to enable the gravity multiplier override.
      The value must be between -1.0 and +28.0.
  HORIZONTAL:
    property: read-only
    type: number
    description: Constant indicating that the collision capsule orientation for a
      pathfinding character is horizontal.
  HTTP_ACCEPT:
    property: read-only
    type: number
    description: Used with llHTTPRequest to override the default Accept header with
      custom MIME types (such as application/json, text/html, etc.). Responses with
      unlisted content types will return status 415.
  HTTP_BODY_MAXLENGTH:
    property: read-only
    type: number
    description: 'Sets the maximum (UTF-8 encoded) byte length of the HTTP response
      body. The maximum limit depends on the VM being used (Mono Max: 16384 bytes,
      LSO Max: 4096 bytes).'
  HTTP_BODY_TRUNCATED:
    property: read-only
    type: number
    description: Indicates the response body truncation point in bytes.
  HTTP_CUSTOM_HEADER:
    property: read-only
    type: number
    description: Adds a custom HTTP header (name and value pair) to the request. Up
      to 8 custom headers can be configured per request. Some default or sensitive
      headers are blocked for security reasons.
  HTTP_EXTENDED_ERROR:
    property: read-only
    type: number
    description: If set to TRUE, llHTTPRequest always returns a key. If an error occurs
      during the request, detailed error information (delivered in an RFC 7807 JSON
      block) is reported through the http_response event using that key.
  HTTP_METHOD:
    property: read-only
    type: number
    description: Specifies the HTTP method ('GET', 'POST', 'PUT', or 'DELETE') for
      the request.
  HTTP_MIMETYPE:
    property: read-only
    type: number
    description: Specifies the request Content-Type MIME type. Text types should define
      a charset (e.g., 'text/plain;charset=utf-8'). Use 'application/x-www-form-urlencoded'
      to emulate HTML forms.
  HTTP_PRAGMA_NO_CACHE:
    property: read-only
    type: number
    description: 'Controls whether the ''Pragma: no-cache'' header is sent with the
      HTTP request. When SendHeader is TRUE (default), the header is sent; when FALSE,
      it is omitted.'
  HTTP_USER_AGENT:
    property: read-only
    type: number
    description: Appends a custom string to the default LSL User-Agent header value.
      Must follow HTTP standard syntax (e.g., 'My-Script-Name/1.0'). Spaces are not
      allowed and will cause a script error; use hyphens instead.
  HTTP_VERBOSE_THROTTLE:
    property: read-only
    type: number
    description: If set to TRUE, shouts error messages to DEBUG_CHANNEL if the outgoing
      request rate exceeds the server limit. If FALSE, these error messages are suppressed.
  HTTP_VERIFY_CERT:
    property: read-only
    type: number
    description: If set to TRUE, the server's SSL certificate must be verifiable using
      a standard certificate authority when making HTTPS requests. If FALSE, any SSL
      certificate is accepted.
