        and str2, returning the result as a Base64 string. The string str2 repeats
        if it is shorter than str1.
    args:
    - type: string
    - type: string
    must_use: true
    description: Correctly performs a bitwise exclusive OR (XOR) on Base64 strings
      str1 and str2, returning the result as a Base64 string. The string str2 repeats
      if it is shorter than str1.
  llcompat.XorBase64Strings:
    deprecated:
      message: Deprecated (use llXorBase64 instead). Retained for backwards compatibility.
        Incorrectly performs a bitwise exclusive OR (XOR) on Base64 strings str1 and
        str2.
    args:
    - type: string
    - type: string
    must_use: true
    description: Deprecated (use llXorBase64 instead). Retained for backwards compatibility.
      Incorrectly performs a bitwise exclusive OR (XOR) on Base64 strings str1 and
      str2.
  llcompat.XorBase64StringsCorrect:
    deprecated:
      message: Deprecated (use llXorBase64 instead). Correctly performs (unless nulls
        are present) a bitwise exclusive OR (XOR) on Base64 strings str1 and str2.
    args:
    - type: string
    - type: string
    must_use: true
    description: Deprecated (use llXorBase64 instead). Correctly performs (unless
      nulls are present) a bitwise exclusive OR (XOR) on Base64 strings str1 and str2.
  llcompat.sRGB2Linear:
    deprecated:
      message: Returns a vector representing the conversion of the color srgb from
        the sRGB colorspace into the linear RGB colorspace.
    args:
