  vector.ceil:
    args:
    - type:
        display: vector
    must_use: true
    description: Applies math.ceil to each component of the vector.
  vector.abs:
    args:
    - type:
        display: vector
    must_use: true
    description: Applies math.abs to each component of the vector.
  vector.sign:
    args:
    - type:
        display: vector
    must_use: true
    description: Applies math.sign to each component of the vector.
  vector.clamp:
    args:
    - type:
        display: vector
    - type:
        display: vector
    - type:
        display: vector
    must_use: true
    description: Clamps each component of the vector between min and max values.
  vector.max:
    args:
    - type:
        display: vector
    - type: '...'
    must_use: true
    description: Applies math.max to each component of the vectors.
  vector.min:
    args:
    - type:
        display: vector
    - type: '...'
    must_use: true
    description: Applies math.min to each component of the vectors.
  vector.lerp:
    args:
    - type:
        display: vector
    - type:
        display: vector
