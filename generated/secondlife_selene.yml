structs:
  quaternion:
    __add:
      method: true
      args:
      - type:
          display: quaternion
    __sub:
      method: true
      args:
      - type:
          display: quaternion
    __mul:
      method: true
      args:
      - type:
          display: quaternion
    __div:
      method: true
      args:
      - type:
          display: quaternion
    __unm:
      method: true
      args: []
    __eq:
      method: true
      args:
      - type:
          display: quaternion
    __tostring:
      method: true
      args: []
    x:
      property: read-only
      type: number
      description: X component of the rotation/quaternion.
    y:
      property: read-only
      type: number
      description: Y component of the rotation/quaternion.
    z:
      property: read-only
      type: number
      description: Z component of the rotation/quaternion.
    s:
      property: read-only
      type: number
      description: S component of the rotation/quaternion. Equivalent to the W component
        in other notations.
  uuid:
    __tostring:
      method: true
      args: []
    istruthy:
      property: read-only
      type: bool
      description: Returns true if the UUID is not the null UUID (all zeros).
    bytes:
      property: read-only
      type: string
      description: Returns the raw 16-byte binary string of the UUID.
  vector:
    __add:
      method: true
      args:
      - type:
          display: vector
      description: Native component-wise addition
    __sub:
      method: true
      args:
      - type:
          display: vector
      description: Native component-wise subtraction
    __unm:
      method: true
      args: []
      description: Unary negation
    __mul:
      method: true
      args:
      - type: any
      description: 'Multiplication: vector * vector / number -> vector (Scale), vector
        * quaternion -> vector (Rotation)'
    __div:
      method: true
      args:
      - type: any
      description: 'Division: vector / number -> vector (Scale), vector / quaternion
        -> vector (Rotation by inverse)'
    __mod:
      method: true
      args:
      - type:
          display: vector
      description: 'LSL-style modulo: vector % vector -> vector (Cross Product)'
    __tostring:
      method: true
      args: []
    x:
      property: read-only
      type: number
      description: X coordinate component of the vector. Typically represents red
        color, forward position, or pitch.
    y:
      property: read-only
      type: number
      description: Y coordinate component of the vector. Typically represents green
        color, left/right position, or roll.
    z:
      property: read-only
      type: number
      description: Z coordinate component of the vector. Typically represents blue
        color, altitude/upward position, or yaw.
  DetectedEvent:
    adjustDamage:
      method: true
      args:
      - type: number
      description: Modifies the amount of damage applied by the current on_damage
        event after it completes processing, specified by the damage event index number.
    getDamage:
      method: true
      args: []
      must_use: true
      description: Returns a list containing pending damage information for the event
        specified by number, including the current damage, the damage type, and the
        original damage delivered.
    getGrab:
      method: true
      args: []
      must_use: true
      description: Returns a vector representing the grab offset of the user touching
        the object. Only works in touch events and returns <0.0, 0.0, 0.0> if number
        is not a valid index.
    getGroup:
      method: true
      args: []
      must_use: true
      description: Returns TRUE if the detected object or avatar specified by number
        has the same active group as the prim containing the script. Returns FALSE
        if the group is not active or if they are not in the group.
    getKey:
      method: true
      args: []
      must_use: true
      description: Returns the key (UUID) of the detected object or avatar specified
        by number, or NULL_KEY if number is not a valid index.
    getLinkNumber:
      method: true
      args: []
      must_use: true
      description: Returns the link number (integer) of the triggered event (touches
        and collisions only) specified by number. Returns 0 for non-linked objects,
        1 for the root prim, and 2+ for child prims. Returns 0 if not supported by
        the event.
    getName:
      method: true
      args: []
      must_use: true
      description: Returns a string representing the name of the detected object or
        avatar specified by item. Returns an empty string if item is not a valid index.
    getOwner:
      method: true
      args: []
      must_use: true
      description: Returns the key (UUID) of the owner of the detected object specified
        by number. Returns an invalid key if number is not a valid index.
    getPos:
      method: true
      args: []
      must_use: true
      description: Returns the vector position (in region coordinates) of the detected
        object or avatar specified by number, or <0.0, 0.0, 0.0> if number is not
        a valid index.
    getRezzer:
      method: true
      args: []
      must_use: true
      description: Returns the key (UUID) of the object or avatar that rezzed the
        detected object specified by number.
    getRot:
      method: true
      args: []
      must_use: true
      description: Returns the rotation of the detected object or avatar specified
        by number, or <0.0, 0.0, 0.0, 1.0> if number is not a valid offset index.
    getTouchBinormal:
      method: true
      args: []
      must_use: true
      description: Returns the surface binormal vector (tangent to the surface, pointing
        along the positive T (V) direction of tangent space) at the touched location
        specified by index. Can be used with llDetectedTouchNormal to determine the
        tangent space.
    getTouchFace:
      method: true
      args: []
      must_use: true
      description: Returns the integer index of the face clicked by the avatar in
        the touch event specified by index.
    getTouchNormal:
      method: true
      args: []
      must_use: true
      description: Returns the surface normal vector (perpendicular to the surface)
        at the touched location specified by index. Can be used with llDetectedTouchBinormal
        to determine the tangent space.
    getTouchPos:
      method: true
      args: []
      must_use: true
      description: Returns the vector position where the object was touched (specified
        by index) in region coordinates, or in screen-space coordinates if the object
        is attached as a HUD.
    getTouchST:
      method: true
      args: []
      must_use: true
      description: Returns the surface coordinates (<s, t, 0.0>) where the prim was
        touched, specified by index. X and Y contain the horizontal (s) and vertical
        (t) face coordinates, typically in the interval [0.0, 1.0]. Returns TOUCH_INVALID_TEXCOORD
        if coordinates cannot be determined.
    getTouchUV:
      method: true
      args: []
      must_use: true
      description: Returns the texture coordinates (<u, v, 0.0>) where the prim was
        touched, specified by index. X and Y contain the horizontal (u) and vertical
        (v) texture coordinates, typically in the interval [0.0, 1.0] (affected by
        repeats and rotation). Returns TOUCH_INVALID_TEXCOORD if coordinates cannot
        be determined.
    getType:
      method: true
      args: []
      must_use: true
      description: Returns an integer bitfield representing the types (AGENT, ACTIVE,
        PASSIVE, or SCRIPTED) of the detected object or avatar specified by number.
        Returns 0 if number is not a valid index.
    getVel:
      method: true
      args: []
      must_use: true
      description: Returns the vector velocity of the detected object or avatar specified
        by number, or <0.0, 0.0, 0.0> if number is not a valid offset index.
    index:
      property: read-only
      type: number
      description: Index of the detected entity.
    valid:
      property: read-only
      type: bool
      description: Returns true if the detected index is valid and contains active
        data.
    canAdjustDamage:
      property: read-only
      type: bool
      description: Returns true if the detected object or avatar can have its damage
        adjusted.
