        display: vector
    must_use: true
    description: Returns the local position vector that places the center of the HUD
      object directly over the world coordinate world_pos as viewed by the current
      camera. Requires the PERMISSION_TRACK_CAMERA runtime permission.
  llcompat.XorBase64:
