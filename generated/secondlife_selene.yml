  string.byte:
    args:
    - type: string
    - type: number
      required: false
    - type: number
      required: false
    must_use: true
    description: Returns the numeric code of every byte in the range start_index..end_index
      in the string src. Negative indices count backward from the end of the string.
  string.char:
    args:
    - type: '...'
      required: true
    must_use: true
    description: Constructs and returns a string from the given byte integers.
  string.find:
    args:
    - type: string
    - type: string
    - type: number
      required: false
    - type: bool
      required: false
    must_use: true
    description: Returns the start and end byte indices of the first occurrence of
      pattern inside the string src, followed by any regex-captured substrings. Search
      starts from start_index. Returns nil if not found. Negative indices count backward
      from the end of the string.
  string.format:
    args:
    - type: string
    - type: '...'
      required: true
    must_use: true
    description: Formats input values into a string using printf-style format specifiers.
  string.gmatch:
    args:
    - type: string
    - type: string
    must_use: true
    description: Returns an iterator function of all occurences of the regex pattern
      inside the string src.
  string.gsub:
    args:
    - type: string
    - type: string
    - type: any
    - type: number
      required: false
    must_use: true
    description: Returns a copy of src with maxn occurrences of the regex pattern
      replaced by repl, followed by the total number of substitutions that occurred.
      repl can be a string, function, or table.
  string.len:
    args:
    - type: string
    must_use: true
    description: 'Returns the number of bytes in the string. Identical to #str.'
  string.lower:
    args:
    - type: string
    must_use: true
    description: Returns a lowercase copy of the string src. Only converts ASCII characters.
      Use ll.ToLower for strings that may contain Unicode.
  string.match:
    args:
    - type: string
    - type: string
    - type: number
      required: false
    must_use: true
    description: Returns all occurences of the regex pattern inside the string src,
      starting from start_index. Returns nil if no match is found. Negative indices
      count backward from the end of the string.
  string.pack:
    args:
    - type: string
    - type: '...'
    must_use: true
    description: Packs values into a binary string.
  string.packsize:
    args:
    - type: string
    must_use: true
    description: Returns the size of a packed string for the given format.
  string.rep:
    args:
    - type: string
    - type: number
    must_use: true
    description: Returns the string src repeated n times. Returns an empty string
      if n is zero or negative.
  string.reverse:
    args:
    - type: string
    must_use: true
    description: Returns a copy of the string src with bytes in reverse order.
  string.split:
    args:
    - type: string
    - type: string
      required: false
    must_use: true
    description: Splits a string by separator. Returns a list of substrings. If the
      separator is nil, splits at commas (","). If the separator is empty, splits
      into individual one-byte substrings.
  string.sub:
    args:
    - type: string
    - type: number
    - type: number
      required: false
    must_use: true
    description: Returns a copy of the substring from src within the inclusive byte
      range start_index..end_index. Negative indices count backward from the end of
      the string.
  string.unpack:
    args:
    - type: string
    - type: string
    - type: number
      required: false
    must_use: true
    description: Decodes a binary string using a pack format, starting from index
      start. Negative indices count backward from the end of the string.
  string.upper:
    args:
    - type: string
    must_use: true
    description: Returns an uppercase copy of the string src. Only converts ASCII
      characters. Use ll.ToUpper for strings that may contain Unicode.
  table.concat:
    args:
    - type: table
    - type: string
      required: false
    - type: number
      required: false
    - type: number
      required: false
    must_use: true
    description: Joins an array of strings into one string, with an optional separator.
  table.foreach:
    deprecated:
      message: Use a for loop instead
    args:
    - type: table
    - type: function
      required: true
    description: Iterates over all key-value pairs in the table (deprecated).
  table.foreachi:
    deprecated:
      message: Use a for loop instead
    args:
    - type: table
    - type: function
      required: false
    description: Iterates over all index-value pairs in the array (deprecated).
  table.getn:
    deprecated:
      message: Use '#' instead.
      replace:
      - '#%1'
    args:
    - type: table
    must_use: true
    description: 'Returns the length of an array (deprecated; use # instead).'
  table.maxn:
    args:
    - type: table
    must_use: true
    description: Returns the highest numeric key in the table.
  table.insert:
    args:
    - type: table
      observes: write
    - type: number
      required: false
    - type: any
    description: 'Inserts an element at index i, shifting subsequent elements up by
      1. The index must be within the range [1, #a].'
  table.append:
    args:
    - type: table
      observes: write
    - type: '...'
    description: Appends one or more elements to the end of the array.
  table.extend:
    args:
    - type: table
      observes: write
    - type: table
    description: 'Appends all elements from one array to the end of another. Shorthand
      for table.move(b, 1, #b, #a+1, a).'
  table.remove:
    args:
    - type: table
      observes: write
    - type: number
      required: false
    description: Removes and returns the element at index i, shifting subsequent elements
      down by 1. Defaults to the end of the array. Returns nil if no element was removed.
  table.sort:
    args:
    - type: table
      observes: write
    - type: function
      required: false
    description: Sorts an array in place.
  table.pack:
    args:
    - type: '...'
    must_use: true
    description: Packs arguments into a table and sets an 'n' field with the total
      count. This is the safest way to pack varargs (...) that might contain nil values.
  table.unpack:
    args:
    - type: table
    - type: number
      required: false
    - type: number
      required: false
    must_use: true
    description: Unpacks array elements into multiple return values.
  table.move:
    args:
    - type: table
    - type: number
    - type: number
    - type: number
    - type: table
      required: false
      observes: write
    description: Copies elements [i..j] from src array into dest array starting at
      [d], overwriting existing elements.
  table.create:
    args:
    - type: number
    - type: any
      required: false
    must_use: true
    description: Creates a new table with pre-allocated array capacity, optionally
      filled. Preallocation only benefits array portions and is counter-productive
      for dictionaries.
  table.find:
    args:
    - type: table
    - type: any
    - type: number
      required: false
    must_use: true
    description: Finds the first occurrence of a value in the array and returns its
      index. Traversal stops at the first nil.
  table.clear:
    args:
    - type: table
      observes: write
    description: Clears all elements from a table while keeping its capacity to avoid
      memory reallocations during future assignments.
  table.shrink:
    args:
    - type: table
    - type: bool
      required: false
    description: Reduces the memory usage of the table to the minimum necessary.
  table.freeze:
    args:
    - type: table
    description: Freezes a table, making it read-only. The freeze is shallow and does
      not affect nested tables. Raises an error if the table is already frozen or
      has a protected metatable.
  table.isfrozen:
    args:
    - type: table
    must_use: true
    description: Returns true if a table is frozen.
  table.clone:
    args:
    - type: table
    must_use: true
    description: Creates a shallow copy of the table, copying its keys, values, and
      metatable. The clone is always unfrozen even if the source was frozen.
  utf8.charpattern:
    property: read-only
    type: string
    description: Pattern that matches exactly one UTF-8 byte sequence.
  utf8.char:
    args:
    - type: '...'
      required: true
    description: Constructs and returns a string from the given Unicode codepoint
      ordinals.
  utf8.codes:
    args:
    - type: string
    must_use: true
    description: Returns an iterator that produces the byte offset and Unicode codepoint
      for each character in the string src.
  utf8.codepoint:
    args:
    - type: string
    - type: number
      required: false
    - type: number
      required: false
    must_use: true
    description: Returns the ordinals (Unicode copepoint integers) of the characters
      in the inclusive byte range start_index..end_index in the string src. Negative
      indices count backward from the end of the string.
  utf8.len:
    args:
    - type: string
    - type: number
      required: false
    - type: number
      required: false
    must_use: true
    description: Returns the number of Unicode codepoints in the inclusive byte range
      start_index..end_index of the string src. If the string is not utf8, returns
      (nil, error index) instead. Negative indices count backward from the end of
      the string.
  utf8.offset:
    args:
    - type: string
    - type: number
    - type: number
      required: false
    must_use: true
    description: Returns the byte offset of the nth Unicode codepoint in the string.
