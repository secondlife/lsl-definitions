  ll.StopLookAt:
    args: []
    description: Stops causing the object to look at or point toward a target (canceling
      llLookAt or llRotLookAt).
  ll.StopMoveToTarget:
    args: []
    description: Stops the critically damped movement of the object toward a target
      (canceling llMoveToTarget). Use llStopLookAt to stop rotational tracking.
  ll.StopObjectAnimation:
    args:
    - type: string
    description: Stops the specified animation anim (inventory, built-in, or UUID)
      on the rigged mesh object associated with the current script.
  ll.StopSound:
    args: []
    description: Stops playback of the currently playing attached sound.
  ll.StringLength:
    deprecated:
