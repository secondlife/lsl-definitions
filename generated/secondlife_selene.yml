  AGENT_SITTING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is sitting.
  AGENT_TYPING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is typing.
  AGENT_WALKING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the queried avatar is walking,
