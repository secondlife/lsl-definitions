      description: Registers a one-time timer. The timer runs only once and is automatically
        removed afterward. The callback receives (expected_time, nil). Returns the
        same function passed in, which can be used to cancel it early via LLTimers:off().
    'off':
      method: true
      args:
      - type: function
      description: Stops and removes a timer. If the same function was added multiple
        times, only the last one added is removed, regardless of its interval. Returns
        true if the timer was found and removed, false otherwise.
