# Second Life SLua (Server Lua) standard library definition file for selene.
# This file is auto-generated by https://github.com/secondlife/lsl-definitions.
base: luau
name: Second Life SLua language support
lua_versions:
- luau
- lua51
globals:
  LLEvents:
    struct: LLEvents
    description: Event registration and management singleton for Second Life events.
  LLTimers:
    struct: LLTimers
    description: Timer management singleton for scheduling periodic and one-time callbacks.
  ACTIVE:
    property: read-only
    type: number
    description: Objects running a script or physically moving (using server resources).
      In llDetectedType(), it identifies physical objects and agents. In llSensor()
      or llSensorRepeat(), it searches for moving physical objects or scripted objects.
  AGENT:
    property: read-only
    type: number
    description: Agents (avatars). In llDetectedType, it indicates an avatar. In llSensor
      or llSensorRepeat, it searches for avatars by legacy name (functionally identical
      to AGENT_BY_LEGACY_NAME, though using AGENT_BY_LEGACY_NAME is recommended instead).
  AGENT_ALWAYS_RUN:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the queried avatar has 'Always
      Run' enabled or is using tap-tap-hold.
  AGENT_ATTACHMENTS:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the queried avatar has attachments.
  AGENT_AUTOMATED:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to identify if the avatar is registered
      with Linden Lab as an automated/scripted agent (bot).
  AGENT_AUTOPILOT:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is in autopilot
      mode, which is enabled when the user selects 'Go Here' on the ground or uses
      double-click autopilot.
  AGENT_AWAY:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is in 'away'
      mode, which indicates they toggled away or have been inactive for too long.
  AGENT_BUSY:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is in 'busy'
      mode.
  AGENT_BY_LEGACY_NAME:
    property: read-only
    type: number
    description: Used to find agents by legacy name. In llDetectedType, it indicates
      an avatar. In llSensor or llSensorRepeat, it searches for avatars by legacy
      name.
  AGENT_BY_USERNAME:
    property: read-only
    type: number
    description: Used to find agents by username (see Avatar Names).
  AGENT_CROUCHING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is crouching.
  AGENT_FLOATING_VIA_SCRIPTED_ATTACHMENT:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is floating or
      hovering because of a scripted attachment using either llSetHoverHeight or llGroundRepel.
  AGENT_FLYING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the queried avatar is flying
      or hovering.
  AGENT_IN_AIR:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is in the air
      (jumping, flying, or falling).
  AGENT_LIST_PARCEL:
    property: read-only
    type: number
    description: Agents on the same parcel where the script is running.
  AGENT_LIST_PARCEL_OWNER:
    property: read-only
    type: number
    description: Agents on any parcel in the region where the parcel owner is the
      same as the owner of the parcel under the scripted object.
  AGENT_LIST_REGION:
    property: read-only
    type: number
    description: Returns any or all agents in the region.
  AGENT_MOUSELOOK:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is in mouselook.
  AGENT_ON_OBJECT:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is sitting on
      an object and linked to it.
  AGENT_SCRIPTED:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is carrying scripted
      objects or has scripted attachments.
  AGENT_SITTING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is sitting.
  AGENT_TYPING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the avatar is typing.
  AGENT_WALKING:
    property: read-only
    type: number
    description: Used with llGetAgentInfo to determine if the queried avatar is walking,
      running, or crouch walking.
  ALL_SIDES:
    property: read-only
    type: number
    description: Selects all sides of an object in an applicable function.
  ANIM_ON:
    property: read-only
    type: number
    description: Enables texture animation. This must be set to start the animation
      and cleared to stop it.
  ATTACH_ANY_HUD:
    property: read-only
    type: number
    description: A special constant representing all HUD attachment points when filtering
