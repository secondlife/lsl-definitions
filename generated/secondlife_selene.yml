  JSON_APPEND:
    property: read-only
    type: number
    description: A specifier for llJsonSetValue indicating the given value should
      be appended to the array at the specified level. If the target value is not
      an array, the existing data will be overwritten and replaced by the new array.
  JSON_ARRAY:
    property: read-only
    type: string
    description: Used with llList2Json to indicate that the provided list should be
      encoded and returned as a string-serialized JSON array.
  JSON_DELETE:
    property: read-only
    type: string
    description: A constant used to delete a value within a JSON text string.
  JSON_FALSE:
    property: read-only
    type: string
    description: Return value for llJsonValueType indicating that the value at the
      specified address in a JSON string is a boolean FALSE.
  JSON_INVALID:
    property: read-only
    type: string
    description: Indicates an invalid state or parameter. Returned by llList2Json
      when inputs are not well-formed, by llJsonValueType for an invalid JSON type,
      or by llJsonGetValue when attempting to access a nonexistent location.
  JSON_NULL:
    property: read-only
    type: string
    description: Return value for llJsonValueType indicating that the value at the
      specified address in a JSON string is a JSON null.
  JSON_NUMBER:
    property: read-only
    type: string
    description: Return value for llJsonValueType indicating that the value at the
      specified address in a JSON string is a number.
  JSON_OBJECT:
    property: read-only
    type: string
    description: Used with llList2Json to indicate that the provided list is a strided
      list of key-value pairs to be encoded and returned as a JSON object.
  JSON_STRING:
    property: read-only
    type: string
    description: Return value for llJsonValueType indicating that the value at the
      specified address in a JSON string is a string.
  JSON_TRUE:
    property: read-only
    type: string
    description: Return value for llJsonValueType indicating that the value at the
      specified address in a JSON string is a boolean TRUE.
  KFM_CMD_PAUSE:
    property: read-only
    type: number
    description: Command used with KFM_COMMAND in llSetKeyframedMotion to pause the
      keyframed motion without resetting it to the start.
  KFM_CMD_PLAY:
    property: read-only
    type: number
    description: Command used with KFM_COMMAND in llSetKeyframedMotion to resume a
      motion previously stopped by KFM_CMD_STOP or paused by KFM_CMD_PAUSE.
  KFM_CMD_STOP:
    property: read-only
    type: number
    description: Command used with KFM_COMMAND in llSetKeyframedMotion to stop the
      keyframed motion and reset it to the start.
  KFM_COMMAND:
    property: read-only
    type: number
    description: Option flag in llSetKeyframedMotion followed by KFM_CMD_STOP, KFM_CMD_PLAY,
      or KFM_CMD_PAUSE to play, stop, or pause the motion.
  KFM_DATA:
    property: read-only
    type: number
    description: Option flag in llSetKeyframedMotion followed by a bitwise combination
      of KFM_TRANSLATION and KFM_ROTATION to specify keyframe data. If absent, both
      rotation and translation data must be provided.
  KFM_FORWARD:
    property: read-only
    type: number
    description: Playback mode used with KFM_MODE in llSetKeyframedMotion (default).
      It plays the frames sequentially from 1 to N and then stops.
  KFM_LOOP:
    property: read-only
    type: number
    description: Playback mode used with KFM_MODE in llSetKeyframedMotion. It plays
      the frames sequentially from 1 to N, returns to the initial position, and repeats
      indefinitely.
  KFM_MODE:
    property: read-only
    type: number
    description: Option flag in llSetKeyframedMotion followed by KFM_LOOP, KFM_REVERSE,
      KFM_FORWARD, or KFM_PING_PONG to set the playback mode (defaults to KFM_FORWARD).
      Must be specified when the keyframe list is provided.
  KFM_PING_PONG:
    property: read-only
    type: number
    description: Playback mode used with KFM_MODE in llSetKeyframedMotion.
  KFM_REVERSE:
    property: read-only
    type: number
    description: Playback mode used with KFM_MODE in llSetKeyframedMotion. It plays
      the frames in reverse order (from N down to 1) and then stops.
  KFM_ROTATION:
    property: read-only
    type: number
    description: Specifies that rotation data is included in the moves list for llSetKeyframedMotion.
  KFM_TRANSLATION:
    property: read-only
    type: number
    description: Specifies that translation data is included in the moves list for
      llSetKeyframedMotion.
