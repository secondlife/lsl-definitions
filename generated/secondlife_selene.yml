      description: Returns an array table containing all the functions currently handling
        the specified event. Useful for debugging or for iterating to remove all functions
        handling an event.
    eventNames:
      method: true
      args: []
      description: Returns an array table of all event names that currently have active
        handler functions attached.
    at_rot_target:
      property: override-fields
      type: function
      description: Triggered when the script's rotation (ourrot) comes within a defined
        angle (error) of the target rotation (targetrot) set by a call to llRotTarget
        (which returns the associated handle).
    at_target:
      property: override-fields
      type: function
      description: Triggered when the scripted object's position (ourpos) comes within
        the defined range of the target position (targetpos) set by llTarget (which
        returns the associated handle tnum).
    attach:
      property: override-fields
      type: function
      description: Triggered whenever the object is attached to or detached from an
        avatar. Passes the UUID key of the avatar (id) if attached, or NULL_KEY if
        detached.
    changed:
      property: override-fields
      type: function
      description: Triggered when various properties of the object change. The parameter
        changes is a bitfield of CHANGED_* flags.
    collision:
      property: override-fields
      type: function
      description: Triggered continuously while an avatar or another object is colliding
        with the object containing the script. Passes num_detected, representing the
        number of detected collisions.
    collision_end:
      property: override-fields
      type: function
      description: Triggered when an avatar or another object stops colliding with
        the object containing the script. Passes num_detected, representing the number
        of detected collisions.
    collision_start:
      property: override-fields
      type: function
      description: Triggered when an avatar or another object first begins colliding
        with the object containing the script. Passes num_detected, representing the
        number of detected collisions.
    control:
      property: override-fields
      type: function
      description: Triggered to pass captured avatar control inputs into the script.
        The parameter level indicates held controls, and edge indicates change in
        controls (both are bitfields of CONTROL_* constants).
    dataserver:
      property: override-fields
      type: function
      description: Triggered when requested data is returned to the script (e.g.,
        from llRequestAgentData, llRequestInventoryData, or llGetNotecardLine).
    email:
      property: override-fields
      type: function
      description: Receive an email requested by llGetNextEmail(). NumberRemaining
        indicates the number of emails remaining in the queue for llGetNextEmail()
        to retrieve.
    experience_permissions:
      property: override-fields
      type: function
      description: Triggered when the agent specified by agent_id approves an experience
        permissions request (interactively or automatically if previously approved).
    experience_permissions_denied:
      property: override-fields
      type: function
      description: Triggered when the agent specified by agent_id denies experience
        permissions, or when permission is blocked for other reasons (specified by
        the error code reason).
    final_damage:
      property: override-fields
      type: function
      description: Triggered after all on_damage events across all scripts have completed
        and damage is actively applied to the avatar or distributed among seated avatars.
        Collision detected functions (llDetected*) and llDetectedDamage are available.
    game_control:
      property: override-fields
      type: function
      description: Triggered when a compatible viewer sends game controller input
        changes for the avatar specified by id. Only triggers for scripts in attachments
        or seats.
    http_request:
      property: override-fields
      type: function
      description: Triggered when the script's registered URL receives an incoming
        HTTP request identified by request_id.
    http_response:
      property: override-fields
      type: function
      description: Triggered when an HTTP response body is received for a pending
        request_id, or if the request fails or times out.
    land_collision:
      property: override-fields
      type: function
      description: Triggered in the root prim when a physical object or attached avatar
        is colliding with the ground at position pos.
    land_collision_end:
      property: override-fields
      type: function
      description: Triggered in the root prim when a physical object or attached avatar
        stops colliding with the ground at position pos.
    land_collision_start:
      property: override-fields
      type: function
      description: Triggered in the root prim when a physical object or attached avatar
        first begins colliding with the ground at position pos.
    link_message:
      property: override-fields
      type: function
      description: Triggered when the script receives a link message from sender_num,
        containing the parameters num, str, and id sent via llMessageLinked.
    linkset_data:
      property: override-fields
      type: function
      description: Fires in all scripts in the linkset whenever the datastore has
        been modified via an llLinksetData function. Passes the action taken, the
        affected key name, and the new value.
    listen:
      property: override-fields
      type: function
      description: Triggered when a chat message matching active llListen filters
        is received on channel. Passes the sender's name and UUID key id, along with
        the spoken string msg.
    money:
      property: override-fields
      type: function
      description: Triggered when a resident specified by id pays an amount of Linden
        dollars (L$) to the prim.
    moving_end:
      property: override-fields
      type: function
      description: Triggered whenever the physical or moving object containing the
        script stops moving.
    moving_start:
      property: override-fields
      type: function
      description: Triggered whenever the physical or moving object containing the
        script starts moving.
    no_sensor:
      property: override-fields
      type: function
      description: Triggered when active sensors (from llSensor or llSensorRepeat)
        complete a scan without finding any matching targets.
    not_at_rot_target:
      property: override-fields
      type: function
      description: Triggered continuously while the object's rotation is outside the
        leeway angle of targets set via llRotTarget.
    not_at_target:
      property: override-fields
      type: function
      description: Triggered continuously while the object's position has not yet
        reached the range of targets set via llTarget.
    object_rez:
      property: override-fields
      type: function
      description: Triggered when this object successfully rezzes another object from
        its inventory. Passes the key (UUID) id of the newly rezzed object.
    on_damage:
      property: override-fields
      type: function
      description: Triggered when damage has been inflicted on an avatar or task,
        but before it is applied or distributed. Collision detected functions (llDetected*),
        llDetectedDamage, and llAdjustDamage are available. Passes num_detected, representing
        the number of pending damage events.
    on_death:
      property: override-fields
      type: function
      description: Triggered on all worn attachments when the wearing avatar's health
        reaches 0.
    on_rez:
      property: override-fields
      type: function
      description: Triggered when the object is rezzed into the world (by a script
        or user). Passes start_param from the rezzing call (or 0 if rezzed from inventory).
        Also triggers on attachments during login or when attached from inventory.
    path_update:
      property: override-fields
      type: function
      description: Triggered to inform the script of changes or failures in the pathfinding
        character's status.
    remote_data:
      property: override-fields
      type: function
      description: Deprecated. Triggered by incoming XML-RPC calls, passing event_type,
        channel, message_id, sender, idata, and sdata.
    run_time_permissions:
      property: override-fields
      type: function
      description: Triggered when an agent grants or denies runtime permissions requested
        by llRequestPermissions. Passes the active integer permissions bitfield perm
        (returns 0 if no permissions are currently granted).
    sensor:
      property: override-fields
      type: function
      description: Triggered when objects matching constraints of llSensor or llSensorRepeat
        are successfully detected. Passes num_detected, representing the number of
        detected targets.
    timer:
      property: override-fields
      type: function
      description: Triggered at regular periodic intervals configured by llSetTimerEvent.
    touch:
      property: override-fields
      type: function
      description: Triggered continuously while an avatar touches the object. Passes
        num_detected, representing the number of touching agents.
    touch_end:
      property: override-fields
      type: function
      description: Triggered when an avatar stops touching the object. Passes num_detected,
        representing the number of touching agents.
    touch_start:
      property: override-fields
      type: function
      description: Triggered when an avatar first touches the object. Passes num_detected,
        representing the number of touching agents.
    transaction_result:
      property: override-fields
      type: function
      description: Triggered when an asynchronous L$ transfer (such as llTransferLindenDollars)
        is completed. Passes transaction info id, success status, and CSV or error
        data.
  LLTimers:
