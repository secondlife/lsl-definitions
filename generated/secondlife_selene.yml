      \ + D)."
  CONTROL_ROT_LEFT:
    property: read-only
    type: number
    description: "Tests for the avatar rotate left control (\u2190 or A)."
  CONTROL_ROT_RIGHT:
    property: read-only
    type: number
    description: "Tests for the avatar rotate right control (\u2192 or D)."
  CONTROL_UP:
    property: read-only
