  ll.TeleportAgent:
    args:
    - type:
        display: uuid
    - type: string
    - type:
        display: vector
    - type:
        display: vector
    description: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to
      a landmark in the object's inventory. If landmark is empty, teleports them to
      position within the current region. Upon arrival, the agent is turned to face
      look_at. Can only teleport the owner.
  ll.TeleportAgentGlobalCoords:
    args:
    - type:
        display: uuid
    - type:
        display: vector
    - type:
        display: vector
    - type:
        display: vector
    description: Teleports the owning agent (who must grant PERMISSION_TELEPORT) to
      region_coordinates within a target region specified by global_coordinates. Upon
      landing, the agent faces the direction look_at. Can only teleport the owner.
  ll.TeleportAgentHome:
    args:
    - type:
        display: uuid
