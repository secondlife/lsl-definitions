    description: Returns an integer representing the absolute (positive) value of
      val.
  ll.Acos:
    deprecated:
      message: Use 'math.acos' instead. Double precision; fastcall.
      replace:
      - math.acos(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the arc-cosine of val in radians.
  ll.AddToLandBanList:
    args:
    - type:
        display: uuid
    - type: number
    description: Adds the avatar to the parcel ban list for the specified number of
      hours. A value of 0 hours adds the avatar indefinitely. Banned users teleporting
      to the parcel are redirected to a neighboring parcel; the minimum accepted duration
      is 0.01 hours (approximately 36 seconds).
  ll.AddToLandPassList:
    args:
    - type:
        display: uuid
    - type: number
    description: Adds the avatar to the land pass list for the specified number of
      hours (or indefinitely if hours is 0).
  ll.AdjustDamage:
    deprecated:
      message: Use 'adjustDamage' instead.
    args:
    - type: number
    - type: number
    description: Modifies the amount of damage applied by the current on_damage event
      after it completes processing, specified by the damage event index number.
  ll.AdjustSoundVolume:
    args:
    - type: number
    description: Adjusts the volume of the currently playing attached sound (has no
      effect on sounds started with llTriggerSound).
  ll.AgentInExperience:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns TRUE if the specified agent is in the experience and the
      experience can run in the current region/location; returns FALSE otherwise.
  ll.AllowInventoryDrop:
    args:
    - type: bool
    description: If add is TRUE, allows users without object modify permissions to
      drop inventory items into the prim. If FALSE, restricts inventory dropping to
      users with modify permissions.
  ll.AngleBetween:
    args:
    - type:
        display: quaternion
    - type:
        display: quaternion
    must_use: true
    description: Returns a float representing the angle in radians between rotations
      a and b.
  ll.ApplyImpulse:
    args:
    - type:
        display: vector
    - type: bool
    description: Applies a linear impulse (momentum) to a physical object. If local
      is TRUE, the impulse is applied in local coordinates; otherwise, it is applied
      in global region coordinates.
  ll.ApplyRotationalImpulse:
    args:
    - type:
        display: vector
    - type: bool
    description: Applies a rotational impulse (force) to a physical object. If local
      is TRUE, the rotational impulse is applied in local coordinates; otherwise,
      it is applied in global region coordinates.
  ll.Asin:
    deprecated:
      message: Use 'math.asin' instead. Double precision; fastcall.
      replace:
      - math.asin(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the arc-sine of val in radians.
  ll.Atan2:
    deprecated:
      message: Use 'math.atan2' instead. Double precision; fastcall.
      replace:
      - math.atan2(%...)
    args:
    - type: number
    - type: number
    must_use: true
    description: Returns a float representing the arctangent2 of y and x.
  ll.AttachToAvatar:
    args:
    - type: number
    description: Attaches the object to the avatar who has granted the PERMISSION_ATTACH
      permission. Takes the object into the user's inventory and attaches it at attach_point.
  ll.AttachToAvatarTemp:
    args:
    - type: number
    description: Attaches the object temporarily to an avatar who has granted the
      PERMISSION_ATTACH permission. No permanent inventory is created, and the object
      disappears on detach or disconnect. Can be used on non-owners (changing ownership
      to the wearer).
  ll.AvatarOnLinkSitTarget:
    args:
    - type: number
    must_use: true
    description: Returns the UUID of the avatar seated on the specified link's sit
      target, or NULL_KEY if no avatar is sitting there.
  ll.AvatarOnSitTarget:
    args: []
    must_use: true
    description: Returns the UUID of the avatar seated on the prim's sit target (defined
      via llSitTarget), or NULL_KEY if no avatar is sitting there or the prim lacks
      a sit target.
  ll.Axes2Rot:
    args:
    - type:
        display: vector
    - type:
        display: vector
    - type:
        display: vector
    must_use: true
    description: Returns the rotation defined by the coordinate axes fwd, left, and
      up.
  ll.AxisAngle2Rot:
    args:
    - type:
        display: vector
    - type: number
    must_use: true
    description: Returns the rotation representing a generated angle (in radians)
      about the specified axis.
  ll.Base64ToInteger:
    deprecated:
      message: Use 'llbase64.decode' and 'string.unpack' or 'buffer.readi32' instead.
      replace:
      - string.unpack(">i", llbase64.decode(s))
    args:
    - type: string
    must_use: true
    description: Returns an integer representing the Base64-decoded big-endian value
      of str. Returns zero if str is longer than 8 characters; the return value is
      unpredictable if str contains fewer than 6 characters.
  ll.Base64ToString:
    deprecated:
      message: Use 'llbase64.decode' instead.
      replace:
      - llbase64.decode(%1)
    args:
    - type: string
    must_use: true
    description: Decodes the Base64-encoded string str into a conventional string,
      interpreting the bytes as a UTF-8 character sequence. Unprintable characters
      are converted to question marks.
  ll.BreakAllLinks:
    args: []
    description: Delinks all prims in the linkset. Requires the PERMISSION_CHANGE_LINKS
      runtime permission, which must be requested and granted by the owner.
  ll.BreakLink:
    args:
    - type: number
    description: Delinks the prim specified by the link number link. Requires the
      PERMISSION_CHANGE_LINKS runtime permission.
  ll.CSV2List:
    args:
    - type: string
    must_use: true
    description: Parses the comma-separated string src and returns it as a list.
  ll.CastRay:
    args:
    - type:
        display: vector
    - type:
        display: vector
    - type: table
    must_use: true
    description: Casts a ray into the physics world from start to end and reports
      collision data for intersections with objects based on options. Returns a list
      of strided values [UUID_1, {link_number_1}, hit_position_1, {hit_normal_1},
      ..., status_code]. A negative status_code indicates an error; otherwise, it
      represents the number of hits.
  ll.Ceil:
    deprecated:
      message: Use 'math.ceil' instead. Fastcall.
      replace:
      - math.ceil(%...)
    args:
    - type: number
    must_use: true
    description: Returns the smallest integer value greater than or equal to val (rounded
      toward positive infinity).
  ll.Char:
    args:
    - type: number
    must_use: true
    description: Constructs and returns a single-character string from the given Unicode
      codepoint ordinal.
  ll.ClearCameraParams:
    args: []
    description: Resets all camera parameters to default values and turns off scripted
      camera control. Requires the PERMISSION_CONTROL_CAMERA runtime permission (automatically
      granted for attached or sat-on objects).
  ll.ClearLinkMedia:
    args:
    - type: number
    - type: number
    description: Deletes the media and clears all parameters from the given face on
      the linked prim. Returns an integer STATUS_* flag detailing the success or failure
      of the operation.
  ll.ClearPrimMedia:
    args:
    - type: number
    description: Deletes the media and clears all parameters from the specified face.
      Returns an integer STATUS_* flag detailing the success or failure of the operation.
  ll.CloseRemoteDataChannel:
    deprecated:
      message: Deprecated. Closes the specified XML-RPC channel.
    args:
    - type:
        display: uuid
    description: Deprecated. Closes the specified XML-RPC channel.
  ll.Cloud:
    deprecated:
      message: Returns a float representing the cloud density at the prim's position
        offset by the vector offset.
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a float representing the cloud density at the prim's position
      offset by the vector offset.
  ll.CollisionFilter:
    args:
    - type: string
    - type:
        display: uuid
    - type: bool
    description: Sets the collision filter, either exclusively or inclusively. If
      accept is TRUE, only collisions matching name and id are processed; if FALSE,
      matches are excluded. Pass an empty string or NULL_KEY to name or id to skip
      filtering on that parameter.
  ll.CollisionSound:
    args:
    - type: string
    - type: number
    description: Suppresses default collision sounds and replaces default impact sounds
      with impact_sound at the volume level specified by impact_volume. Supply an
      empty string to only suppress collision sounds.
  ll.CollisionSprite:
    deprecated:
      message: Suppresses default collision sprites and replaces them with impact_sprite
        (which must be in the prim's inventory). Supply an empty string to only suppress
        collision sprites.
    args:
    - type: string
    description: Suppresses default collision sprites and replaces them with impact_sprite
      (which must be in the prim's inventory). Supply an empty string to only suppress
      collision sprites.
  ll.ComputeHash:
    args:
    - type: string
    - type: string
    must_use: true
    description: Returns a hex-encoded hash digest string of message using the specified
      cryptographic algorithm.
  ll.Cos:
    deprecated:
      message: Use 'math.cos' instead. Double precision; fastcall.
      replace:
      - math.cos(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the cosine of theta.
  ll.CreateCharacter:
    args:
    - type: table
    description: Converts the linkset containing the script into a pathfinding character
      entity (required to use pathfinding functions) using the specified options.
  ll.CreateKeyValue:
    args:
    - type: string
    - type: string
    description: Starts an asynchronous transaction to create a key-value pair (k
      and v) associated with the script's experience. Returns a key query handle for
      the dataserver event. Fails with XP_ERROR_STORAGE_EXCEPTION if the key already
      exists.
  ll.CreateLink:
    args:
    - type:
        display: uuid
    - type: bool
    description: Attempts to link the object containing the script with target. Requires
      the PERMISSION_CHANGE_LINKS runtime permission.
  ll.Damage:
    args:
    - type:
        display: uuid
    - type: number
    - type: number
    description: Generates a damage event delivering the specified amount of damage
      and damage_type to the targeted avatar or task in the same region.
  ll.DataSizeKeyValue:
    args: []
    description: Starts an asynchronous transaction to request the used and total
      data storage allocated for the experience. Returns a key query handle for the
      dataserver event.
  ll.DeleteCharacter:
    args: []
    description: Converts the linkset back to a standard physical object, removing
      all pathfinding properties.
  ll.DeleteKeyValue:
    args:
    - type: string
    description: Starts an asynchronous transaction to delete the key-value pair associated
      with key k in the experience. Returns a key query handle for the dataserver
      event.
  ll.DeleteSubList:
    deprecated:
      message: Use 'table.remove' instead. Unnecessary table copying.
      replace:
      - table.remove(%1, %2)
    args:
    - type: table
    - type: number
    - type: number
    must_use: true
    description: Returns a copy of the list src with the slice from start_index to
      end_index (inclusive) removed. Negative indices count backward from the end
      of the list. If start_index is greater than end_index, the deletion excludes
      the specified range.
  ll.DeleteSubString:
    args:
    - type: string
    - type: number
    - type: number
    must_use: true
    description: Returns a copy of the string src with the characters from start_index
      to end_index (inclusive) removed. Negative indices count backward from the end
      of the string. If start_index is greater than end_index, the deletion excludes
      the specified range.
  ll.DerezObject:
    args:
    - type:
        display: uuid
    - type: number
    description: Derezzes (deletes or returns) a targeted object in the region previously
      rezzed by a script in this linkset, returning TRUE on success or FALSE on failure.
  ll.DetachFromAvatar:
    args: []
    description: Detaches the object containing the script from the avatar. Requires
      the PERMISSION_ATTACH runtime permission (automatically granted to attached
      objects). Note that the detached object is completely removed from the region
      and not dropped on the ground.
  ll.DetectedDamage:
    deprecated:
      message: Use 'getDamage' instead.
    args:
    - type: number
    must_use: true
    description: Returns a list containing pending damage information for the event
      specified by number, including the current damage, the damage type, and the
      original damage delivered.
  ll.DetectedGrab:
    deprecated:
      message: Use 'getGrab' instead.
    args:
    - type: number
    must_use: true
    description: Returns a vector representing the grab offset of the user touching
      the object. Only works in touch events and returns <0.0, 0.0, 0.0> if number
      is not a valid index.
  ll.DetectedGroup:
    deprecated:
      message: Use 'getGroup' instead.
    args:
    - type: number
    must_use: true
    description: Returns TRUE if the detected object or avatar specified by number
      has the same active group as the prim containing the script. Returns FALSE if
      the group is not active or if they are not in the group.
  ll.DetectedKey:
    deprecated:
      message: Use 'getKey' instead.
    args:
    - type: number
    must_use: true
    description: Returns the key (UUID) of the detected object or avatar specified
      by number, or NULL_KEY if number is not a valid index.
  ll.DetectedLinkNumber:
    deprecated:
      message: Use 'getLinkNumber' instead.
    args:
    - type: number
    must_use: true
    description: Returns the link number (integer) of the triggered event (touches
      and collisions only) specified by number. Returns 0 for non-linked objects,
      1 for the root prim, and 2+ for child prims. Returns 0 if not supported by the
      event.
  ll.DetectedName:
    deprecated:
      message: Use 'getName' instead.
    args:
    - type: number
    must_use: true
    description: Returns a string representing the name of the detected object or
      avatar specified by item. Returns an empty string if item is not a valid index.
  ll.DetectedOwner:
    deprecated:
      message: Use 'getOwner' instead.
    args:
    - type: number
    must_use: true
    description: Returns the key (UUID) of the owner of the detected object specified
      by number. Returns an invalid key if number is not a valid index.
  ll.DetectedPos:
    deprecated:
      message: Use 'getPos' instead.
    args:
    - type: number
    must_use: true
    description: Returns the vector position (in region coordinates) of the detected
      object or avatar specified by number, or <0.0, 0.0, 0.0> if number is not a
      valid index.
  ll.DetectedRezzer:
    deprecated:
      message: Use 'getRezzer' instead.
    args:
    - type: number
    must_use: true
    description: Returns the key (UUID) of the object or avatar that rezzed the detected
      object specified by number.
  ll.DetectedRot:
    deprecated:
      message: Use 'getRot' instead.
    args:
    - type: number
    must_use: true
    description: Returns the rotation of the detected object or avatar specified by
      number, or <0.0, 0.0, 0.0, 1.0> if number is not a valid offset index.
  ll.DetectedTouchBinormal:
    deprecated:
      message: Use 'getTouchBinormal' instead.
    args:
    - type: number
    must_use: true
    description: Returns the surface binormal vector (tangent to the surface, pointing
      along the positive T (V) direction of tangent space) at the touched location
      specified by index. Can be used with llDetectedTouchNormal to determine the
      tangent space.
  ll.DetectedTouchFace:
    deprecated:
      message: Use 'getTouchFace' instead.
    args:
    - type: number
    must_use: true
    description: Returns the integer index of the face clicked by the avatar in the
      touch event specified by index.
  ll.DetectedTouchNormal:
    deprecated:
      message: Use 'getTouchNormal' instead.
    args:
    - type: number
    must_use: true
    description: Returns the surface normal vector (perpendicular to the surface)
      at the touched location specified by index. Can be used with llDetectedTouchBinormal
      to determine the tangent space.
  ll.DetectedTouchPos:
    deprecated:
      message: Use 'getTouchPos' instead.
    args:
    - type: number
    must_use: true
    description: Returns the vector position where the object was touched (specified
      by index) in region coordinates, or in screen-space coordinates if the object
      is attached as a HUD.
  ll.DetectedTouchST:
    deprecated:
      message: Use 'getTouchST' instead.
    args:
    - type: number
    must_use: true
    description: Returns the surface coordinates (<s, t, 0.0>) where the prim was
      touched, specified by index. X and Y contain the horizontal (s) and vertical
      (t) face coordinates, typically in the interval [0.0, 1.0]. Returns TOUCH_INVALID_TEXCOORD
      if coordinates cannot be determined.
  ll.DetectedTouchUV:
    deprecated:
      message: Use 'getTouchUV' instead.
    args:
    - type: number
    must_use: true
    description: Returns the texture coordinates (<u, v, 0.0>) where the prim was
      touched, specified by index. X and Y contain the horizontal (u) and vertical
      (v) texture coordinates, typically in the interval [0.0, 1.0] (affected by repeats
      and rotation). Returns TOUCH_INVALID_TEXCOORD if coordinates cannot be determined.
  ll.DetectedType:
    deprecated:
      message: Use 'getType' instead.
    args:
    - type: number
    must_use: true
    description: Returns an integer bitfield representing the types (AGENT, ACTIVE,
      PASSIVE, or SCRIPTED) of the detected object or avatar specified by number.
      Returns 0 if number is not a valid index.
  ll.DetectedVel:
    deprecated:
      message: Use 'getVel' instead.
    args:
    - type: number
    must_use: true
    description: Returns the vector velocity of the detected object or avatar specified
      by number, or <0.0, 0.0, 0.0> if number is not a valid offset index.
  ll.Dialog:
    args:
    - type:
        display: uuid
    - type: string
    - type: table
    - type: number
    description: Shows a dialog box on the screen of the specified agent, displaying
      msg along with up to 12 choice buttons. Clicking a button chats its label on
      channel. The chat originates at the object's position, but uses the agent's
      name and UUID, so it can be heard as long as the agent is still in the region.
  ll.Die:
    args: []
    description: Deletes the entire object containing the script (the object does
      not go to inventory). Use llBreakLink first to delete only a single prim.
  ll.DumpList2String:
    args:
    - type: table
    - type: string
    must_use: true
    description: Returns a string that is the list src converted to a single string,
      with separator placed between each entry.
  ll.EdgeOfWorld:
    args:
    - type:
        display: vector
    - type:
        display: vector
    must_use: true
    description: Checks if the border reached along the vector dir from the vector
      pos is the edge of the world (i.e., has no neighboring simulator). Returns TRUE
      if it hits the edge of the world, or FALSE if there is a neighboring simulator.
  ll.EjectFromLand:
    args:
    - type:
        display: uuid
    description: Ejects the specified avatar from land/parcels owned by the object's
      owner (group or resident).
  ll.Email:
    args:
    - type: string
    - type: string
    - type: string
    description: Sends an email with the given destination address, subject, and body
      msg. The email will be sent from `{ll.GetKey()}@lsl.secondlife.com`. This can
      be used for script communication; see llGetNextEmail()
  ll.EscapeURL:
    args:
    - type: string
    must_use: true
    description: Returns a string representing the escaped/encoded version of url,
      replacing spaces with '%20' and non-alphanumeric characters with their '%xx'
      hexadecimal UTF-8 equivalent.
  ll.Euler2Rot:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns the rotation representation of the Euler angles vector v.
  ll.Evade:
    args:
    - type:
        display: uuid
    - type: table
    description: Directs a pathfinding character to evade target, attempting to hide
      from its pursuer if a hiding spot is available (i.e., no line of sight from
      the character's head to the pursuer's head, and no direct path on the navmesh).
  ll.ExecCharacterCmd:
    args:
    - type: number
    - type: table
    description: Sends a command (specified by command) to the pathing system with
      options. Currently only supports stopping pathfinding or making the character
      jump.
  ll.Fabs:
    deprecated:
      message: Use 'math.abs' instead. Double precision; fastcall.
      replace:
      - math.abs(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the absolute (positive) value of val.
  ll.FindNotecardTextCount:
    args:
    - type: string
    - type: string
    - type: table
    must_use: true
    description: Searches the text of a cached notecard for lines containing the given
      pattern and returns the number of matches found through a dataserver event.
  ll.FindNotecardTextSync:
    args:
    - type: string
    - type: string
    - type: number
    - type: number
    - type: table
    must_use: true
    description: Synchronously searches a cached notecard name for lines containing
      pattern, returning a list of line and column numbers. Returns a list containing
      'NAK' if the notecard is not cached, or an empty list if no matches are found.
  ll.FleeFrom:
    args:
    - type:
        display: vector
    - type: number
    - type: table
    description: Directs a pathfinding character to keep the specified distance from
      the target position vector (within the region or adjacent regions).
  ll.Floor:
    deprecated:
      message: Use 'math.floor' instead. Fastcall.
      replace:
      - math.floor(%...)
    args:
    - type: number
    must_use: true
    description: Returns the largest integer value less than or equal to val (rounded
      toward negative infinity).
  ll.ForceMouselook:
    args:
    - type: bool
    description: Sets whether any avatar sitting on this prim is forced into mouselook
      mode. Setting mouselook to TRUE forces the mode; FALSE (default) allows the
      avatar to keep their current camera mode.
  ll.Frand:
    args:
    - type: number
    must_use: true
    description: Returns a pseudo-random float in the range [0.0, mag) or (mag, 0.0]
      depending on the sign of mag. The value is inclusive of 0.0 but exclusive of
      mag.
  ll.GenerateKey:
    args: []
    must_use: true
    description: Generates and returns a unique versioned UUID key (utilizing SHA-1
      hashing). Due to being versioned, it will not return NULL_KEY; however, the
      exact UUID version is an implementation detail that should not be relied upon.
  ll.GetAccel:
    args: []
    must_use: true
    description: Returns a vector representing the acceleration of the object in the
      region's frame of reference.
  ll.GetAgentInfo:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns an integer bitfield containing status information about the
      agent specified by id (such as AGENT_FLYING, AGENT_ATTACHMENTS, AGENT_SITTING,
      etc.).
  ll.GetAgentLanguage:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a string representing the language code of the preferred
      interface language set by the avatar.
  ll.GetAgentList:
    args:
    - type: number
    - type: table
    must_use: true
    description: Requests a list of avatar UUID keys for agents currently in the region,
      limited by scope. Returns a list of keys or a list containing an error message
      string.
  ll.GetAgentSize:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a vector representing the estimated bounding box size of
      the specified avatar, or ZERO_VECTOR if they are not in the same region.
  ll.GetAlpha:
    args:
    - type: number
    must_use: true
    description: Returns a float representing the Blinn-Phong alpha (transparency)
      of face. If face is ALL_SIDES, returns the mean average of all faces.
  ll.GetAnimation:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a string representing the name of the currently playing locomotion
      animation for the specified avatar.
  ll.GetAnimationList:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a list of keys (UUIDs) representing all active animations
      currently playing on the specified avatar.
  ll.GetAnimationOverride:
    args:
    - type: string
    must_use: true
    description: Returns a string representing the name of the animation currently
      overriding the specified anim_state. Requires the PERMISSION_OVERRIDE_ANIMATIONS
      or PERMISSION_TRIGGER_ANIMATION runtime permission.
  ll.GetAttached:
    args: []
    must_use: true
    description: Returns the integer attachment point (an ATTACH_* constant) that
      the object is attached to, or 0 if it is unattached or pending detachment.
  ll.GetAttachedList:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a list of object keys (UUIDs) corresponding to public, visible
      (non-HUD) attachments worn by the specified avatar, in the order they were attached.
      Returns a list with an error message string on failure.
  ll.GetAttachedListFiltered:
    args:
    - type:
        display: uuid
    - type: table
    must_use: true
    description: Retrieves a list of attachment object keys worn by avatar in the
      order they were attached, filtered by options. Returns a list containing an
      error message string on failure.
  ll.GetBoundingBox:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns the bounding box of object (including any linked prims) relative
      to its root prim in local coordinates, formatted as [ (vector) min_corner, (vector)
      max_corner ].
  ll.GetCameraAspect:
    args: []
    must_use: true
    description: Returns a float representing the camera's current aspect ratio (width/height)
      of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if permissions
      are not granted.
  ll.GetCameraFOV:
    args: []
    must_use: true
    description: Returns a float representing the camera's current field of view (FOV)
      in radians of the agent who granted PERMISSION_TRACK_CAMERA. Returns 0.0 if
      permissions are not granted.
  ll.GetCameraPos:
    args: []
    must_use: true
    description: Returns a vector representing the camera's current position in region
      coordinates of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_VECTOR
      if permissions are not granted.
  ll.GetCameraRot:
    args: []
    must_use: true
    description: Returns a rotation representing the camera's current orientation
      of the agent who granted PERMISSION_TRACK_CAMERA. Returns ZERO_ROTATION if permissions
      are not granted.
  ll.GetCenterOfMass:
    args: []
    must_use: true
    description: Returns the vector position (in region coordinates) of the center
      of mass. Returns the individual child prim's center of mass if called from a
      child, or the entire linkset's center of mass if called from the root.
  ll.GetClosestNavPoint:
    args:
    - type:
        display: vector
    - type: table
    must_use: true
    description: Returns a list containing the closest vector position on the navigation
      mesh (navmesh) to the specified point (expressed in region-local space), or
      an empty list if none is found. Configured using options.
  ll.GetColor:
    args:
    - type: number
    must_use: true
    description: Returns the Blinn-Phong RGB color vector of face (values between
      0.0 and 1.0). If face is ALL_SIDES, returns the mean average of all faces.
  ll.GetCreator:
    args: []
    must_use: true
    description: Returns the key (UUID) of the prim's original creator.
  ll.GetDate:
    args: []
    must_use: true
    description: Returns a string representing the current date in the UTC time zone
      in the format 'YYYY-MM-DD'.
  ll.GetDayLength:
    args: []
    must_use: true
    description: Returns an integer representing the number of seconds in the environmental
      day cycle applied to the current parcel.
  ll.GetDayOffset:
    args: []
    must_use: true
    description: Returns an integer representing the offset duration (in seconds)
      added to calculate the current environmental time on this parcel.
  ll.GetDisplayName:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns the display name string of the avatar specified by id if
      they are in the region or cached; returns an empty string otherwise (use llRequestDisplayName
      if the avatar is absent).
  ll.GetEnergy:
    args: []
    must_use: true
    description: Returns a float representing the remaining physics energy of the
      object as a percentage (0.0 to 1.0) of its maximum capacity.
  ll.GetEnv:
    args:
    - type: string
    must_use: true
    description: Returns a string containing the requested regional data specified
      by name.
  ll.GetEnvironment:
    args:
    - type:
        display: vector
    - type: table
    must_use: true
    description: Returns a list containing the current environment parameters for
      the parcel or region at pos, retrieved in the order specified by params.
  ll.GetExperienceDetails:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a list of details for the specified experience_id, formatted
      as [string experience_name, key owner_id, key experience_id, integer state,
      string state_message, key group_id].
  ll.GetExperienceErrorMessage:
    args:
    - type: number
    must_use: true
    description: Returns a text description of the specified experience error code,
      or a description of XP_ERROR_UNKNOWN_ERROR if the error is invalid.
  ll.GetForce:
    args: []
    must_use: true
    description: Returns a vector representing the constant force currently applied
      to the object (if the object is physical).
  ll.GetFreeMemory:
    args: []
    must_use: true
    description: Returns an integer representing the number of free bytes of memory
      currently available to the script.
  ll.GetFreeURLs:
    args: []
    must_use: true
    description: Returns an integer representing the number of available HTTP URLs
      (remaining for the owner if the object is attached, or for the region if unattached).
  ll.GetGMTclock:
    args: []
    must_use: true
    description: Returns a float representing the time in seconds since midnight GMT
      (truncated to whole seconds).
  ll.GetGeometricCenter:
    args: []
    must_use: true
    description: Returns a vector representing the geometric center of the object
      relative to its root prim.
  ll.GetHTTPHeader:
    args:
    - type:
        display: uuid
    - type: string
    must_use: true
    description: Returns a string representing the value of the specified header associated
      with the HTTP request_id.
  ll.GetHealth:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a float representing the current health of the avatar or
      object specified by id.
  ll.GetInventoryAcquireTime:
    args:
    - type: string
    must_use: true
    description: Returns the time when the item was placed in the prim's inventory,
      as a UTC timestamp string of the form "YYYY-MM-DDThh:mm:ssZ"
  ll.GetInventoryCreator:
    args:
    - type: string
    must_use: true
    description: Returns the key (UUID) of the creator of the specified inventory
      item.
  ll.GetInventoryDesc:
    args:
    - type: string
    must_use: true
    description: Returns the description string of the specified inventory item.
  ll.GetInventoryKey:
    args:
    - type: string
    must_use: true
    description: Returns the key (UUID) of the specified inventory item.
  ll.GetInventoryName:
    args:
    - type: number
    - type: number
    must_use: true
    description: Returns the name of the inventory item of the specified type (INVENTORY_*)
      at the specified inventory index.
  ll.GetInventoryNumber:
    args:
    - type: number
    must_use: true
    description: Returns the count of items of the specified type (INVENTORY_*) in
      the prim's inventory.
  ll.GetInventoryPermMask:
    args:
    - type: string
    - type: number
    must_use: true
    description: Returns the specified item's permission flags for the specified group.
  ll.GetInventoryType:
    args:
    - type: string
    must_use: true
    description: Returns an integer representing the INVENTORY_* type of the named
      inventory item.
  ll.GetKey:
    args: []
    must_use: true
    description: Returns the key (UUID) of the prim containing the script.
  ll.GetLandOwnerAt:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns the key (UUID) of the land owner at the vector pos, or NULL_KEY
      if the land is public.
  ll.GetLinkKey:
    args:
    - type: number
    must_use: true
    description: Returns the key (UUID) of the linked prim or avatar specified by
      link.
  ll.GetLinkMedia:
    args:
    - type: number
    - type: number
    - type: table
    must_use: true
    description: Returns a list containing the media parameters of the specified face
      on the linked prim link, retrieved in the order requested by params.
  ll.GetLinkName:
    args:
    - type: number
    must_use: true
    description: Returns a string containing the name of the linked prim specified
      by link.
  ll.GetLinkNumber:
    args: []
    must_use: true
    description: Returns the integer link number of the prim containing the script
      (0 for unlinked, 1 for the root, and 2+ for children).
  ll.GetLinkNumberOfSides:
    args:
    - type: number
    must_use: true
    description: Returns an integer representing the number of sides (faces) of the
      linked prim specified by link.
  ll.GetLinkPrimitiveParams:
    args:
    - type: number
    - type: table
    must_use: true
    description: Returns a list of primitive parameters requested in params for the
      linked prim specified by link (equivalent to llGetPrimitiveParams).
  ll.GetLinkSitFlags:
    args:
    - type: number
    must_use: true
    description: Returns an integer representing the active sit flags currently set
      on the linked prim specified by link.
  ll.GetListEntryType:
    deprecated:
      message: Use 'typeof' instead.
      replace:
      - typeof(%1[%2])
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns an integer representing the variable type (TYPE_*) of the
      list entry at index in the list src.
  ll.GetListLength:
    deprecated:
      message: Use '#' or 'rawlen' instead. Metatable support.
      replace:
      - '#%1'
      - rawlen(%1)
    args:
    - type: table
    must_use: true
    description: Returns an integer representing the total number of elements in the
      list src.
  ll.GetLocalPos:
    args: []
    must_use: true
    description: Returns a position vector relative to the root prim. If called from
      the root prim, it returns the global region position (or the position relative
      to the attachment point if attached).
  ll.GetLocalRot:
    args: []
    must_use: true
    description: Returns a rotation representing the local orientation of a child
      prim relative to the root prim, or the object's overall rotation if called from
      the root.
  ll.GetMass:
    args: []
    must_use: true
    description: Returns a float representing the mass of the object (in lindograms).
      Returns the total linkset mass if called from the root, or the individual prim's
      mass if called from a child prim. Returns the wearer's mass if inside an attachment.
  ll.GetMassMKS:
    args: []
    must_use: true
    description: Returns a float representing the mass of the object in kilograms.
      Functionally identical to llGetMass except for using MKS (metric) units.
  ll.GetMaxScaleFactor:
    args: []
    must_use: true
    description: Returns a float representing the maximum scale factor that can be
      applied to the object via llScaleByFactor without violating size or linkability
      limits.
  ll.GetMemoryLimit:
    args: []
    must_use: true
    description: Returns an integer representing the maximum memory limit (in bytes)
      that the script is allowed to allocate.
  ll.GetMinScaleFactor:
    args: []
    must_use: true
    description: Returns a float representing the minimum scale factor that can be
      applied to the object via llScaleByFactor without violating size limits.
  ll.GetMoonDirection:
    args: []
    must_use: true
    description: Returns a normalized vector representing the current direction of
      the parcel's moon, taking altitude into account. Falls back to the region's
      moon direction if no custom parcel environment is set.
  ll.GetMoonRotation:
    args: []
    must_use: true
    description: Returns a rotation representing the orientation applied to the moon
      on the current parcel and altitude track. Falls back to the region's moon rotation
      if no custom parcel environment is set.
  ll.GetNextEmail:
    args:
    - type: string
    - type: string
    description: 'Requests the next queued email via the email event. Emails must

      1. Be sent to `{ll.GetKey()}@lsl.secondlife.com`

      2. Be sent from the specified sender Address (or any address if blank)

      3. Have the specified subject Subject (or any subject if blank)'
  ll.GetNotecardLine:
    args:
    - type: string
    - type: number
    description: Asynchronously requests the line index line of the notecard name
      from the dataserver. Returns a key query handle for the dataserver event, which
      will return 'EOF' when reaching past the end of the notecard.
  ll.GetNotecardLineSync:
    args:
    - type: string
    - type: number
    must_use: true
    description: Synchronously reads the line index line of the notecard name from
      the region's cache, immediately returning its text without raising a dataserver
      event. Returns 'NAK' if not cached or 'EOF' if out of bounds.
  ll.GetNumberOfNotecardLines:
    args:
    - type: string
    description: Asynchronously requests the total line count of the notecard name.
      Returns a key query handle for the dataserver event.
  ll.GetNumberOfPrims:
    args: []
    must_use: true
    description: Returns an integer representing the total number of prims and seated
      avatars in the linkset containing the script.
  ll.GetNumberOfSides:
    args: []
    must_use: true
    description: Returns an integer representing the total number of sides (faces)
      of the prim containing the script.
  ll.GetObjectAnimationNames:
    args: []
    must_use: true
    description: Returns a list of strings representing the names or UUIDs of all
      active animations currently playing on the object.
  ll.GetObjectDesc:
    args: []
    must_use: true
    description: Returns a string containing the description of the specific prim
      containing the script.
  ll.GetObjectDetails:
    args:
    - type:
        display: uuid
    - type: table
    must_use: true
    description: Returns a list containing the requested parameters of the specified
      avatar or object id, retrieved in the order requested by params.
  ll.GetObjectLinkKey:
    args:
    - type:
        display: uuid
    - type: number
    must_use: true
    description: Returns the key (UUID) of the linked child prim specified by link
      within the linkset identified by object_id.
  ll.GetObjectMass:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a float representing the mass of the avatar or object specified
      by id.
  ll.GetObjectName:
    args: []
    must_use: true
    description: Returns a string containing the name of the specific prim containing
      the script.
  ll.GetObjectPermMask:
    args:
    - type: number
    must_use: true
    description: Returns the script's object's permission flags for the specified
      group.
  ll.GetObjectPrimCount:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns an integer representing the total number of prims in the
      object containing the specified prim.
  ll.GetOmega:
    args: []
    must_use: true
    description: Returns a vector representing the physical rotation (angular velocity)
      of the object in radians per second.
  ll.GetOwner:
    args: []
    must_use: true
    description: Returns the key (UUID) of the object's current owner.
  ll.GetOwnerKey:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns the key (UUID) of the owner of the prim specified by id.
  ll.GetParcelDetails:
    args:
    - type:
        display: vector
    - type: table
    must_use: true
    description: Returns a list containing the requested parcel details specified
      by params (retrieved in the same order) for the parcel at the vector pos.
  ll.GetParcelFlags:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns an integer bitfield of parcel flags (PARCEL_FLAG_*) for the
      parcel at the position pos.
  ll.GetParcelMaxPrims:
    args:
    - type:
        display: vector
    - type: bool
    must_use: true
    description: Returns an integer representing the maximum combined land impact
      (prim limit) allowed for objects on the parcel at pos, determined either for
      the single parcel or sim-wide based on sim_wide.
  ll.GetParcelMusicURL:
    args: []
    must_use: true
    description: Returns a string containing the parcel's streaming music (audio)
      URL. The object owner must also be the land owner (or share the same group deeding).
  ll.GetParcelPrimCount:
    args:
    - type:
        display: vector
    - type: number
    - type: bool
    must_use: true
    description: Returns an integer representing the total land impact of objects
      on the parcel at pos in the specified category. If sim_wide is TRUE, returns
      combined usage for all regional parcels owned by the parcel owner; if FALSE,
      returns usage for only the specified parcel.
  ll.GetParcelPrimOwners:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a list of up to 100 strides (formatted as [key owner, integer
      land_impact]) representing owners of objects on the parcel at pos, sorted by
      owner key. Requires owner-like permissions for the parcel and the script owner's
      presence in the region.
  ll.GetPermissions:
    args: []
    must_use: true
    description: Returns an integer bitfield representing the permissions (PERMISSION_*)
      currently granted to the script.
  ll.GetPermissionsKey:
    args: []
    must_use: true
    description: Returns the key (UUID) of the avatar that last granted or declined
      permissions to the script, or NULL_KEY if the permissions request was ignored
      or cancelled.
  ll.GetPhysicsMaterial:
    args: []
    must_use: true
    description: Returns a list of the format [float gravity_multiplier, float restitution,
      float friction, float density] detailing the physical characteristics of the
      object.
  ll.GetPos:
    args: []
    must_use: true
    description: Returns a vector representing the current position of the object
      in region coordinates.
  ll.GetPrimMediaParams:
    args:
    - type: number
    - type: table
    must_use: true
    description: Returns a list containing the media parameters of the specified face,
      retrieved in the order requested by params. Returns an empty list if no media
      exists on the face.
  ll.GetPrimitiveParams:
    args:
    - type: table
    must_use: true
    description: Returns a list of primitive attribute values matching the requested
      params list.
  ll.GetRegionAgentCount:
    args: []
    must_use: true
    description: Returns an integer representing the current number of avatars in
      the region.
  ll.GetRegionCorner:
    args: []
    must_use: true
    description: Returns a vector (in meters) representing the global grid coordinates
      of the south-west corner of the current region (Z component is always 0.0).
  ll.GetRegionDayLength:
    args: []
    must_use: true
    description: Returns an integer representing the total number of seconds in the
      region-wide day cycle.
  ll.GetRegionDayOffset:
    args: []
    must_use: true
    description: Returns an integer representing the offset duration (in seconds)
      added to calculate the current environmental time for the region.
  ll.GetRegionFPS:
    args: []
    must_use: true
    description: Returns a float representing the average region simulator frames
      per second (FPS).
  ll.GetRegionFlags:
    args: []
    must_use: true
    description: Returns an integer bitfield representing the region flags (REGION_FLAG_*)
      currently enabled for the region containing the object.
  ll.GetRegionMoonDirection:
    args: []
    must_use: true
    description: Returns a normalized vector representing the current direction of
      the region's moon, taking altitude into account.
  ll.GetRegionMoonRotation:
    args: []
    must_use: true
    description: Returns a rotation representing the orientation applied to the moon
      at the region level, taking altitude track into account.
  ll.GetRegionName:
    args: []
    must_use: true
    description: Returns a string containing the name of the current region.
  ll.GetRegionSunDirection:
    args: []
    must_use: true
    description: Returns a normalized vector representing the current direction of
      the region's sun, taking altitude into account.
  ll.GetRegionSunRotation:
    args: []
    must_use: true
    description: Returns a rotation representing the orientation applied to the sun
      at the region level, taking altitude track into account.
  ll.GetRegionTimeDilation:
    args: []
    must_use: true
    description: Returns a float representing the current physics time dilation of
      the region, ranging from 0.0 (full dilation / slow) to 1.0 (no dilation / real-world
      speed).
  ll.GetRegionTimeOfDay:
    args: []
    must_use: true
    description: Returns a float with subsecond precision representing the elapsed
      seconds since region environmental midnight or region uptime (whichever is smaller).
      If the region's sun position is fixed, returns region uptime.
  ll.GetRenderMaterial:
    args:
    - type: number
    must_use: true
    description: Returns a string representing the render material on face (returns
      the inventory name if it is in the prim's inventory, or its key UUID otherwise).
  ll.GetRootPosition:
    args: []
    must_use: true
    description: Returns a vector representing the position (in region coordinates)
      of the root prim of the linkset containing the script.
  ll.GetRootRotation:
    args: []
    must_use: true
    description: Returns a rotation representing the orientation (relative to the
      region) of the root prim of the linkset containing the script.
  ll.GetRot:
    args: []
    must_use: true
    description: Returns a rotation representing the prim's orientation relative to
      the region's axes.
  ll.GetSPMaxMemory:
    args: []
    must_use: true
    description: Returns an integer representing the maximum memory (in bytes) used
      by the script while the memory profiler was last active (only valid after using
      PROFILE_SCRIPT_MEMORY).
  ll.GetScale:
    args: []
    must_use: true
    description: Returns a vector representing the physical scale (dimensions in meters)
      of the prim containing the script.
  ll.GetScriptName:
    args: []
    must_use: true
    description: Returns a string containing the name of the script calling this function.
  ll.GetScriptState:
    args:
    - type: string
    must_use: true
    description: Returns a boolean integer indicating whether the specified script
      in the prim's inventory is running (returns TRUE if running, FALSE otherwise).
  ll.GetSimStats:
    args:
    - type: number
    must_use: true
    description: Returns a float containing the value of the requested region statistic
      specified by stat_type.
  ll.GetSimulatorHostname:
    args: []
    must_use: true
    description: Returns a string containing the hostname of the server machine running
      the script (e.g., 'sim225.agni.lindenlab.com').
  ll.GetStartParameter:
    args: []
    must_use: true
    description: Returns an integer representing the start/rez parameter passed to
      the object on creation (returns 0 if rezzed by an agent).
  ll.GetStartString:
    args: []
    must_use: true
    description: Returns the initialization string passed to the object's root prim
      on rez with llRezObjectWithParams (via REZ_PARAM_STRING; returns an empty string
      if rezzed by an agent).
  ll.GetStaticPath:
    args:
    - type:
        display: vector
    - type:
        display: vector
    - type: number
    - type: table
    must_use: true
    description: Returns a list of position vectors representing pathfinding waypoints
      between start and end on the static navmesh for a character of the specified
      radius. Ignores movable obstacles and can be used in any region regardless of
      dynamic pathfinding status.
  ll.GetStatus:
    args:
    - type: number
    must_use: true
    description: Returns a boolean integer indicating whether the specified status
      flag status is enabled for the object.
  ll.GetSubString:
    args:
    - type: string
    - type: number
    - type: number
    must_use: true
    description: Returns a copy of the substring from src within the inclusive codepoint
      range start_index..end_index. Negative indices count backward from the end of
      the string. If start_index is greater than end_index, the substring is the excluded
      range.
  ll.GetSunDirection:
    args: []
    must_use: true
    description: Returns a normalized vector representing the current direction of
      the parcel's sun, taking altitude into account. Falls back to the region's sun
      direction if no custom parcel environment is set.
  ll.GetSunRotation:
    args: []
    must_use: true
    description: Returns a rotation representing the orientation applied to the sun
      on the current parcel and altitude track. Falls back to the region's sun rotation
      if no custom parcel environment is set.
  ll.GetTexture:
    args:
    - type: number
    must_use: true
    description: Returns a string representing the Blinn-Phong diffuse texture on
      face (returns the inventory name if it is a texture in the prim's inventory,
      or its key UUID otherwise).
  ll.GetTextureOffset:
    args:
    - type: number
    must_use: true
    description: Returns a vector containing the texture offsets of face in the X
      (horizontal U) and Y (vertical V) components (Z is unused).
  ll.GetTextureRot:
    args:
    - type: number
    must_use: true
    description: Returns a float representing the texture rotation angle (in radians)
      on face.
  ll.GetTextureScale:
    args:
    - type: number
    must_use: true
    description: Returns a vector containing the texture scales of face in the X and
      Y components (Z is unused).
  ll.GetTime:
    args: []
    must_use: true
    description: Returns a float representing the elapsed script time in seconds with
      subsecond precision (since the script started, was reset, or since the last
      call to llResetTime or llGetAndResetTime).
  ll.GetTimeOfDay:
    args: []
    must_use: true
    description: Returns a float with subsecond precision representing the elapsed
      seconds since parcel environmental midnight or region uptime (whichever is smaller).
      If the parcel's sun position is fixed, returns region uptime.
  ll.GetTimestamp:
    args: []
    must_use: true
    description: Returns a string containing the current date and time in the UTC
      time zone formatted as an ISO 8601 timestamp ('YYYY-MM-DDThh:mm:ss.ff..fZ').
  ll.GetTorque:
    args: []
    must_use: true
    description: Returns a vector representing the physical torque force currently
      acting on the object (if the object is physical).
  ll.GetUnixTime:
    deprecated:
      message: Use 'os.time' instead. Int32 will wrap on 2038-01-19
    args: []
    must_use: true
    description: Returns an integer representing the current Unix timestamp (the number
      of seconds elapsed since 00:00:00 Jan 1, 1970 UTC).
  ll.GetUsedMemory:
    args: []
    must_use: true
    description: Returns an integer representing the total number of bytes of memory
      currently used by the script (non-Mono scripts always return 16,384 bytes).
  ll.GetUsername:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a string representing the unique username of the avatar specified
      by id if they are connected to the region or cached; returns an empty string
      otherwise (use llRequestUsername if the avatar is absent).
  ll.GetVel:
    args: []
    must_use: true
    description: Returns a vector representing the velocity of the object (in meters
      per second) relative to the global region coordinates. For physical objects,
      returns the velocity of its center of mass.
  ll.GetVisualParams:
    args:
    - type:
        display: uuid
    - type: table
    must_use: true
    description: Returns a list containing the values of the visual parameters requested
      in params for the agent specified by agentid.
  ll.GetWallclock:
    args: []
    must_use: true
    description: Returns a float representing the time in seconds since midnight Pacific
      Time (PST/PDT), which is equivalent to Second Life Time (SLT) truncated to whole
      seconds.
  ll.GiveAgentInventory:
    args:
    - type:
        display: uuid
    - type: string
    - type: table
    - type: table
    description: Gives the specified inventory items to the agent as a new folder
      named folder, as permitted by the permissions system. Customizes the transfer
      using options.
  ll.GiveInventory:
    args:
    - type:
        display: uuid
    - type: string
    description: Gives the specified inventory item to the target, as permitted by
      the permissions system. The target can be any agent or an object located in
      the same region.
  ll.GiveInventoryList:
    args:
    - type:
        display: uuid
    - type: string
    - type: table
    description: Gives the list of inventory items to target as a new folder named
      folder. If target is an object, the items are passed directly into its inventory
      and no folder is created. The target must be an agent or an object in the same
      region.
  ll.GiveMoney:
    args:
    - type:
        display: uuid
    - type: number
    description: Transfers the specified amount of L$ from the script owner to the
      destination avatar. Silently fails if the PERMISSION_DEBIT permission has not
      been granted. Returns 0 (use llTransferLindenDollars to match transactions to
      transaction_result events).
  ll.GodLikeRezObject:
    args:
    - type:
        display: uuid
    - type:
        display: vector
    description: Rezzes an object directly from a UUID specified by id at the position
      pos, provided the owner has the god-bit set.
  ll.Ground:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a float representing the ground height directly below the
      prim's position offset by the vector offset.
  ll.GroundContour:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a vector representing the ground contour direction (the direction
      with no change in elevation) directly below the prim's position offset by the
      vector offset.
  ll.GroundNormal:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a vector representing the ground surface normal vector directly
      below the current position offset by the vector offset.
  ll.GroundRepel:
    args:
    - type: number
    - type: bool
    - type: number
    description: Critically damps the object's vertical motion to height (using critical
      damping timescale tau) if it is within height * 0.5 of the terrain (or water
      level if water is TRUE). Only works on physics-enabled objects; do not use with
      vehicles.
  ll.GroundSlope:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a vector representing the ground slope directly below the
      prim's position offset by the vector offset.
  ll.HMAC:
    args:
    - type: string
    - type: string
    - type: string
    must_use: true
    description: Returns a Base64-encoded HMAC hash of msg using the secret key private_key
      and the specified digest algorithm (md5, sha1, sha224, sha256, sha384, or sha512).
  ll.HTTPRequest:
    args:
    - type: string
    - type: table
    - type: string
    description: Sends an HTTP request to the specified url containing body and configured
      via parameters. Raises an http_response event and returns a key query handle
      identifying the request.
  ll.HTTPResponse:
    args:
    - type:
        display: uuid
    - type: number
    - type: string
    description: Responds to the incoming HTTP request identified by request_id with
      the HTTP status code status and the payload body.
  ll.Hash:
    args:
    - type: string
    must_use: true
    description: Returns an integer representing the 32-bit hash value of the string
      val (returns 0 if the string is empty).
  ll.InsertString:
    args:
    - type: string
    - type: number
    - type: string
    must_use: true
    description: Returns a copy of dst with src inserted at the given codepoint index.
  ll.InstantMessage:
    args:
    - type:
        display: uuid
    - type: string
    description: Sends an instant message containing msg to the agent identified by
      their key.
  ll.IntegerToBase64:
    args:
    - type: number
    must_use: true
    description: Returns an 8-character Base64 string representing the big-endian
      encoded value of number.
  ll.IsFriend:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns TRUE if agent_id and the owner of the script are friends,
      and FALSE otherwise.
  ll.IsLinkGLTFMaterial:
    args:
    - type: number
    - type: number
    must_use: true
    description: Checks the specified face on the linked prim link. Returns TRUE if
      the face material is a PBR render material, or FALSE if it uses Blinn-Phong
      diffuse textures.
  ll.Json2List:
    deprecated:
      message: Use 'lljson.decode' instead.
    args:
    - type: string
    must_use: true
    description: Parses the JSON string src and returns a list representing its top-level
      elements.
  ll.JsonGetValue:
    deprecated:
      message: Use 'lljson.decode' instead. Also, the indices are zero-based.
    args:
    - type: string
    - type: table
    must_use: true
    description: Parses the JSON string json and returns the value found by traversing
      the specified path of specifiers as a string.
  ll.JsonSetValue:
    deprecated:
      message: Use 'lljson.encode' instead. Also, the indices are zero-based.
    args:
    - type: string
    - type: table
    - type: string
    must_use: true
    description: Returns a new JSON string representing json with the target located
      at specifiers set to value. Supports JSON_APPEND to append elements. Writing
      JSON_DELETE deletes the target. Overwriting array bounds or setting non-array
      levels with array indices returns JSON_INVALID.
  ll.JsonValueType:
    deprecated:
      message: Use 'lljson.decode' and 'typeof' instead. Also, the indices are zero-based.
    args:
    - type: string
    - type: table
    must_use: true
    description: Parses the JSON string json and returns the JSON type constant (JSON_*)
      representing the value found at specifiers.
  ll.Key2Name:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns a string containing the name of the prim or avatar specified
      by id. The target must be a valid, rezzed entity in the current region, otherwise
      an empty string is returned. Avatars return their legacy name.
  ll.KeyCountKeyValue:
    args: []
    description: Starts an asynchronous transaction requesting the total count of
      keys in the experience data store. Returns a key query handle for the dataserver
      event.
  ll.KeysKeyValue:
    args:
    - type: number
    - type: number
    description: Starts an asynchronous transaction to retrieve count keys from the
      experience data store starting at the zero-based index first. Returns a key
      query handle for the dataserver event. Fails with XP_ERROR_KEY_NOT_FOUND if
      out of bounds.
  ll.Linear2sRGB:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns a vector representing the conversion of color from the linear
      RGB colorspace into the sRGB colorspace.
  ll.LinkAdjustSoundVolume:
    args:
    - type: number
    - type: number
    description: Adjusts the volume of the currently playing sound attached to the
      linked prim link (has no effect on sounds started with llTriggerSound).
  ll.LinkParticleSystem:
    args:
    - type: number
    - type: table
    description: Creates or updates a particle system on the linked prim link based
      on the list of rules. An empty list removes the particle system.
  ll.LinkPlaySound:
    args:
    - type: number
    - type: string
    - type: number
    - type: number
    description: Plays the specified sound on the linked prim link (once or looping)
      at volume. Only one sound can be attached to a prim at a time; new attachments
      or calling llStopSound stops previous playback. Controlled by flags.
  ll.LinkSetSoundQueueing:
    args:
    - type: number
    - type: bool
    description: Enables or disables sound queuing on the linked prim link. When set
      to TRUE, sounds will queue and play in sequence.
  ll.LinkSetSoundRadius:
    args:
    - type: number
    - type: number
    description: Limits the audibility radius of attached and triggered scripted sounds
      to distance radius (in meters) around the linked prim link.
  ll.LinkSitTarget:
    args:
    - type: number
    - type:
        display: vector
    - type:
        display: quaternion
    description: Sets the sit target position (offset) and orientation (rot) for the
      linked prim link, relative to the prim's own position and rotation. Clear by
      setting offset to <0.0, 0.0, 0.0>.
  ll.LinkStopSound:
    args:
    - type: number
    description: Stops the playback of any currently playing attached sound on the
      linked prim link.
  ll.LinksetDataAvailable:
    args: []
    must_use: true
    description: Returns an integer representing the number of bytes available/remaining
      in the linkset's datastore.
  ll.LinksetDataCountFound:
    args:
    - type: string
    must_use: true
    description: Returns the total count of keys in the linkset datastore that match
      the regular expression pattern.
  ll.LinksetDataCountKeys:
    args: []
    must_use: true
    description: Returns an integer representing the total number of unique keys stored
      in the linkset's datastore.
  ll.LinksetDataDelete:
    args:
    - type: string
    description: Deletes the unprotected key-value pair specified by name from the
      linkset's datastore, triggering a linkset_data event.
  ll.LinksetDataDeleteFound:
    args:
    - type: string
    - type: string
    description: Deletes all keys in the datastore matching the regular expression
      pattern. Returns a list [num_deleted, num_failed_protected]. Decrypts and deletes
      protected keys if matching pass is provided.
  ll.LinksetDataDeleteProtected:
    args:
    - type: string
    - type: string
    description: Deletes the protected key-value pair specified by name from the linkset's
      datastore using the passphrase pass, triggering a linkset_data event.
  ll.LinksetDataFindKeys:
    args:
    - type: string
    - type: number
    - type: number
    must_use: true
    description: Returns an alphabetically sorted list of up to count keys from the
      datastore that match the regular expression pattern, starting at index start
      (returns all matching keys if count < 1).
  ll.LinksetDataListKeys:
    args:
    - type: number
    - type: number
    must_use: true
    description: Returns an alphabetically sorted list of up to count keys from the
      datastore, starting at index start (returns all keys if count < 1).
  ll.LinksetDataRead:
    args:
    - type: string
    must_use: true
    description: Reads and returns the string value corresponding to key name from
      the linkset's datastore.
  ll.LinksetDataReadProtected:
    args:
    - type: string
    - type: string
    must_use: true
    description: Reads and returns the string value of the protected key name from
      the linkset's datastore using the passphrase pass.
  ll.LinksetDataReset:
    args: []
    description: Erases all key-value pairs stored in the linkset's datastore, triggering
      a linkset_data event (with LINKSETDATA_RESET) in all scripts in the linkset.
  ll.LinksetDataWrite:
    args:
    - type: string
    - type: string
    description: Creates or updates an unprotected key-value pair (name and value)
      in the linkset's datastore. Returns an integer success or failure code.
  ll.LinksetDataWriteProtected:
    args:
    - type: string
    - type: string
    - type: string
    description: Creates or updates a protected key-value pair (name and value) in
      the linkset's datastore using the passphrase pass. Returns an integer success
      or failure code.
  ll.List2CSV:
    args:
    - type: table
    must_use: true
    description: Returns a string of comma-separated values taken in order from the
      list src.
  ll.List2Float:
    deprecated:
      message: Use '[]' and 'tonumber' instead.
      replace:
      - tonumber(%1[%2]) or 0
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the float value at index in the list src. Returns 0.0 if
      the index is out of bounds or if the value cannot be type-cast.
  ll.List2Integer:
    deprecated:
      message: Use '[]', 'tonumber', and 'math.modf' instead.
      replace:
      - math.modf(tonumber(%1[%2]) or 0)
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the integer value at index in the list src. Returns 0 if
      the index is out of bounds or if the value cannot be type-cast.
  ll.List2Json:
    deprecated:
      message: Use 'lljson.encode' instead.
      replace:
      - lljson.encode(%2)
    args:
    - type: string
    - type: table
    must_use: true
    description: Converts the list values into a JSON string of the specified type
      (either a JSON_ARRAY or a JSON_OBJECT). Returns JSON_INVALID if an error is
      encountered.
  ll.List2Key:
    deprecated:
      message: Use '[]' and 'touuid' instead.
      replace:
      - touuid(%1[%2]) or NULL_KEY
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the key (UUID) value at index in the list src. Returns a
      null string/key if the index is out of bounds or if the value cannot be type-cast.
  ll.List2List:
    deprecated:
      message: Use 'unpack' (fastcall) or 'table.move' instead. Prefer structured
        tables over strided lists.
      replace:
      - table.pack(unpack(%...))
      - table.move(%..., 1, {})
    args:
    - type: table
    - type: number
    - type: number
    must_use: true
    description: Returns a new list containing the subset of entries from src within
      the inclusive range specified by the start and end indices. Negative indices
      count backward from the end.
  ll.List2ListSlice:
    deprecated:
      message: Prefer structured tables over strided lists.
    args:
    - type: table
    - type: number
    - type: number
    - type: number
    - type: number
    must_use: true
    description: Returns a list containing the slice_index'th element of every stride
      within the inclusive range from start to end in the strided list src. Stride
      must be a positive integer.
  ll.List2ListStrided:
    deprecated:
      message: Prefer structured tables over strided lists.
    args:
    - type: table
    - type: number
    - type: number
    - type: number
    must_use: true
    description: Returns a new list containing the first element of every stride in
      the strided list src within the inclusive range from start to end.
  ll.List2Rot:
    deprecated:
      message: Use '[]' instead.
      replace:
      - '%1[%2]'
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the rotation value at index in the list src. Returns ZERO_ROTATION
      if the index is out of bounds or if the value cannot be type-cast.
  ll.List2String:
    deprecated:
      message: Use '[]' and 'tostring' instead.
      replace:
      - tostring(%1[%2])
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the string value at index in the list src. Returns an empty
      string if the index is out of bounds.
  ll.List2Vector:
    deprecated:
      message: Use '[]' instead.
      replace:
      - '%1[%2]'
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns the vector value at index in the list src. Returns ZERO_VECTOR
      if the index is out of bounds or if the value cannot be type-cast.
  ll.ListFindList:
    deprecated:
      message: Use 'table.find' instead. Prefer dictionaries or single-item searches.
      replace:
      - table.find(%1, %2[1])
    args:
    - type: table
    - type: table
    must_use: true
    description: Returns the integer index of the first instance of list test within
      the list src (returns nil if not found).
  ll.ListFindListNext:
    deprecated:
      message: Use 'table.find' instead. Prefer dictionaries or single-item searches.
      replace:
      - table.find(%1, %2[1])
    args:
    - type: table
    - type: table
    - type: number
    must_use: true
    description: Returns the integer index of the specified instance of list test
      within the list src (returns nil if not found).
  ll.ListFindStrided:
    deprecated:
      message: Prefer dictionary lookups over strided list searches.
    args:
    - type: table
    - type: table
    - type: number
    - type: number
    - type: number
    must_use: true
    description: Returns the integer index of the first instance of list test in the
      strided list src within the range from start to end (stepping through by stride).
      Returns nil if not found.
  ll.ListInsertList:
    deprecated:
      message: Use 'table.insert' instead. Unnecessary table copying. Fastcall.
      replace:
      - table.insert(%1, %3, %2[1])
      - 'table.move(%2, 1, #%2, %3, %1)'
    args:
    - type: table
    - type: table
    - type: number
    must_use: true
    description: Returns a new list containing all elements of dest with the elements
      of src inserted starting at index start. Does not modify dest itself.
  ll.ListRandomize:
    args:
    - type: table
    - type: number
    must_use: true
    description: Returns a randomized copy of the list src by blocks of size stride.
      If the list length is not perfectly divisible by stride, no randomization occurs.
  ll.ListReplaceList:
    deprecated:
      message: Use 't[n] = x' instead. Unnecessary table copying.
      replace:
      - '%1[%3] = %2[1]'
    args:
    - type: table
    - type: table
    - type: number
    - type: number
    must_use: true
    description: Returns a copy of the list dest with the inclusive range from start
      to end removed, and the elements of src inserted in its place at start.
  ll.ListSort:
    args:
    - type: table
    - type: number
    - type: bool
    must_use: true
    description: Returns a copy of the list src, sorted into blocks of stride in ascending
      order (if ascending is TRUE) or descending order (if FALSE). Only works if the
      first entry of each block shares the same datatype.
  ll.ListSortStrided:
    deprecated:
      message: Use 'table.sort' instead. Prefer structured tables over strided lists.
    args:
    - type: table
    - type: number
    - type: number
    - type: bool
    must_use: true
    description: Returns a copy of the list src sorted into blocks of stride by the
      element at stride_index in each block. Sorted in ascending order (if ascending
      is TRUE) or descending order (if FALSE).
  ll.ListStatistics:
    args:
    - type: number
    - type: table
    must_use: true
    description: Returns a float representing the result of performing the statistical
      aggregate function operation (a LIST_STAT_* constant) on the numeric list src.
  ll.Listen:
    args:
    - type: number
    - type: string
    - type:
        display: uuid
    - type: string
    description: Creates a listener on channel from name and id for msg. Returns an
      integer listener handle used to control or remove the listener. Empty strings
      or NULL_KEY filters do not filter on those parameters.
  ll.ListenControl:
    args:
    - type: number
    - type: bool
    description: Enables or disables the listener specified by the integer handle.
      If active is TRUE, the listener is activated; if FALSE, it is deactivated.
  ll.ListenRemove:
    args:
    - type: number
    description: Completely removes the listener specified by the integer handle.
  ll.LoadURL:
    args:
    - type:
        display: uuid
    - type: string
    - type: string
    description: Shows a dialog box displaying message to the avatar avatar offering
      to open the specified url. Clicking yes launches the URL in their default web
      browser.
  ll.Log:
    deprecated:
      message: Use 'math.log' instead. Double precision; fastcall.
      replace:
      - math.log(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the natural (base e) logarithm of the
      positive value val (returns 0.0 if val <= 0).
  ll.Log10:
    deprecated:
      message: Use 'math.log10' instead. Double precision; fastcall.
      replace:
      - math.log10(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the base-10 (common) logarithm of the
      positive value val (returns 0.0 if val <= 0).
  ll.LookAt:
    args:
    - type:
        display: vector
    - type: number
    - type: number
    description: Causes the object to orient its positive Z-axis (up axis) toward
      the target vector, keeping its positive X-axis (forward axis) below the horizon.
      Tracks target until llStopLookAt is called or strength is set to 0.0.
  ll.LoopSound:
    args:
    - type: string
    - type: number
    description: Plays the attached sound looping indefinitely at the specified volume.
      Only one sound can be attached to a prim at a time; new loops adjust the volume
      of the currently playing sound without restarting it.
  ll.LoopSoundMaster:
    args:
    - type: string
    - type: number
    description: Plays the attached sound looping indefinitely at the specified volume
      and declares it a Sync Master, forcing slave sounds to synchronize with it.
  ll.LoopSoundSlave:
    args:
    - type: string
    - type: number
    description: Plays the attached sound looping indefinitely at the specified volume,
      synchronized to the most audible active Sync Master in range.
  ll.MD5String:
    args:
    - type: string
    - type: number
    must_use: true
    description: Returns a string of 32 hex characters representing the MD5 checksum
      of src salted with nonce (formatted as ':' + nonce).
  ll.MakeExplosion:
    deprecated:
      message: Use 'll.ParticleSystem' instead.
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: string
    - type:
        display: vector
    description: Deprecated. Generates a circular explosion of particles. Use llParticleSystem
      instead.
  ll.MakeFire:
    deprecated:
      message: Use 'll.ParticleSystem' instead.
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: string
    - type:
        display: vector
    description: Deprecated. Generates fire-like particles. Use llParticleSystem instead.
  ll.MakeFountain:
    deprecated:
      message: Use 'll.ParticleSystem' instead.
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: string
    - type:
        display: vector
    - type: number
    description: Deprecated. Generates a fountain of particles. Use llParticleSystem
      instead.
  ll.MakeSmoke:
    deprecated:
      message: Use 'll.ParticleSystem' instead.
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: string
    - type:
        display: vector
    description: Deprecated. Generates smoke-like particles. Use llParticleSystem
      instead.
  ll.ManageEstateAccess:
    args:
    - type: number
    - type:
        display: uuid
    description: Adds or removes agents from the estate's access or ban lists, or
      groups from the estate's group access list, specified by the action. Returns
      TRUE if successful, or FALSE if throttled, if the action/ID is invalid, or if
      the script owner lacks estate management rights.
  ll.MapBeacon:
    args:
    - type: string
    - type:
        display: vector
    - type: table
    description: Displays an in-world beacon and optionally opens the world map for
      the avatar touching or wearing the object, centered on region_name with pos
      highlighted. Only works for attached scripts or during touch events.
  ll.MapDestination:
    args:
    - type: string
    - type:
        display: vector
    - type:
        display: vector
    description: 'Opens the world map for the avatar touching or wearing the object,
      centered on simname with pos highlighted. Only works for attached scripts or
      during touch events. Note: look_at currently has no effect.'
  ll.MessageLinked:
    args:
    - type: number
    - type: number
    - type: string
    - type: string
    description: Triggers a link_message event, sending num, str, and id to the scripts
      in the prim(s) specified by link to allow scripts within the same object to
      communicate.
  ll.MinEventDelay:
    args:
    - type: number
    description: Sets the minimum delay time between events being handled (minimums
      and defaults vary by event type).
  ll.ModPow:
    args:
    - type: number
    - type: number
    - type: number
    must_use: true
    description: Returns an integer representing a raised to the power b, modulo c
      (i.e., (a**b)%c). The b value is capped at 0xFFFF (16 bits).
  ll.ModifyLand:
    args:
    - type: number
    - type: number
    description: Modifies the terrain using the specified land action and brush size
      (0, 1, or 2, corresponding to 2m x 2m, 4m x 4m, or 8m x 8m).
  ll.MoveToTarget:
    args:
    - type:
        display: vector
    - type: number
    description: Critically damps the physical object's motion to position target
      in tau seconds. Setting tau to 0.0 stops the critical damping; recommended tau
      values are greater than 0.2.
  ll.Name2Key:
    args:
    - type: string
    must_use: true
    description: Requests the key (UUID) of the avatar name in the current region.
      Returns NULL_KEY if no matching agent is present. Formats are 'First Last' or
      'first.last' (assumes 'Resident' if last name is omitted; case-insensitive).
  ll.NavigateTo:
    args:
    - type:
        display: vector
    - type: table
    description: Directs a pathfinding character to navigate to the position pos (located
      in the current or adjacent regions) using the parameters specified in options.
  ll.OffsetTexture:
    args:
    - type: number
    - type: number
    - type: number
    description: Sets the texture horizontal (u) and vertical (v) offsets for the
      chosen face. If face is ALL_SIDES, offsets all faces.
  ll.OpenFloater:
    args:
    - type: string
    - type: string
    - type: table
    description: Opens the specified viewer floater_name loaded with url and configured
      via params. Returns an integer error code, or 0 if successful.
  ll.OpenRemoteDataChannel:
    deprecated:
      message: Deprecated. Creates a channel to listen for incoming XML-RPC calls,
        triggering a remote_data event with the channel ID once available.
    args: []
    description: Deprecated. Creates a channel to listen for incoming XML-RPC calls,
      triggering a remote_data event with the channel ID once available.
  ll.Ord:
    args:
    - type: string
    - type: number
    must_use: true
    description: Returns the ordinal (Unicode copepoint integer) of the character
      at index in the string val. Negative indices count backward from the end of
      the string.
  ll.OverMyLand:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns TRUE if the avatar or object specified by key id is over
      land owned by the script owner, or FALSE otherwise.
  ll.OwnerSay:
    deprecated:
      message: Use 'print' instead.
      replace:
      - print(%...)
    args:
    - type: string
    description: Sends the chat message msg privately to the object owner (the owner
      must be currently in the same region for the message to be received).
  ll.ParcelMediaCommandList:
    args:
    - type: table
    description: Controls the playback of movies and other multimedia resources on
      a parcel or for an agent, using the PARCEL_MEDIA_COMMAND_* settings specified
      in commandList.
  ll.ParcelMediaQuery:
    args:
    - type: table
    must_use: true
    description: Queries the media properties of the parcel containing the script,
      returning a list of values in the order requested by query. Only works if the
      object is owned by the landowner or deeded to the land's group.
  ll.ParseString2List:
    args:
    - type: string
    - type: table
    - type: table
    must_use: true
    description: Breaks the string src into a list of substrings, discarding any separators,
      keeping spacers, and omitting any empty null values. separators and spacers
      accept up to 8 string entries each.
  ll.ParseStringKeepNulls:
    args:
    - type: string
    - type: table
    - type: table
    must_use: true
    description: Breaks the string src into a list of substrings, discarding separators
      and keeping spacers, while preserving empty null values (unlike llParseString2List).
      separators and spacers accept up to 8 string entries each.
  ll.ParticleSystem:
    args:
    - type: table
    description: Creates or updates a particle system on the prim containing the script
      based on rules. An empty list removes the particle system.
  ll.PassCollisions:
    args:
    - type: number
    description: Sets the pass-collisions attribute. If pass is TRUE, collision events
      are passed from child prims to the root; if FALSE (default), they only trigger
      events in the affected child prim.
  ll.PassTouches:
    args:
    - type: number
    description: Sets the pass-touches attribute. If pass is TRUE, touch events are
      passed from child prims to the root; if FALSE (default), they only trigger events
      in the affected child prim.
  ll.PatrolPoints:
    args:
    - type: table
    - type: table
    description: Directs a pathfinding character to patrol sequentially through the
      coordinates specified in patrolPoints, configured by options.
  ll.PlaySound:
    args:
    - type: string
    - type: number
    description: Plays the specified sound once at volume, attached to the object.
      Only one sound can be attached to a prim at a time; new sounds or calling llStopSound
      stops previous playback. A second call with the same sound adjusts the volume
      without restarting it.
  ll.PlaySoundSlave:
    args:
    - type: string
    - type: number
    description: Plays the attached sound once at volume, synchronized to the next
      loop point of the most audible active Sync Master.
  ll.Pow:
    deprecated:
      message: Use '^' instead. Double precision; operator.
      replace:
      - '%1 ^ %2'
      - math.pow(%...)
      - math.exp(%2)
    args:
    - type: number
    - type: number
    must_use: true
    description: Returns a float representing base raised to the power exponent. Returns
      0 and triggers a Math Error for imaginary results.
  ll.PreloadSound:
    args:
    - type: string
    description: Causes nearby viewers in range to preload the specified sound from
      the object's inventory to prevent playback delays.
  ll.Pursue:
    args:
    - type:
        display: uuid
    - type: table
    description: Directs a pathfinding character to pursue and chase target, configured
      by the parameters specified in options.
  ll.PushObject:
    args:
    - type:
        display: uuid
    - type:
        display: vector
    - type:
        display: vector
    - type: bool
    description: Applies physical impulse (force) and ang_impulse (rotational force)
      to the specified target avatar or object.
  ll.ReadKeyValue:
    args:
    - type: string
    description: Starts an asynchronous transaction to read the value associated with
      key k in the experience. Returns a key query handle for the dataserver event.
      Fails with XP_ERROR_KEY_NOT_FOUND if the key does not exist.
  ll.RefreshPrimURL:
    deprecated:
      message: Use 'll.SetPrimMediaParams' instead.
    args: []
    description: Legacy function intended to reload the web page displayed on the
      prim's faces (currently non-functional).
  ll.RegionSay:
    args:
    - type: number
    - type: string
    description: Broadcasts the message msg to all scripts listening on channel Channel
      within the region. PUBLIC_CHANNEL (0) cannot be used, so, only scripts can receive
      the message.
  ll.RegionSayTo:
    args:
    - type:
        display: uuid
    - type: number
    - type: string
    description: Sends the message msg on Channel privately to the targeted agent
      or object (if within the region). If target is an agent and channel is non-zero,
      the message can also be heard by any attachments worn by the avatar.
  ll.ReleaseCamera:
    deprecated:
      message: Use 'll.ClearCameraParams' instead.
      replace:
      - ll.ClearCameraParams()
    args:
    - type:
        display: uuid
    description: Deprecated. Intended to return camera control back to the avatar
      (use llClearCameraParams instead).
  ll.ReleaseControls:
    args: []
    description: Stops taking inputs (previously acquired via llTakeControls) from
      the avatar, dequeuing any remaining control events and revoking the PERMISSION_TAKE_CONTROLS
      permission.
  ll.ReleaseURL:
    args:
    - type: string
    description: Releases the specified url (previously obtained via llRequestURL),
      rendering it no longer usable.
  ll.RemoteDataReply:
    deprecated:
      message: Deprecated. Sends an XML-RPC reply on channel to message_id with payload
        string sdata and integer idata.
    args:
    - type:
        display: uuid
    - type:
        display: uuid
    - type: string
    - type: number
    description: Deprecated. Sends an XML-RPC reply on channel to message_id with
      payload string sdata and integer idata.
  ll.RemoteDataSetRegion:
    deprecated:
      message: Deprecated. Used with XML-RPC to reregister remote data channels if
        the object moves to another region.
    args: []
    description: Deprecated. Used with XML-RPC to reregister remote data channels
      if the object moves to another region.
  ll.RemoteLoadScriptPin:
    args:
    - type:
        display: uuid
    - type: string
    - type: number
    - type: bool
    - type: number
    description: Copies the script into target, setting it running (if running is
      TRUE) with the start_param, provided the script owner has modify permissions
      on target and target's PIN matches pin (set via llSetRemoteScriptAccessPin).
  ll.RemoveFromLandBanList:
    args:
    - type:
        display: uuid
    description: Removes the specified avatar from the land parcel's ban list.
  ll.RemoveFromLandPassList:
    args:
    - type:
        display: uuid
    description: Removes the specified avatar from the land parcel's pass/access list.
  ll.RemoveInventory:
    args:
    - type: string
    description: Permanently deletes the named inventory item from the prim's inventory.
  ll.RemoveVehicleFlags:
    args:
    - type: number
    description: Disables the specified vehicle flags (sets them to FALSE) using the
      bitwise mask flags.
  ll.ReplaceAgentEnvironment:
    args:
    - type:
        display: uuid
    - type: number
    - type: string
    description: Replaces the region and parcel environment seen by the specified
      agent_id as part of an experience, transitioning the settings over transition
      seconds. Passing NULL_KEY or an empty string for environment restores defaults.
  ll.ReplaceEnvironment:
    args:
    - type:
        display: vector
    - type: string
    - type: number
    - type: number
    - type: number
    description: Replaces the environment on the parcel containing position (or the
      entire region if position is <-1.0, -1.0, -1.0>) for the specified track_no.
      Modifies day_length and day_offset if specified. Requires edit permissions on
      the parcel or estate management rights.
  ll.ReplaceSubString:
    args:
    - type: string
    - type: string
    - type: string
    - type: number
    must_use: true
    description: Returns a copy of src with count occurrences of pattern replaced
      by replacement_pattern. Setting count to 0 replaces all occurrences; positive
      counts process left-to-right, while negative counts process right-to-left.
  ll.RequestAgentData:
    args:
    - type:
        display: uuid
    - type: number
    description: Asynchronously requests the specified data category (DATA_*) about
      the agent id. Triggers a dataserver event with the results and returns a key
      query handle.
  ll.RequestDisplayName:
    args:
    - type:
        display: uuid
    description: Asynchronously requests the display name of the agent specified by
      id, triggering a dataserver event with the results. The agent does not need
      to be online or in the region. Returns a key query handle.
  ll.RequestExperiencePermissions:
    args:
    - type:
        display: uuid
    - type: string
    description: Requests permission from the specified agent to participate in the
      experience. These permissions are persistent and apply grid-wide across all
      scripts in the experience, automatically triggering experience_permissions or
      experience_permissions_denied.
  ll.RequestInventoryData:
    args:
    - type: string
    description: Asynchronously requests data for the named inventory item, triggering
      a dataserver event. Currently, only landmark items are supported (which return
      local region coordinates). Returns a key query handle.
  ll.RequestPermissions:
    args:
    - type:
        display: uuid
    - type: number
    description: Requests permissions (a bitfield specified by permissions) from the
      agent in the same region, calling run_time_permissions if granted. This call
      does not pause script execution.
  ll.RequestSecureURL:
    args: []
    description: Asynchronously requests one secure HTTPS (SSL, port 12043) URL for
      use by this object, triggering an http_request event. Returns a key query handle.
  ll.RequestSimulatorData:
    args:
    - type: string
    - type: number
    description: Asynchronously requests data (using a DATA_SIM_* constant) about
      the region. Triggers a dataserver event and returns a key query handle.
  ll.RequestURL:
    args: []
    description: Asynchronously requests one HTTP URL for use by this script, triggering
      an http_request event. Returns a key query handle.
  ll.RequestUserKey:
    args:
    - type: string
    description: Asynchronously requests the Agent ID key (UUID) for the agent specified
      by their current or historical username, returning NULL_KEY if not found. Returns
      a key query handle for the dataserver event.
  ll.RequestUsername:
    args:
    - type:
        display: uuid
    description: Asynchronously requests the unique single-word username of the agent
      identified by id, triggering a dataserver event. The agent does not need to
      be online or in the region. Returns a key query handle.
  ll.ResetAnimationOverride:
    args:
    - type: string
    description: Resets the animation override for anim_state to its default value
      (use 'ALL' to reset all states). Requires the PERMISSION_OVERRIDE_ANIMATIONS
      permission.
  ll.ResetLandBanList:
    args: []
    description: Removes all blocked residents from the land parcel's ban list.
  ll.ResetLandPassList:
    args: []
    description: Removes all residents from the land parcel's access/pass list.
  ll.ResetOtherScript:
    args:
    - type: string
    description: Resets the named script name in the prim's inventory.
  ll.ResetScript:
    args: []
    description: Resets the current script.
  ll.ReturnObjectsByID:
    args:
    - type: table
    description: Returns objects specified by the list of UUIDs objects to their owners.
      Requires the PERMISSION_RETURN_OBJECTS permission, and the script owner must
      own the parcel or be an estate manager/region owner.
  ll.ReturnObjectsByOwner:
    args:
    - type:
        display: uuid
    - type: number
    description: Returns objects owned by owner within the specified scope (parcel,
      parcel owner, or region). Requires the PERMISSION_RETURN_OBJECTS permission,
      and the script owner must own the parcel or be an estate manager/region owner.
  ll.RezAtRoot:
    args:
    - type: string
    - type:
        display: vector
    - type:
        display: vector
    - type:
        display: quaternion
    - type: number
    description: Instantiates the named inventory object with the root prim at pos
      with velocity vel and rotation rot, passing start_param as the on_rez start
      parameter. The vel parameter is ignored if the rezzed object is non-physical.
  ll.RezObject:
    args:
    - type: string
    - type:
        display: vector
    - type:
        display: vector
    - type:
        display: quaternion
    - type: number
    description: Instantiates the named inventory object with the bounding box centered
      at pos with velocity vel and rotation rot, passing param as the on_rez start
      parameter. The vel parameter is ignored if the rezzed object is non-physical.
  ll.RezObjectWithParams:
    args:
    - type: string
    - type: table
    description: Instantiates the named inventory object (defaulting to the rezzing
      prim's position unless REZ_POS is specified) using the initial set of parameters
      specified in options. Returns the key of the rezzed object, or a blank key on
      failure.
  ll.Rot2Angle:
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a float representing the rotation angle of rot.
  ll.Rot2Axis:
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a vector representing the rotation axis of rot.
  ll.Rot2Euler:
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a vector representing the Euler rotation (roll, pitch, yaw)
      of quat, with each component expressed in radians.
  ll.Rot2Fwd:
    deprecated:
      message: Use 'quaternion.tofwd' instead.
      replace:
      - quaternion.tofwd(%1)
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a unit vector pointing in the local positive X direction
      (forward) relative to the parent (root prim or region) defined by rotation q.
  ll.Rot2Left:
    deprecated:
      message: Use 'quaternion.toleft' instead.
      replace:
      - quaternion.toleft(%1)
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a unit vector pointing in the local positive Y direction
      (left) relative to the parent (root prim or region) defined by rotation q.
  ll.Rot2Up:
    deprecated:
      message: Use 'quaternion.toup' instead.
      replace:
      - quaternion.toup(%1)
    args:
    - type:
        display: quaternion
    must_use: true
    description: Returns a unit vector pointing in the local positive Z direction
      (up) relative to the parent (root prim or region) defined by rotation q.
  ll.RotBetween:
    args:
    - type:
        display: vector
    - type:
        display: vector
    must_use: true
    description: Returns a rotation representing the shortest path rotation from vector
      start to vector end.
  ll.RotLookAt:
    args:
    - type:
        display: quaternion
    - type: number
    - type: number
    description: Causes the object to smoothly rotate to target_direction with a force
      defined by strength and damping. A strength of 0.0 cancels the rotation target.
      Rotation is maintained until stopped with llStopLookAt.
  ll.RotTarget:
    args:
    - type:
        display: quaternion
    - type: number
    description: Registers the rotation rot with a leeway tolerance error (in radians)
      as a target, triggering at_rot_target and not_at_rot_target events. Returns
      an integer handle to unregister the target via llRotTargetRemove.
  ll.RotTargetRemove:
    args:
    - type: number
    description: Removes the rotational target specified by the integer handle registered
      with llRotTarget.
  ll.RotateTexture:
    args:
    - type: number
    - type: number
    description: Sets the texture rotation of face to the specified angle (in radians).
      If face is ALL_SIDES, rotates the texture on all faces.
  ll.Round:
    deprecated:
      message: Use 'math.round' instead. Fastcall.
      replace:
      - math.round(%...)
    args:
    - type: number
    must_use: true
    description: Returns the integer that float val is closest to.
  ll.SHA1String:
    args:
    - type: string
    must_use: true
    description: Returns a string of 40 hex characters representing the SHA-1 security
      hash of src.
  ll.SHA256String:
    args:
    - type: string
    must_use: true
    description: Returns a string of 64 hex characters representing the SHA-256 security
      hash of src.
  ll.SameGroup:
    args:
    - type:
        display: uuid
    must_use: true
    description: Returns TRUE if the agent or object specified by uuid is in the same
      region (simulator) and shares the same active group as the prim containing the
      script; returns FALSE otherwise.
  ll.Say:
    args:
    - type: number
    - type: string
    description: Broadcasts the message msg to all scripts or agents listening on
      channel within llGetEnv("chat_range"), which is 20m on most regions. Agents
      listen on PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647). All other channels
      are for script-to-script communication.
  ll.ScaleByFactor:
    args:
    - type: number
    description: Attempts to uniformly resize the entire object by scaling_factor,
      maintaining size-position ratios of the prims. Fails if the linkset is physical,
      a pathfinding character, in keyframed motion, would exceed prim scale/linkability
      limits, or would overflow parcel capacity.
  ll.ScaleTexture:
    args:
    - type: number
    - type: number
    - type: number
    description: Sets the diffuse texture horizontal u and vertical v scales (repeats)
      on the specified face of the prim. Setting face to ALL_SIDES updates all sides.
      Negative scale values flip the texture.
  ll.ScriptDanger:
    args:
    - type:
        display: vector
    must_use: true
    description: Returns TRUE if the vector position pos is over public land, sandbox
      land, land restricting edit/build permissions, or land that disables outside
      scripts.
  ll.ScriptProfiler:
    args:
    - type: number
    description: Enables or disables the script's profiling state using flags (supports
      PROFILE_SCRIPT_MEMORY on Mono, or PROFILE_NONE). Active profiling can significantly
      reduce script performance.
  ll.SendRemoteData:
    deprecated:
      message: Deprecated. Sends an XML-RPC request to dest on channel, containing
        the channel ID as a string, integer idata, and string sdata. Returns a key
        representing the message_id.
    args:
    - type:
        display: uuid
    - type: string
    - type: number
    - type: string
    description: Deprecated. Sends an XML-RPC request to dest on channel, containing
      the channel ID as a string, integer idata, and string sdata. Returns a key representing
      the message_id.
  ll.Sensor:
    args:
    - type: string
    - type:
        display: uuid
    - type: number
    - type: number
    - type: number
    description: Performs a single scan from the prim's forward vector for name and
      id of type within radius meters and arc radians. Results trigger a sensor or
      no_sensor event. Passing empty filters (blank name, 0 type, or NULL_KEY id)
      disables that filter.
  ll.SensorRemove:
    args: []
    description: Removes the periodic sensor previously configured by llSensorRepeat.
  ll.SensorRepeat:
    args:
    - type: string
    - type:
        display: uuid
    - type: number
    - type: number
    - type: number
    - type: number
    description: Sets up a repeating periodic scan every rate seconds for name and
      id of type within radius meters and arc radians of the forward vector. Results
      trigger sensor or no_sensor events.
  ll.SetAgentEnvironment:
    args:
    - type:
        display: uuid
    - type: number
    - type: table
    description: Sets an individual agent's environmental settings using the attributes
      in params over a duration of transition seconds. Must be used as part of an
      experience; passing an empty list removes overrides.
  ll.SetAgentRot:
    args:
    - type:
        display: quaternion
    - type: number
    description: Sets the rotation of the avatar to rot, controlled by flags.
  ll.SetAlpha:
    args:
    - type: number
    - type: number
    description: Sets the diffuse texture alpha (opacity) of face. If face is ALL_SIDES,
      applies to all faces. Values are clamped between 0.1 and 1.0 (where 1.0 is fully
      opaque).
  ll.SetAngularVelocity:
    args:
    - type:
        display: vector
    - type: bool
    description: Sets the angular velocity of a physical object to initial_omega (mass-independent).
      If local is TRUE, applied in local coordinates; if FALSE, applied in global
      coordinates. Has no effect on non-physical objects.
  ll.SetAnimationOverride:
    args:
    - type: string
    - type: string
    description: Overrides the default animation for anim_state with anim (which must
      be in the object's inventory or a built-in animation). Requires the PERMISSION_OVERRIDE_ANIMATIONS
      permission.
  ll.SetBuoyancy:
    args:
    - type: number
    description: Sets the buoyancy of a physical object (requires physics to be enabled).
      A value of 0.0 offers no buoyancy, < 1.0 sinks, 1.0 counteracts gravity, and
      > 1.0 rises.
  ll.SetCameraAtOffset:
    args:
    - type:
        display: vector
    description: Sets the target offset vector (in local coordinates) that a seated
      avatar's camera will look at.
  ll.SetCameraEyeOffset:
    args:
    - type:
        display: vector
    description: Sets the eye offset vector (in local coordinates) where a seated
      avatar's camera is positioned.
  ll.SetCameraParams:
    args:
    - type: table
    description: Sets multiple camera parameters simultaneously using the list of
      rules. Requires the PERMISSION_CONTROL_CAMERA runtime permission.
  ll.SetClickAction:
    args:
    - type: number
    description: Sets the action (a CLICK_ACTION_* flag) performed when an avatar
      left-clicks the prim.
  ll.SetColor:
    args:
    - type:
        display: vector
    - type: number
    description: Sets the Blinn-Phong diffuse RGB color of face. If face is ALL_SIDES,
      applies the color to all faces.
  ll.SetContentType:
    args:
    - type:
        display: uuid
    - type: number
    description: Sets the 'Content-Type' header of subsequent HTTP server responses
      (via llHTTPResponse) for request_id using the specified content_type (a CONTENT_TYPE_*
      constant).
  ll.SetDamage:
    args:
    - type: number
    description: Sets the amount of damage delivered when this object hits an avatar.
      The object is immediately destroyed upon inflicting damage, and no collision
      event is triggered.
  ll.SetEnvironment:
    args:
    - type:
        display: vector
    - type: table
    description: Overrides the environmental settings at position for a parcel (or
      region if position is <-1.0, -1.0, z>) using the parameters in params. Passing
      an empty params list removes previous overrides.
  ll.SetForce:
    args:
    - type:
        display: vector
    - type: bool
    description: Applies a constant linear force to a physical object. If local is
      TRUE, force is applied relative to local coordinates; if FALSE, applied relative
      to region coordinates.
  ll.SetForceAndTorque:
    args:
    - type:
        display: vector
    - type:
        display: vector
    - type: bool
    description: Sets both the constant linear force and constant torque acting on
      a physical object. If local is TRUE, forces are applied in local coordinates;
      if FALSE, in global coordinates.
  ll.SetGroundTexture:
    args:
    - type: table
    description: Changes the painted terrain textures on the region based on changes.
      The script owner must have estate management rights. Returns an integer status.
  ll.SetHoverHeight:
    args:
    - type: number
    - type: bool
    - type: number
    description: Critically damps the physical object's vertical movement to hover
      at height (above ground, or above water if water is TRUE) in tau seconds. Do
      not use with vehicles; call llStopHover to cancel.
  ll.SetInventoryPermMask:
    args:
    - type: string
    - type: number
    - type: number
    description: Sets the specified item's permission flags for the specified group.
  ll.SetKeyframedMotion:
    args:
    - type: table
    - type: table
    description: Smoothly moves a non-physical object between the positions, orientations,
      and times specified in the keyframes list, configured via options. Collisions
      with keyframed objects are ignored. An empty keyframes list terminates the motion.
  ll.SetLinkAlpha:
    args:
    - type: number
    - type: number
    - type: number
    description: Sets the Blinn-Phong alpha (transparency) of face on the linked prim
      link.
  ll.SetLinkCamera:
    args:
    - type: number
    - type:
        display: vector
    - type:
        display: vector
    description: Sets the camera eye position offset eye and looking-at position offset
      at for avatars who sit on the linked prim link.
  ll.SetLinkColor:
    args:
    - type: number
    - type:
        display: vector
    - type: number
    description: Sets the Blinn-Phong diffuse RGB color of face on the linked prim
      link.
  ll.SetLinkGLTFOverrides:
    args:
    - type: number
    - type: number
    - type: table
    description: Sets or removes individual GLTF override parameters specified by
      params on face of the linked prim link.
  ll.SetLinkMedia:
    args:
    - type: number
    - type: number
    - type: table
    description: Sets the media parameters specified by params on face of the linked
      prim link without a script delay. Returns an integer STATUS_* flag detailing
      success or failure.
  ll.SetLinkPrimitiveParams:
    deprecated:
      message: Use 'll.SetLinkPrimitiveParamsFast' instead.
      replace:
      - ll.SetLinkPrimitiveParamsFast(%...)
    args:
    - type: number
    - type: table
    description: Deprecated (use llSetLinkPrimitiveParamsFast instead). Sets primitive
      parameters for the linked prim link according to rules.
  ll.SetLinkPrimitiveParamsFast:
    args:
    - type: number
    - type: table
    description: Sets primitive parameters for the linked prim link according to rules
      with no built-in script sleep delay.
  ll.SetLinkRenderMaterial:
    args:
    - type: number
    - type: string
    - type: number
    description: 'Applies material (UUID or inventory name) to face of the linked
      prim link. Note: This clears most PRIM_GLTF_* properties on the face except
      for repeats, offsets, and rotation.'
  ll.SetLinkSitFlags:
    args:
    - type: number
    - type: number
    description: Sets the sit target flags for the linked prim link inside the linkset.
  ll.SetLinkTexture:
    args:
    - type: number
    - type: string
    - type: number
    description: Applies texture (UUID or inventory name) to face of the linked prim
      link.
  ll.SetLinkTextureAnim:
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    description: Animates the texture on face of the linked prim link by setting the
      scale and offset according to mode. Parameters sizex/sizey define frames, start
      defines the start frame/angle, length defines duration, and rate defines playback
      speed.
  ll.SetLocalRot:
    args:
    - type:
        display: quaternion
    description: Sets the rotation of a child prim relative to its root prim using
      rot.
  ll.SetObjectDesc:
    args:
    - type: string
    description: Sets the description of the prim containing the script to description
      (limited to 127 characters).
  ll.SetObjectName:
    args:
    - type: string
    description: Sets the name of the prim containing the script to name.
  ll.SetObjectPermMask:
    args:
    - type: number
    - type: number
    description: Sets the scripts's object's permission flags for the specified group.
  ll.SetParcelForSale:
    args:
    - type: bool
    - type: table
    description: Sets the parcel the object is on for sale. If ForSale is TRUE, puts
      the land up for sale using Options (price, buyer, objects included). Setting
      ForSale to FALSE removes the parcel from sale. Requires parcel ownership and
      the PERMISSION_PRIVILEGED_LAND_ACCESS permission. Returns an error code or 0
      if successful.
  ll.SetParcelMusicURL:
    args:
    - type: string
    description: Sets the streaming audio (music) URL for the parcel containing the
      object. The object owner must match the landowner or land group.
  ll.SetPayPrice:
    args:
    - type: number
    - type: table
    description: Suggests default amounts for the pay text input field price and the
      four payment dialog quick_pay_buttons when an avatar pays this object.
  ll.SetPhysicsMaterial:
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    description: Configures the physical characteristics of an object. The mask bitfield
      specifies which of the other parameters (gravity_multiplier, restitution, friction,
      or density) should be applied to the object.
  ll.SetPos:
    args:
    - type:
        display: vector
    description: Moves the non-physical object or prim toward the vector pos (up to
      10m). If called in a child prim, pos is treated as root-relative; if called
      from the root prim, the entire object is moved.
  ll.SetPrimMediaParams:
    args:
    - type: number
    - type: table
    description: Sets the media parameters specified by params on the designated face
      of the prim. Returns an integer STATUS_* flag detailing success or failure.
  ll.SetPrimURL:
    deprecated:
      message: Use 'll.SetPrimMediaParams' instead.
      replace:
      - ll.SetPrimMediaParams(ALL_SIDES, {PRIM_MEDIA_CURRENT_URL, %1})
    args:
    - type: string
    description: Deprecated (use llSetPrimMediaParams instead). Updates the URL displayed
      on the prim's faces.
  ll.SetPrimitiveParams:
    deprecated:
      message: Use 'll.SetLinkPrimitiveParamsFast' instead.
      replace:
      - ll.SetLinkPrimitiveParamsFast(%...)
    args:
    - type: table
    description: Deprecated (use llSetLinkPrimitiveParamsFast instead). Sets the prim's
      attributes according to rules.
  ll.SetRegionPos:
    args:
    - type:
        display: vector
    description: Tries to move the entire object so that its root prim is within 0.1m
      of the vector position (underground positions are set to ground level). Returns
      TRUE on success or FALSE on failure.
  ll.SetRemoteScriptAccessPin:
    args:
    - type: number
    description: Sets the prim's remote script access PIN to pin (a non-zero value
      enables loading via llRemoteLoadScriptPin, while zero disables it).
  ll.SetRenderMaterial:
    args:
    - type: string
    - type: number
    description: 'Applies material (UUID or inventory name) to face of the prim. Note:
      This clears most PRIM_GLTF_* properties on the face except for repeats, offsets,
      and rotation.'
  ll.SetRot:
    args:
    - type:
        display: quaternion
    description: Sets the rotation of the prim to rot. If in a child prim, rot is
      treated as root-relative; if in the root prim of a non-physical object, rotates
      the entire object.
  ll.SetScale:
    args:
    - type:
        display: vector
    description: Sets the physical scale (dimensions) of the prim containing the script
      to size.
  ll.SetScriptState:
    args:
    - type: string
    - type: bool
    description: Sets the running state of the named script in the prim's inventory.
      If running is TRUE, the script is enabled; if FALSE, it is disabled.
  ll.SetSitText:
    args:
    - type: string
    description: Displays the string text instead of 'Sit' (or 'Sit Here') in the
      viewer's right-click context menu.
  ll.SetSoundQueueing:
    args:
    - type: bool
    description: Sets whether attached sounds wait for the current sound to end before
      playing (enables queuing if queue is TRUE, disables if FALSE). The queue is
      one level deep.
  ll.SetSoundRadius:
    args:
    - type: number
    description: Limits the audibility radius of attached and triggered scripted sounds
      to distance radius.
  ll.SetStatus:
    args:
    - type: number
    - type: bool
    description: Sets the object status attributes specified by status to value.
  ll.SetText:
    args:
    - type: string
    - type:
        display: vector
    - type: number
    description: Displays floating text above the prim with the specified color vector
      and transparency alpha.
  ll.SetTexture:
    args:
    - type: string
    - type: number
    description: Applies the Blinn-Phong diffuse texture to face of the prim.
  ll.SetTextureAnim:
    args:
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    - type: number
    description: Animates the texture on face of the prim by setting its scale and
      offset. mode defines options, sizex/sizey define frames, start defines the start
      frame/angle, length defines duration, and rate defines playback speed.
  ll.SetTorque:
    args:
    - type:
        display: vector
    - type: bool
    description: Applies a constant torque rotational force to a physical object.
      If local is TRUE, torque is applied in local coordinates; if FALSE, applied
      in global coordinates.
  ll.SetTouchText:
    args:
    - type: string
    description: Displays the string text instead of 'Touch' in the right-click context
      menu.
  ll.SetVehicleFlags:
    args:
    - type: number
    description: Enables the vehicle flags specified in the Flags bitmask.
  ll.SetVehicleFloatParam:
    args:
    - type: number
    - type: number
    description: Sets the specified vehicle float parameter param to value.
  ll.SetVehicleRotationParam:
    args:
    - type: number
    - type:
        display: quaternion
    description: Sets the specified vehicle rotation parameter param to rot.
  ll.SetVehicleType:
    args:
    - type: number
    description: Sets the vehicle physics preset type to one of the default vehicle
      types.
  ll.SetVehicleVectorParam:
    args:
    - type: number
    - type:
        display: vector
    description: Sets the specified vehicle vector parameter param to vec.
  ll.SetVelocity:
    args:
    - type:
        display: vector
    - type: bool
    description: Sets the linear velocity of a physical object to velocity. If local
      is TRUE, velocity is treated as a local directional vector; if FALSE, as a global
      region directional vector. Has no effect on non-physical objects.
  ll.Shout:
    args:
    - type: number
    - type: string
    description: Broadcasts the message msg to all scripts or agents listening on
      channel within llGetEnv("shout_range"), which is 100m on most regions. Agents
      listen on PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647). All other channels
      are for script-to-script communication.
  ll.SignRSA:
    args:
    - type: string
    - type: string
    - type: string
    must_use: true
    description: Returns the Base64-encoded RSA signature of msg using the PEM-formatted
      private_key and the specified digest algorithm (sha1, sha224, sha256, sha384,
      or sha512). Can be paired with llVerifyRSA to pass verifiable messages.
  ll.Sin:
    deprecated:
      message: Use 'math.sin' instead. Double precision; fastcall.
      replace:
      - math.sin(%...)
    args:
    - type: number
    must_use: true
    description: Returns a float representing the sine of theta.
  ll.SitOnLink:
    args:
    - type:
        display: uuid
    - type: number
    description: Forces the avatar specified by agent_id (who must be participating
      in the experience) to sit on the sit target of the prim indicated by link. If
      occupied, searches down the linkset for an available sit target. Returns an
      integer.
  ll.SitTarget:
