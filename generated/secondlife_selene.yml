  AVOID_CHARACTERS:
    property: read-only
    type: number
  AVOID_DYNAMIC_OBSTACLES:
    property: read-only
    type: number
  AVOID_NONE:
    property: read-only
    type: number
  BEACON_MAP:
    property: read-only
    type: number
    description: Causes llMapBeacon to optionally display and focus the world map
      on the avatar's viewer.
  CAMERA_ACTIVE:
    property: read-only
    type: number
    description: Option flag used with llSetCameraParams to turn scripted control
      of the camera on or off.
  CAMERA_BEHINDNESS_ANGLE:
    property: read-only
    type: number
    description: Sets the angle in degrees within which the camera is not constrained
      by changes in target rotation.
  CAMERA_BEHINDNESS_LAG:
    property: read-only
    type: number
    description: Sets how strongly the camera is forced to stay behind the target
      if outside of the behindness angle.
  CAMERA_DISTANCE:
    property: read-only
    type: number
    description: Sets how far away the camera wants to be from its target.
  CAMERA_FOCUS:
    property: read-only
    type: number
    description: Sets camera focus (target position) in region coordinates.
  CAMERA_FOCUS_LAG:
    property: read-only
    type: number
    description: Sets how much the camera lags as it aims toward the target.
  CAMERA_FOCUS_LOCKED:
    property: read-only
    type: number
    description: Option flag used with llSetCameraParams to lock the camera focus
      so it does not move.
  CAMERA_FOCUS_OFFSET:
    property: read-only
    type: number
    description: Adjusts the camera focus position relative to the target.
  CAMERA_FOCUS_THRESHOLD:
    property: read-only
    type: number
    description: Sets the radius of a sphere around the camera's target position within
      which its focus is not affected by target motion.
  CAMERA_PITCH:
    property: read-only
    type: number
    description: Adjusts the angular amount that the camera aims straight ahead versus
      straight down, maintaining the same distance (analogous to 'incidence').
  CAMERA_POSITION:
    property: read-only
    type: number
    description: Sets camera position in region coordinates.
  CAMERA_POSITION_LAG:
    property: read-only
    type: number
    description: Sets how much the camera lags as it moves toward its ideal position.
  CAMERA_POSITION_LOCKED:
    property: read-only
    type: number
    description: Option flag used with llSetCameraParams to lock the camera position
      so it does not move.
  CAMERA_POSITION_THRESHOLD:
    property: read-only
    type: number
    description: Sets the radius of a sphere around the camera's ideal position within
      which it is not affected by target motion.
  CHANGED_ALLOWED_DROP:
    property: read-only
    type: number
    description: The object inventory changed because a user other than the owner
      (or the owner if the object is no-mod) added an item. This is only possible
      if enabled via llAllowInventoryDrop.
  CHANGED_COLOR:
    property: read-only
    type: number
    description: The object's Blinn-Phong color or alpha parameters have changed.
  CHANGED_INVENTORY:
    property: read-only
    type: number
    description: The prim inventory has changed by someone who has modification rights
      to it.
  CHANGED_LINK:
    property: read-only
    type: number
    description: The number of prims making up the object or avatars seated on it
      has changed. Also occurs when duplicating a linked object or when a prim changes
      type or shape. Does not trigger on attach/detach, sit/unsit in attachments,
      or single prim duplication.
  CHANGED_MEDIA:
    property: read-only
    type: number
    description: Prim Media on the prim has changed.
  CHANGED_OWNER:
    property: read-only
    type: number
    description: The object has changed owners. Triggers in the original object when
      a user takes it, copies it, or deeds it to a group, and in the new object when
      it is first rezzed.
  CHANGED_REGION:
    property: read-only
    type: number
    description: The object has changed regions by crossing a boundary or teleporting
      (if attached). Triggers only in the root prim of a linkset.
  CHANGED_REGION_START:
    property: read-only
    type: number
    description: The region containing this object has just come online.
  CHANGED_RENDER_MATERIAL:
    property: read-only
    type: number
    description: The render material (prim material ID or material overrides) has
      changed on one or more faces.
  CHANGED_SCALE:
    property: read-only
    type: number
    description: The prim scale of at least one prim in the linked object has changed.
      Only the root prim receives this event.
  CHANGED_SHAPE:
    property: read-only
    type: number
    description: The prim base shape (PRIM_TYPE, such as box, prism, torus, taper,
      twist, or cut) has changed.
  CHANGED_TELEPORT:
    property: read-only
    type: number
    description: The avatar this object is attached to has teleported. Triggers only
      in the root prim of an attachment. Does not occur for child prims or 'sit teleports'.
      If scripts are disabled at the destination, the event queues and triggers after
      moving to a script-enabled parcel.
  CHANGED_TEXTURE:
    property: read-only
    type: number
    description: The prim texture parameters (shine/bump settings, repeats, flip,
      rotation, offset, or texture) have changed.
  CHARACTER_ACCOUNT_FOR_SKIPPED_FRAMES:
    property: read-only
    type: number
    description: If set to FALSE, the pathfinding character will not attempt to catch
      up on lost time when performance is low, potentially providing more reliable
      (though potentially more stuttery) movement. Default is TRUE.
  CHARACTER_AVOIDANCE_MODE:
    property: read-only
    type: number
    description: Specifies which objects a pathfinding character avoids (other characters,
      dynamic obstacles like fast-moving objects and avatars, or both). Combined using
      bit flags; setting to AVOID_NONE disables avoidance for both categories.
  CHARACTER_CMD_JUMP:
    property: read-only
    type: number
    description: Makes the character jump. Requires a height parameter between 0.1m
      and 2.0m as the first element of the llExecCharacterCmd option list.
  CHARACTER_CMD_SMOOTH_STOP:
    property: read-only
    type: number
    description: Stops any current pathfinding operation in a smooth fashion.
  CHARACTER_CMD_STOP:
    property: read-only
    type: number
    description: Stops any current pathfinding operation.
  CHARACTER_DESIRED_SPEED:
    property: read-only
    type: number
    description: Constant used to indicate that the following argument is the desired
      speed (or speed of pursuit in meters per second) for a pathfinding character.
  CHARACTER_DESIRED_TURN_SPEED:
    property: read-only
    type: number
    description: Specifies the character's maximum speed while turning about the Z-axis
      (default is 6 meters/second). Note that this is only loosely enforced, and a
      character may turn at higher speeds under certain conditions.
  CHARACTER_LENGTH:
    property: read-only
    type: number
    description: Sets the collision capsule length for a pathfinding character. If
      the value is less than twice the radius plus 0.1m, it automatically adjusts
      to twice the radius plus 0.1m.
  CHARACTER_MAX_ACCEL:
    property: read-only
    type: number
    description: "Specifies the character's maximum acceleration rate (default is\
      \ 20 m/s\xB2)."
  CHARACTER_MAX_DECEL:
    property: read-only
    type: number
    description: "Specifies the character's maximum deceleration rate (default is\
      \ 30 m/s\xB2)."
  CHARACTER_MAX_SPEED:
    property: read-only
    type: number
    description: Specifies the character's maximum speed (must be between 0.2 and
      50 meters/second; default is 20 m/s). Affects speed when avoiding dynamic obstacles
      and when traversing low-walkability objects in TRAVERSAL_TYPE_FAST mode.
  CHARACTER_MAX_TURN_RADIUS:
    property: read-only
    type: number
    description: Specifies the character's turn radius when traveling at CHARACTER_DESIRED_TURN_SPEED
      (default is 1.25 meters).
  CHARACTER_ORIENTATION:
    property: read-only
    type: number
    description: Specifies the orientation of the collision capsule for a pathfinding
      character to denote how to interpret its size. Valid options are VERTICAL and
      HORIZONTAL.
  CHARACTER_RADIUS:
    property: read-only
    type: number
    description: Sets the collision capsule radius used to define the size of a pathfinding
      character.
  CHARACTER_STAY_WITHIN_PARCEL:
    property: read-only
    type: number
    description: Determines whether a character is restricted to its starting parcel
      (default is FALSE). If TRUE, parcel boundaries act as one-way obstacles; the
      character cannot voluntarily leave and pathfinding behaviors (wander, flee,
      evade, pursue) will only choose goal points within the parcel. If pushed out,
      it can re-enter but cannot voluntarily leave again.
  CHARACTER_TYPE:
    property: read-only
    type: number
    description: Specifies the preferred surface and terrain terrain-type for the
      character (default is CHARACTER_TYPE_NONE). Used to describe preferred surfaces
      rather than behavior (e.g., cows prefer type B, sheep herded along a road prefer
      type C).
  CHARACTER_TYPE_A:
    property: read-only
    type: number
    description: Used for pathfinding character types that prefer movement consistent
      with humanoids.
  CHARACTER_TYPE_B:
    property: read-only
    type: number
    description: Used for pathfinding character types that prefer movement consistent
      with wild animals or off-road vehicles.
  CHARACTER_TYPE_C:
    property: read-only
    type: number
    description: Used for mechanical pathfinding character types or road-going vehicles.
  CHARACTER_TYPE_D:
    property: read-only
    type: number
    description: Used for pathfinding character types that are inconsistent with types
      A, B, or C.
  CHARACTER_TYPE_NONE:
    property: read-only
    type: number
    description: Used to set no specific pathfinding character type.
  CLICK_ACTION_BUY:
    property: read-only
    type: number
    description: Opens the buy dialog when the prim is clicked or touched.
  CLICK_ACTION_DISABLED:
    property: read-only
    type: number
    description: Disables click actions. No touches are detected or passed.
  CLICK_ACTION_IGNORE:
    property: read-only
    type: number
    description: Disables click actions. Clicks pass through the object to whatever
      is behind it, and no touches are detected.
  CLICK_ACTION_NONE:
    property: read-only
    type: number
    description: 'Performs the default action: triggers touch events when the prim
      is clicked or touched.'
  CLICK_ACTION_OPEN:
    property: read-only
    type: number
    description: Opens the object inventory dialog when the prim is clicked or touched.
  CLICK_ACTION_OPEN_MEDIA:
    property: read-only
    type: number
    description: Opens the web media dialog or plays parcel media (without pausing)
      when the prim is touched.
  CLICK_ACTION_PAY:
    property: read-only
    type: number
    description: Opens the pay dialog when the prim is clicked or touched.
  CLICK_ACTION_PLAY:
    property: read-only
    type: number
    description: Enables HTML-on-a-prim or plays/pauses parcel media when the prim
      is clicked or touched.
  CLICK_ACTION_SIT:
    property: read-only
    type: number
    description: Causes the avatar to sit on the prim when it is clicked or touched.
  CLICK_ACTION_TOUCH:
    property: read-only
    type: number
    description: Triggers touch events when the prim is clicked or touched.
  CLICK_ACTION_ZOOM:
    property: read-only
    type: number
    description: Zooms the avatar camera in on the object (Viewer 2) when clicked
      or touched.
  COMBAT_CHANNEL:
    property: read-only
    type: number
    description: A region-wide channel reserved for combat-related log events. Passing
      this to llRegionSay adds the message to the combat log, and scripts listening
      on this channel can monitor the combat log.
  COMBAT_LOG_ID:
    struct: uuid
    description: The ID used by all combat log messages sent from the region to the
      COMBAT_CHANNEL. Scripts can filter llListen calls with this ID to receive only
      system-generated combat log messages.
  CONTENT_TYPE_ATOM:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/atom+xml'.
  CONTENT_TYPE_FORM:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/x-www-form-urlencoded'.
  CONTENT_TYPE_HTML:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'text/html'. Only valid for embedded browsers on content
      owned by the viewer; falls back to 'text/plain' otherwise.
  CONTENT_TYPE_JSON:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/json'.
  CONTENT_TYPE_LLSD:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/llsd+xml' (Linden Lab Structured Data).
  CONTENT_TYPE_RSS:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/rss+xml'.
  CONTENT_TYPE_TEXT:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'text/plain'.
  CONTENT_TYPE_XHTML:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/xhtml+xml'.
  CONTENT_TYPE_XML:
    property: read-only
    type: number
    description: Sets the 'Content-Type' header of subsequent LSL HTTP server responses
      via llHTTPResponse to 'application/xml'.
  CONTROL_BACK:
