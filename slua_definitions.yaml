%YAML 1.2
---
# yaml-language-server: $schema=http://raw.githubusercontent.com/secondlife/lsl-definitions/refs/heads/main/slua_definitions.schema.json
#
# increment only when the file format changes, not just the content
version: 1.0.0
# baseClasses must not depend on anything else in this file (not typeAliases, not classes)
base-classes:
- name: quaternion
  comment: A set of four float values. Used to represent rotations and orientations.
  methods:
  - name: __add
    parameters:
    - name: self
    - name: other
      type: quaternion
    return-type: quaternion
  - name: __sub
    parameters:
    - name: self
    - name: other
      type: quaternion
    return-type: quaternion
  - name: __mul
    parameters:
    - name: self
    - name: other
      type: quaternion
    return-type: quaternion
  - name: __div
    parameters:
    - name: self
    - name: other
      type: quaternion
    return-type: quaternion
  - name: __unm
    parameters:
    - name: self
    return-type: quaternion
  - name: __eq
    parameters:
    - name: self
    - name: other
      type: quaternion
    return-type: boolean
  - name: __tostring
    parameters:
    - name: self
    return-type: string
  properties:
  - name: x
    type: number
    comment: X component of the rotation/quaternion.
  - name: "y"
    type: number
    comment: Y component of the rotation/quaternion.
  - name: z
    type: number
    comment: Z component of the rotation/quaternion.
  - name: s
    type: number
    comment: S component of the rotation/quaternion. Equivalent to the W component in other notations.
- name: uuid
  comment: 'A 128‑bit unique identifier formatted as 36 hexadecimal characters (8‑4‑4‑4‑12), e.g. "A822FF2B-FF02-461D-B45D-DCD10A2DE0C2".'
  methods:
  - name: __tostring
    parameters:
    - name: self
    return-type: string
  properties:
  - name: istruthy
    comment: Returns true if the UUID is not the null UUID (all zeros).
    type: boolean
  - name: bytes
    comment: Returns the raw 16-byte binary string of the UUID.
    type: string
- name: vector
  comment: A set of three float values. Used to represent colors (RGB), positions, directions, and velocities.
  methods:
  - name: __add
    comment: Native component-wise addition
    parameters:
    - name: self
    - name: other
      type: vector
    return-type: vector
  - name: __sub
    comment: Native component-wise subtraction
    parameters:
    - name: self
    - name: other
      type: vector
    return-type: vector
  - name: __unm
    comment: Unary negation
    parameters:
    - name: self
    return-type: vector
  - name: __mul
    comment: 'Multiplication: vector * vector / number -> vector (Scale), vector
      * quaternion -> vector (Rotation)'
    parameters:
    - name: self
    - name: other
      type: number | vector | quaternion
    return-type: vector
  - name: __div
    comment: 'Division: vector / number -> vector (Scale), vector / quaternion ->
      vector (Rotation by inverse)'
    parameters:
    - name: self
    - name: other
      type: number | vector | quaternion
    return-type: vector
  - name: __mod
    comment: 'LSL-style modulo: vector % vector -> vector (Cross Product)'
    parameters:
    - name: self
    - name: other
      type: vector
    return-type: vector
  - name: __tostring
    parameters:
    - name: self
    return-type: string
  properties:
  - name: x
    type: number
    comment: "X coordinate component of the vector. Typically represents red color, forward position, or pitch."
  - name: "y"
    type: number
    comment: "Y coordinate component of the vector. Typically represents green color, left/right position, or roll."
  - name: z
    type: number
    comment: "Z coordinate component of the vector. Typically represents blue color, altitude/upward position, or yaw."
- name: DetectedEvent
  comment: Event detection class providing access to detected object/avatar information
  # auto-generated from lsl_definitions.yaml
  methods: []
  properties:
  - name: index
    type: number
    comment: "Index of the detected entity."
  - name: valid
    type: boolean
    comment: "Returns true if the detected index is valid and contains active data."
  - name: canAdjustDamage
    type: boolean
    comment: "Returns true if the detected object or avatar can have its damage adjusted."
type-aliases:
- name: rotation
  comment: '''rotation'' is an alias for ''quaternion'''
  export: true
  definition: quaternion
  selene-type: {display: "quaternion"}
- name: list
  export: true
  definition: "{string | number | vector | uuid | quaternion | boolean}"
  selene-type: "table"
- name: LLDetectedEventName
  # auto-generated from lsl_definitions.yaml
  definition: "{}"
  selene-type: []
- name: LLNonDetectedEventName
  # auto-generated from lsl_definitions.yaml
  definition: "{}"
  selene-type: []
- name: LLEventName
  definition: LLDetectedEventName | LLNonDetectedEventName
  selene-type: []
- name: LLEventHandler
  definition: (...any) -> ()
  selene-type: "function"
- name: LLDetectedEventHandler
  definition: "(detected: {DetectedEvent}) -> ()"
  selene-type: "function"
- name: LLTimerEveryCallback
  comment: Callback type for LLTimers.every() - receives scheduled time and interval
  definition: "(scheduled: number, interval: number) -> ()"
  selene-type: "function"
- name: LLTimerOnceCallback
  comment: Callback type for LLTimers.once() - receives scheduled time
  definition: "(scheduled: number) -> ()"
  selene-type: "function"
- name: LLTimerCallback
  comment: Union of timer callback types
  definition: LLTimerEveryCallback | LLTimerOnceCallback
  selene-type: "function"
- name: DateTypeArg
  comment: Date/time table structure used by os.date and os.time
  export: true
  definition: |-
    {
      year: number,
      month: number,
      day: number,
      hour: number?,
      min: number?,
      sec: number?,
      isdst: boolean?,
    }
  selene-type: {display: "DateTypeArg"}
- name: DateTypeResult
  comment: Date/time table structure used by os.date and os.time
  export: true
  definition: |-
    {
      year: number,
      month: number,
      day: number,
      hour: number?,
      min: number?,
      sec: number?,
      wday: number?,
      yday: number?,
      isdst: boolean?,
    }
  selene-type: {display: "DateTypeResult"}
- name: LLJsonEncodeOptions
  comment: Configuration options for lljson encoding
  definition: |-
    {
      tight: boolean?,
      skip_tojson: boolean?,
      allow_sparse: boolean?,
      replacer: ((key: any, value: any, parent: {}?) -> any)?,
    }
  selene-type: table
- name: LLJsonDecodeReviverWithoutPath
  definition: "(key: string | number, value: any, parent: {}?, ctx: {}) -> any"
  selene-type: function
- name: LLJsonDecodeOptionsWithoutPath
  definition: |-
    {
      track_path: false?,
      reviver: LLJsonDecodeReviverWithoutPath?,
    } | LLJsonDecodeReviverWithoutPath
  selene-type: any
- name: LLJsonDecodeOptionsWithPath
  definition: |-
    {
      track_path: true,
      reviver: (key: string | number, value: any, parent: {}?, ctx: {path: {string | number}}) -> any
    }
  selene-type: table
- name: LLJsonDecodeOptions
  comment: Configuration options for lljson decoding
  definition: "LLJsonDecodeOptionsWithoutPath | LLJsonDecodeOptionsWithPath"
  selene-type: any
- name: ParticleParams
  comment: Particle system parameter table. Pass to llprim.particleSystem() to emit particles.
  export: true
  definition: '{[string]: any}'  # rebuilt at generation time from expand_table_ruleset("particle-params")
  selene-type: table
- name: MediaParams
  comment: Prim face media parameter table. Pass to llprim.setMedia() to configure media on a face.
  export: true
  definition: '{[string]: any}'  # rebuilt at generation time from expand_table_ruleset("prim-media-params")
  selene-type: table
- name: HttpRequestParams
  comment: HTTP request parameter table. Pass to llhttp.request() to configure an HTTP request.
  export: true
  definition: '{[string]: any}'  # rebuilt at generation time from expand_table_ruleset("http-params")
  selene-type: table
classes:
- name: LLEvents
  comment: Event registration and management class for Second Life events. Supports adding multiple handlers per event and dynamic registration.
  # auto-generated from lsl_definitions.yaml
  properties: []
  methods:
  - name: 'on'
    comment: "Registers a handler function to run whenever the specified event occurs. Multiple handlers can be attached to the same event and will run in the order they were added. Returns the same function passed in so it can be used later with LLEvents:off()."
    # auto-generated from lsl_definitions.yaml
    overloads: []
    parameters:
    - name: self
    - name: event
      comment: "Name of the event to handle."
      type: LLEventName
    - name: callback
      comment: "Function to execute when the event happens."
      type: LLEventHandler
    return-type: LLEventHandler
  - name: 'off'
    comment: "Removes an event handler. If the function was added multiple times via LLEvents:on(), only the last one added is removed. Returns true if the function was found and removed, false otherwise."
    # auto-generated from lsl_definitions.yaml
    overloads: []
    parameters:
    - name: self
    - name: event
      comment: "Name of the event to remove."
      type: LLEventName
    - name: callback
      comment: "Function to remove. Note: To remove a handler added via LLEvents:once(), you must pass the specific wrapper function it returned."
      type: LLEventHandler
    return-type: boolean
  - name: once
    comment: "Registers a one-time event handler. The function runs only once and is automatically removed afterward. Returns a newly generated wrapper function, which MUST be used if you want to manually remove the handler early using LLEvents:off()."
    # auto-generated from lsl_definitions.yaml
    overloads: []
    parameters:
    - name: self
    - name: event
      comment: "Name of the event to handle."
      type: LLEventName
    - name: callback
      comment: "Function to execute once when the event happens."
      type: LLEventHandler
    return-type: LLEventHandler
  - name: handlers
    comment: "Returns an array table containing all the functions currently handling the specified event. Useful for debugging or for iterating to remove all functions handling an event."
    parameters:
    - name: self
    - name: event
      comment: "Name of the event to query."
      type: LLEventName
    return-type: '{LLEventHandler}'
  - name: eventNames
    comment: "Returns an array table of all event names that currently have active handler functions attached."
    parameters:
    - name: self
    return-type: '{string}'
- name: LLTimers
  comment: "Timer management class for scheduling periodic and one-time callbacks. Note: Do not mix LLTimers with old LSL timer functions (e.g., llcompat.SetTimerEvent), as they share the same underlying event and will interfere with each other."
  methods:
  - name: every
    comment: "Registers a repeating timer. The callback receives (expected_time, interval). Returns the same function passed in so it can be removed later."
    parameters:
    - name: self
    - name: seconds
      comment: "Interval in seconds. Minimum practical interval is ~0.022s (one server frame). An interval of 0 schedules the timer for the next frame."
      type: number
    - name: callback
      comment: "Function to execute when the time arrives."
      type: LLTimerEveryCallback
    return-type: LLTimerCallback
  - name: once
    comment: "Registers a one-time timer. The timer runs only once and is automatically removed afterward. The callback receives (expected_time, nil). Returns the same function passed in, which can be used to cancel it early via LLTimers:off()."
    parameters:
    - name: self
    - name: seconds
      comment: "Time in seconds to wait before triggering. A value of 0 schedules it for the next frame."
      type: number
    - name: callback
      comment: "Function to execute once when the time arrives."
      type: LLTimerOnceCallback
    return-type: LLTimerCallback
  - name: 'off'
    comment: "Stops and removes a timer. If the same function was added multiple times, only the last one added is removed, regardless of its interval. Returns true if the timer was found and removed, false otherwise."
    parameters:
    - name: self
    - name: callback
      comment: "Function reference to remove."
      type: LLTimerCallback
    return-type: boolean
- name: PrimParamsSetterType
  comment: Metatable for building lists to pass to ll.SetLinkPrimitiveParamsFast
  instance-type: '{any}'
  export: true
  functions:
  - name: new
    comment: Create an empty list with PrimParamsSetterTypeMeta as metatable
    parameters: []
    return-type: PrimParamsSetterType
  methods: # This class is currently populated dynamically
  - name: apply
    comment: Call ll.SetLinkPrimitiveParamsFast with my instance list
    parameters:
    - name: self
      type: PrimParamsSetterType
    - name: link
      type: number?
      comment: Link number to target, or LINK_THIS if not specified
    return-type: ()
global-variables:
- name: rotation
  comment: rotation is an alias for quaternion.
  type: typeof(quaternion)
- name: LLEvents
  comment: Event registration and management singleton for Second Life events.
  type: LLEvents
- name: LLTimers
  comment: Timer management singleton for scheduling periodic and one-time callbacks.
  type: LLTimers
functions:
- name: assert
  comment: Checks if the value is truthy; if not, raises an error with the optional message. Returns the value upon success.
  type-parameters: [T]
  parameters:
  - name: value
    comment: Value to check for truthiness.
    type: T?
  - name: errorMessage
    comment: Error message to display if the value is not truthy.
    type: string?
    default-value: '"assertion failed!"'
  return-type: T
  fastcall: true
  typechecker: {magic: true}
- name: collectgarbage
  comment: Run the garbage collector
  parameters:
  - name: option
    type: '"collect"?'
    selene-type: string
  overloads:
  - comment: Alias for gcinfo
    parameters:
    - name: option
      type: '"count"'
      selene-type: string
    return-type: number
  local-only: true
- name: dangerouslyexecuterequiredmodule
  comment: Dangerously executes a required module function
  parameters:
  - name: f
    type: (...any) -> ...any
  return-type: '...any'
- name: error
  comment: Raises an error with the specified object. The optional level determines which call stack level is blamed for the error.
  type-parameters: [T]
  parameters:
  - name: message
    comment: Error message, or object, to raise. Does not have to be a string.
    type: T
  - name: level
    comment: Level to attribute the error to in the call stack. Level 1 is the current function, level 2 is its caller, and so on.
    type: number?
    default-value: 1
  return-type: never
- name: gcinfo
  comment: Returns the total heap size in kilobytes.
  return-type: number
- name: getfenv
  comment: Get the scoped environment for the given function.
  parameters:
  - name: target
    type: '((...any) -> ...any) | number'
    selene-type: function
  return-type: '{[string]: any}'
  checked: true
  slua-removed: true
- name: getmetatable
  comment: "Returns the metatable for the specified object. If the metatable has a '__metatable' field, returns its value instead."
  type-parameters: [T]
  parameters:
  - name: obj
    comment: Object to get the metatable for.
    type: T
    selene-type: table
  return-type: getmetatable<T>
  typechecker: {builtin: true}  # builtin due to FFlag::LuauSolverV2
  fastcall: true
- name: graphheap
  comment: Writes the contents of heap to the given file in JSON format.
    Intended to be used with tools/graphanalyze.py
  parameters:
  - name: path
    type: string
  local-only: true
- name: graphuserheap
  comment: Writes the contents of user heap to the given file in JSON format.
    Intended to be used with tools/graphanalyze.py
  parameters:
  - name: path
    type: string
  local-only: true
- name: ipairs
  comment: Returns an iterator for sequential integer key-value pairs in the table. Iteration starts at 1 and halts at the first nil value.
  type-parameters: [V]
  parameters:
  - name: tab
    comment: Table to iterate over.
    type: "{V}"
  return-type: "(({V}, number) -> (number?, V), {V}, number)"
- name: loadstring
  comment: Compile Luau code into a function.
  type-parameters: [A...]
  parameters:
  - name: src
    type: string
  - name: chunkname
    type: string?
  return-type: (((A...) -> any)?, string?)
  slua-removed: true
- name: newproxy
  comment: Creates a new untyped userdata object with an optional metatable.
  parameters:
  - name: mt
    comment: Boolean to create a modifiable metatable.
    type: boolean?
    default-value: false
  return-type: any
  checked: true
- name: next
  comment: Returns the next key-value pair in the table traversal order. If the index is nil or omitted, returns the first pair.
  type-parameters: [K, V]
  parameters:
  - name: t
    comment: Table to traverse.
    type: "{[K]: V}"
  - name: i
    comment: Key to start traversal after. Omit or pass nil to fetch the first key-value pair.
    type: K?
    default-value: nil
  return-type: (K?, V)
  typechecker: {builtin: true}  # builtin due to FFlag::LuauStorePolarityInline
- name: pairs
  comment: Returns an iterator for all key-value pairs in the table.
  type-parameters: [K, V]
  parameters:
  - name: t
    comment: Table to iterate over.
    type: "{[K]: V}"
  return-type: "(({[K]: V}, K?) -> (K?, V), {[K]: V}, K)"
  typechecker: {builtin: true}  # builtin due to FFlag::LuauStorePolarityInline
- name: pcall
  comment: Executes function f in protected mode, calling it with the provided arguments. Returns a boolean indicating success. If true, it also returns the function's results. If false, it returns the error message.
  type-parameters: [A..., R...]
  parameters:
  - name: f
    comment: A function to be called.
    type: (A...) -> R...
  - name: ...
    comment: Arguments to pass to the function.
    type: A...
  return-type: (boolean, R...)
- name: print
  comment: Prints all arguments to standard output using Tab as a separator.
  type-parameters: [T...]
  parameters:
  - name: ...
    comment: Arguments to print to standard output.
    type: T...
  return-type: ()
- name: rawequal
  comment: Returns true if a and b have the same type and value or reference, bypassing the __eq metamethod..
  type-parameters: [T1, T2]
  parameters:
  - name: a
    comment: First object to compare.
    type: T1
  - name: b
    comment: Second object to compare.
    type: T2
  return-type: boolean
  fastcall: true
- name: rawget
  comment: Performs a table lookup, bypassing the __index metamethod..
  type-parameters: [K, V]
  parameters:
  - name: t
    comment: Table to perform the lookup on.
    type: "{[K]: V}"
  - name: k
    comment: Key to look up in the table.
    type: K
  return-type: V?
  fastcall: true
- name: rawlen
  comment: Returns the length of a table or string, bypassing the __len metamethod..
  type-parameters: [K, V]
  parameters:
  - name: t
    comment: Table or string to compute the length of.
    type: "{[K]: V} | string"
  return-type: number
  fastcall: true
- name: rawset
  comment: Assigns a value to a table field, bypassing the __newindex metamethod..
  type-parameters: [K, V]
  parameters:
  - name: t
    comment: Table to assign the value to.
    type: "{[K]: V}"
  - name: k
    comment: Key to assign the value to.
    type: K
  - name: v
    comment: Value to assign.
    type: V
  return-type: "{[K]: V}"
  fastcall: true
- name: require
  comment: Execute the named external module.
  parameters:
  - name: target
    comment: Name of the external module.
    type: any
  return-type: any
  typechecker: {magic: true, checked: true}
- name: select
  comment: Returns a subset of arguments starting from the specified index. Supports negative indexing. If index is '#', returns the number of arguments.
  type-parameters: [A...]
  parameters:
  - name: i
    comment: Index integer, or '#' to return the total arguments count. Supports negative indexing.
    type: string | number
  - name: ...
    comment: Arguments to select from.
    type: A...
  return-type: ...any
  fastcall: true
  typechecker: {magic: true}
- name: setfenv
  comment: Set the scoped environment for the given function.
  type-parameters: [T..., R...]
  parameters:
  - name: target
    type: 'number | (T...) -> R...'
    selene-type: function
  - name: env
    type: '{[string]: any}'
  return-type: ((T...) -> R...)?
  slua-removed: true
- name: setmetatable
  comment: "Changes the metatable for the given table. Raises an error if the table already has a protected metatable (it has a '__metatable' field)."
  type-parameters: [T, MT]
  parameters:
  - name: t
    comment: Table to set the metatable for.
    type: T
    selene-type: table
  - name: mt
    comment: Metatable to set.
    type: MT
    selene-type: table
  return-type: setmetatable<T, MT>
  fastcall: true
  typechecker: {builtin: true, magic: true}  # builtin due to FFlag::LuauSolverV2
- name: tonumber
  comment: Converts the input string to a number in the specified base. Returns nil if the conversion fails.
  parameters:
  - name: value
    comment: String to convert to a number.
    type: string? | number
    selene-type: string
  - name: base
    comment: "Base for the conversion. Valid range is [2, 36]."
    type: number?
    default-value: 10
  return-type: number?
  fastcall: true
  must-use: true
- name: toquaternion
  comment: Converts a string to a quaternion, returns nil if invalid.
  parameters:
  - name: value
    comment: String to convert to a quaternion.
    type: string? | quaternion
    selene-type: string
  return-type: quaternion?
  must-use: true
- name: torotation
  comment: Converts a string to a rotation (quaternion), returns nil if invalid.
  parameters:
  - name: value
    comment: String to convert to a rotation.
    type: string? | quaternion
    selene-type: string
  return-type: quaternion?
  must-use: true
- name: tostring
  comment: "Converts the input object to a string. Calls the metatable's '__tostring' metamethod if present."
  type-parameters: [T]
  parameters:
  - name: value
    comment: Object to convert to a string.
    type: T
  return-type: string
  fastcall: true
- name: touuid
  comment: Creates a new uuid from a string, buffer, or existing uuid. Returns
    nil if the string is not a valid UUID, or the buffer is
    shorter than 16 bytes.
  parameters:
  - name: val
    comment: String to convert to a uuid.
    type: string? | buffer | uuid
    selene-type: string
  return-type: uuid?
  must-use: true
- name: tovector
  comment: Converts a string to a vector, returns nil if invalid.
  parameters:
  - name: val
    comment: String to convert to a vector.
    type: string? | vector
    selene-type: string
  return-type: vector?
  must-use: true
- name: type
  comment: Returns the type of the object as a string.
  type-parameters: [T]
  parameters:
  - name: obj
    comment: Object to get the type of.
    type: T
  return-type: string
  must-use: true
  fastcall: true
- name: typeof
  comment: Returns the type of the object, including custom userdata types.
  type-parameters: [T]
  parameters:
  - name: obj
    comment: Object to get the type of.
    type: T
  return-type: string
  must-use: true
  fastcall: true
- name: unpack
  comment: Returns values from an array in the specified index range.
  type-parameters: [V]
  parameters:
  - name: tab
    comment: Array from which to extract values.
    type: "{V}"
  - name: i
    comment: Starting index.
    type: number?
    default-value: 1
  - name: j
    comment: "Ending index."
    type: number?
    default-value: '#tab'
  return-type: ...V
  fastcall: true
- name: xpcall
  comment: Calls function f with the provided arguments, handling errors with err if they occur.
  type-parameters: [E, A..., R1..., R2...]
  parameters:
  - name: f
    comment: A function to be called.
    type: (A...) -> R1...
  - name: err
    comment: Error handler function.
    type: (E) -> R2...
  - name: ...
    comment: Arguments to pass to the function.
    type: A...
  return-type: (boolean, R1...)
modules:
- name: bit32
  comment: Bitwise operations library.
  functions:
  - name: arshift
    comment: |-
      Shifts n by i bits to the right. If i is negative, a left shift is performed.
      Does an arithmetic shift: The most significant bit of n is propagated during the shift.
      Returns 0 if i < -31, or all sign bits if i > 31.
    parameters:
    - name: "n"
      comment: Number to shift.
      type: number
    - name: i
      comment: Number of bits to shift.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: band
    comment: Performs a bitwise AND operation on input numbers.
    parameters:
    - name: ...
      comment: Numbers to perform bitwise AND on.
      type: ...number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: bnot
    comment: Returns the bitwise negation of the input number.
    parameters:
    - name: "n"
      comment: Number to negate.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: bor
    comment: Performs a bitwise OR operation on input numbers.
    parameters:
    - name: ...
      comment: Numbers to perform bitwise OR on.
      type: ...number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: bxor
    comment: Performs a bitwise XOR operation on input numbers.
    parameters:
    - name: ...
      comment: Numbers to perform bitwise XOR on.
      type: ...number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: btest
    comment: |-
      Performs a bitwise AND operation on input numbers.
      Returns true if result is non-zero.
    parameters:
    - name: ...
      comment: Numbers to perform bitwise AND on.
      type: ...number
    return-type: boolean
    must-use: true
    fastcall: true
    checked: true
  - name: extract
    comment: "Extracts bits from n at position field with width. Raises an error if the selected bit range goes outside [0, 31]."
    parameters:
    - name: "n"
      comment: Number to extract from.
      type: number
    - name: field
      comment: Starting index.
      type: number
    - name: width
      comment: Number of bits to extract.
      type: number?
      default-value: 1
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: lrotate
    comment: Rotates n by i bits to the left. If i is negative, a right rotate is performed.
    parameters:
    - name: "n"
      comment: Number to rotate.
      type: number
    - name: i
      comment: Number of bits to rotate.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: lshift
    comment: "Shifts n by i bits to the left. If i is negative, a right shift is performed. Returns 0 if i is outside the [-31, 31] range."
    parameters:
    - name: "n"
      comment: Number to shift.
      type: number
    - name: i
      comment: Number of bits to shift.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: replace
    comment: "Replaces bits in n at position field with width using value v. Raises an error if the selected bit range goes outside [0, 31]."
    parameters:
    - name: "n"
      comment: Number to replace in.
      type: number
    - name: v
      comment: Value containing the new bits to insert.
      type: number
    - name: field
      comment: Starting index.
      type: number
    - name: width
      comment: Number of bits to replace.
      type: number?
      default-value: 1
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: rrotate
    comment: Rotates n by i bits to the right. If i is negative, a left rotate is performed.
    parameters:
    - name: "n"
      comment: Number to rotate.
      type: number
    - name: i
      comment: Number of bits to rotate.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: rshift
    comment: "Shifts n by i bits to the right. If i is negative, a left shift is performed. Returns 0 if i is outside the [-31, 31] range."
    parameters:
    - name: "n"
      comment: Number to shift.
      type: number
    - name: i
      comment: Number of bits to shift.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: s32
    comment: Wrap this number from float64 range to signed int32 range and truncate to integer.
      Makes integer arithmetic compatible with LSL.
    parameters:
    - name: "n"
      comment: Number to truncate.
      type: number
    return-type: number
    must-use: true
  - name: smul
    comment: Multiplies two signed 32-bit integers. Returns the result as a signed 32-bit integer, wrapping as necessary.
      Avoids precision loss associated with float64 multiplication. Compatible with LSL integer multiplication.
    parameters:
    - name: a
      comment: Left factor.
      type: number
    - name: b
      comment: Right factor.
      type: number
    return-type: number
    must-use: true
  - name: countlz
    comment: Count leading zeros.
    parameters:
    - name: "n"
      comment: Number whose leading zeros will be counted.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: countrz
    comment: Count trailing zeros.
    parameters:
    - name: "n"
      comment: Number whose trailing zeros will be counted.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: byteswap
    comment: Swap byte order.
    parameters:
    - name: "n"
      comment: Number whose byte order will be swapped.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
- name: buffer
  comment: Buffer manipulation library for binary data.
  functions:
  - name: create
    comment: Creates a buffer of the requested size with all bytes initialized to 0.
    parameters:
    - name: size
      comment: Size of the buffer to create.
      type: number
    return-type: buffer
    must-use: true
    checked: true
  - name: fromstring
    comment: Creates a buffer initialized to the contents of the string.
    parameters:
    - name: str
      comment: String to initialize the buffer with.
      type: string
    return-type: buffer
    must-use: true
    checked: true
  - name: tostring
    comment: Returns the buffer data as a string.
    parameters:
    - name: b
      comment: Buffer to convert to a string.
      type: buffer
    return-type: string
    must-use: true
    checked: true
  - name: readi8
    comment: Reads a signed 8-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readu8
    comment: Reads an unsigned 8-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readi16
    comment: Reads a signed 16-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readu16
    comment: Reads an unsigned 16-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readi32
    comment: Reads a signed 32-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readu32
    comment: Reads an unsigned 32-bit integer from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readf32
    comment: Reads a 32-bit floating-point number from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: readf64
    comment: Reads a 64-bit floating-point number from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to read from.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: writei8
    comment: Writes a signed 8-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writeu8
    comment: Writes an unsigned 8-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writei16
    comment: Writes a signed 16-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writeu16
    comment: Writes an unsigned 16-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writei32
    comment: Writes a signed 32-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writeu32
    comment: Writes an unsigned 32-bit integer to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writef32
    comment: Writes a 32-bit floating-point number to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: writef64
    comment: Writes a 64-bit floating-point number to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: Value to write.
      type: number
    return-type: ()
    fastcall: true
    checked: true
  - name: readstring
    comment: Reads a string of the given length from the buffer at the specified offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: offset
      comment: 0-based byte offset to start reading.
      type: number
    - name: count
      comment: Number of bytes to read.
      type: number
    return-type: string
    must-use: true
    checked: true
  - name: writestring
    comment: Writes data from a string into the buffer at the specified offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to write at.
      type: number
    - name: value
      comment: String to write.
      type: string
    - name: count
      comment: Number of bytes to write.
      type: number?
      default-value: '#value'
    return-type: ()
    checked: true
  - name: len
    comment: Returns the size of the buffer in bytes.
    parameters:
    - name: b
      comment: Buffer to get the size of.
      type: buffer
    return-type: number
    must-use: true
    checked: true
  - name: copy
    comment: Copies bytes from the source buffer into the target buffer.
    parameters:
    - name: target
      comment: Target buffer to copy into.
      type: buffer
      observes: write
    - name: targetOffset
      comment: 0-based byte offset in target buffer.
      type: number
    - name: source
      comment: Source buffer to copy from.
      type: buffer
    - name: sourceOffset
      comment: 0-based byte offset in source buffer.
      type: number?
      default-value: 0
    - name: count
      comment: Number of bytes to copy.
      type: number?
      default-value: 'buffer.len(source) - sourceOffset'
    return-type: ()
    checked: true
  - name: fill
    comment: Fills the buffer with the specified value starting at the given offset.
    parameters:
    - name: b
      comment: Buffer to fill.
      type: buffer
      observes: write
    - name: offset
      comment: 0-based byte offset to start filling.
      type: number
    - name: value
      comment: Value to fill with.
      type: number
    - name: count
      comment: Number of bytes to fill.
      type: number?
      default-value: 'buffer.len(b) - offset'
    return-type: ()
    checked: true
  - name: readbits
    comment: Reads up to 32 bits from the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to read from.
      type: buffer
    - name: bitOffset
      comment: Bit offset to read at.
      type: number
    - name: bitCount
      comment: "Number of bits to read. Must be in [0, 32] range."
      type: number
    return-type: number
    must-use: true
    checked: true
  - name: writebits
    comment: Writes up to 32 bits to the buffer at the given offset.
    parameters:
    - name: b
      comment: Buffer to write to.
      type: buffer
      observes: write
    - name: bitOffset
      comment: Bit offset to write at.
      type: number
    - name: bitCount
      comment: "Number of bits to write. Must be in [0, 32] range."
      type: number
    - name: value
      comment: Source of bits to write.
      type: number
    return-type: ()
    checked: true
- name: coroutine
  comment: Coroutine manipulation library.
  functions:
  - name: create
    comment: Returns a new coroutine that, when resumed, will run function f.
    parameters:
    - name: f
      comment: A function to be executed by the new coroutine.
      type: (...any) -> ...any
    return-type: thread
    must-use: true
  - name: resume
    comment: Resumes a coroutine. Returns true followed by any values passed to coroutine.yield() or returned by the function. If an error occurs, returns false and the error message.
    parameters:
    - name: co
      comment: Coroutine to resume.
      type: thread
    - name: ...
      comment: Arguments to pass to the coroutine.
      type: ...any
    return-type: (boolean, ...any)
  - name: running
    comment: Returns the currently running coroutine, or nil if called from the main coroutine.
    parameters: []
    return-type: thread?
    must-use: true
  - name: status
    comment: 'Returns the status of the coroutine: "running", "suspended", "normal", or "dead".'
    parameters:
    - name: co
      comment: Coroutine to check status of.
      type: thread
    return-type: '"running" | "suspended" | "normal" | "dead"'
    must-use: true
    checked: true
  - name: wrap
    comment: Creates a coroutine and returns a function that resumes it.
    parameters:
    - name: f
      comment: A function to execute in a coroutine.
      type: (...any) -> ...any
    return-type: (...any) -> ...any
    must-use: true
  - name: yield
    comment: Yields the current coroutine, passing arguments to the resuming code.
    parameters:
    - name: ...
      comment: Values to pass to the resuming code.
      type: ...any
    return-type: '...any'
  - name: isyieldable
    comment: Returns true if the currently running coroutine can yield.
    parameters: []
    return-type: boolean
    must-use: true
  - name: close
    comment: Closes a coroutine, returning true if successful or false and an error.
    parameters:
    - name: co
      comment: Coroutine to close.
      type: thread
    return-type: (boolean, string?)
    checked: true
- name: debug
  comment: Debug library for introspection.
  functions:
  - name: info
    comment: Returns information about a stack frame or function based on specified format.
    overloads:
    - comment: Returns information about a stack level.
      parameters:
      - name: level
        comment: Stack level or function reference for inspection.
        type: number
      - name: s
        comment: String specifying requested information.
        type: string
      return-type: '...any'
    - comment: Returns information about a function.
      parameters:
      - name: func
        comment: Function reference.
        type: (...any) -> ...any
      - name: s
        comment: String specifying requested information.
        type: string
      return-type: '...any'
    parameters:
    - name: co
      comment: Optional thread or function reference.
      type: thread | ((...any) -> ...any) | number
    - name: level
      comment: Stack level or function reference for inspection.
      type: number
      optional: true
    - name: s
      comment: String specifying requested information.
      type: string
    return-type: '...any'
    must-use: true
  - name: traceback
    comment: Returns a human-readable call stack starting from the specified level.
    overloads:
    - comment: Returns a string with a traceback of the current call stack.
      parameters:
      - name: msg
        comment: Message prepended to the traceback.
        type: string?
        default-value: nil
      - name: level
        comment: Stack level to start traceback.
        type: number?
        default-value: 1
      return-type: string
    parameters:
    - name: co
      comment: Optional thread reference for traceback.
      type: thread
      optional: true
    - name: msg
      comment: Message prepended to the traceback.
      type: string?
      default-value: nil
    - name: level
      comment: Stack level to start traceback.
      type: number?
      default-value: 1
    return-type: string
    must-use: true
- name: llbase64
  comment: Base64 encoding/decoding library.
  functions:
  - name: encode
    comment: Encodes a string or buffer to base64.
    parameters:
    - name: data
      comment: "String or buffer to encode to base64 format."
      type: string | buffer
      selene-type: string
    return-type: string
    must-use: true
  - name: decode
    comment: Decodes a base64 string to a string, or buffer if asBuffer is true.
      The output is truncated at the first decoding error.
    overloads:
    - comment: Decodes a base64 string to a buffer if asBuffer is true.
      parameters:
      - name: data
        comment: "Base64 encoded string to decode."
        type: string
      - name: asBuffer
        comment: "If true, decodes the payload into a buffer instead of a string."
        type: "true"
      return-type: buffer
    parameters:
    - name: data
      comment: "Base64 encoded string to decode."
      type: string
    - name: asBuffer
      comment: "Decodes the payload as a string."
      type: false?
      selene-type: bool
      default-value: false
    return-type: string
    must-use: true
- name: lljson
  comment: JSON encoding/decoding library for Second Life.
  functions:
  - name: encode
    comment: Encodes a Lua value as JSON.
      Raises an error if value contains unsupported types.
    parameters:
    - name: value
      comment: "Value (table, string, number, etc.) to serialize into JSON."
      type: any
    - name: options
      comment: "Optional configuration settings and replacer function to customize serialization formatting."
      type: LLJsonEncodeOptions?
      default-value: '{allow_sparse=false, skip_tojson=false, replacer=nil}'
    return-type: string
    must-use: true
  - name: decode
    comment: Decodes a JSON string to a Lua value.
      Raises an error if JSON is invalid.
    parameters:
    - name: json
      comment: "JSON string to deserialize into a table or value."
      type: string
    - name: options
      comment: "Optional configuration settings and reviver function to apply during parsing."
      type: LLJsonDecodeOptions?
      default-value: '{track_path=false, reviver=nil}'
    return-type: any
    must-use: true
  - name: slencode
    comment: Encodes a Lua value as JSON, preserving SL types. Use tight to encode
      more compactly. Raises an error if value contains unsupported types.
    parameters:
    - name: value
      comment: "Value to serialize into SL-typed JSON."
      type: any
    - name: options
      comment: "Optional configuration settings to customize serialization formatting."
      type: LLJsonEncodeOptions?
      default-value: '{allow_sparse=false, skip_tojson=false, tight=false, replacer=nil}'
    return-type: string
    must-use: true
  - name: sldecode
    comment: Decodes a JSON string to a Lua value, preserving SL types.
      Raises an error if JSON is invalid.
    parameters:
    - name: json
      comment: "SL-typed JSON string to deserialize."
      type: string
    - name: options
      comment: "Optional configuration settings to apply during parsing."
      type: LLJsonDecodeOptions?
      default-value: '{track_path=false, reviver=nil}'
    return-type: any
    must-use: true
  constants:
  - name: 'null'
    comment: A constant to pass for null to json encode.
    type: any
  - name: remove
    comment: A constant to return from a reviver/replacer function to omit this item.
    type: any
  - name: array_mt
    comment: Metatable for declaring a table as an array for json encode.
    type: '{__jsonhint: string}'
    value: '{__jsonhint = "array"}'
  - name: object_mt
    comment: Metatable for declaring a table as an object for json encode.
    type: '{__jsonhint: string}'
    value: '{__jsonhint = "object"}'
  - name: empty_array
    comment: A constant to pass for an empty array to json encode.
    type: '{}'
    value: 'setmetatable({}, lljson.array_mt)'
  - name: empty_object
    comment: A constant to pass for an empty object to json encode.
    type: '{}'
    value: 'setmetatable({}, lljson.object_mt)'
- name: llhttp
  comment: Utilities for making HTTP requests.
  functions:
  - name: request
    comment: Send an HTTP request. Returns a key identifying the request, which is
      delivered via the http_response event. Omit body for requests that do not
      need a body (e.g. GET).
    parameters:
    - name: url
      type: string
    - name: params
      type: HttpRequestParams?
    - name: body
      type: string?
    return-type: uuid
- name: llprim
  comment: Utilities for working with prims / objects
  constants:
  - name: ParamsSetter
    comment: Metatable for building lists to pass to ll.SetLinkPrimitiveParamsFast
    type: PrimParamsSetterTypeMeta
    value: PrimParamsSetterTypeMeta
  functions:
  - name: particleSystem
    comment: Emit a particle system from a ParticleParams table. Omit link to apply to the current prim.
    parameters:
    - name: params
      type: ParticleParams?
    - name: link
      type: number?
    return-type: '()'
  - name: setMedia
    comment: Configure media on a specific face. Omit link to apply to the current prim.
    parameters:
    - name: face
      type: number
    - name: params
      type: MediaParams?
    - name: link
      type: number?
    return-type: number
- name: math
  comment: Mathematical functions library.
  functions:
  - name: abs
    comment: Returns the absolute value of n.
    parameters:
    - name: "n"
      comment: A number.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: acos
    comment: Returns the arc cosine of n in radians.
    parameters:
    - name: "n"
      comment: "A number in the range [-1, 1]."
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: asin
    comment: Returns the arc sine of n in radians.
    parameters:
    - name: "n"
      comment: "A number in the range [-1, 1]."
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: atan
    comment: Returns the arc tangent of n in radians.
    parameters:
    - name: "n"
      comment: A number.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: atan2
    comment: "Returns the arc tangent of y/x in radians, using the signs to determine the quadrant. Note the argument order: Y is the first parameter, X is the second parameter."
    parameters:
    - name: "y"
      comment: Y-coordinate.
      type: number
    - name: x
      comment: X-coordinate.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: ceil
    comment: Returns the smallest integer larger than or equal to n.
    parameters:
    - name: "n"
      comment: A number to round up.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: clamp
    comment: Returns n clamped between min and max. Raises an error if min is greater than max.
    parameters:
    - name: "n"
      comment: Value to be clamped.
      type: number
    - name: min
      comment: Minimum allowable value.
      type: number
    - name: max
      comment: Maximum allowable value.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: cos
    comment: Returns the cosine of n. n is in radians.
    parameters:
    - name: "n"
      comment: An angle in radians.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: cosh
    comment: Returns the hyperbolic cosine of n.
    parameters:
    - name: "n"
      comment: A number to compute the hyperbolic cosine of.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: deg
    comment: Converts n from radians to degrees.
    parameters:
    - name: "n"
      comment: A value in radians.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: exp
    comment: Returns the base-e exponent of n.
    parameters:
    - name: "n"
      comment: A number to compute e^n.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: floor
    comment: Returns the largest integer smaller than or equal to n.
    parameters:
    - name: "n"
      comment: A number to round down.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: fmod
    comment: Returns the remainder of x modulo y, rounded towards zero.
    parameters:
    - name: x
      comment: Dividend.
      type: number
    - name: "y"
      comment: Divisor.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: frexp
    comment: Returns m and e such that n = m * 2^e.
    parameters:
    - name: "n"
      comment: A number to split into significand and exponent.
      type: number
    return-type: (number, number)
    must-use: true
    fastcall: true
    checked: true
  - name: ldexp
    comment: Returns s * 2^e.
    parameters:
    - name: s
      comment: Significand.
      type: number
    - name: e
      comment: Exponent.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: lerp
    comment: Linearly interpolates between a and b using factor t.
    parameters:
    - name: a
      comment: Start value.
      type: number
    - name: b
      comment: End value.
      type: number
    - name: t
      comment: Interpolation factor.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: log
    comment: Returns the logarithm of n in the given base, defaults to e.
    parameters:
    - name: "n"
      comment: A number to compute logarithm.
      type: number
    - name: base
      comment: Base of the logarithm.
      type: number?
      default-value: 'math.e'
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: log10
    comment: Returns the base-10 logarithm of n.
    parameters:
    - name: "n"
      comment: A number to compute base-10 logarithm.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: map
    comment: Maps n from input range to output range.
    parameters:
    - name: "n"
      comment: Number to map.
      type: number
    - name: inMin
      comment: Lower bound of the input range.
      type: number
    - name: inMax
      comment: Upper bound of the input range.
      type: number
    - name: outMin
      comment: Lower bound of the output range.
      type: number
    - name: outMax
      comment: Upper bound of the output range.
      type: number
    return-type: number
    must-use: true
  - name: max
    comment: Returns the maximum value from the given numbers.
    parameters:
    - name: "n"
      comment: A number to find the maximum from.
      type: number
    - name: ...
      comment: Numbers to find the maximum from.
      type: ...number
      optional: false
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: min
    comment: Returns the minimum value from the given numbers.
    parameters:
    - name: "n"
      comment: A number to find the minimum from.
      type: number
    - name: ...
      comment: Numbers to find the minimum from.
      type: ...number
      optional: false
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: modf
    comment: Returns the integer and fractional parts of n.
    parameters:
    - name: "n"
      comment: A number to split into integer and fractional parts.
      type: number
    return-type: (number, number)
    must-use: true
    fastcall: true
    checked: true
  - name: noise
    comment: "Returns a Perlin noise value for the point (x, y, z). The return value is in the range [-1.0, 1.0]."
    parameters:
    - name: x
      comment: X coordinate for the noise function.
      type: number
    - name: "y"
      comment: Y coordinate for the noise function.
      type: number?
      default-value: 0
    - name: z
      comment: Z coordinate for the noise function.
      type: number?
      default-value: 0
    return-type: number
    must-use: true
    checked: true
  - name: pow
    comment: Returns base to the power of exponent.
    parameters:
    - name: base
      comment: Base value.
      type: number
    - name: exponent
      comment: Exponent value.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: rad
    comment: Converts n from degrees to radians.
    parameters:
    - name: "n"
      comment: A value in degrees.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: random
    comment: Returns a random number within the given range.
    parameters:
    - name: min
      comment: Minimum value of the range.
      type: number?
      default-value: nil
    - name: max
      comment: Maximum value of the range.
      type: number?
      default-value: nil
    return-type: number
    must-use: true
    checked: true
    variants:
      - comment: "Returns a random float number in the [0, 1) range (exclusive of 1)."
        parameters: []
        return-type: number
      - comment: "Returns a random integer number in the [1, n] range. Input is truncated to integer."
        parameters:
        - name: n
          comment: Maximum value of the range.
          type: number
        return-type: number
      - comment: "Returns a random integer number in the [min, max] range. Inputs are truncated to integers."
        parameters:
        - name: min
          comment: Minimum value of the range.
          type: number
        - name: max
          comment: Maximum value of the range.
          type: number
        return-type: number
  - name: randomseed
    comment: Sets the seed for the random number generator.
    parameters:
    - name: seed
      comment: Seed for the random number generator.
      type: number
    return-type: ()
    deprecated:
      reason: Disabled in SLua.
    checked: true
  - name: round
    comment: Rounds n to the nearest integer.
    parameters:
    - name: "n"
      comment: A number to round to the nearest integer. Halfway values are rounded away from zero.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: sign
    comment: Returns -1 if n is negative, 1 if positive, and 0 if zero.
    parameters:
    - name: "n"
      comment: A number to get the sign of.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: sin
    comment: Returns the sine of n. n is in radians.
    parameters:
    - name: "n"
      comment: An angle in radians.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: sinh
    comment: Returns the hyperbolic sine of n.
    parameters:
    - name: "n"
      comment: A number to compute the hyperbolic sine of.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: sqrt
    comment: Returns the square root of n.
    parameters:
    - name: "n"
      comment: A number to compute the square root of.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: tan
    comment: Returns the tangent of n. n is in radians.
    parameters:
    - name: "n"
      comment: An angle in radians.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: tanh
    comment: Returns the hyperbolic tangent of n.
    parameters:
    - name: "n"
      comment: A number to compute the hyperbolic tangent of.
      type: number
    return-type: number
    must-use: true
    fastcall: true
    checked: true
  - name: isnan
    comment: Returns true if n is NaN.
    parameters:
    - name: "n"
      comment: Number to check as NaN.
      type: number
    return-type: boolean
    must-use: true
    fastcall: true
    checked: true
  - name: isinf
    comment: Returns true if n is infinite.
    parameters:
    - name: "n"
      comment: Number to check as infinite.
      type: number
    return-type: boolean
    must-use: true
    fastcall: true
    checked: true
  - name: isfinite
    comment: Returns true if n is finite.
    parameters:
    - name: "n"
      comment: Number to check as finite.
      type: number
    return-type: boolean
    must-use: true
    fastcall: true
    checked: true
  constants:
  - name: pi
    comment: Value of pi.
    type: number
    value: 3.141592653589793
  - name: huge
    comment: A value larger than any other numeric value (infinity).
    type: number
    value: inf
- name: os
  comment: Operating system facilities library.
  functions:
  - name: clock
    comment: Returns a high-precision timestamp in seconds for measuring durations.
      Has a resolution of 0.0001s (222 ticks per server frame, 3 ticks per script time slice).
      6-11x slower to look up than ll.GetTime.
    parameters: []
    return-type: number
    must-use: true
  - name: date
    comment: Returns a table or string representation of the time based on the provided format.
    parameters:
    - name: formatString
      comment: Format string for the date representation.
      type: string?
      default-value: '"%c"'
    - name: t
      comment: Timestamp to format; defaults to the current time.
      type: number?
      default-value: 'os.time()'
    return-type: string
    overloads:
    - parameters:
      - name: formatString
        comment: Optional format string for the date representation.
        type: '"*t" | "!*t"'
      - name: t
        comment: Timestamp to format; defaults to the current time.
        type: number?
        default-value: 'os.time()'
      return-type: DateTypeResult
    must-use: true
  - name: difftime
    deprecated:
      reason: Same as a - b
      selene-replace: ["%1 - %2"]
    comment: Returns the difference in seconds between two timestamps. Same as a - b.
    parameters:
    - name: a
      comment: First timestamp value.
      type: number
    - name: b
      comment: Second timestamp value.
      type: number
    return-type: number
    must-use: true
  - name: time
    comment: Returns the current Unix timestamp or the timestamp of the given date.
    parameters:
    - name: time
      comment: Optional table with date/time fields; returns the corresponding Unix timestamp.
      type: DateTypeArg
      optional: true
    return-type: number?
    overloads:
    - comment: Returns the current Unix timestamp.
      parameters: []
      return-type: number
    must-use: true
- name: quaternion
  comment: Quaternion manipulation library.
  callable:
    name: quaternion
    comment: Creates a new quaternion with the given component values.
      Alias of quaternion.create.
    parameters:
    - name: x
      comment: X component of the quaternion.
      type: number
    - name: "y"
      comment: Y component of the quaternion.
      type: number
    - name: z
      comment: Z component of the quaternion.
      type: number
    - name: s
      comment: S component of the quaternion.
      type: number
    return-type: quaternion
    must-use: true
  functions:
  - name: create
    comment: Creates a new quaternion with the given component values.
    parameters:
    - name: x
      comment: X component of the quaternion.
      type: number
    - name: "y"
      comment: Y component of the quaternion.
      type: number
    - name: z
      comment: Z component of the quaternion.
      type: number
    - name: s
      comment: S component of the quaternion.
      type: number
    return-type: quaternion
    must-use: true
  - name: normalize
    comment: Computes the normalized version (unit quaternion) of the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: quaternion
    must-use: true
  - name: magnitude
    comment: Computes the magnitude of the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: number
    must-use: true
  - name: dot
    comment: Computes the dot product of two quaternions.
    parameters:
    - name: a
      comment: Left input quaternion.
      type: quaternion
    - name: b
      comment: Right input quaternion.
      type: quaternion
    return-type: number
    must-use: true
  - name: slerp
    comment: Spherical linear interpolation from a to b using factor t.
    parameters:
    - name: a
      comment: Start quaternion.
      type: quaternion
    - name: b
      comment: End quaternion.
      type: quaternion
    - name: t
      comment: Interpolation factor.
      type: number
    return-type: quaternion
    must-use: true
  - name: conjugate
    comment: Computes the conjugate of the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: quaternion
    must-use: true
  - name: tofwd
    comment: Computes the forward vector from the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: vector
    must-use: true
  - name: toleft
    comment: Computes the left vector from the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: vector
    must-use: true
  - name: toup
    comment: Computes the up vector from the quaternion.
    parameters:
    - name: q
      comment: Input quaternion.
      type: quaternion
    return-type: vector
    must-use: true
  constants:
  - name: identity
    comment: Identity quaternion constant.
    type: quaternion
    value: quaternion(0, 0, 0, 1)
- name: string
  comment: String manipulation library.
  functions:
  - name: byte
    comment: Returns the numeric code of every byte in the input string within the given range.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: i
      comment: Starting index.
      type: number?
      default-value: 1
    - name: j
      comment: Ending index.
      type: number?
      default-value: i
    return-type: '...number'
    must-use: true
    fastcall: true
    typechecker: {builtin: true, checked: true}
  - name: char
    comment: Returns a string containing characters for the given byte values.
    parameters:
    - name: ...
      comment: Byte values to convert to string.
      type: ...number
      optional: false
    return-type: string
    must-use: true
    fastcall: true
    typechecker: {builtin: true, checked: true}
  - name: find
    comment: Finds the first instance of the pattern in the string. Returns the start and end indices of the first match, followed by any captured substrings. Returns nil if no match is found.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: pattern
      comment: Pattern to search for.
      type: string
    - name: init
      comment: Index to start the search from. Supports negative indexing.
      type: number?
      default-value: 1
    - name: plain
      comment: Perform raw search. If true, turns off pattern matching and performs a raw, case-sensitive substring match.
      type: boolean?
      default-value: false
    return-type: (number?, number?, ...string)
    must-use: true
    typechecker: {builtin: true, magic: true, checked: true}
  - name: format
    comment: Formats input values into a string using printf-style format specifiers.
    parameters:
    - name: formatstring
      comment: Format string.
      type: string
    - name: ...
      comment: Values to format.
      type: ...any
      optional: false
    return-type: string
    must-use: true
    typechecker: {builtin: true, magic: true, checked: true}
  - name: gmatch
    comment: Returns an iterator function for pattern matches.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: pattern
      comment: Pattern to search for.
      type: string
    return-type: () -> ...string
    must-use: true
    typechecker: {builtin: true, magic: true, checked: true}
  - name: gsub
    comment: Performs pattern-based substitution in a string. Returns a copy of the string with substitutions made, followed by the total number of substitutions that occurred.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: pattern
      comment: Pattern to replace.
      type: string
    - name: repl
      comment: Replacement string, function, or table.
      type: 'string | { [string]: string } | (...string) -> string'
    - name: maxn
      comment: Maximum replacements.
      type: number?
      default-value: nil
    return-type: (string, number)
    must-use: true
    typechecker: {builtin: true}
  - name: len
    comment: "Returns the number of bytes in the string. Identical to #s."
    parameters:
    - name: s
      comment: Input string.
      type: string
    return-type: number
    must-use: true
    fastcall: true
    typechecker: {builtin: true, checked: true}
  - name: lower
    comment: Returns a lowercase version of the input string. Only works with ASCII. Use ll.ToLower for strings that may contain Unicode.
    parameters:
    - name: s
      comment: Input string.
      type: string
    return-type: string
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: match
    comment: Finds and returns matches for a pattern in the input string. Returns nil if no match is found.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: pattern
      comment: Pattern to match.
      type: string
    - name: init
      comment: Starting index.
      type: number?
      default-value: 1
    return-type: '...string?'
    must-use: true
    typechecker: {builtin: true, magic: true, checked: true}
  - name: pack
    comment: Packs values into a binary string.
    parameters:
    - name: fmt
      comment: Pack format string.
      type: string
    - name: ...
      comment: Values to encode.
      type: ...any
    return-type: string
    must-use: true
    typechecker: {builtin: true}
  - name: packsize
    comment: Returns the size of a packed string for the given format.
    parameters:
    - name: fmt
      comment: Pack format string.
      type: string
    return-type: number
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: rep
    comment: Returns the input string repeated n times. Returns an empty string if n is zero or negative.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: "n"
      comment: Number of times to repeat the string.
      type: number
    return-type: string
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: reverse
    comment: Returns the input string with bytes in reverse order.
    parameters:
    - name: s
      comment: Input string.
      type: string
    return-type: string
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: split
    comment: 'Splits a string by separator. Returns a list of substrings. If the separator is nil, splits at commas (","). If the separator is empty, splits into individual one-byte substrings.'
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: separator
      comment: 'Separator to split on. If nil, splits at commas (","). If empty, splits into individual bytes.'
      type: string?
      default-value: '","'
    return-type: '{string}'
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: sub
    comment: Returns a substring from the given range.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: i
      comment: Starting index. Supports negative indexing.
      type: number
    - name: j
      comment: Ending index. Supports negative indexing.
      type: number?
      default-value: '#s'
    return-type: string
    must-use: true
    fastcall: true
    typechecker: {builtin: true, checked: true}
  - name: unpack
    comment: Decodes a binary string using a pack format.
    parameters:
    - name: fmt
      comment: Pack format string.
      type: string
    - name: s
      comment: Encoded string.
      type: string
    - name: init
      comment: Starting index.
      type: number?
      default-value: 1
    return-type: '...any'
    must-use: true
    typechecker: {builtin: true, checked: true}
  - name: upper
    comment: Returns an uppercase version of the input string. Only works with ASCII. Use ll.ToUpper for strings that may contain Unicode.
    parameters:
    - name: s
      comment: Input string.
      type: string
    return-type: string
    must-use: true
    typechecker: {builtin: true, checked: true}
- name: table
  comment: Table manipulation library. Tables are collections of key-value pairs.
  functions:
  - name: concat
    comment: Joins an array of strings into one string, with an optional separator.
    parameters:
    - name: a
      comment: Array of strings.
      type: '{string | number}'
    - name: sep
      comment: Separator string.
      type: string?
      default-value: '""'
    - name: i
      comment: Starting index.
      type: number?
      default-value: 1
    - name: j
      comment: Ending index.
      type: number?
      default-value: '#a'
    return-type: string
    must-use: true
  - name: foreach
    comment: Iterates over all key-value pairs in the table (deprecated).
    deprecated:
      reason: Use a for loop instead
    type-parameters: [K, V, R]
    parameters:
    - name: t
      comment: Table to iterate over.
      type: '{[K]: V}'
    - name: f
      comment: Function applied to each key-value pair.
      type: '(key: K, value: V) -> R?'
      optional: false
    return-type: R?
  - name: foreachi
    comment: Iterates over all index-value pairs in the array (deprecated).
    deprecated:
      reason: Use a for loop instead
    type-parameters: [V, R]
    parameters:
    - name: a
      comment: Array to iterate over.
      type: '{V}'
    - name: f
      comment: Function applied to each index-value pair.
      type: '(index: number, value: V) -> R?'
    return-type: R?
  - name: getn
    comment: 'Returns the length of an array (deprecated; use # instead).'
    deprecated:
      use: "#"
      selene-replace: ["#%1"]
    parameters:
    - name: a
      comment: Array to check.
      type: '{any}'
    return-type: number
    must-use: true
  - name: maxn
    comment: Returns the highest numeric key in the table.
    parameters:
    - name: t
      comment: Table to check.
      type: '{any}'
    return-type: number
    must-use: true
  - name: insert
    comment: "Inserts an element at index i, shifting subsequent elements up by 1. The index must be within the range [1, #a]."
    overloads:
    - comment: "Appends an element to the end of the array. Equivalent to a[#a+1] = value."
      type-parameters: [V]
      parameters:
      - name: a
        comment: Array to insert into.
        type: '{V}'
        observes: write
      - name: value
        comment: Value to insert.
        type: V
      return-type: ()
    type-parameters: [V]
    parameters:
    - name: a
      comment: Array to insert into.
      type: '{V}'
