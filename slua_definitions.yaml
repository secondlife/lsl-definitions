    comment: Creates a string from Unicode codepoints.
    parameters:
    - name: ...
      comment: Unicode codepoints.
      type: ...number
      optional: false
    return-type: string
    checked: true
  - name: codes
    comment: Returns an iterator that produces
      the byte offset and Unicode codepoint for each character in the string.
    parameters:
    - name: s
      comment: Input string.
      type: string
    return-type: ((string, number) -> (number, number), string, number)
    must-use: true
    checked: true
  - name: codepoint
    comment: Returns the Unicode codepoints in the specified range of the string.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: i
      comment: Starting index.
      type: number?
      default-value: 1
    - name: j
      comment: Ending index.
      type: number?
      default-value: i
    return-type: '...number'
    must-use: true
    checked: true
  - name: len
    comment: Returns the number of Unicode codepoints in the specified range of the string,
      or nil and error index.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: i
      comment: Starting index.
      type: number?
      default-value: 1
    - name: j
      comment: Ending index.
      type: number?
      default-value: '#s'
    return-type: (number?, number?)
    must-use: true
    checked: true
  - name: offset
    comment: Returns the byte offset of the nth Unicode codepoint in the string.
    parameters:
    - name: s
      comment: Input string.
      type: string
    - name: n
      comment: Character position.
      type: number
    - name: i
      comment: Starting index.
      type: number?
      default-value: 'if n >= 0 then 1 else #s + 1'
    return-type: number?
    must-use: true
    checked: true
  constants:
  - name: charpattern
    comment: Pattern that matches exactly one UTF-8 byte sequence.
    type: string
    value: '"[\x00-\x7F\xC2-\xF4][\x80-\xBF]*"'
