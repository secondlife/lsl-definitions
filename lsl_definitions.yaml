    value: '0x20'
  CHANGED_MEDIA:
    member-of: [ChangeType]
    tooltip: Prim Media on the prim has changed.
    type: integer
    value: '0x800'
  CHANGED_OWNER:
    member-of: [ChangeType]
    tooltip: Object has changed owners. Triggers in the original object when a
