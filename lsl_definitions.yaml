      - data_conversion
  llsRGB2Linear:
    arguments:
    - srgb:
        tooltip: Color vector in the sRGB colorspace to convert.
        type: vector
    energy: 10.0
    func-id: 716
    must-use: true
    return: vector
    sleep: 0.0
    tooltip: Returns a vector representing the conversion of the color srgb from the
      sRGB colorspace into the linear RGB colorspace.
    categories:
      - math
      - prim_appearance
types:
  float:
    tooltip: 32 bit floating point value.\nThe range is 1.175494351E-38 to 3.402823466E+38.
  integer:
    tooltip: "32 bit integer value.\\n\u22122,147,483,648 and +2,147,483,647 (that\
      \ is 0x80000000 to 0x7FFFFFFF in hex)."
  key:
    tooltip: A 128 bit unique identifier (UUID).\nThe key is represented as hexidecimal
      characters (A-F and 0-9), grouped into sections (8,4,4,4,12 characters) and
      separated by hyphens (for a total of 36 characters). e.g. "A822FF2B-FF02-461D-B45D-DCD10A2DE0C2".
  list:
    tooltip: A collection of other data types.\nLists are signified by square brackets
      surrounding their elements; the elements inside are separated by commas. e.g.
      [0, 1, 2, 3, 4] or ["Yes", "No", "Perhaps"].
  quaternion:
    private: true
    tooltip: Quaternion type is a left over from way back when LSL was created.
      It was later renamed to <rotation> to make it more user friendly, but it appears
      someone forgot to remove it ;-)
  rotation:
    tooltip: Rotation type is one of several ways to represent an orientation
      in 3D.\nIt is a mathematical object called a quaternion. You can think of a
      quaternion as four numbers (x, y, z, w), three of which represent the direction
      an object is facing and a fourth that represents the object's banking left or
      right around that direction.
  string:
    tooltip: Text data.\nThe editor accepts UTF-8 encoded text.
  vector:
    tooltip: A vector is a data type that contains a set of three float values.\nVectors
      are used to represent colors (RGB), positions, and directions/velocities.
controls:
  default:
    tooltip: |-
      All scripts must have a default state, which is the first state entered when the script starts.
      If another state is defined before the default state, the compiler will report a syntax error.
  do:
    tooltip: do / while loop\ndo {\n...\n} while (<condition>);
  else:
    tooltip: if / else block\nif (<condition>) {\n...\n[} else [if (<condition>) {\n...]]\n}
  event:
    deprecated: true
    tooltip: Undefined reserved word.
  for:
    tooltip: for loop\nfor (<initializer>; <condition>; <post-iteration-statement>)\n{
      ...\n}
  if:
    tooltip: if / else block\nif (<condition>) {\n...\n[} else [if (<condition>) {\n...]]\n}
  jump:
    tooltip: jump statement\njump <label>
  print:
    tooltip: Say the given variable to the owner. Only works on 2025 VM.
  return:
    tooltip: Leave current event or function.\nreturn [<variable>];\nOptionally pass
      back a variable's value, from a function.
  state:
    tooltip: state <target>\nIf the target state is not the same as the current one,
      change to the target state.
  while:
    tooltip: while loop\nwhile (<condition>) {\n...\n}

# Rulesets that expand into fluent-builder SLua classes (ordered, heterogeneous,
# with face-target and discriminator variants). Keyed-bag rule lists (object
# details, media, environment, KFM options, prim-param reads) aren't modeled yet.
builder-rulesets:
  prim-params:
    type: builder
    enum: PrimParam
    rules:
      # PRIM_TYPE_LEGACY intentionally omitted, it has very annoying semantics,
      #  has no "get" equivalent and isn't something anyone should use now.
      # PRIM_CAST_SHADOWS ignored because it's not even implemented
      LINK_TARGET:
        # Make this more obviously verb-y since it's a meta-command
        method-name: "targetLink"
        params:
          - [ link, link_target ]
      MATERIAL:
        # Otherwise this is _very_ easy to confuse with render materials
        method-name: 'physicsMaterial'
        params:
          - [ integer, flag ]
      PHYSICS:
        method-name: 'physical'
        params:
          # Note that we use "asset" and "boolean" types to denote places where
          # 'asset-semantics' or 'bool-semantics' would apply.
          - [ boolean, enabled ]
      TEMP_ON_REZ:
        method-name: 'temporary'
        params:
          - [ boolean, enabled ]
      PHANTOM:
        params:
          - [ boolean, enabled ]
      POSITION:
        method-name: "pos"
        params:
          - [ vector, position ]
      SIZE:
        params:
          - [ vector, size ]
      ROTATION:
        method-name: "rot"
        params:
          - [ rotation, rot ]
      TYPE:
        params:
          # TODO: express an enum-like relationship here?
          - [ integer, prim_type ]
        variants-on: prim_type
        variant-enum: PrimType
        variants:
          - applies-to: [ BOX, CYLINDER, PRISM ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, top_size ]
              - [ vector, top_shear ]
          - applies-to: [ SPHERE ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, dimple ]
          - applies-to: [ TORUS, TUBE, RING ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, hole_size ]
              - [ vector, top_shear ]
              - [ vector, advanced_cut ]
              - [ vector, taper ]
              - [ float, revolutions ]
              - [ float, radius_offset ]
              - [ float, skew ]
          - applies-to: [ SCULPT ]
            params:
              - [ asset, texture ]
              - [ integer, sculpt_type ]
      TEXTURE:
        face-target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      COLOR:
        face-target: true
        params:
          - [ vector, color ]
          - [ float, alpha ]
      BUMP_SHINY:
        face-target: true
        # Neither name is very good, but at least this makes sense
        method-name: 'shinyBump'
        params:
          - [ integer, shiny ]
          - [ integer, bump ]
      FULLBRIGHT:
        face-target: true
        params:
          - [ boolean, enabled ]
      FLEXIBLE:
        params:
          - [ boolean, enabled ]
          - [ integer, softness ]
          - [ float, gravity ]
          - [ float, friction ]
          - [ float, wind ]
          - [ float, tension ]
          - [ vector, force ]
      TEXGEN:
        face-target: true
        params:
          - [ integer, mode ]
      POINT_LIGHT:
        params:
          - [ boolean, enabled ]
          - [ vector, linear_color ]
          - [ float, intensity ]
          - [ float, radius ]
          - [ float, falloff ]
      GLOW:
        face-target: true
        params:
          - [ float, intensity ]
      TEXT:
        params:
          - [ string, text ]
          - [ vector, color ]
          - [ float, alpha ]
      NAME:
        params:
          - [ string, name ]
      DESC:
        method-name: "description"
        params:
          - [ string, description ]
      ROT_LOCAL:
        params:
          - [ rotation, rot ]
      PHYSICS_SHAPE_TYPE:
        params:
          - [ integer, shape_type ]
      OMEGA:
        params:
          - [ vector, axis ]
          - [ float, spinrate ]
          - [ float, gain ]
      POS_LOCAL:
        params:
          - [ vector, position ]
      SLICE:
        params:
          - [ vector, slice ]
      SPECULAR:
        face-target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, color ]
          - [ integer, glossiness ]
          - [ integer, environment ]
      NORMAL:
        face-target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      ALPHA_MODE:
        face-target: true
        params:
          - [ integer, alpha_mode ]
          - [ integer, mask_cutoff ]
      ALLOW_UNSIT:
        params:
          - [ boolean, allowed ]
      SCRIPTED_SIT_ONLY:
        params:
          - [ boolean, enabled ]
      SIT_TARGET:
        params:
          - [ boolean, active ]
          - [ vector, offset ]
          - [ rotation, rot ]
      PROJECTOR:
        params:
          # This should almost certainly have asset semantics, but the server
          # appears to only allow 'string', though stringified UUID is fine?
          # Will need to fix that. Also, llGetPrimitiveParams does not allow reading:
          # https://feedback.secondlife.com/scripting-features/p/make-prim-projector-readable
          # https://community.secondlife.com/forums/topic/486118-only-set-ambiance-on-prim_projector#comment-2446570
          - [ string, texture ]
          - [ float, fov ]
          - [ float, focus ]
          - [ float, ambiance ]
      CLICK_ACTION:
        params:
          - [ integer, action ]
      REFLECTION_PROBE:
        params:
          - [ boolean, enabled ]
          - [ float, ambiance ]
          - [ float, clip_distance ]
          - [ integer, flags ]
      GLTF_NORMAL:
        face-target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      GLTF_EMISSIVE:
        face-target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, linear_emissive_tint ]
      GLTF_METALLIC_ROUGHNESS:
        face-target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ float, metallic_factor ]
          - [ float, roughness_factor ]
      GLTF_BASE_COLOR:
        face-target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, linear_color ]
          - [ float, alpha ]
          - [ integer, gltf_alpha_mode ]
          - [ float, alpha_mask_cutoff ]
          - [ boolean, double_sided ]
      RENDER_MATERIAL:
        face-target: true
        params:
          - [ asset, render_material ]
      SIT_FLAGS:
        params:
          - [ integer, flags ]
      DAMAGE:
        params:
          - [ float, damage ]
          - [ integer, damage_type ]
      HEALTH:
        params:
          - [ float, health ]
      COLLISION_SOUND:
        params:
          - [ asset, sound ]
          - [ float, volume ]

  http-params:
    type: table
    enum: HTTPRequestParam
    filler-tokens: [http]
    lua-type: HttpRequestParams

  particle-params:
    type: table
    enum: ParticleParam
    filler-tokens: [part, src]
    flag-enum: ParticleFlag
    flag-field: flags
    flag-mask: _MASK
    lua-module: llprim
    lua-fn: particleSystem
    lua-type: ParticleParams
    dispatch-fn: LinkParticleSystem

  prim-media-params:
    type: table
    enum: PrimMediaParam
    lua-module: llprim
    lua-fn: setMedia
    lua-type: MediaParams
    dispatch-fn: SetLinkMedia
