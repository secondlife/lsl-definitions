    tooltip: Render material (prim material ID or material overrides) has
      changed on one or more faces.
    type: integer
    value: '0x1000'
  CHANGED_SCALE:
    member-of: [ChangeType]
    tooltip: Prim scale of at least one prim in the linked object has changed.
