    member-of: [ChangeType]
    tooltip: Prim inventory has changed by someone who has modification rights
      to it.
    type: integer
    value: '0x1'
  CHANGED_LINK:
    member-of: [ChangeType]
    tooltip: Number of prims making up the object or avatars seated on it has
