    energy: 10.0
    func-id: 262
    pure: true
    return: string
    sleep: 0.3
    tooltip: Deprecated (use llXorBase64 instead). Retained for backwards
      compatibility. Incorrectly performs a bitwise exclusive OR (XOR) on Base64
      strings str1 and str2.
    categories:
      - data_conversion
  llXorBase64StringsCorrect:
