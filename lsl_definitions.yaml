      characters, dynamic obstacles like fast-moving objects and avatars, or
      both). Combined using bit flags; setting to AVOID_NONE disables avoidance
      for both categories.
    type: integer
    value: 5
    value-type: integer
    enum: CharacterAvoidanceMode
    default: AVOID_CHARACTERS | AVOID_DYNAMIC_OBSTACLES
  CHARACTER_CMD_JUMP:
