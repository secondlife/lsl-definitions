      motors to bank. 0.0 means no banking.
    type: integer
    value: 38
  VEHICLE_BANKING_MIX:
    member-of: [VehicleFloatParam]
    tooltip: Vehicle float parameter (range 0.0 (static) to 1.0) (dynamic) controlling the mix between
