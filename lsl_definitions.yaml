        tooltip: Offset relative to the prim's position, expressed in local
          coordinates.
        type: vector
    energy: 10.0
    func-id: 44
    must-use: true
    return: vector
    sleep: 0.0
    tooltip: Returns a vector representing the wind velocity at the prim's position
