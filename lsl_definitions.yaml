      when it is first rezzed.
    type: integer
    value: '0x80'
  CHANGED_REGION:
    member-of: [ChangeType]
    tooltip: Object has changed regions by crossing a boundary or teleporting
      (if attached). Triggers only in the root prim of a linkset.
    type: integer
    value: '0x100'
  CHANGED_REGION_START:
    member-of: [ChangeType]
    tooltip: Region containing this object has just come online.
    type: integer
    value: '0x400'
  CHANGED_RENDER_MATERIAL:
