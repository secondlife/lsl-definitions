types:
  float:
    tooltip: 32 bit floating point value.\nThe range is 1.175494351E-38 to 3.402823466E+38.
  integer:
    tooltip: "32 bit integer value.\\n\u22122,147,483,648 and +2,147,483,647 (that\
      \ is 0x80000000 to 0x7FFFFFFF in hex)."
  key:
    tooltip: A 128 bit unique identifier (UUID).\nThe key is represented as hexidecimal
      characters (A-F and 0-9), grouped into sections (8,4,4,4,12 characters) and
      separated by hyphens (for a total of 36 characters). e.g. "A822FF2B-FF02-461D-B45D-DCD10A2DE0C2".
  list:
    tooltip: A collection of other data types.\nLists are signified by square brackets
      surrounding their elements; the elements inside are separated by commas. e.g.
      [0, 1, 2, 3, 4] or ["Yes", "No", "Perhaps"].
  quaternion:
    private: true
    tooltip: The quaternion type is a left over from way back when LSL was created.
      It was later renamed to <rotation> to make it more user friendly, but it appears
      someone forgot to remove it ;-)
  rotation:
    tooltip: The rotation type is one of several ways to represent an orientation
      in 3D.\nIt is a mathematical object called a quaternion. You can think of a
      quaternion as four numbers (x, y, z, w), three of which represent the direction
      an object is facing and a fourth that represents the object's banking left or
      right around that direction.
  string:
    tooltip: Text data.\nThe editor accepts UTF-8 encoded text.
  vector:
    tooltip: A vector is a data type that contains a set of three float values.\nVectors
      are used to represent colors (RGB), positions, and directions/velocities.
controls:
  do:
    tooltip: do / while loop\ndo {\n...\n} while (<condition>);
  else:
    tooltip: if / else block\nif (<condition>) {\n...\n[} else [if (<condition>) {\n...]]\n}
  for:
    tooltip: for loop\nfor (<initializer>; <condition>; <post-iteration-statement>)\n{
      ...\n}
  if:
    tooltip: if / else block\nif (<condition>) {\n...\n[} else [if (<condition>) {\n...]]\n}
  jump:
    tooltip: jump statement\njump <label>
  return:
    tooltip: Leave current event or function.\nreturn [<variable>];\nOptionally pass
      back a variable's value, from a function.
  state:
    tooltip: state <target>\nIf the target state is not the same as the current one,
      change to the target state.
  while:
    tooltip: while loop\nwhile (<condition>) {\n...\n}

# These are usage-specific rulesets for dynamically typed lists used by various
# LSL APIs. The semantics are particular to each ruleset, though they should
# all use a `rules` keyed on whichever LSL enum value is related to that rule.
rulesets:
  prim_params:
    rules:
      # PRIM_TYPE_LEGACY intentionally omitted, it has very annoying semantics,
      #  has no "get" equivalent and isn't something anyone should use now.
      # PRIM_LINK_TARGET also omitted since it's a meta-rule that relates to
      #  all rules that follow it in the list, not an actual rule.
      # PRIM_CAST_SHADOWS ignored because it's not even implemented
      PRIM_MATERIAL:
        params:
          - [ integer, flag ]
      PRIM_PHYSICS:
        params:
          # Note that we use "asset" and "boolean" types to denote places where
          # `asset-semantics` or `bool-semantics` would apply.
          - [ boolean, enabled ]
      PRIM_TEMP_ON_REZ:
        params:
          - [ boolean, enabled ]
      PRIM_PHANTOM:
        params:
          - [ boolean, enabled ]
      PRIM_POSITION:
        params:
          - [ vector, position ]
      PRIM_SIZE:
        params:
          - [ vector, size ]
      PRIM_ROTATION:
        params:
          - [ rotation, rot ]
      PRIM_TYPE:
        params:
          # TODO: something so we can express an enum-like relationship,
          #  this actually only accepts ints that are `PRIM_TYPE_*` consts.
          - [ integer, prim_type ]
        variants_on: prim_type
        variants:
          - applies_to: [ PRIM_TYPE_BOX, PRIM_TYPE_CYLINDER, PRIM_TYPE_PRISM ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, top_size ]
              - [ vector, top_shear ]
          - applies_to: [ PRIM_TYPE_SPHERE ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, dimple ]
          - applies_to: [ PRIM_TYPE_TORUS, PRIM_TYPE_TUBE, PRIM_TYPE_RING ]
            params:
              - [ integer, hole_type ]
              - [ vector, cut ]
              - [ float, hollow ]
              - [ vector, twist ]
              - [ vector, hole_size ]
              - [ vector, top_shear ]
              - [ vector, advanced_cut ]
              - [ vector, taper ]
              - [ float, revolutions ]
              - [ float, radius_offset ]
              - [ float, skew ]
          - applies_to: [ PRIM_TYPE_SCULPT ]
            params:
              - [ asset,   texture ]
              - [ integer, type ]
      PRIM_TEXTURE:
        face_target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      PRIM_COLOR:
        face_target: true
        params:
          - [ vector, color ]
          - [ float, alpha ]
      PRIM_BUMP_SHINY:
        face_target: true
        params:
          - [ integer, shiny ]
          - [ integer, bump ]
      PRIM_FULLBRIGHT:
        face_target: true
        params:
          - [ boolean, enabled ]
      PRIM_FLEXIBLE:
        params:
          - [ boolean, enabled ]
          - [ integer, softness ]
          - [ float, gravity ]
          - [ float, friction ]
          - [ float, wind ]
          - [ float, tension ]
          - [ vector, force ]
      PRIM_TEXGEN:
        face_target: true
        params:
          - [ integer, mode ]
      PRIM_POINT_LIGHT:
        params:
          - [ boolean, enabled ]
          - [ vector, linear_color ]
          - [ float, intensity ]
          - [ float, radius ]
          - [ float, falloff ]
      PRIM_GLOW:
        face_target: true
        params:
          - [ float, intensity ]
      PRIM_TEXT:
        params:
          - [ string, text ]
          - [ vector, color ]
          - [ float, alpha ]
      PRIM_NAME:
        params:
          - [ string, name ]
      PRIM_DESC:
        params:
          - [ string, description ]
      PRIM_ROT_LOCAL:
        params:
          - [ rotation, rot ]
      PRIM_PHYSICS_SHAPE_TYPE:
        params:
          - [ integer, shape_type ]
      PRIM_OMEGA:
        params:
          - [ vector, axis ]
          - [ float, spinrate ]
          - [ float, gain ]
      PRIM_POS_LOCAL:
        params:
          - [ vector, position ]
      PRIM_SLICE:
        params:
          - [ vector, slice ]
      PRIM_SPECULAR:
        face_target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, color ]
          - [ integer, glossiness ]
          - [ integer, environment ]
      PRIM_NORMAL:
        face_target: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      PRIM_ALPHA_MODE:
        face_target: true
        params:
          - [ integer, alpha_mode ]
          - [ integer, mask_cutoff ]
      PRIM_ALLOW_UNSIT:
        params:
          - [ boolean, allowed ]
      PRIM_SCRIPTED_SIT_ONLY:
        params:
          - [ boolean, enabled ]
      PRIM_SIT_TARGET:
        params:
          - [ boolean, active ]
          - [ vector, offset ]
          - [ rotation, rot ]
      PRIM_PROJECTOR:
        params:
          # This should almost certainly have asset semantics, but the server
          # appears to only allow `string`, though stringified UUID is fine?
          # Will need to fix that, but we need `asset` here since the `get`
          # may still return a UUID.
          - [ asset, texture ]
          - [ float, fov ]
          - [ float, focus ]
          - [ float, ambiance ]
      PRIM_CLICK_ACTION:
        params:
          - [ integer, action ]
      PRIM_REFLECTION_PROBE:
        params:
          - [ boolean, enabled ]
          - [ float, ambiance ]
          - [ float, clip_distance ]
          - [ integer, flags ]
      PRIM_GLTF_NORMAL:
        face_target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
      PRIM_GLTF_EMISSIVE:
        face_target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, linear_emissive_tint ]
      PRIM_GLTF_METALLIC_ROUGHNESS:
        face_target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ float, metallic_factor ]
          - [ float, roughness_factor ]
      PRIM_GLTF_BASE_COLOR:
        face_target: true
        nullable: true
        params:
          - [ asset, texture ]
          - [ vector, repeats ]
          - [ vector, offsets ]
          - [ float, rotation_in_radians ]
          - [ vector, linear_color ]
          - [ float, alpha ]
          - [ integer, gltf_alpha_mode ]
          - [ float, alpha_mask_cutoff ]
          - [ boolean, double_sided ]
      PRIM_RENDER_MATERIAL:
        face_target: true
        params:
          - [ asset, render_material ]
      PRIM_SIT_FLAGS:
        params:
          - [ integer, flags ]
      PRIM_DAMAGE:
        params:
          - [ float, damage ]
          - [ integer, damage_type ]
      PRIM_HEALTH:
        params:
          - [ float, health ]
      PRIM_COLLISION_SOUND:
        params:
          - [ asset, sound ]
          - [ float, volume ]
