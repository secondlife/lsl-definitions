    tooltip: Broadcasts the message msg to all scripts or agents listening on channel
      within llGetEnv("whisper_range"), which is 10m on most regions.
      Agents listen on PUBLIC_CHANNEL (0) and DEBUG_CHANNEL (2147483647).
      All other channels are for script-to-script communication.
    categories:
      - avatar_communication
      - chat
      - script_communication
  llWind:
    arguments:
