    tooltip: Prim base shape (PRIM_TYPE, such as box, prism, torus, taper,
      twist, or cut) has changed.
    type: integer
    value: '0x4'
  CHANGED_TELEPORT:
    member-of: [ChangeType]
    tooltip: Avatar this object is attached to has teleported. Triggers only in
      the root prim of an attachment. Does not occur for child prims or 'sit
